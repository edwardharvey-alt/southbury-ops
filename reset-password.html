<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset password — Hearth</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --rp-brand-primary: var(--h-accent, #8B6B3F);
      --rp-brand-secondary: var(--h-accent-2, #CBB89D);
      --rp-brand-soft: rgba(139,107,63,0.10);
      --rp-brand-soft-2: rgba(203,184,157,0.08);
    }

    body.rpBody{
      background:
        radial-gradient(1200px 600px at 15% -10%, var(--rp-brand-soft), rgba(249,115,22,0) 60%),
        radial-gradient(900px 450px at 90% 0%, var(--rp-brand-soft-2), rgba(251,146,60,0) 55%),
        #f7f5f1;
      min-height:100vh;
    }

    .rpPage{
      max-width:440px;
      margin:0 auto;
      padding:56px 20px 72px;
      display:grid;
      gap:28px;
    }

    .rpWordmark{
      text-align:center;
      padding:4px 0 4px;
    }

    .rpWordmarkText{
      display:inline-block;
      font-size:22px;
      font-weight:950;
      letter-spacing:-0.035em;
      color:#1f2937;
      margin:0;
    }

    .rpWordmarkDot{
      display:inline-block;
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--rp-brand-primary), var(--rp-brand-secondary));
      margin-left:6px;
      vertical-align:middle;
      transform:translateY(-2px);
    }

    .rpCard{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:32px 28px;
      display:grid;
      gap:20px;
    }

    .rpHeader{
      display:grid;
      gap:8px;
    }

    .rpTitle{
      font-size:28px;
      font-weight:950;
      letter-spacing:-0.035em;
      line-height:1.1;
      color:#1f2937;
      margin:0;
    }

    .rpSub{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    .rpForm{
      display:grid;
      gap:14px;
    }

    .rpField{
      display:grid;
      gap:6px;
    }

    .rpLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .rpInput{
      appearance:none;
      width:100%;
      box-sizing:border-box;
      min-height:46px;
      padding:0 14px;
      border:1px solid #d9d2c3;
      border-radius:12px;
      background:#fbf8f3;
      font-size:15px;
      font-weight:600;
      color:#1f2937;
      font-family:inherit;
      transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .rpInput:focus{
      outline:none;
      border-color:var(--rp-brand-primary);
      background:#fff;
      box-shadow:0 0 0 3px rgba(139,107,63,0.15);
    }

    .rpInput:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .rpButton{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:48px;
      padding:0 18px;
      border-radius:12px;
      background:linear-gradient(135deg, var(--rp-brand-primary), var(--rp-brand-secondary));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.01em;
      font-family:inherit;
      transition:transform .08s ease, box-shadow .15s ease, opacity .15s ease;
    }

    .rpButton:hover:not(:disabled){
      box-shadow:0 4px 14px rgba(139,107,63,0.25);
    }

    .rpButton:active:not(:disabled){
      transform:translateY(1px);
    }

    .rpButton:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .rpError{
      font-size:13px;
      font-weight:700;
      color:#b45309;
      background:rgba(180,83,9,0.08);
      border:1px solid rgba(180,83,9,0.18);
      border-radius:10px;
      padding:10px 12px;
      margin:0;
      line-height:1.45;
    }

    .rpError[hidden]{
      display:none !important;
    }

    /* Sent state */
    .rpSent{
      display:grid;
      gap:14px;
      padding:4px 0 2px;
    }

    .rpSentTitle{
      font-size:20px;
      font-weight:950;
      letter-spacing:-0.03em;
      color:#1f2937;
      margin:0;
    }

    .rpSentBody{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    .rpSentBody strong{
      color:#1f2937;
      font-weight:900;
    }

    .rpFoot{
      text-align:center;
      font-size:13px;
      font-weight:700;
      color:#6b7280;
    }

    .rpFoot a{
      color:var(--rp-brand-primary);
      text-decoration:none;
      font-weight:900;
    }

    .rpFoot a:hover{
      text-decoration:underline;
    }

    @media (max-width:600px){
      .rpPage{
        padding:36px 14px 56px;
        gap:22px;
      }
      .rpCard{
        padding:26px 20px;
      }
      .rpTitle{
        font-size:24px;
      }
    }
  </style>
</head>
<body class="rpBody">

  <div class="rpPage">
    <div class="rpWordmark">
      <p class="rpWordmarkText">Hearth<span class="rpWordmarkDot" aria-hidden="true"></span></p>
    </div>

    <div class="rpCard">
      <div class="rpHeader">
        <h1 class="rpTitle">Reset your password</h1>
        <p class="rpSub">Enter your email and we'll send you a link to set a new password.</p>
      </div>

      <form class="rpForm" id="rpForm" novalidate>
        <div class="rpField">
          <label class="rpLabel" for="rpEmail">Email address</label>
          <input
            class="rpInput"
            type="email"
            id="rpEmail"
            name="email"
            autocomplete="email"
            inputmode="email"
            placeholder="you@yourvendor.co.uk"
            required
          />
        </div>
        <p class="rpError" id="rpError" hidden></p>
        <button class="rpButton" type="submit" id="rpSubmit">Send reset link</button>
      </form>

      <div class="rpSent" id="rpSent" hidden>
        <h2 class="rpSentTitle">Check your inbox</h2>
        <p class="rpSentBody">If an account exists for <strong id="rpSentEmail"></strong>, we've sent a link to reset your password.</p>
        <p class="rpSentBody">Check your spam folder if you don't see it within a minute.</p>
      </div>
    </div>

    <p class="rpFoot"><a href="./login.html">Back to sign in →</a></p>
  </div>

  <script>
    const _sb = supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const formEl = document.getElementById("rpForm");
    const emailEl = document.getElementById("rpEmail");
    const submitEl = document.getElementById("rpSubmit");
    const errorEl = document.getElementById("rpError");
    const sentEl = document.getElementById("rpSent");
    const sentEmailEl = document.getElementById("rpSentEmail");

    function showError(message){
      errorEl.textContent = message;
      errorEl.hidden = false;
    }

    function clearError(){
      errorEl.textContent = "";
      errorEl.hidden = true;
    }

    function showSent(email){
      formEl.hidden = true;
      sentEmailEl.textContent = email;
      sentEl.hidden = false;
    }

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearError();

      const email = (emailEl.value || "").trim();
      if (!email){
        showError("Please enter your email address.");
        return;
      }

      const looksValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      if (!looksValid){
        showError("That doesn't look like a valid email address.");
        return;
      }

      submitEl.disabled = true;
      emailEl.disabled = true;
      submitEl.textContent = "Sending…";

      try {
        const { error } = await _sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + "/auth-callback.html",
        });

        if (error) throw error;

        showSent(email);
      } catch (err){
        console.error(err);
        showError(
          (err && err.message)
            ? err.message
            : "Something went wrong. Please try again."
        );
        submitEl.disabled = false;
        emailEl.disabled = false;
        submitEl.textContent = "Send reset link";
      }
    });
  </script>
</body>
</html>
