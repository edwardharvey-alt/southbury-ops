<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hearth — Activation</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="./assets/hearth-vendor.js?v=1"></script>
  <script src="./assets/vendor-nav.js?v=2"></script>
  <script src="./assets/hearth-photo-upload.js?v=1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* The .home-* classes used below live in home.html's inline <style>,
       not in hearth.css — mirror the rules this page uses so Activation
       renders consistently with the Home page. */
    :root{
      --home-bg: var(--h-chalk, #faf8f5);
      --home-card:#ffffff;
      --home-border: var(--h-cinder, #e8ddd5);
      --home-text: var(--h-coal, #0f0b08);
      --home-muted: var(--h-stone, #8c7b6e);
      --home-accent: var(--h-fire, #c4511a);
      --home-radius:20px;
      --home-shadow:0 10px 30px rgba(15,23,42,.05);
      --home-good:#166534;
      --home-good-bg:#ecfdf3;
      --home-warn:#92400e;
      --home-warn-bg:#fffbeb;
      --home-neutral-bg:#f3f4f6;
      --home-neutral:#374151;
    }

    /* iOS Safari horizontal-overflow guard — must sit on html, not body
       alone (operational learning #32). Keeps the activation detail view
       free of horizontal scroll regardless of any single overrunning child. */
    html, body {
      overflow-x: hidden;
      max-width: 100%;
    }

    body{
      background:var(--home-bg);
      color:var(--home-text);
      font-family: 'Figtree', system-ui, sans-serif;
    }

    .home-shell{
      display:grid;
      gap:18px;
      padding-bottom:40px;
    }

    .home-card{
      background:var(--home-card);
      border:1px solid var(--home-border);
      border-radius:var(--home-radius);
      box-shadow:var(--home-shadow);
    }

    .home-pad-lg{ padding:22px; }

    .home-sectionTitle{
      margin:0;
      font-size:20px;
      letter-spacing:-.02em;
    }

    .home-sectionSub{
      margin:4px 0 0;
      color:var(--home-muted);
      font-size:13px;
    }

    .home-empty{
      border:1px dashed #d6cdbc;
      border-radius:16px;
      padding:22px;
      background:#fcfbf8;
      color:var(--home-muted);
      text-align:center;
      font-size:14px;
      line-height:1.55;
    }

    .home-loading{
      color:var(--home-muted);
      font-size:14px;
    }

    /* Single-column cards grid — full width to give the action area room. */
    .activation-grid{
      display:grid;
      gap:14px;
    }

    /* Redesigned overview drop cards (actod = activation overview drop). */
    .actod-card{ background:#fff; border:1px solid #efe7da; border-radius:14px; padding:20px 22px; }
    .actod-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    .actod-title{ font-family:'Cormorant Garamond', Georgia, serif; font-size:23px; font-weight:600; line-height:1.15; color:#1F2937; margin:0; }
    .actod-meta{ font-size:13px; color:#9a8b73; margin-top:3px; line-height:1.5; }
    .actod-status{ display:inline-flex; align-items:center; gap:6px; font-size:12px; white-space:nowrap; }
    .actod-status--live{ color:#5f7d5f; }
    .actod-status--muted{ color:#b6a98f; }
    .actod-dot{ width:7px; height:7px; border-radius:50%; background:#7d9a7d; display:inline-block; }
    .actod-chip{ font-size:12px; font-weight:600; border-radius:99px; padding:4px 11px; white-space:nowrap; }
    .actod-chip--filling{ color:#8a5a1f; background:#f6ecd9; }
    .actod-chip--full{ color:#7a3b1d; background:#f3e0d6; }
    .actod-metric{ margin-top:18px; }
    .actod-metric-head{ display:flex; justify-content:space-between; align-items:baseline; }
    .actod-metric-label{ font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:#b6a98f; font-weight:600; }
    .actod-metric-count{ font-size:14px; color:#6b7280; }
    .actod-metric-count strong{ font-weight:600; color:#1F2937; }
    .actod-track{ height:6px; background:#f0e9dd; border-radius:99px; margin-top:8px; overflow:hidden; }
    .actod-fill{ height:100%; background:var(--h-fire); border-radius:99px; }
    .actod-foot{ display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-top:18px; }
    .actod-next{ font-size:13px; color:#6b7280; }
    .actod-next-key{ color:var(--h-fire); font-weight:600; }
    .actod-next--done{ color:#5f7d5f; }
    .actod-sep{ color:#c9bca3; }
    .actod-steps{ color:#9a8b73; }
    .actod-actions{ display:flex; align-items:center; gap:18px; }
    .actod-link{ font-size:13px; color:#9a8b73; text-decoration:none; }
    .actod-link:hover{ color:#1F2937; }
    .actod-cta{ font-family:'Figtree', system-ui, sans-serif; font-size:13px; font-weight:600; color:#fff; background:var(--h-fire); border:none; border-radius:9px; padding:9px 16px; text-decoration:none; white-space:nowrap; }
    .actod-cta:hover{ background:#75592f; }

    .home-pill{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      white-space:nowrap;
    }
    .good{ background:var(--home-good-bg); color:var(--home-good); }
    .warn{ background:var(--home-warn-bg); color:var(--home-warn); }
    .neutral{ background:var(--home-neutral-bg); color:var(--home-neutral); }

    .home-button,
    .home-button-secondary{
      appearance:none;
      border:none;
      text-decoration:none;
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font:inherit;
      cursor:pointer;
      transition:all .18s ease;
    }
    .home-button-secondary{
      background:#fff;
      border:1px solid var(--home-border);
      color:var(--home-text);
    }
    .home-button{
      background:var(--home-accent);
      color:#fff;
      font-weight:700;
    }
    .home-button-secondary:hover{
      border-color:#d8ccb8;
      background:#fcfbf8;
    }
    .home-button:hover{
      filter:brightness(.98);
    }

    /* Menu card artwork — ported verbatim from drop-manager.html. The
       artwork is always 540×540px and scaled down via transform to fit
       its frame; transform-origin top-left keeps the html2canvas export
       pixel-identical to the preview. */
    .menuCardArtwork {
      width: 540px;
      height: 540px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      font-family: 'Figtree', system-ui, sans-serif;
      transform-origin: top left;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      --vendor-brand-primary: #8B6B3F;
      background-color: var(--vendor-brand-primary);
    }

    .menuCardArtwork__image {
      position: absolute;
      display: block;
    }

    .menuCardArtwork__scrim {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0) 25%,
        rgba(0,0,0,0.38) 52%,
        rgba(0,0,0,0.74) 76%,
        rgba(0,0,0,0.92) 100%
      );
      pointer-events: none;
    }

    .menuCardArtwork__lockup {
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 32px;
      color: #FAF8F4;
      text-align: left;
    }

    .menuCardArtwork__dropName {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0.005em;
      margin: 0;
      color: #FAF8F4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45), 0 0 14px rgba(0,0,0,0.35);
    }

    .menuCardArtwork__dropDate {
      margin-top: 6px;
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 500;
      font-size: 13px;
      line-height: 1.2;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #FAF8F4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45), 0 0 14px rgba(0,0,0,0.35);
    }

    .menuCardArtwork__skeleton {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F3EEE6 0%, #EBE4D6 100%);
      color: var(--h-slate);
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Per-drop activation timeline */
    .act-timeline {
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 24px;
      border-left: 2px solid var(--home-border);
      margin-top: 18px;
    }

    .act-touchpoint {
      background: #fff;
      border: 1px solid var(--home-border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      position: relative;
    }

    .act-touchpoint::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--home-border);
      border: 2px solid var(--home-bg);
    }

    .act-touchpoint.is-vendor::before { background: var(--home-accent); }
    .act-touchpoint.is-host::before { background: #CBB89D; }
    .act-touchpoint.is-auto::before { background: #166534; }
    .act-touchpoint.is-prompted::before { background: var(--home-muted); }

    .act-touchpoint.is-host {
      background: rgba(139,107,63,0.03);
    }

    .act-touchpoint.is-auto {
      border-left: 3px solid #ecfdf3;
    }

    .act-touchpoint.is-locked {
      opacity: 0.55;
    }

    .act-touchpoint.is-done {
      opacity: 0.7;
    }

    .act-day-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--home-muted);
      margin-bottom: 6px;
    }

    .act-touchpoint h4 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
    }

    /* Collapsible touchpoint disclosure — the heading row is the toggle.
       Mirrors the host-view "Share with your community" collapse pattern. */
    .act-tp-toggle {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: inherit;
    }

    .act-tp-heading {
      display: block;
      min-width: 0;
    }

    .act-tp-title {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .act-tp-chevron {
      flex-shrink: 0;
      font-size: 20px;
      line-height: 1.2;
      color: var(--home-muted);
      transform: rotate(0deg);
      transition: transform 0.18s ease;
    }

    .act-tp-toggle[aria-expanded="true"] .act-tp-chevron {
      transform: rotate(90deg);
    }

    /* Right-side header cluster: optional channel badge + chevron. */
    .act-tp-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Non-interactive label naming a single-channel touchpoint's destination.
       Calm Hearth sand/brown pill — the slot the ordering-open card will later
       replace with a channel selector. */
    .act-channel-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #8b6b3f;
      background: rgba(139,107,63,0.10);
      border: 1px solid rgba(139,107,63,0.18);
      border-radius: 999px;
      padding: 3px 9px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .act-tp-body {
      margin-top: 10px;
    }

    .act-tp-body.act-tp-body--collapsed {
      display: none;
    }

    .act-touchpoint p {
      margin: 0 0 12px;
      color: var(--home-muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .act-locked-note {
      font-size: 12px;
      color: var(--home-muted);
      font-style: italic;
    }

    .act-done-state {
      font-size: 13px;
      color: #166534;
      font-weight: 600;
    }

    .act-copy-btn {
      appearance: none;
      border: 1px solid var(--home-border);
      background: #fff;
      color: var(--home-text);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.18s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .act-copy-btn:hover {
      border-color: #d8ccb8;
      background: #fcfbf8;
    }

    .act-copy-btn.primary {
      background: var(--home-accent);
      border-color: var(--home-accent);
      color: #fff;
    }

    .act-channel-bar{ display:inline-flex; flex-wrap:wrap; gap:4px; padding:4px; background:rgba(139,107,63,0.08); border:1px solid rgba(139,107,63,0.16); border-radius:999px; margin-bottom:10px; align-self: flex-start; max-width:100%; }
    .act-zone{ display:flex; flex-direction:column; gap:10px; align-items:flex-start; padding-top:18px; border-top:1px solid #efe9df; }
    .act-zone:first-child{ padding-top:0; border-top:none; }
    .act-zone-label{ font-family:'Figtree', system-ui, sans-serif; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:#9a8b73; margin-bottom:2px; }
    .act-social-grid{ display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
    .act-social-grid > .act-zone{ border-top:none; padding-top:0; }
    .act-social-grid > .act-zone:first-child{ flex:0 0 280px; }
    .act-social-grid > .act-zone:last-child{ flex:1 1 300px; min-width:280px; }
    .act-photo-controls{ display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
    .act-photo-controls__swatches{ flex:0 1 auto; max-width:240px; }
    .act-photo-controls__upload{ flex:0 0 132px; }
    #act-socialImageUploadContainer,
    #act-revealImageUploadContainer,
    #act-capacityImageUploadContainer{ max-width:132px; }
    /* Quiet, compact styling for the upload helper in this context only. */
    #act-socialImageUploadContainer .hpu-add-btn,
    #act-revealImageUploadContainer .hpu-add-btn,
    #act-capacityImageUploadContainer .hpu-add-btn{ padding:9px 14px; font-size:12px; white-space:nowrap; }
    #act-socialImageUploadContainer .hpu-btn,
    #act-revealImageUploadContainer .hpu-btn,
    #act-capacityImageUploadContainer .hpu-btn{ padding:7px 12px; font-size:12px; }
    #act-socialImageUploadContainer .hpu-guidance,
    #act-revealImageUploadContainer .hpu-guidance,
    #act-capacityImageUploadContainer .hpu-guidance{ margin-top:8px; background:none; border:none; border-radius:0; padding:0; }
    #act-socialImageUploadContainer .hpu-guidance > summary,
    #act-revealImageUploadContainer .hpu-guidance > summary,
    #act-capacityImageUploadContainer .hpu-guidance > summary{ padding:0; font-size:12px; font-weight:600; color:#9a8b73; }
    #act-socialImageUploadContainer .hpu-guidance[open] > summary,
    #act-revealImageUploadContainer .hpu-guidance[open] > summary,
    #act-capacityImageUploadContainer .hpu-guidance[open] > summary{ border-bottom:none; }
    /* Card 6 capacity-signal wording options (pick one; number system-filled). */
    .act-capacity-wordings{ display:flex; flex-direction:column; gap:8px; align-self:stretch; width:100%; }
    .act-capacity-wording{ text-align:left; font-family:'Figtree', system-ui, sans-serif; font-size:14px; line-height:1.5; color:#1f2937; background:#faf8f4; border:1.5px solid #efe9df; border-radius:10px; padding:12px 14px; cursor:pointer; transition:border-color .15s ease, background .15s ease; }
    .act-capacity-wording:hover{ border-color:#cbb89d; }
    .act-capacity-wording.is-selected{ border-color:var(--h-fire); background:#fff; }
    .act-channel-pill{ font-family:'Figtree', system-ui, sans-serif; font-size:12px; font-weight:800; letter-spacing:-0.01em; color:#6b7280; background:none; border:none; border-radius:999px; padding:6px 14px; cursor:pointer; transition:background .2s ease, color .2s ease; }
    .act-channel-pill:hover{ color:#1f2937; }
    .act-channel-pill.is-active{ background:#fff; color:#6b4c1f; box-shadow:0 1px 3px rgba(15,23,42,0.08); }

    /* One-tap adjustment chips on the vendor_open composer. Deliberately
       lighter than the channel pills — these refine the current draft, they
       are not a primary control. */
    .act-chip-row{ display:inline-flex; flex-wrap:wrap; gap:6px; align-self:flex-start; }
    .act-chip{ font-family:'Figtree', system-ui, sans-serif; font-size:12px; font-weight:700; letter-spacing:-0.01em; color:#6b4c1f; background:rgba(139,107,63,0.07); border:1px solid rgba(139,107,63,0.18); border-radius:999px; padding:5px 12px; cursor:pointer; transition:background .2s ease, border-color .2s ease; }
    .act-chip:hover{ background:rgba(139,107,63,0.13); border-color:rgba(139,107,63,0.30); }

    /* Persistent on/off format toggles for the Social channel. Read as
       settings, not one-tap adjustments — off is a subtle outline with an
       empty dot; on (.is-on) fills with brand colour and a light dot. */
    .act-social-toggles{ display:inline-flex; flex-wrap:wrap; gap:8px; align-self:flex-start; margin-top:8px; max-width:100%; }
    .act-social-toggle{ display:inline-flex; align-items:center; gap:7px; font-family:'Figtree', system-ui, sans-serif; font-size:12px; font-weight:700; letter-spacing:-0.01em; color:#6b4c1f; background:#fff; border:1px solid rgba(139,107,63,0.30); border-radius:8px; padding:6px 12px; cursor:pointer; transition:background .2s ease, border-color .2s ease, color .2s ease; }
    .act-social-toggle::before{ content:''; width:9px; height:9px; border-radius:50%; border:1.5px solid rgba(139,107,63,0.45); background:transparent; transition:background .2s ease, border-color .2s ease; }
    .act-social-toggle:hover{ border-color:rgba(139,107,63,0.55); }
    .act-social-toggle.is-on{ background:#8B6B3F; border-color:#8B6B3F; color:#fff; }
    .act-social-toggle.is-on::before{ background:#fff; border-color:#fff; }

    .act-copy-btn.primary:hover {
      filter: brightness(0.96);
    }

    .act-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      margin-top: 4px;
    }

    .act-note {
      font-size: 12px;
      color: var(--home-muted);
      margin-top: 4px;
    }

    .act-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--home-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      margin-bottom: 16px;
    }

    .act-back-link:hover {
      color: var(--home-text);
    }

    .act-drop-header {
      margin-bottom: 4px;
    }

    .act-drop-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 28px;
      letter-spacing: -0.03em;
      margin: 0 0 4px;
    }

    .act-drop-context {
      font-size: 14px;
      color: var(--home-muted);
      margin: 0 0 4px;
    }

    /* Two-region per-drop layout: timeline (left) | live-stats aside (right,
       sticky on desktop). Mirrors host-view's hvLayout / hvLayoutAside. */
    .act-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      align-items: start;
    }

    .act-layout-main {
      min-width: 0;
    }

    .act-layout-aside {
      position: sticky;
      top: 24px;
      margin-top: 18px;
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    /* Live-stats card — mirrors host-view's hvCard / hvStat* styling. */
    .act-stat-card {
      background: #fff;
      border: 1px solid #e9e3d8;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(15,23,42,0.04);
      padding: 20px 20px 22px;
      display: grid;
      gap: 16px;
    }

    .act-stat-eyebrow {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--h-fire);
      margin: 0;
    }

    .act-stat-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
    }

    .act-stat-label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin: 0;
    }

    .act-stat-value {
      font-size: 30px;

    /* Containment for the cards layered inside the page shell — prevents

    .home-card,
    .act-touchpoint,
    .act-message-preview {

      max-width: 100%;
      min-width: 0;
    }

    @media (max-width: 768px) {
      .home-shell {
        padding: 0;
      }

      .home-card {
        border-radius: 16px;
      }

      .act-timeline {
        padding-left: 16px;
        border-left-width: 2px;
      }

      .act-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .act-layout-aside {
        position: static;
        top: auto;

      }

      .act-message-preview {
        box-sizing: border-box;
        max-width: 100%;
        word-break: break-word;
        overflow-wrap: break-word;
      }

      .act-actions {
        max-width: 100%;
      }

      .act-copy-btn {
        max-width: 100%;
        white-space: normal;
        height: auto;
        min-height: 44px;
        padding: 8px 14px;
        text-align: center;
      }

      .act-drop-title {
        font-size: 22px;
      }

      /* Artwork frame — the SINGLE shared class for all three scaled
         social cards (menu/reveal = #act-menuCardFrame, orders-open =
         #act-ordersOpenFrame, capacity = #act-capacityFrame). Clamp the
         frame to the (now full-width) zone. */
      .menuCardArtworkFrame {
        width: 100% !important;
        min-width: 0 !important;
        max-width: 100% !important;
      }

      /* NOTE: the inner 540×540 artwork BOXES (.menuCardArtwork /
         .act-orders-open-artwork / .act-capacity-artwork) are deliberately
         NOT capped here. They must stay 540px in layout — the html2canvas
         export rasterises the live node at that size and the inner <img>
         cover geometry is welded to 540 (T5-25 hard rule). On-screen fit
         is achieved by the JS transform:scale() inside the fluid,
         overflow:hidden frame (.menuCardArtworkFrame, above) — never by
         shrinking the box. A previous attempt capped the box with
         max-width:100% !important; that was reverted because it would
         shrink the export and misalign the 540-welded children. */

      /* Scoped catch-all for the detail-card body: cropper canvas + form
         controls stay within their container. Deliberately EXCLUDES `img`
         and the `[class*="rtwork"]` boxes/images so the artwork cover
         geometry and the html2canvas export remain untouched. */
      .act-tp-body canvas,
      .act-tp-body textarea,
      .act-tp-body input {
        max-width: 100% !important;
        box-sizing: border-box !important;
      }

      /* Every editable field in the detail cards — full-width, border-box,
         and wrap long unbroken strings (e.g. order URLs in the message and
         caption textareas) instead of overrunning the edge. Covers the
         message/caption textareas, the email subject + body inputs, the
         reveal-line + reveal-dish fields, and the guidance / poster-hook
         inputs (several of which had no overflow-wrap before this fix). */
      .act-tp-body textarea,
      .act-tp-body input,
      .act-email-field input,
      .act-email-field textarea,
      .act-message-edit textarea,
      .act-reveal-fields textarea,
      .act-reveal-fields select,
      .act-guidance-input {
        width: 100% !important;
        box-sizing: border-box !important;
        overflow-wrap: anywhere !important;
      }

      /* The two-column image|message split (Cards 1, 4, 6) carries rigid
         280px zone widths for desktop. Those fixed bases + min-width:280px
         overrun the viewport on narrow phones (the primary horizontal-
         overflow cause — the card image looks "cut off" because the whole
         row runs past the screen edge). Stack both zones full-width on
         mobile so they reflow within the viewport.

         width:100% + min-width:0 stop the grid shrink-wrapping to its
         widest child (the 540px artwork box) — its parent .act-actions
         uses align-items:flex-start, which would otherwise size the grid
         to max-content (540+) and keep frame.clientWidth at 540, pinning
         the JS scale at 1. Forcing the grid to fill .act-actions makes the
         frame measure the true narrow width so scale drops below 1. */
      .act-social-grid {
        gap: 18px;
        width: 100% !important;
        min-width: 0 !important;
      }
      .act-social-grid > .act-zone:first-child,
      .act-social-grid > .act-zone:last-child {
        flex: 1 1 100% !important;
        min-width: 0 !important;
        max-width: 100% !important;
      }

      /* Caption / message / poster field containment.

         Root cause (audit-confirmed): two base rules carry fixed px
         widths — .act-message-edit (width:720px, :1102) and
         .act-poster-hook (width:600px, :1354). Their max-width:100%
         doesn't help because the enclosing .act-zone uses
         align-items:flex-start (a shrink-to-content cross axis), so the
         zone grows to the child's 720/600 preferred width and 100%
         resolves against that wide zone. Every other offender
         (.act-guidance-row, .act-guidance-input, .act-message-edit-row,
         .act-copy-error, .act-poster-generate) carries NO fixed width —
         it inherits the 720/600 from those two parents; .act-copy-error
         has no CSS rule at all (inline-styled block, full parent width).
         Constrain the real sources AND the named children so the column
         can never exceed the viewport, and let chip/field rows wrap. */
      .act-zone,
      .act-message-edit,
      .act-message-edit-row,
      .act-guidance-row,
      .act-guidance-input,
      .act-copy-error,
      .act-poster-hook,
      .act-poster-generate {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
      }

         URLs pasted into a caption/guidance field). */
      .act-guidance-input,
      .act-message-edit-row textarea,
      .act-copy-error,
      .act-email-send-error {
        overflow-wrap: anywhere !important;

         instead of pushing a chip past the edge. Fixes the ROW, not the
         chip width. .act-chip-row is already inline-flex+wrap; force wrap
         defensively and keep .act-message-edit-row wrapping too. */
      .act-chip-row,
      .act-message-edit-row {
        flex-wrap: wrap !important;
        gap: 6px !important;

  <div class="container">
    <div class="card headerBar">
      <div class="brand">
        <a class="brandMark" href="./home.html" aria-label="Hearth home">H</a>
        <div>
          <div class="brandTitle">Hearth</div>
          <div class="brandSubtitle" id="actHeaderVendorSub">Activation</div>
        </div>
      </div>
      <nav class="nav" id="operatorNav" aria-label="Primary"></nav>
      <script>HearthNav.renderNav('operatorNav', 'activation.html', { dotSlash: true });</script>
    </div>
    <div class="home-shell">

      <section class="home-card home-pad-lg">
        <h2 class="home-sectionTitle">Activation</h2>
        <p class="home-sectionSub">Fill your drops. The work of making each moment land.</p>
        <div id="activationContent" style="margin-top:18px;">
          <div class="home-loading">Loading your drops…</div>
        </div>

  <script>
    const sb = window.supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const state = {
      vendor: null,
      summaryById: {},
      rawById: {},
      products: [],
      selectedDropId: null,
      activationLog: [],
      view: 'cross',
      resizeObserver: null,
      _ordersOpenObserver: null,
      _capacityObserver: null,
      currentTemplates: {},
      expandedEmailCards: {},
      emailDrafts: {},
      messageDrafts: {},
      guidanceDrafts: {},
      expandedMessageCards: {},
      cardExpanded: {},  // cardNum (string) → explicit user toggle override; survives re-render
      _activationDropPhase: 'pre-open',  // current drop phase, drives auto-expand
      _nextActionOpened: false,  // render-scoped: set once the next-action card has auto-opened
      sendingEmail: {},  // touchpoint → true while in-flight
      generateLoading: {},  // touchpoint → true while AI copy generates
      emailBodyGenerated: {},  // touchpoint → true once body auto-generated
      messageGenerated: {},  // touchpoint → true once message copy generated
      posterHookGenerated: {},  // dropId → true once the till poster line is generated
      _posterHookDebounce: null  // debounce timer for manual poster-line edits
    };

    const DAY_MS = 24 * 60 * 60 * 1000;

    function byId(id){ return document.getElementById(id); }

    function escapeHtml(str){
      return String(str ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function titleCase(str){
      return String(str || '')
        .replace(/[_-]+/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function fmtTime(d){
      let h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${String(m).padStart(2,'0')}${ampm}`;
    }

    // "Friday 30 May · 6:00pm–8:00pm"
    function fmtDateTime(start, end){
      const ds = start ? new Date(start) : null;
      if (!ds || Number.isNaN(ds.getTime())) return 'Date to be confirmed';
      const datePart = ds.toLocaleDateString('en-GB', {
        weekday:'long', day:'numeric', month:'long'
      });
      let timePart = fmtTime(ds);
      const de = end ? new Date(end) : null;
      if (de && !Number.isNaN(de.getTime())) {
        timePart += `–${fmtTime(de)}`;
      }
      return `${datePart} · ${timePart}`;
    }

    function statusOf(s){
      return String(s.status || '').toLowerCase();
    }

    // ---- Cross-drop view (Prompt 2) ----------------------------------

    // Activation scope: live, or upcoming (published/scheduled/open within
    // the next 14 days), or recently closed (within the last 48 hours).
    function inScope(s){
      const status = statusOf(s);
      if (status === 'live') return true;

      if (status === 'published' || status === 'scheduled' || status === 'open') {
        const ds = Date.parse(s.delivery_start);
        if (Number.isNaN(ds)) return false;
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        const horizon = Date.now() + 14 * DAY_MS;
        return ds >= todayStart.getTime() && ds <= horizon;
      }

      if (status === 'closed') {
        const raw = state.rawById[s.drop_id];
        const closedRaw = s.closed_at ?? (raw && (raw.closed_at ?? raw.closes_at)) ?? s.closes_at;
        const cm = Date.parse(closedRaw);
        if (Number.isNaN(cm)) return false;
        const now = Date.now();
        return cm >= now - 48 * 60 * 60 * 1000 && cm <= now + 60 * 1000;
      }

      return false;
    }

    function scopeRank(s){
      const status = statusOf(s);
      if (status === 'live') return 0;
      if (status === 'closed') return 2;
      return 1; // upcoming
    }

    // live first, then upcoming by delivery_start asc, then recently closed
    // by delivery_start desc.
    function sortScoped(rows){
      return rows.slice().sort((a, b) => {
        const ra = scopeRank(a), rb = scopeRank(b);
        if (ra !== rb) return ra - rb;
        const da = Date.parse(a.delivery_start) || 0;
        const db = Date.parse(b.delivery_start) || 0;
        return ra === 2 ? db - da : da - db;
      });
    }

    function contextLine(s){
      if (s.host_name) return 'at ' + escapeHtml(s.host_name);
      const fm = String(s.fulfilment_mode || '').toLowerCase();
      if (fm === 'delivery') return 'Neighbourhood delivery';
      if (fm === 'collection') return 'Collection';
      if (fm) return escapeHtml(titleCase(fm));
      return '';
    }

    // Overview status: live drops near/at capacity get a meaningful chip;
    // otherwise a quiet live dot, or a muted scheduled/closed label.
    function overviewStatus(s){
      const st = statusOf(s);
      const placed = Number(s.order_count || 0);
      const total = s.capacity_units_total != null ? Number(s.capacity_units_total) : null;
      if (st === 'live' && total && total > 0){
        if (placed >= total) return { kind:'full', label:'Full' };
        if (placed >= 0.8 * total) return { kind:'filling', label:'Filling up' };
      }
      if (st === 'live') return { kind:'live', label:'Live' };
      if (st === 'closed') return { kind:'closed', label:'Closed' };
      return { kind:'scheduled', label:'Scheduled' };
    }

    function statusChip(s){
      const st = overviewStatus(s);
      if (st.kind === 'live'){
        return `<span class="actod-status actod-status--live"><span class="actod-dot"></span>Live</span>`;
      }
      if (st.kind === 'filling' || st.kind === 'full'){
        return `<span class="actod-chip actod-chip--${st.kind}">${escapeHtml(st.label)}</span>`;
      }
      return `<span class="actod-status actod-status--muted">${escapeHtml(st.label)}</span>`;
    }

    // The inner HTML for an overview card's "Next — … · X of N done" line.
    // Extracted so the suffix can be re-rendered in place once a drop's
    // persisted activation log is hydrated (see refreshCardProgress).
    function nextLineHtml(s){
      const progress = getDropProgress(s);
      const stepsSuffix = progress.total > 0
        ? ` <span class="actod-sep">·</span> <span class="actod-steps">${progress.completed} of ${progress.total} done</span>`
        : '';
      return (progress.nextTitle && progress.completed < progress.total)
        ? `<div class="actod-next"><span class="actod-next-key">Next</span> — ${escapeHtml(progress.nextTitle)}${stepsSuffix}</div>`
        : (progress.total > 0 && progress.completed === progress.total)
          ? `<div class="actod-next actod-next--done">All steps complete</div>`
          : '';
    }

    // Re-render a single overview card's progress line from current
    // state.activationLog. Called after that drop's log is hydrated so the
    // "X of N done" suffix reflects saved done-states. No-op if the card is
    // no longer in the DOM (e.g. the vendor navigated into a drop view).
    function refreshCardProgress(dropId){
      const s = state.summaryById[dropId];
      if (!s) return;
      const wrap = document.getElementById('actod-next-wrap-' + dropId);
      if (wrap) wrap.innerHTML = nextLineHtml(s);
    }

    function cardHtml(s){
      const host = s.host_name ? String(s.host_name) : '';
      const fm = String(s.fulfilment_mode || '').toLowerCase();
      const ctxName = host || (fm === 'delivery' ? 'Neighbourhood delivery' : fm === 'collection' ? 'Collection' : '');
      const isLive = statusOf(s) === 'live';

      const placed = Number(s.order_count || 0);
      const total = s.capacity_units_total != null ? Number(s.capacity_units_total) : null;
      const ordersPct = (total && total > 0) ? Math.min(100, Math.round((placed / total) * 100)) : 0;
      const ordersMetric = (total && total > 0)
        ? `<div class="actod-metric">
            <div class="actod-metric-head">
              <span class="actod-metric-label">Orders</span>
              <span class="actod-metric-count"><strong>${placed}</strong> of ${total}</span>
            </div>
            <div class="actod-track"><div class="actod-fill" style="width:${ordersPct}%"></div></div>
          </div>`
        : `<div class="actod-metric">
            <div class="actod-metric-head">
              <span class="actod-metric-label">Orders</span>
              <span class="actod-metric-count"><strong>${placed}</strong> placed</span>
            </div>
          </div>`;

      const nextLine = nextLineHtml(s);

      const sbLink = isLive
        ? `<a class="actod-link" href="${HearthNav.withVendor('./service-board.html')}">Service board</a>`
        : '';

      return `
        <article class="actod-card">
          <div class="actod-top">
            <div>
              <h3 class="actod-title">${escapeHtml(s.drop_name || 'Untitled drop')}</h3>
              <div class="actod-meta">${ctxName ? escapeHtml(ctxName) + '<br>' : ''}${escapeHtml(fmtDateTime(s.delivery_start, s.delivery_end))}</div>
            </div>
            ${statusChip(s)}
          </div>
          ${ordersMetric}
          <div class="actod-foot">
            <div class="actod-next-wrap" id="actod-next-wrap-${escapeHtml(s.drop_id)}">${nextLine}</div>
            <div class="actod-actions">
              ${sbLink}
              <a class="actod-cta" href="#" data-drop-id="${escapeHtml(s.drop_id)}">Open activation →</a>
            </div>
          </div>
        </article>
      `;
    }

    function renderContent(rows){
      const content = byId('activationContent');
      if (!rows.length) {
        content.innerHTML = `<div class="home-empty">No active or upcoming drops. Create your next drop in Drop Studio.</div>`;
        return;
      }
      content.innerHTML = `<div class="activation-grid">${rows.map(cardHtml).join('')}</div>`;
      // Cards render immediately with their un-hydrated step count (which is 0
      // until a drop's detail view is opened, because progress reads the
      // in-memory state.activationLog). Hydrate each shown drop's persisted log
      // and patch its "X of N done" suffix in place as the call resolves, so
      // the overview reflects saved progress without opening each drop. A
      // failed call leaves that card's count untouched.
      rows.forEach(s => {
        const dropId = s && s.drop_id;
        if (!dropId) return;
        hydrateDropLog(dropId).then(ok => { if (ok) refreshCardProgress(dropId); });
      });
    }

    async function loadDrops(){
      state.vendor = await window.HearthVendor.resolveVendor(sb);
      if (!state.vendor) throw new Error('Vendor resolution failed');

      const { data, error } = await sb.functions.invoke('list-drops', { body: {} });
      if (error) throw error;
      if (data && data.error) throw new Error(data.error);

      const summaries = Array.isArray(data?.drop_summaries) ? data.drop_summaries : [];
      const drops = Array.isArray(data?.drops) ? data.drops : [];

      state.rawById = {};
      drops.forEach(d => { state.rawById[d.id] = d; });
      state.summaryById = {};
      summaries.forEach(s => { state.summaryById[s.drop_id] = s; });

      return sortScoped(summaries.filter(inScope));
    }

    // ---- Per-drop view: helpers --------------------------------------

    function getOrderingLink(rawDrop) {
      const slug = rawDrop?.slug || '';
      if (!slug) return '';
      return `https://lovehearth.co.uk/order.html?drop=${encodeURIComponent(slug)}`;
    }

    function getTouchpointDayLabels(deliveryStart) {
      const ds = deliveryStart ? new Date(deliveryStart) : null;
      if (!ds || isNaN(ds.getTime())) {
        return [
          '4 DAYS BEFORE',
          '3 DAYS BEFORE — HOST',
          '1 DAY BEFORE — MORNING',
          '1 DAY BEFORE — 5PM',
          '1 DAY BEFORE — EVENING',
          'DROP DAY — MORNING',
          'DROP DAY — SERVICE',
          'DROP DAY — EVENING',
          'DAY AFTER — MORNING'
        ];
      }
      const day = (offset) => {
        const d = new Date(ds);
        d.setDate(d.getDate() + offset);
        return d.toLocaleDateString('en-GB', { weekday: 'long' }).toUpperCase();
      };
      return [
        `${day(-4)} — 4 DAYS BEFORE`,
        `${day(-3)} — HOST AWARENESS`,
        `${day(-1)} MORNING — EARLY ACCESS`,
        `${day(-1)} 5PM — ORDERING OPENS`,
        `${day(-1)} EVENING — HOST LINK`,
        `${day(0)} MORNING — CAPACITY SIGNAL`,
        `${day(0)} — SERVICE`,
        `${day(0)} EVENING — POST DROP`,
        `${day(1)} MORNING — THANK YOU`
      ];
    }

    function resolveOpenness(summary) {
      // An explicit vendor-set audience wins (set in Drop Studio for Hosted drops).
      if (summary.audience_scope === 'public') return 'open';
      if (summary.audience_scope === 'community') return 'closed';
      // No explicit signal: derive. Events are private; a drop with no host is an
      // open neighbourhood drop; any other host-anchored drop defaults to
      // community/closed — host leads, public posts off.
      if (summary.drop_type === 'event') return 'closed';
      return summary.host_name ? 'closed' : 'open';
    }

    // Returns the set of touchpoint card numbers relevant for this drop,
    // selected on two axes: openness (open / closed, host-driven via
    // resolveOpenness) and host present / absent. A closed drop drops the
    // public-Instagram cards (reveal 1, capacity 6, post-drop 8) and keeps
    // the host + email + ordering-open cards. optionalCards are shown but
    // don't block progress completion and are marked "(optional)" in title.
    function getDropProfile(summary) {
      const hasHost = !!summary.host_name;
      const openness = resolveOpenness(summary);

      // Card 4 ("Ordering opens") deliverable descriptor — resolved here, not
      // via inline checks in the render. A closed drop drops the public
      // Instagram image and the 'social' copy channel, and its poster is a
      // pinned-up noticeboard sheet rather than a till-side card.
      const card4 = openness === 'open'
        ? { instagram: true,  poster: 'till',        channels: ['whatsapp', 'social', 'email'] }
        : { instagram: false, poster: 'noticeboard', channels: ['whatsapp'] };

      // Card 5 ("Ask your host to drop the link") deliverable descriptor — a
      // closed drop drops the public 'social' channel and reframes the copy.
      const card5 = openness === 'open'
        ? { channels: ['whatsapp', 'email', 'social'] }
        : { channels: ['whatsapp', 'email'] };

      if (openness === 'open'   && hasHost)  return { openness, card4, card5, cards: [1,2,3,4,5,6,7,8,9], optional: [] };
      if (openness === 'open'   && !hasHost) return { openness, card4, card5, cards: [1,3,4,6,7,8,9],     optional: [] };
      if (openness === 'closed' && hasHost)  return { openness, card4, card5, cards: [2,3,5,7,9],         optional: [] };
      /* closed && !hasHost */                return { openness, card4, card5, cards: [3,7,9],             optional: [] };
    }

    // Returns the activation log entries for a specific drop from
    // state.activationLog. The log entries have a dropId field stamped
    // when actLog() is called.
    function getDropLog(dropId) {
      return (state.activationLog || []).filter(e => e.dropId === dropId);
    }

    // Hydrate a single drop's activation log from the persisted store,
    // REPLACING that drop's in-memory entries. Mirrors the replace-per-drop
    // semantics in showDropView so it is idempotent — re-hydrating a drop
    // already opened/loaded this session never duplicates entries. Resolves
    // true on success, false if the call failed (caller keeps the
    // un-hydrated count rather than breaking).
    async function hydrateDropLog(dropId) {
      try {
        const { data: logRows, error: logError } = await sb.functions.invoke('activation-events', {
          body: { op: 'list', drop_id: dropId }
        });
        if (logError) { console.error('activation-events list failed', logError); return false; }
        if (!Array.isArray(logRows)) return false;
        state.activationLog = state.activationLog.filter(e => e.dropId !== dropId);
        // Rows arrive newest-first; reverse to oldest-first so first-match
        // helpers return the earliest entry per touchpoint (matches the
        // in-memory push order and showDropView's hydration).
        logRows.slice().reverse().forEach(row => {
          state.activationLog.push({
            touchpoint: row.touchpoint,
            action: row.action,
            dropId: row.drop_id,
            timestamp: row.created_at,
            ...(row.meta || {}),
            actor: row.actor
          });
        });
        return true;
      } catch (e) {
        console.error('activation-events list failed', e);
        return false;
      }
    }

    // Returns progress for a drop: { completed, total, nextTitle }
    function getDropProgress(summary) {
      const profile = getDropProfile(summary);
      const dropId = summary.drop_id;
      const log = getDropLog(dropId);

      // Map touchpoint card numbers to the actual logged touchpoint keys
      // (verified against the actLog() call sites in renderDropView — the
      // keys here are the ones the code really stamps, not the day-named
      // variants). Card 7 is a passive auto-card that never logs, so it has
      // no key and is excluded from counting below.
      const cardKeyMap = {
        1: 'menu_reveal',
        2: 'host_heads_up',
        3: 'early_access',
        4: 'vendor_open',
        5: 'host_link',
        6: 'capacity_signal',
        7: null,
        8: 'post_drop',
        9: 'thank_you'
      };

      const cardTitleMap = {
        1: 'Share reveal post',
        2: 'Send host WhatsApp',
        3: 'Send early access email',
        4: 'Tell customers ordering is live',
        5: 'Send host ordering link',
        6: 'Share capacity signal',
        7: 'Order ready notifications',
        8: 'Post drop content',
        9: 'Send thank-you email'
      };

      // The only host-origin event that counts toward vendor progress is the
      // Card 5 link-share (the host is the legitimate finisher of that
      // touchpoint); every other host event stays excluded (the #332 fix).
      const loggedKeys = new Set(
        log.filter(e =>
          e.actor !== 'host' ||
          (e.touchpoint === 'host_link' && e.action === 'shared')
        ).map(e => e.touchpoint)
      );

      // Only count non-optional cards that actually have a loggable key
      // toward progress. Card 7 (key null) is passive and never completes,
      // so excluding it keeps 100% / "All steps complete" reachable.
      const countableCards = profile.cards.filter(
        n => !profile.optional.includes(n) && cardKeyMap[n]
      );
      const completed = countableCards.filter(n => loggedKeys.has(cardKeyMap[n])).length;
      const total = countableCards.length;

      // Next action: first unlogged countable card in profile order.
      const nextCard = profile.cards.find(
        n => cardKeyMap[n] && !loggedKeys.has(cardKeyMap[n])
      );
      const nextTitle = nextCard ? cardTitleMap[nextCard] : null;

      return { completed, total, nextTitle };
    }


    // "this Friday" / "this Friday evening"
    function actRelDay(value, withPartOfDay){
      if (!value) return 'soon';
      const d = new Date(value);
      if (isNaN(d.getTime())) return 'soon';
      const wd = d.toLocaleDateString('en-GB', { weekday: 'long' });
      if (!withPartOfDay) return `this ${wd}`;
      const h = d.getHours();
      const part = h >= 17 ? 'evening' : (h >= 12 ? 'afternoon' : 'morning');
      return `this ${wd} ${part}`;
    }

    function actWeekday(value, offset){
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      d.setDate(d.getDate() + (offset || 0));
      return d.toLocaleDateString('en-GB', { weekday: 'long' });
    }

    // "5:00pm on Friday 30 May", or "soon" when not set.
    function actOpensPhrase(opensAt){
      if (!opensAt) return 'soon';
      const d = new Date(opensAt);
      if (isNaN(d.getTime())) return 'soon';
      return `${fmtTime(d)} on ${actFormatMenuCardDate(d)}`;
    }

    function getLogEntry(touchpoint){
      // Vendor completion only: ignore host-origin events so a host copying
      // their message on host-view can never mark a vendor card done.
      // actor !== 'host' (not === 'vendor') so legacy/null-actor rows keep
      // counting exactly as before.
      return state.activationLog.find(e => e.touchpoint === touchpoint && e.actor !== 'host') || null;
    }

    function getHostShareSignal(touchpoint){
      // Host's own share, server-stamped actor='host' (host-view logHostShare).
      // Read SEPARATELY from getLogEntry, which excludes host events.
      return state.activationLog.find(e =>
        e.touchpoint === touchpoint && e.actor === 'host' && e.action === 'shared'
      ) || null;
    }

    function formatLogTime(isoString){
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return '';
      return fmtTime(d);
    }

    function formatMoneyPence(pence){
      const n = Number(pence || 0);
      return '£' + (n / 100).toFixed(2);
    }

    function actLog(touchpoint, action, meta = {}){
      const dropId = state.selectedDropId || null;
      state.activationLog.push({
        touchpoint,
        action,
        dropId,
        timestamp: new Date().toISOString(),
        ...meta
      });
      renderDropView(state.selectedDropId);
      // Persist alongside the in-memory update so the log survives reloads.
      // Non-blocking: the UI has already updated; a persist failure is logged
      // but never surfaced and never interrupts the flow.
      if (dropId) {
        sb.functions.invoke('activation-events', {
          body: { op: 'log', drop_id: dropId, touchpoint, action, meta }
        }).then(({ error }) => {
          if (error) console.error('activation-events log failed', error);
        }).catch(e => console.error('activation-events log failed', e));
      }
    }

    async function actCopyToClipboard(text, btn, originalLabel) {
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = 'Copied ✓';
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = originalLabel;
          btn.disabled = false;
        }, 2000);
      } catch (err) {
        console.error('Copy failed', err);
      }
    }

    // ---- Menu card (ported from drop-manager.html, act- prefix) ------

    function actFormatMenuCardDate(value) {
      if (!value) return "";
      const d = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString("en-GB", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });
    }

    function actComputeRevealDate(deliveryStart) {
      if (!deliveryStart) return null;
      const d = new Date(deliveryStart);
      if (Number.isNaN(d.getTime())) return null;
      const reveal = new Date(d.getTime() - 4 * 24 * 60 * 60 * 1000);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      if (reveal.getTime() < today.getTime()) return null;
      return reveal;
    }

    function actPopulateMenuCard(summary, rawDrop, vendor, products) {
      const artworkEl = byId("act-menuCardArtwork");
      const downloadBtn = byId("act-downloadMenuCardBtn");
      const skeletonEl = byId("act-menuCardSkeleton");
      if (!artworkEl) return;

      // Brand-colour solid is the last-resort fallback.
      artworkEl.style.setProperty("--vendor-brand-primary", (vendor && vendor.brand_primary_color) || "#8B6B3F");

      // Honour the drop's chosen photo via the shared resolver (social pick →
      // reveal product → vendor hero), so the menu card matches the other cards.
      const imageUrl = resolveDropSocialImage(rawDrop, vendor);

      // Explicit pixel geometry against the 540×540 source box so the
      // html2canvas scale:2 export matches the preview exactly.
      const img = byId("act-menuCardImage");
      const S = 540;
      if (img) {
        if (imageUrl) {
          img.onload = () => {
            const iw = img.naturalWidth, ih = img.naturalHeight;
            const sc = Math.max(S / iw, S / ih);
            const w = iw * sc, h = ih * sc;
            img.style.width  = w + "px";
            img.style.height = h + "px";
            img.style.left   = ((S - w) / 2) + "px";
            img.style.top    = ((S - h) / 2) + "px";
            img.style.display = "block";
            if (skeletonEl) skeletonEl.style.display = "none";
            if (downloadBtn) downloadBtn.disabled = false;
          };
          img.onerror = () => {
            img.style.display = "none";
            if (skeletonEl) skeletonEl.style.display = "none";
            if (downloadBtn) downloadBtn.disabled = false;
          };
          img.crossOrigin = "anonymous";
          img.src = imageUrl;
        } else {
          img.style.display = "none";
          img.removeAttribute("src");
          if (skeletonEl) skeletonEl.style.display = "none";
          if (downloadBtn) downloadBtn.disabled = false;
        }
      }

      const dropNameEl = byId("act-menuCardDropName");
      if (dropNameEl) dropNameEl.textContent = (rawDrop && rawDrop.name) || summary.drop_name || "";
      const dropDateEl = byId("act-menuCardDropDate");
      if (dropDateEl) dropDateEl.textContent = actFormatMenuCardDate((rawDrop && rawDrop.delivery_start) || summary.delivery_start);

      actUpdateMenuCardScale();
    }

    function actUpdateMenuCardScale() {
      const frame = byId("act-menuCardFrame");
      const artwork = byId("act-menuCardArtwork");

    function resolveDropSocialImage(rawDrop, vendor) {
      if (rawDrop && rawDrop.social_image_url) return String(rawDrop.social_image_url);

    // ---- Reveal fields (Card 1: reveal_line + reveal_product_id) -----

    let actRevealSaveTimer = null;

    // Persist the current reveal fields to update-drop. Silent on error —
    // the vendor isn't blocked; failures land in the console for debug.
    async function actSaveRevealFields(dropId) {
      if (!state.rawById[dropId]) return;
      const reveal_line = (state.rawById[dropId]?.reveal_line || '').trim() || null;
      const reveal_product_id = state.rawById[dropId]?.reveal_product_id || null;
      try {

          body: {
            vendor_id: state.vendor.id,
            drop_id: dropId,
            fields: { reveal_line, reveal_product_id }
          }
        });
        if (error) throw error;
        if (data && data.error) throw new Error(data.error);
        if (state.rawById[dropId]) {
          state.rawById[dropId].reveal_line = reveal_line;

    async function actSaveSocialImage(dropId, url) {
      if (!state.rawById[dropId]) return;
      try {
        const { data, error } = await sb.functions.invoke('update-drop', {
          body: {
            vendor_id: state.vendor.id,
            drop_id: dropId,

          }

    // Mount the upload-your-own tile beside the swatches. The uploaded photo's
    // public URL becomes social_image_url — the same field the swatches write —
    // so artwork + persistence reuse what's already wired. initialUrl is set
    // only when the current choice is an uploaded image (not a menu/brand swatch).
    // Shared option list for social image pickers: every menu-item photo, then
    // the vendor's brand image.
    function actBuildImageOptions() {
      const options = [];
      (state.products || []).forEach(p => {
        if (p && p.image_url) {
          options.push({ url: String(p.image_url), label: p.name || 'Menu item' });
        }
      });
      if (state.vendor && state.vendor.hero_image_url) {
        options.push({ url: String(state.vendor.hero_image_url), label: 'Brand image' });
      }
      return options;
    }

    // Shared swatch grid for social image pickers. Highlights the swatch that
    // matches the currently-resolved image.
    function actBuildImageSwatches(options, currentImage) {
      if (!options.length) return '';
      return `
              <div style="display:flex; flex-wrap:wrap; gap:8px;">
                ${options.map(opt => {
                  const selected = String(opt.url) === String(currentImage);
                  return `<button type="button" data-act="pick-image" data-image-url="${escapeHtml(opt.url)}" title="${escapeHtml(opt.label)}" aria-label="Use ${escapeHtml(opt.label)}" style="width:52px; height:52px; border-radius:8px; padding:0; overflow:hidden; cursor:pointer; background:#f6f2ea; border:2px solid ${selected ? '#c4511a' : '#efe9df'};"><img src="${escapeHtml(opt.url)}" alt="" style="width:100%; height:100%; object-fit:cover; display:block;" /></button>`;
                }).join('')}
              </div>`;
    }

    // Mounts the upload tile. containerId / stateKey default to Card 4's, so its
    // existing call is unchanged; another card passes its own pair so the two
    // pickers don't collide.
    function actMountSocialImageUpload(dropId, containerId, stateKey) {
      containerId = containerId || 'act-socialImageUploadContainer';
      stateKey = stateKey || '_socialImageUpload';
      const container = byId(containerId);
      if (!container || typeof window.HearthPhotoUpload !== 'function') return;
      const slug = state.vendor && state.vendor.slug;
      if (!slug) return;
      if (state[stateKey]) {
        try { state[stateKey].destroy(); } catch (e) { /* ignore */ }
        state[stateKey] = null;
      }
      const drop = state.rawById[dropId] || {};
      const optionUrls = new Set();
      (state.products || []).forEach(p => {
        if (p && p.image_url) optionUrls.add(String(p.image_url));
      });
      if (state.vendor && state.vendor.hero_image_url) {
        optionUrls.add(String(state.vendor.hero_image_url));
      }
      const current = drop.social_image_url ? String(drop.social_image_url) : '';
      const initialUrl = (current && !optionUrls.has(current)) ? current : null;
      state[stateKey] = new HearthPhotoUpload(container, {
        aspectRatio: 1,
        storagePath: () => `${slug}/social/${dropId}`,
        initialUrl: initialUrl,
        guidanceCopy: 'item',
        onUpload: (publicUrl) => {
          if (!state.rawById[dropId]) return;
          state.rawById[dropId].social_image_url = publicUrl || null;
          actSaveSocialImage(dropId, publicUrl || null);
          renderDropView(dropId);
        },
        onRemove: () => {
          if (!state.rawById[dropId]) return;
          state.rawById[dropId].social_image_url = null;
          actSaveSocialImage(dropId, null);
          renderDropView(dropId);
        }
      });
