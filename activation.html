                <div class="act-photo-controls__upload">
                  <div style="font-size:12px; color:#9a8b73; margin-bottom:8px;">Or add your own</div>
                  <div id="act-capacityImageUploadContainer"></div>
                </div>
              </div>
            </div>`;

      const card6Body = `
          <p>If you're approaching capacity, post an Instagram Story. Real scarcity
          is honest — it validates the drop for people who ordered and trains future
          customers to act earlier next time.</p>
          <div class="act-actions">
            ${card6Locked
              ? `<div class="act-locked-note">This prompt appears when your drop is live or approaching capacity.</div>`
              : card6Unlocked
            }
          </div>
      `;
      cards.push(actTouchpointShell({
        classes: `act-touchpoint is-prompted${card6Locked ? ' is-locked' : ''}${card6Entry ? ' is-done' : ''}`,
        cardNum: 6,
        label: labels[5],
        title: optionalTitle(6, 'Share your capacity signal'),
        channel: 'Instagram',
        bodyHtml: card6Body,
        open: actCardOpen(6, !!card6Entry, card6Locked),
        bodyId: 'act-tp-body-6'
      }));
      }

      // Cards 7, 8, 9 — present in all profiles, but wrapped with
      // inProfile() for consistency with the rest of the timeline.

      // Card 7 — order ready (is-auto) — never enters done state
      if (inProfile(7)) {
        cards.push(tpCard({
          typeClass: 'is-auto',
          cardNum: 7,
          label: labels[6],
          title: optionalTitle(7, 'Order-ready notifications are automatic'),
          desc: "There's nothing to send from here. When you mark an order Ready on the Service Board during service, the platform notifies that customer automatically. Keep the Service Board open while you work.",
          actionHtml: `<a class="act-copy-btn" href="${HearthNav.withVendor('./service-board.html')}">Open Service Board</a>`
        }));
      }

      // Card 8 — post-drop content (is-prompted, locked until closed)
      if (inProfile(8)) {
        // Editable caption draft, seeded from the assembled template.
        if (!state.messageDrafts['post_drop']) {
          state.messageDrafts['post_drop'] = templates['post_drop'];
        }
        const card8Caption = state.messageDrafts['post_drop'];
        const card8ActionHtml = `
          <div class="act-message-edit">
            <textarea
              data-act="message-textarea"
              data-touchpoint="post_drop"
              rows="5">${escapeHtml(card8Caption)}</textarea>
            ${state.messageGenerated?.['post_drop'] ? '<div class="act-ai-draft">✦ AI draft — edit freely</div>' : ''}
            <div class="act-chip-row">
              <button type="button" class="act-chip" data-act="adjust-chip" data-touchpoint="post_drop" data-instruction="Make it shorter and more concise">Shorter</button>
              <button type="button" class="act-chip" data-act="adjust-chip" data-touchpoint="post_drop" data-instruction="Make it warmer and more personal">Warmer</button>
              <button type="button" class="act-chip" data-act="adjust-chip" data-touchpoint="post_drop" data-instruction="Mention the next drop date to invite them back">Mention next drop</button>
            </div>
            <div class="act-guidance-row">
              <input type="text" class="act-guidance-input"
                data-touchpoint="post_drop"
                placeholder="e.g. warmer, mention the sold-out moment, include the next drop date...">
            </div>
            <div class="act-message-edit-row">
              <button
                data-act="generate-copy"
                data-touchpoint="post_drop"
                class="act-copy-btn">
                ✦ Generate →
              </button>
              ${copyBtn('Copy post-drop caption', 'post_drop', 'caption_copied', false)}
            </div>
            <div class="act-copy-error" data-error-key="post_drop"
              style="font-size:12px;color:#b91c1c;margin-top:4px;min-height:16px;"></div>
          </div>
        `;
        cards.push(tpCard({
          typeClass: 'is-prompted',
          cardNum: 8,
          label: labels[7],
          title: optionalTitle(8, 'Close the loop on social'),
          channel: 'Instagram',
          desc: "Post a real moment from the drop — food leaving the kitchen, the venue, a community moment. Unpolished is fine. Then post the sold-out confirmation if you haven't already.",
          actionHtml: card8ActionHtml,
          locked: status !== 'closed',
          lockedNote: 'This prompt appears once your drop closes.',
          touchpointKey: 'post_drop'
        }));
      }

      // Card 9 — thank-you email (is-auto, locked until closed)
      if (inProfile(9)) {
        cards.push(emailCard({
          typeClass: 'is-auto',
          cardNum: 9,
          label: labels[8],
          title: optionalTitle(9, 'Thank-you email to every customer'),
          channel: 'Email',
          desc: 'A warm, brief thank-you goes to everyone who ordered. Review and confirm before it sends.',
          subject: state.emailDrafts['thank_you'].subject,
          body: state.emailDrafts['thank_you'].body,
          note: `Sends to ${orderCount} customer${orderCount === 1 ? '' : 's'} who ordered from this drop.`,
          locked: status !== 'closed',
          lockedNote: 'This confirms once your drop closes.',
          touchpointKey: 'thank_you'
        }));
      }

      // Sticky live-stats aside — mirrors host-view's order-insight aside.
      // All figures come from the summary object already in scope (the same
      // v_drop_summary row driving statusOf and the capacity artwork); no
      // extra fetch. No "your share" card — that is host-only.
      const asideCapNum = (capTotalNum != null && capTotalNum > 0) ? capTotalNum : 0;
      const asideCapPct = asideCapNum > 0
        ? Math.min(100, Math.round((used / asideCapNum) * 100))
        : 0;
      const asideGmvPence = summary.drop_gmv_pence;
      const asideShowGmv = asideGmvPence != null;
      const asideHtml = `
        <div class="act-stat-card">
          <p class="act-stat-eyebrow">This drop, live</p>
          <div class="act-stat-row">
            <p class="act-stat-label">Orders placed</p>
            <p class="act-stat-value">${orderCount}</p>
          </div>
          <div class="act-sent-line" id="act-sent-confirmations"></div>
          <div class="act-stat-divider"></div>
          <div class="act-capacity">
            <div class="act-capacity-head">
              <p class="act-stat-label">Capacity filled</p>
              <span class="act-capacity-pct">${asideCapPct}%</span>
            </div>
            <div class="act-capacity-track">
              <div class="act-capacity-fill" style="width:${asideCapPct}%"></div>
            </div>
            <p class="act-capacity-meta">${asideCapNum > 0
              ? `${used} of ${asideCapNum} orders taken`
              : 'No capacity limit set'}</p>
          </div>
          ${asideShowGmv ? `
          <div class="act-stat-divider"></div>
          <div class="act-stat-row">
            <p class="act-stat-label">Revenue</p>
            <p class="act-stat-value act-stat-value--sm">${formatMoneyPence(asideGmvPence)}</p>
          </div>
          ` : ''}
        </div>
      `;

      content.innerHTML = `
        <button class="act-back-link" type="button" data-act="back">← All drops</button>
        <div class="act-drop-header">
          <h3 class="act-drop-title">${eName}</h3>
          <p class="act-drop-context">${contextLine(summary)}</p>
        </div>
        <div class="act-layout">
          <div class="act-layout-main">
            <div class="act-timeline">${cards.join('')}</div>
          </div>
          <aside class="act-layout-aside">${asideHtml}</aside>
        </div>
      `;

      hydrateSentComms(dropId);

      actSetupMenuCard(summary, rawDrop);
      actMountSocialImageUpload(dropId, 'act-revealImageUploadContainer', '_revealImageUpload');
      actMountSocialImageUpload(dropId);

      // Populate orders-open artwork (Card 4)
      const ordersOpenFrame = byId('act-ordersOpenFrame');
      if (state._ordersOpenObserver) {
        // renderDropView re-runs on every copy/confirm — disconnect the
        // stale observer first so we don't leak one per re-render.
        state._ordersOpenObserver.disconnect();
        state._ordersOpenObserver = null;
      }
      if (ordersOpenFrame) {
        actPopulateOrdersOpenCard(summary, rawDrop, state.vendor);
        actUpdateOrdersOpenScale();
        if (typeof ResizeObserver === 'function') {
          const ooObserver = new ResizeObserver(() => actUpdateOrdersOpenScale());
          ooObserver.observe(ordersOpenFrame);
          // Store alongside the menu card observer so showCrossDropView can clean up.
          state._ordersOpenObserver = ooObserver;
        }
      }

      // Populate capacity artwork (Card 6) — only when unlocked
      if (state._capacityObserver) {
        state._capacityObserver.disconnect();
        state._capacityObserver = null;
      }
      const capacityFrame = byId('act-capacityFrame');
      if (capacityFrame) {
        actPopulateCapacityCard(summary, rawDrop, state.vendor);
        actMountSocialImageUpload(dropId, 'act-capacityImageUploadContainer', '_capacityImageUpload');
        actUpdateCapacityScale();
        if (typeof ResizeObserver === 'function') {
          const capObserver = new ResizeObserver(() => actUpdateCapacityScale());
          capObserver.observe(capacityFrame);
          state._capacityObserver = capObserver;
        }
      }

      // The synchronous actUpdate*Scale calls above measure frame.clientWidth
      // before the ≤768px stacking/fluid-grid layout has fully settled, which
      // can leave the initial paint pinned at scale(1) (frame still ~540).
      // Recompute on the next frame once layout is final. Each fn early-returns
      // on a missing/zero-width frame, so calling all three is safe and cheap.
      // (Does not change the scale formula or the 540 constant.)
      requestAnimationFrame(() => {
        actUpdateMenuCardScale();
        actUpdateOrdersOpenScale();
        actUpdateCapacityScale();
      });

      // Bind a single window resize/orientation handler that re-fits the
      // artworks whenever the viewport width changes (e.g. rotating the phone,
      // or crossing the 768px breakpoint). The per-frame ResizeObservers cover
      // most cases; this is belt-and-suspenders for orientation races.
      if (!state._scaleResizeBound) {
        state._scaleResizeBound = true;
        const recomputeScales = () => {
          if (state.view !== 'drop') return;
          actUpdateMenuCardScale();
          actUpdateOrdersOpenScale();
          actUpdateCapacityScale();
        };
        window.addEventListener('resize', recomputeScales);
        window.addEventListener('orientationchange', recomputeScales);
      }
    }

    // ---- View switching ----------------------------------------------

    function showCrossDropView(){
      state.view = 'cross';
      if (state.resizeObserver) { state.resizeObserver.disconnect(); state.resizeObserver = null; }
      if (state._ordersOpenObserver) {
        state._ordersOpenObserver.disconnect();
        state._ordersOpenObserver = null;
      }
      if (state._capacityObserver) {
        state._capacityObserver.disconnect();
        state._capacityObserver = null;
      }
      renderContent(sortScoped(Object.values(state.summaryById).filter(inScope)));
    }

    async function showDropView(dropId){
      state.view = 'drop';
      state.selectedDropId = dropId;
      if (state.products.length === 0) {
        byId('activationContent').innerHTML = `<div class="home-loading">Loading drop activation…</div>`;
        try {
          const { data, error } = await sb.from('products').select('*').eq('vendor_id', state.vendor.id);
          if (!error && Array.isArray(data)) state.products = data;
        } catch (e) {
          console.error(e);
        }
      }
      // Reset per-drop edit state so drafts from a previous drop don't bleed through.
      state.messageDrafts = {};
      state.expandedMessageCards = {};
      state.cardExpanded = {};  // clear manual disclosure overrides for the new drop
      // Hydrate this drop's activation log from the persisted store so
      // done-states and progress survive reloads. Replace only this drop's
      // entries — other drops' in-memory entries are left intact so the
      // landing-page progress for already-visited drops is unaffected.
      try {
        const { data: logRows, error: logError } = await sb.functions.invoke('activation-events', {
          body: { op: 'list', drop_id: dropId }
        });
        if (logError) {
          console.error('activation-events list failed', logError);
        } else if (Array.isArray(logRows)) {
          state.activationLog = state.activationLog.filter(e => e.dropId !== dropId);
          // Rows arrive newest-first; reverse to oldest-first so getLogEntry()
          // (first match wins) returns the earliest entry per touchpoint,
          // matching the in-memory push order.
          logRows.slice().reverse().forEach(row => {
            state.activationLog.push({
              touchpoint: row.touchpoint,
              action: row.action,
              dropId: row.drop_id,
              timestamp: row.created_at,
              ...(row.meta || {}),
              // actor ('vendor'|'host') stamped server-side. Kept AFTER the
              // meta spread so meta can never clobber it. Host-origin events
              // stay in the log (available for later use) but are excluded
              // from vendor done-state/progress (see getLogEntry /
              // getDropProgress / Card 2 done-line guards).
              actor: row.actor
            });
          });
        }
      } catch (e) {
        console.error('activation-events list failed', e);
      }
      renderDropView(dropId);
      // Message and email cards stand on their static seeds on load — no
      // auto-generate on drop selection, so there is no jarring seed → AI
      // draft text-swap. The vendor generates per card when they choose to
      // (handlers left intact).
      //
      // The till poster line is the one exception: its Card 4 field is BLANK
      // without a saved reveal_line (no static seed), so we auto-generate it
      // once — but only when no saved line exists, so a vendor's saved edit is
      // never clobbered. A single quiet field, not a multi-card swap.
      const savedPosterLine = (state.rawById[dropId]?.reveal_line || '').trim();
      if (!savedPosterLine && !state.posterHookGenerated?.[dropId]) {
        setTimeout(() => {
          const phBtn = document.querySelector('[data-act="generate-poster-hook"]');
          if (phBtn) phBtn.click();
        }, 400);
      }
    }

    // ---- Init + delegated events -------------------------------------

    async function init(){
      try {
        const rows = await loadDrops();
        renderContent(rows);

        // Set the header subtitle to the vendor display name once resolved.
        const sub = document.getElementById('actHeaderVendorSub');
        if (sub) sub.textContent = state.vendor.display_name || state.vendor.name || 'Activation';

        // Deep-link: ?drop=<drop_id> opens the per-drop view directly.
        const deepDropId = new URLSearchParams(window.location.search).get('drop');
        if (deepDropId && (state.summaryById[deepDropId] || state.rawById[deepDropId])) {
          await showDropView(deepDropId);
        }
      } catch (err) {
        console.error(err);
        byId('activationContent').innerHTML =
          `<div class="home-empty">Drops could not be loaded. Check your connection and refresh.</div>`;
      }
    }

    byId('activationContent').addEventListener('click', async function (e) {
      // Collapse-to-expand disclosure toggle on a touchpoint card. The body
      // is a sibling of the toggle button, so card actions never match here.
      const toggle = e.target.closest('[data-act="toggle-card"]');
      if (toggle) {
        const next = toggle.getAttribute('aria-expanded') !== 'true';
        toggle.setAttribute('aria-expanded', String(next));
        const body = byId(toggle.getAttribute('aria-controls'));
        if (body) body.classList.toggle('act-tp-body--collapsed', !next);
        // Remember the manual override so it survives the frequent re-renders.
        state.cardExpanded[toggle.dataset.card] = next;
        // Cards 1/4/6 hold html2canvas artworks whose scale is computed from
        // frame width; a collapsed (display:none) body has zero width, so the
        // initial scale was skipped. Recompute on expand. Each function
        // early-returns when its frame is absent or zero-width, so calling all
        // three unconditionally is safe and cheap.
        if (next) {
          actUpdateMenuCardScale();
          actUpdateOrdersOpenScale();
          actUpdateCapacityScale();
        }
        return;
      }

      const dropLink = e.target.closest('a[data-drop-id]');
      if (dropLink) { e.preventDefault(); showDropView(dropLink.dataset.dropId); return; }

      const back = e.target.closest('[data-act="back"]');
      if (back) { e.preventDefault(); showCrossDropView(); return; }

      const dl = e.target.closest('[data-act="download"]');
      if (dl) { e.preventDefault(); actDownloadMenuCard(); return; }

      const dlOrdersOpen = e.target.closest('[data-act="download-orders-open"]');
      if (dlOrdersOpen) {
        e.preventDefault();
        actDownloadOrdersOpenCard();
        return;
      }

      const pickImage = e.target.closest('[data-act="pick-image"]');
      if (pickImage) {
        e.preventDefault();
        const url = pickImage.getAttribute('data-image-url') || '';
        const dropId = state.selectedDropId;
        if (dropId && state.rawById[dropId]) {
          state.rawById[dropId].social_image_url = url || null;
          renderDropView(dropId);              // re-render: ring + artwork (flushes captions first)
          actSaveSocialImage(dropId, url || null);
        }
        return;
      }

      const openPoster = e.target.closest('[data-act="open-poster"]');
      if (openPoster) {
        e.preventDefault();
        const rawDrop = state.rawById[state.selectedDropId];
        if (rawDrop && rawDrop.slug) {
          window.open(
            `./activation-poster.html?drop=${encodeURIComponent(rawDrop.slug)}`,
            '_blank'
          );
        }
        return;
      }

      const dlCapacity = e.target.closest('[data-act="download-capacity"]');
      if (dlCapacity) {
        e.preventDefault();
        actDownloadCapacityCard();
        return;
      }

      // Expand message card into edit mode
      const expandMsg = e.target.closest('[data-act="expand-message"]');
      if (expandMsg) {
        e.preventDefault();
        state.expandedMessageCards[expandMsg.dataset.touchpoint] = true;
        renderDropView(state.selectedDropId);
        return;
      }

      // Pick a capacity-signal wording (Card 6) — swaps the selected variant and
      // re-renders so currentTemplates picks up the new text for copy.
      const pickWording = e.target.closest('[data-act="pick-capacity-wording"]');
      if (pickWording) {
        e.preventDefault();
        state.capacityVariant = Number(pickWording.dataset.variant) || 0;
        renderDropView(state.selectedDropId);
        return;
      }

      // Switch active channel on a per-channel message card (Card 4)
      const switchCh = e.target.closest('[data-act="switch-channel"]');
      if (switchCh) {
        const tp = switchCh.dataset.touchpoint;
        const ch = switchCh.dataset.channel;
        const cd = state.channelDrafts?.[tp];
        if (cd && ch && ch !== cd.active) {
          const ta = document.querySelector(`[data-act="message-textarea"][data-touchpoint="${tp}"]`);
          if (ta) cd.drafts[cd.active] = ta.value;   // preserve the edit before switching
          cd.active = ch;
          renderDropView(state.selectedDropId);
        }
        return;
      }

      // Collapse message card — save textarea value first
      const collapseMsg = e.target.closest('[data-act="collapse-message"]');
      if (collapseMsg) {
        e.preventDefault();
        const tp = collapseMsg.dataset.touchpoint;
        const ta = document.querySelector(
          `[data-act="message-textarea"][data-touchpoint="${tp}"]`
        );
        if (ta) state.messageDrafts[tp] = ta.value;
        state.expandedMessageCards[tp] = false;
        renderDropView(state.selectedDropId);
        return;
      }

      // Copy message (from preview or edit state)
      const copyMsg = e.target.closest('[data-act="copy-message"]');
      if (copyMsg) {
        e.preventDefault();
        const tp = copyMsg.dataset.touchpoint;
        // If currently in edit state, save the textarea first
        const ta = document.querySelector(
          `[data-act="message-textarea"][data-touchpoint="${tp}"]`
        );
        let text;
        if (tp === 'vendor_open') {
          const cd = state.channelDrafts?.['vendor_open'];
          if (ta && cd) cd.drafts[cd.active] = ta.value;
          text = (cd && cd.drafts[cd.active]) || '';
        } else {
          if (ta) state.messageDrafts[tp] = ta.value;
          text = state.messageDrafts[tp] || '';
        }
        const originalLabel = copyMsg.textContent;
        await actCopyToClipboard(text, copyMsg, originalLabel);
        actLog(tp, copyMsg.dataset.action || 'message_copied');
        return;
      }

      // Original copy handler (for non-message copy buttons e.g. caption,
      // capacity post, post-drop caption — cards 1, 6, 8 still emit
      // data-act="copy" via the copyBtn() helper).
      const copy = e.target.closest('[data-act="copy"]');
      if (copy) {
        e.preventDefault();
        const tp = copy.dataset.touchpoint;
        const action = copy.dataset.action || 'copied';
        // Caption cards (1, 8) now carry an editable textarea + Generate, so
        // copy the live textarea value when present — otherwise the saved
        // draft, otherwise the freshly-assembled template.
        const captionTa = document.querySelector(`[data-act="message-textarea"][data-touchpoint="${tp}"]`);
        const text = (captionTa && captionTa.value)
          || (state.messageDrafts || {})[tp]
          || (state.currentTemplates || {})[tp]
          || '';
        await actCopyToClipboard(text, copy, copy.textContent);
        actLog(tp, action);
        return;
      }

      const confirm = e.target.closest('[data-act="confirm"]');
      if (confirm) {
        e.preventDefault();
        actLog(confirm.dataset.touchpoint, confirm.dataset.action || 'confirmed');
        return;
      }

      const collapseEmail = e.target.closest('[data-act="collapse-email"]');
      if (collapseEmail) {
        e.preventDefault();
        // Preserve any edits before collapsing
        const tp = collapseEmail.dataset.touchpoint;
        const subjectInput = document.querySelector(`.act-email-subject-input[data-email-key="${tp}"]`);
        const bodyInput = document.querySelector(`.act-email-body-input[data-email-key="${tp}"]`);
        if (subjectInput && bodyInput && state.emailDrafts && state.emailDrafts[tp]) {
          state.emailDrafts[tp].subject = subjectInput.value;
          state.emailDrafts[tp].body = bodyInput.value;
        }
        state.expandedEmailCards[tp] = false;
        renderDropView(state.selectedDropId);
        return;
      }

      const generateEmailBody = e.target.closest('[data-act="generate-email-body"]');
      if (generateEmailBody) {
        e.preventDefault();
        const tp = generateEmailBody.dataset.touchpoint;
        const dropId = state.selectedDropId;
        const rawDrop = state.rawById?.[dropId];
        if (!rawDrop) return;

        const emailTpMap = {
          early_access: 'early_access_email',
          thank_you:     'post_drop_thankyou',
        };
        if (!emailTpMap[tp]) return;

        // Optional vendor steer for this regeneration (cleared after success).
        const guidanceEl = document.querySelector(`.act-guidance-input[data-touchpoint="${tp}"]`);
        const guidance = guidanceEl?.value?.trim() || null;

        generateEmailBody.disabled = true;
        generateEmailBody.textContent = 'Generating…';

        try {
          const body = {
            touchpoint: emailTpMap[tp],
            ...actBuildDropContext(dropId),
            // Email cases deliberately receive no opens day/time — preserve
            // today's behaviour by overriding after spreading the context.
            opens_day: null, opens_time: null,
            guidance,
          };

          const { data, error } = await sb.functions.invoke('generate-activation-copy', { body });
          if (error) throw error;
          if (data?.error) throw new Error(data.error);

          if (data?.copy) {
            if (guidanceEl) guidanceEl.value = '';
            const orderingUrl = `https://lovehearth.co.uk/order.html?drop=${rawDrop.slug}`;
            const vendorName = state.vendor?.display_name || '';
            const capStr = rawDrop.capacity_units_total
              ? `${rawDrop.capacity_units_total} orders`
              : 'a limited number of orders';
            const closesStr = fmtT(rawDrop.closes_at) || 'tonight';

            let fullBody;
            if (emailTpMap[tp] === 'early_access_email') {
              fullBody = `Hi,\n\n${data.copy}\n\nOrder here: ${orderingUrl}\n\nCapacity is limited to ${capStr} and closes at ${closesStr}.\n\n${vendorName}`;
            } else {
              fullBody = `Hi,\n\n${data.copy}\n\n${vendorName}`;
            }

            // Update state — renderDropView will re-render both mock and
            // textarea from state, keeping them in sync.
            if (state.emailDrafts?.[tp]) state.emailDrafts[tp].body = fullBody;
            state.emailBodyGenerated = state.emailBodyGenerated || {};
            state.emailBodyGenerated[tp] = true;
            state.expandedEmailCards = state.expandedEmailCards || {};
            state.expandedEmailCards[tp] = true;
            renderDropView(dropId);
          }

        } catch (err) {
          console.error('[activation] generate-email-body failed:', tp, err);
        } finally {
          generateEmailBody.disabled = false;
          generateEmailBody.textContent = state.emailBodyGenerated?.[tp] ? '↺ Regenerate body →' : '✦ Generate body →';
        }
        return;
      }

      // One-tap adjustment chip: writes its instruction into the touchpoint's
      // guidance input, then triggers the Generate button. With a generated
      // draft already present, the generate-copy handler routes this through
      // the EF's ADJUST mode (currentText sent); otherwise it's a fresh
      // generate steered by the instruction.
      const adjustChip = e.target.closest('[data-act="adjust-chip"]');
      if (adjustChip) {
        e.preventDefault();
        const tp = adjustChip.dataset.touchpoint;
        const guidanceEl = document.querySelector(`.act-guidance-input[data-touchpoint="${tp}"]`);
        if (guidanceEl) guidanceEl.value = adjustChip.dataset.instruction || '';
        const genBtn = document.querySelector(`[data-act="generate-copy"][data-touchpoint="${tp}"]`)
          || document.querySelector(`[data-act="generate-email-body"][data-touchpoint="${tp}"]`)
          || (tp === 'poster_hook' ? document.querySelector('[data-act="generate-poster-hook"]') : null);
        if (genBtn) genBtn.click();
        return;
      }

      // Persistent Social format toggle (Hashtags / Emojis): flips the stored
      // socialOptions state, then re-runs the social draft via the same
      // adjust/generate path. The instruction nudges the EF to add/remove the
      // format element; socialOptions on the body carries the durable state.
      const socialToggle = e.target.closest('[data-act="social-toggle"]');
      if (socialToggle) {
        e.preventDefault();
        const cd = state.channelDrafts?.['vendor_open'];
        if (!cd) return;
        if (!cd.socialOptions) cd.socialOptions = { hashtags:false, emojis:false };
        const opt = socialToggle.dataset.option;
        const newVal = !cd.socialOptions[opt];
        cd.socialOptions[opt] = newVal;
        socialToggle.classList.toggle('is-on', newVal);
        socialToggle.setAttribute('aria-pressed', String(newVal));
        const instr = opt === 'hashtags'
          ? (newVal ? 'Add one to three relevant, local hashtags.' : 'Remove the hashtags.')
          : (newVal ? 'Add a tasteful emoji or two where it reads naturally.' : 'Remove any emojis.');
        const guidanceEl = document.querySelector('.act-guidance-input[data-touchpoint="vendor_open"]');
        if (guidanceEl) guidanceEl.value = instr;
        const genBtn = document.querySelector('[data-act="generate-copy"][data-touchpoint="vendor_open"]');
        if (genBtn) genBtn.click();
        return;
      }

      const generateCopy = e.target.closest('[data-act="generate-copy"]');
      if (generateCopy) {
        e.preventDefault();
        const tp = generateCopy.dataset.touchpoint;
        const dropId = state.selectedDropId;
        const rawDrop = state.rawById?.[dropId];
        if (!rawDrop) return;

        // Map activation touchpoint keys → Edge Function touchpoint names.
        // Message cards (2, 4, 5) plus the caption cards (1, 8) now all
        // carry an editable textarea + Generate button. Keys confirmed
        // against the card-key map and the Edge Function's buildPrompt.
        const tpMap = {
          menu_reveal:            'menu_reveal',
          host_heads_up:             'host_heads_up',
          vendor_open: 'vendor_open',
          host_link:       'host_link',
          post_drop:         'post_drop',
        };
        if (!tpMap[tp]) return;

        // Optional vendor steer for this regeneration (cleared after success).
        const guidanceEl = document.querySelector(`.act-guidance-input[data-touchpoint="${tp}"]`);
        const guidance = guidanceEl?.value?.trim() || null;

        state.generateLoading = state.generateLoading || {};
        state.generateLoading[tp] = true;
        generateCopy.disabled = true;
        generateCopy.textContent = 'Generating…';

        // Clear any previous error
        const errorNote = document.querySelector(`.act-copy-error[data-error-key="${tp}"]`);
        if (errorNote) errorNote.textContent = '';

        const activeChannel = tp === 'vendor_open'
          ? (state.channelDrafts?.['vendor_open']?.active || 'whatsapp') : undefined;

        // ADJUST vs GENERATE: if there's a vendor steer AND an existing
        // generated vendor_open draft, send the current opener as currentText
        // so the EF refines it (ADJUST mode). A seed or empty box with no
        // generated draft falls through to a fresh GENERATE, unchanged.
        let currentText;
        if (tp === 'vendor_open' && guidance) {
          const cd = state.channelDrafts?.['vendor_open'];
          if (cd && cd.generated?.[cd.active]) currentText = actOpenerOnly(cd.drafts[cd.active]);
        }

        // Social format toggles travel with every social Generate/adjust
        // (button, chip, free-text) so the EF honours the current state.
        const socialOptions = (tp === 'vendor_open' && (activeChannel === 'social' || activeChannel === 'whatsapp'))
          ? (state.channelDrafts['vendor_open'].socialOptions || { hashtags: false, emojis: false })
          : undefined;

        try {
          const body = {
            touchpoint: tpMap[tp],
            ...actBuildDropContext(dropId),
            guidance,
            ...(activeChannel ? { channel: activeChannel } : {}),
            ...(currentText ? { currentText } : {}),
            ...(socialOptions ? { socialOptions } : {}),
          };

          const { data, error } = await sb.functions.invoke('generate-activation-copy', { body });
          if (error) throw error;
          if (data?.error) throw new Error(data.error);

          if (data?.copy) {
            if (guidanceEl) guidanceEl.value = '';
            // Card 4 (ordering-opens) gets the AI opener plus a
            // platform-assembled ordering link + close time, so the link is
            // always accurate while the AI writes only the warm opener.
            // Other touchpoints use the generated copy verbatim.
            let draft;
            if (tp === 'vendor_open') {
              const orderingUrl = `https://lovehearth.co.uk/order.html?drop=${rawDrop.slug}`;
              const closeTime = fmtT(rawDrop.closes_at) || 'tonight';
              draft = `${data.copy}\n\nOrder here: ${orderingUrl}\n\nOrders close at ${closeTime}.`;
            } else {
              draft = data.copy;
            }
            // On success always re-render the card in expanded state so the
            // generated text is shown. The re-render rebuilds the button, so
            // no manual button reset is needed here.
            if (tp === 'vendor_open') {
              const cd = state.channelDrafts['vendor_open'];
              cd.drafts[cd.active] = draft;
              cd.generated[cd.active] = true;
              state.messageGenerated = state.messageGenerated || {};
              state.messageGenerated[tp] = true;  // mirror — keeps the auto-gen-once guard + error-state label working
            } else {
              state.messageDrafts[tp] = draft;
              state.messageGenerated = state.messageGenerated || {};
              state.messageGenerated[tp] = true;
            }
            state.expandedMessageCards[tp] = true;
            state.generateLoading[tp] = false;
            // Sync the live textarea (if one is mounted) before the re-render:
            // renderDropView() flushes every message-textarea's current DOM
            // value back into messageDrafts first, which would otherwise
            // clobber the assembled draft with the stale pre-generation text.
            const ta = document.querySelector(
              `[data-act="message-textarea"][data-touchpoint="${tp}"]`
            );
            if (ta) ta.value = draft;
            renderDropView(dropId);
            return;
          }

        } catch (err) {
          console.error('[activation] generate-copy failed:', tp, err);
          state.generateLoading[tp] = false;
          generateCopy.disabled = false;
          generateCopy.textContent = state.messageGenerated?.[tp] ? '↺ Regenerate →' : '✦ Generate →';
          const errNote = document.querySelector(`.act-copy-error[data-error-key="${tp}"]`);
          if (errNote) errNote.textContent = 'Generation failed — try again or edit manually.';
        } finally {
          state.generateLoading[tp] = false;
        }
        return;
      }

      const generatePosterHook = e.target.closest('[data-act="generate-poster-hook"]');
      if (generatePosterHook) {
        e.preventDefault();
        const dropId = state.selectedDropId;
        const rawDrop = state.rawById?.[dropId];
        if (!rawDrop) return;
        const input = byId('act-posterHookInput');

        // Optional vendor steer for this regeneration (cleared after success).
        const guidanceEl = document.querySelector('.act-guidance-input[data-touchpoint="poster_hook"]');
        const guidance = guidanceEl?.value?.trim() || null;

        generatePosterHook.disabled = true;
        generatePosterHook.textContent = 'Generating…';

        // Clear any previous error
        const errorNote = document.querySelector('.act-copy-error[data-error-key="poster_hook"]');
        if (errorNote) errorNote.textContent = '';

        try {
          // Archetype-aware poster framing: 'till' (open, walk-up) or
          // 'noticeboard' (closed, pinned sheet). Resolved in getDropProfile.
          const posterType = getDropProfile(state.summaryById[dropId])?.card4?.poster || 'till';
          const body = {
            touchpoint: 'poster_hook',
            ...actBuildDropContext(dropId),
            posterType,
            guidance,
          };

          const { data, error } = await sb.functions.invoke('generate-activation-copy', { body });
          if (error) throw error;
          if (data?.error) throw new Error(data.error);

          if (data?.copy) {
            if (guidanceEl) guidanceEl.value = '';
            const line = data.copy.trim();
            // Persist to the drop's reveal_line so the poster page picks it up.
            if (state.rawById[dropId]) state.rawById[dropId].reveal_line = line;
            state.posterHookGenerated = state.posterHookGenerated || {};
            state.posterHookGenerated[dropId] = true;
            // Sync the live input before the re-render seeds it from reveal_line.
            if (input) input.value = line;
            await actSaveRevealFields(dropId);
            renderDropView(dropId);
            return;
          }

        } catch (err) {
          console.error('[activation] generate-poster-hook failed:', err);
          generatePosterHook.disabled = false;
          generatePosterHook.textContent = state.posterHookGenerated?.[dropId] ? '↺ Regenerate →' : '✦ Generate →';
          const errNote = document.querySelector('.act-copy-error[data-error-key="poster_hook"]');
          if (errNote) errNote.textContent = 'Generation failed — try again or edit manually.';
        }
        return;
      }

      // Matches Card 3/9 emailCard "Confirm send" AND Card 4's Email-tab
      // "Send to customers" (data-act="send-vendor-open"). The latter reuses
      // this confirm step but reads its message from the channel draft and
      // posts message_body to send-drop-open-email — branched via
      // isVendorOpen throughout so Card 3/9 behaviour is unchanged.
      const confirmEmail = e.target.closest('[data-act="confirm-email"],[data-act="send-vendor-open"]');
      if (confirmEmail) {
        e.preventDefault();
        const tp = confirmEmail.dataset.touchpoint;
        const dropId = state.selectedDropId;
        const isVendorOpen = confirmEmail.dataset.act === 'send-vendor-open';

        // Save final edits before sending (Card 3/9 emailCard inputs only)
        if (!isVendorOpen) {
          const subjectInput = document.querySelector(`.act-email-subject-input[data-email-key="${tp}"]`);
          const bodyInput = document.querySelector(`.act-email-body-input[data-email-key="${tp}"]`);
          if (subjectInput && bodyInput && state.emailDrafts && state.emailDrafts[tp]) {
            state.emailDrafts[tp].subject = subjectInput.value;
            state.emailDrafts[tp].body = bodyInput.value;
          }
        }

        // Map touchpoint key → Edge Function name
        const fnMap = {
          early_access: 'send-early-access-email',
          thank_you:     'send-post-drop-thankyou',
          vendor_open:   'send-drop-open-email',
        };
        const fnName = fnMap[tp];

        if (!fnName) {
          // No Edge Function for this touchpoint — collapse, log, re-render
          state.expandedEmailCards[tp] = false;
          actLog(tp, 'email_confirmed');
          return;
        }

        // Assemble the request body. vendor_open posts the composed Email
        // channel draft as message_body; Card 3/9 post custom_subject/body.
        let invokeBody;
        if (isVendorOpen) {
          // Flush the live Email textarea (if mid-edit) into the channel
          // draft first, mirroring the copy-message handler.
          const cd = state.channelDrafts?.['vendor_open'];
          const ta = document.querySelector('[data-act="message-textarea"][data-touchpoint="vendor_open"]');
          if (cd && ta) cd.drafts[cd.active] = ta.value;
          const rawMessage = ((cd && cd.drafts && cd.drafts.email) || '').trim();
          const vNote = document.querySelector('.act-copy-error[data-error-key="vendor_open"]');
          // Lift a leading "Subject: ..." line out of the composed email draft
          // and pass it as the EF's subject. Otherwise send-drop-open-email's
          // default header ("Ordering is now open") wins and the typed Subject
          // line shows up as the first line of the email body. If no Subject
          // line is present (e.g. after an AI regenerate), leave the EF default
          // standing and send the body unchanged.
          let parsedSubject = null;
          let messageBody = rawMessage;
          if (rawMessage) {
            const lines = rawMessage.split('\n');
            const subjMatch = lines[0].match(/^subject:\s*(.+)$/i);
            if (subjMatch) {
              parsedSubject = subjMatch[1].trim();
              let rest = lines.slice(1);
              if (rest.length && rest[0].trim() === '') rest = rest.slice(1);
              messageBody = rest.join('\n').trim();
            }
          }
          if (!messageBody) {
            if (vNote) { vNote.style.color = '#b91c1c'; vNote.textContent = 'Write your message before sending.'; }
            return;
          }
          if (vNote) vNote.textContent = '';
          invokeBody = { vendor_id: state.vendor.id, drop_id: dropId, message_body: messageBody };
          if (parsedSubject) invokeBody.subject = parsedSubject;
        } else {
          invokeBody = {
            vendor_id: state.vendor.id,
            drop_id:   dropId,
            custom_subject: state.emailDrafts?.[tp]?.subject || null,
            custom_body:    state.emailDrafts?.[tp]?.body    || null,
          };
        }

        // Show sending state — disable the button while in-flight
        state.sendingEmail[tp] = true;
        confirmEmail.disabled = true;
        const restoreLabel = isVendorOpen ? 'Send to customers' : 'Confirm send';
        confirmEmail.textContent = 'Sending…';

        try {
          const { data, error } = await sb.functions.invoke(fnName, { body: invokeBody });

          if (error) throw error;
          if (data && data.error) throw new Error(data.error);

          // Success — log into done state with sent count
          const sent  = data?.sent  ?? 0;
          const total = data?.total ?? 0;
          state.sendingEmail[tp] = false;
          if (isVendorOpen) {
            actLog(tp, 'email_confirmed', { sent, total });
            // actLog re-rendered the view; refresh the comms ledger so the
            // vendor_open sent-line appears, then surface a calm result on
            // the freshly-rendered note element (success green #166534).
            await hydrateSentComms(dropId);
            const okNote = document.querySelector('.act-copy-error[data-error-key="vendor_open"]');
            if (okNote) {
              okNote.style.color = '#166534';
              okNote.textContent = `Sent to ${sent} customer${sent === 1 ? '' : 's'}.`;
            }
          } else {
            state.expandedEmailCards[tp] = false;
            actLog(tp, 'email_confirmed', { sent, total });
          }
        } catch (err) {
          console.error('[activation] Email send failed:', tp, err);
          state.sendingEmail[tp] = false;
          // Restore the button so the vendor can retry
          confirmEmail.disabled = false;
          confirmEmail.textContent = restoreLabel;
          // Show a brief inline error note below the button — leave the card
          // in its current state (no re-render) so the note survives.
          if (isVendorOpen) {
            const errNote = document.querySelector('.act-copy-error[data-error-key="vendor_open"]');
            if (errNote) { errNote.style.color = '#b91c1c'; errNote.textContent = 'Send failed — check your connection and try again.'; }
          } else {
            const note = document.querySelector(`.act-email-send-error[data-error-key="${tp}"]`);
            if (note) note.textContent = 'Send failed — check your connection and try again.';
          }
        }
        return;
      }

      // Card 2 host handoff — email the host their share page. Mirrors the
      // confirm-email handler above, plus the one branch the email cards
      // don't have: a success-with-skip (HTTP 200, sent:0, no error key)
      // when the host has no email on file, which must NOT log a send.
      const emailHostShare = e.target.closest('[data-act="email-host-share"]');
      if (emailHostShare) {
        e.preventDefault();
        const tp = emailHostShare.dataset.touchpoint;
        // Card 2 hands the host their share page (handoff); the later Card 5
        // reminder reuses this handler with tp='host_link' (reminder).
        const variant = tp === 'host_link' ? 'reminder' : 'handoff';
        const dropId = state.selectedDropId;
        const errSlot = document.querySelector(`.act-copy-error[data-error-key="${tp}"]`);
        if (errSlot) errSlot.textContent = '';

        const originalLabel = emailHostShare.textContent;
        emailHostShare.disabled = true;
        emailHostShare.textContent = 'Sending…';

        try {
          const { data, error } = await sb.functions.invoke('send-host-activation-email', {
            body: { vendor_id: state.vendor.id, drop_id: dropId, variant },
          });

          // Success-with-skip FIRST: host has no email (HTTP 200, sent:0, no
          // error key — does not throw). Don't log a send; switch to the
          // no-email state so Copy link is foregrounded.
          if (!error && data && data.skipped === 'no_host_email') {
            state.hostNoEmail = state.hostNoEmail || {};
            state.hostNoEmail[tp] = state.hostNoEmail[tp] || {};
            state.hostNoEmail[tp][dropId] = true;
            renderDropView(dropId);
            return;
          }

          // Otherwise surface failures. A non-2xx response sets `error`
          // (transport) and carries the function's { error } body in the
          // Response on error.context; a 200-with-error sets data.error.
          // Extract the code so no_token / host_not_found can be messaged
          // distinctly from a generic connection failure.
          if (error || (data && data.error)) {
            let code = (data && data.error) ? String(data.error) : '';
            if (error && error.context && typeof error.context.json === 'function') {
              try {
                const body = await error.context.json();
                if (body && body.error) code = String(body.error);
              } catch (_) { /* body not JSON — leave code empty */ }
            }
            const e2 = new Error(code || 'send_failed');
            e2.code = code;
            throw e2;
          }

          // Real send → done.
          const sent  = data?.sent  ?? 0;
          const total = data?.total ?? 0;
          actLog(tp, 'host_email_sent', { sent, total });
        } catch (err) {
          console.error('[activation] host email send failed:', err);
          emailHostShare.disabled = false;
          emailHostShare.textContent = originalLabel;
          const code = err?.code || '';
          const note = document.querySelector(`.act-copy-error[data-error-key="${tp}"]`);
          if (note) {
            note.textContent = (code === 'no_token' || code === 'host_not_found')
              ? "Couldn't build a link for this host — flag this drop."
              : 'Send failed — check your connection and try again.';
          }
        }
        return;
      }

      // Card 2 host handoff — copy the host's share-page link (fallback for
      // hosts with no email, and always available once sent). Mirrors
      // drop-manager.html's copy-host-link: get-drop-host-token → host-view URL.
      const copyHostLink = e.target.closest('[data-act="copy-host-link"]');
      if (copyHostLink) {
        e.preventDefault();
        const tp = copyHostLink.dataset.touchpoint;
        const dropId = state.selectedDropId;
        const slug = state.rawById?.[dropId]?.slug;
        const note = document.querySelector(`.act-copy-error[data-error-key="${tp}"]`);
        if (note) note.textContent = '';

        if (!slug) {
          if (note) note.textContent = 'No host link could be built for this drop.';
          return;
        }

        try {
          const { data: tokenResp, error: tokenErr } =
            await sb.functions.invoke('get-drop-host-token', { body: { drop_id: dropId } });
          if (tokenErr || tokenResp?.error || !tokenResp?.host_access_token) {
            if (note) note.textContent = 'No host link could be built for this drop.';
            return;
          }
          const url = `${window.location.origin}/host-view.html?drop=${encodeURIComponent(slug)}&t=${encodeURIComponent(tokenResp.host_access_token)}`;
          const originalLabel = copyHostLink.textContent;
          await actCopyToClipboard(url, copyHostLink, originalLabel);
          // Transient "Copied ✓" confirmation, driven through rendered state so
          // it survives the actLog re-render and shows in every state (including
          // when the done line already reads "Sent to {host}"). Set BEFORE
          // actLog so the re-render reads it; clear ~2s later and re-render —
          // but only if still on the same drop, so we don't re-render a drop
          // the user has navigated away from.
          state.hostLinkCopied = state.hostLinkCopied || {};
          state.hostLinkCopied[tp] = state.hostLinkCopied[tp] || {};
          state.hostLinkCopied[tp][dropId] = true;
          actLog(tp, 'host_link_copied');
          setTimeout(() => {
            if (state.hostLinkCopied?.[tp]) delete state.hostLinkCopied[tp][dropId];
            if (state.selectedDropId === dropId) renderDropView(dropId);
          }, 2000);
        } catch (err) {
          console.error('[activation] copy host link failed:', err);
          if (note) note.textContent = 'No host link could be built for this drop.';
        }
        return;
      }
    });

    // Live preview wiring for the email mock — patches the mock DOM
    // directly as the vendor types so the preview stays in sync without
    // any re-render flicker.
    byId('activationContent').addEventListener('input', function (e) {
      const subjectInput = e.target.closest('.act-email-subject-input');
      if (subjectInput) {
        const tp = subjectInput.dataset.emailKey;
        if (tp && state.emailDrafts[tp]) {
          state.emailDrafts[tp].subject = subjectInput.value;
          const mockSubject = subjectInput.closest('.act-touchpoint')
            ?.querySelector('.act-email-mock__subject');
          if (mockSubject) mockSubject.textContent = subjectInput.value;
        }
        return;
      }

      const bodyInput = e.target.closest('.act-email-body-input');
      if (bodyInput) {
        const tp = bodyInput.dataset.emailKey;
        if (tp && state.emailDrafts[tp]) {
          state.emailDrafts[tp].body = bodyInput.value;
          const mockContent = bodyInput.closest('.act-touchpoint')
            ?.querySelector('.act-email-mock__content');
          if (mockContent) mockContent.textContent = bodyInput.value;
        }
        return;
      }

      // Manual edits to the till poster line persist to the drop's
      // reveal_line, debounced so we don't save on every keystroke.
      const posterHookInput = e.target.closest('#act-posterHookInput');
      if (posterHookInput) {
        const dropId = state.selectedDropId;
        if (dropId && state.rawById[dropId]) {
          state.rawById[dropId].reveal_line = posterHookInput.value;
          clearTimeout(state._posterHookDebounce);
          state._posterHookDebounce = setTimeout(() => {
            actSaveRevealFields(dropId);
          }, 600);
        }
        return;
      }
    });

    init();
  </script>
  <script>HearthNav.decorateLinks();</script>
</body>
</html>
