<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hearth — Activation</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="./assets/hearth-vendor.js?v=1"></script>
  <script src="./assets/vendor-nav.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* The .home-* classes used below live in home.html's inline <style>,
       not in hearth.css — mirror the rules this page uses so Activation
       renders consistently with the Home page. */
    :root{
      --home-bg: var(--h-chalk, #faf8f5);
      --home-card:#ffffff;
      --home-border: var(--h-cinder, #e8ddd5);
      --home-text: var(--h-coal, #0f0b08);
      --home-muted: var(--h-stone, #8c7b6e);
      --home-accent: var(--h-fire, #c4511a);
      --home-radius:20px;
      --home-shadow:0 10px 30px rgba(15,23,42,.05);
      --home-good:#166534;
      --home-good-bg:#ecfdf3;
      --home-warn:#92400e;
      --home-warn-bg:#fffbeb;
      --home-neutral-bg:#f3f4f6;
      --home-neutral:#374151;
    }

    body{
      background:var(--home-bg);
      color:var(--home-text);
      font-family: 'Figtree', system-ui, sans-serif;
    }

    .home-shell{
      display:grid;
      gap:18px;
      padding-bottom:40px;
    }

    .home-card{
      background:var(--home-card);
      border:1px solid var(--home-border);
      border-radius:var(--home-radius);
      box-shadow:var(--home-shadow);
    }

    .home-pad-lg{ padding:22px; }

    .home-sectionTitle{
      margin:0;
      font-size:20px;
      letter-spacing:-.02em;
    }

    .home-sectionSub{
      margin:4px 0 0;
      color:var(--home-muted);
      font-size:13px;
    }

    .home-empty{
      border:1px dashed #d6cdbc;
      border-radius:16px;
      padding:22px;
      background:#fcfbf8;
      color:var(--home-muted);
      text-align:center;
      font-size:14px;
      line-height:1.55;
    }

    .home-loading{
      color:var(--home-muted);
      font-size:14px;
    }

    /* Single-column cards grid — full width to give the action area room. */
    .activation-grid{
      display:grid;
      gap:14px;
    }

    .home-work{
      display:grid;
      gap:10px;
      padding:18px;
      border:1px solid var(--home-border);
      border-radius:18px;
      background:linear-gradient(180deg,#fff,#fcfbf8);
    }

    .home-workTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .home-work h3{
      margin:0;
      font-size:18px;
      letter-spacing:-.02em;
    }

    .home-work p{
      margin:0;
      color:var(--home-muted);
      line-height:1.55;
      font-size:14px;
    }

    .home-workMeta{
      color:var(--home-text);
      font-size:13px;
      line-height:1.5;
    }

    .home-workActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:2px;
    }

    .home-pill{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      white-space:nowrap;
    }
    .good{ background:var(--home-good-bg); color:var(--home-good); }
    .warn{ background:var(--home-warn-bg); color:var(--home-warn); }
    .neutral{ background:var(--home-neutral-bg); color:var(--home-neutral); }

    .home-button,
    .home-button-secondary{
      appearance:none;
      border:none;
      text-decoration:none;
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font:inherit;
      cursor:pointer;
      transition:all .18s ease;
    }
    .home-button-secondary{
      background:#fff;
      border:1px solid var(--home-border);
      color:var(--home-text);
    }
    .home-button{
      background:var(--home-accent);
      color:#fff;
      font-weight:700;
    }
    .home-button-secondary:hover{
      border-color:#d8ccb8;
      background:#fcfbf8;
    }
    .home-button:hover{
      filter:brightness(.98);
    }

    /* Menu card artwork — ported verbatim from drop-manager.html. The
       artwork is always 540×540px and scaled down via transform to fit
       its frame; transform-origin top-left keeps the html2canvas export
       pixel-identical to the preview. */
    .menuCardArtwork {
      width: 540px;
      height: 540px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      font-family: 'Figtree', system-ui, sans-serif;
      transform-origin: top left;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      --vendor-brand-primary: #8B6B3F;
      background-color: var(--vendor-brand-primary);
    }

    .menuCardArtwork__image {
      position: absolute;
      display: block;
    }

    .menuCardArtwork__scrim {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0) 25%,
        rgba(0,0,0,0.38) 52%,
        rgba(0,0,0,0.74) 76%,
        rgba(0,0,0,0.92) 100%
      );
      pointer-events: none;
    }

    .menuCardArtwork__lockup {
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 32px;
      color: #FAF8F4;
      text-align: left;
    }

    .menuCardArtwork__dropName {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0.005em;
      margin: 0;
      color: #FAF8F4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45), 0 0 14px rgba(0,0,0,0.35);
    }

    .menuCardArtwork__dropDate {
      margin-top: 6px;
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 500;
      font-size: 13px;
      line-height: 1.2;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #FAF8F4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45), 0 0 14px rgba(0,0,0,0.35);
    }

    .menuCardArtwork__skeleton {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F3EEE6 0%, #EBE4D6 100%);
      color: var(--h-slate);
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Per-drop activation timeline */
    .act-timeline {
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 24px;
      border-left: 2px solid var(--home-border);
      margin-top: 18px;
    }

    .act-touchpoint {
      background: #fff;
      border: 1px solid var(--home-border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      position: relative;
    }

    .act-touchpoint::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--home-border);
      border: 2px solid var(--home-bg);
    }

    .act-touchpoint.is-vendor::before { background: var(--home-accent); }
    .act-touchpoint.is-host::before { background: #CBB89D; }
    .act-touchpoint.is-auto::before { background: #166534; }
    .act-touchpoint.is-prompted::before { background: var(--home-muted); }

    .act-touchpoint.is-host {
      background: rgba(139,107,63,0.03);
    }

    .act-touchpoint.is-auto {
      border-left: 3px solid #ecfdf3;
    }

    .act-touchpoint.is-locked {
      opacity: 0.55;
    }

    .act-touchpoint.is-done {
      opacity: 0.7;
    }

    .act-day-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--home-muted);
      margin-bottom: 6px;
    }

    .act-touchpoint h4 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
    }

    .act-touchpoint p {
      margin: 0 0 12px;
      color: var(--home-muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .act-locked-note {
      font-size: 12px;
      color: var(--home-muted);
      font-style: italic;
    }

    .act-done-state {
      font-size: 13px;
      color: #166534;
      font-weight: 600;
    }

    .act-copy-btn {
      appearance: none;
      border: 1px solid var(--home-border);
      background: #fff;
      color: var(--home-text);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.18s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .act-copy-btn:hover {
      border-color: #d8ccb8;
      background: #fcfbf8;
    }

    .act-copy-btn.primary {
      background: var(--home-accent);
      border-color: var(--home-accent);
      color: #fff;
    }

    .act-copy-btn.primary:hover {
      filter: brightness(0.96);
    }

    .act-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      margin-top: 4px;
    }

    .act-note {
      font-size: 12px;
      color: var(--home-muted);
      margin-top: 4px;
    }

    .act-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--home-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      margin-bottom: 16px;
    }

    .act-back-link:hover {
      color: var(--home-text);
    }

    .act-drop-header {
      margin-bottom: 4px;
    }

    .act-drop-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 28px;
      letter-spacing: -0.03em;
      margin: 0 0 4px;
    }

    .act-drop-context {
      font-size: 14px;
      color: var(--home-muted);
      margin: 0 0 4px;
    }

    .act-message-preview {
      background: rgba(139,107,63,0.04);
      border-left: 3px solid var(--home-border);
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: var(--home-text);
      margin-bottom: 10px;
      word-break: break-word;
    }

    .act-channel-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .act-email-expanded {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    .act-email-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      box-sizing: border-box;
    }

    .act-email-subject-input,
    .act-email-body-input {
      box-sizing: border-box;
    }

    .act-email-field label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--home-muted);
    }

    .act-email-field input,
    .act-email-field textarea {
      font: inherit;
      font-size: 13px;
      line-height: 1.55;
      border: 1px solid var(--home-border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--home-text);
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
    }

    .act-email-field textarea {
      min-height: 100px;
    }

    .act-confirm-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Containment for the cards layered inside the page shell — prevents
       child content (long links, message previews) from forcing the cards
       wider than their parent and reintroducing horizontal scroll. */
    .home-card,
    .act-touchpoint,
    .act-message-preview {
      box-sizing: border-box;
      max-width: 100%;
      min-width: 0;
    }

    @media (max-width: 768px) {
      .home-shell {
        padding: 0;
      }

      .home-card {
        border-radius: 16px;
      }

      .act-timeline {
        padding-left: 16px;
        border-left-width: 2px;
      }

      .act-touchpoint {
        box-sizing: border-box;
        max-width: 100%;
        min-width: 0;
      }

      .act-touchpoint::before {
        left: -24px;
      }

      .act-message-preview {
        box-sizing: border-box;
        max-width: 100%;
        word-break: break-word;
        overflow-wrap: break-word;
      }

      .act-actions {
        max-width: 100%;
      }

      .act-copy-btn {
        max-width: 100%;
        white-space: normal;
        height: auto;
        min-height: 44px;
        padding: 8px 14px;
        text-align: center;
      }

      .act-drop-title {
        font-size: 22px;
      }

      .menuCardArtworkFrame {
        max-width: 100% !important;
      }
    }

    /* Ported from service-board.html (lines 135–162) — keeps the operator
       nav as a single horizontal scroll strip on small screens instead of
       wrapping to multiple rows under hearth.css's defaults. */
    @media (max-width: 768px) {

      /* --- 1. Header bar: stack brand and nav vertically --- */
      .headerBar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 14px;
      }

      /* --- 2. Navigation: horizontally scrollable, no wrapping --- */
      .nav {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
        flex-wrap: nowrap;
        gap: 2px;
        padding-bottom: 2px;
        scrollbar-width: none;
        justify-content: flex-start;
      }
      .nav::-webkit-scrollbar { display: none; }
      .nav a {
        flex-shrink: 0;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
    }

    /* Reveal fields above the menu card on Card 1 */
    .act-reveal-fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
      width: 100%;
    }

    .act-field-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--home-muted);
      margin-bottom: 4px;
      display: block;
    }

    .act-field-helper {
      font-size: 12px;
      color: var(--home-muted);
      margin-top: 4px;
    }

    .act-reveal-fields textarea,
    .act-reveal-fields select {
      font: inherit;
      font-size: 13px;
      line-height: 1.55;
      border: 1px solid var(--home-border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--home-text);
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
    }

    .act-reveal-fields select {
      resize: none;
      min-height: 38px;
    }

    /* Orders-open visual asset for Card 4. Same 540×540 + transform-
       scale pattern as the menu card; distinct visual treatment with a
       brand-colour tint, centred "Orders open" headline, drop name
       below, closing time at the bottom. */
    .act-orders-open-artwork {
      width: 540px;
      height: 540px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      font-family: 'Figtree', system-ui, sans-serif;
      transform-origin: top left;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      --vendor-brand-primary: #8B6B3F;
      background-color: var(--vendor-brand-primary);
    }

    .act-orders-open-artwork__image {
      position: absolute;
      display: block;
    }

    .act-orders-open-artwork__tint {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-color: var(--vendor-brand-primary);
      opacity: 0.28;
    }

    .act-orders-open-artwork__centre {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .act-orders-open-artwork__headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 64px;
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: #FAF8F4;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45), 0 0 20px rgba(0,0,0,0.35);
      margin: 0;
    }

    .act-orders-open-artwork__dropname {
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 500;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0.02em;
      color: #FAF8F4;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      margin-top: 14px;
      opacity: 0.92;
    }

    .act-orders-open-artwork__closing {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #FAF8F4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      opacity: 0.85;
    }

    .act-orders-open-artwork__skeleton {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F3EEE6 0%, #EBE4D6 100%);
      color: var(--h-slate, #374151);
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Editable message pattern for Cards 2 / 4 / 5 — preview ↔ textarea
       with channel-specific copy buttons. */
    .act-message-edit {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .act-message-edit textarea {
      font: inherit;
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid var(--home-border);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--home-text);
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
      min-height: 100px;
      white-space: pre-wrap;
    }

    .act-message-edit-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Capacity-signal visual asset for Card 6. Same 540×540 + transform-
       scale pattern as the menu card / orders-open card; tint deepens to
       0.62 opacity when sold out, with a Cormorant "Sold out" headline
       replacing the slots-left number. */
    .act-capacity-artwork {
      width: 540px;
      height: 540px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      font-family: 'Figtree', system-ui, sans-serif;
      transform-origin: top left;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      --vendor-brand-primary: #8B6B3F;
      background-color: var(--vendor-brand-primary);
    }

    .act-capacity-artwork__image {
      position: absolute;
      display: block;
    }

    .act-capacity-artwork__tint {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-color: var(--vendor-brand-primary);
      opacity: 0.28;
    }

    .act-capacity-artwork__tint.is-soldout {
      opacity: 0.62;
    }

    .act-capacity-artwork__centre {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .act-capacity-artwork__number {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 96px;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #FAF8F4;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45), 0 0 20px rgba(0,0,0,0.35);
      margin: 0;
    }

    .act-capacity-artwork__slots {
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #FAF8F4;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      margin-top: 8px;
      opacity: 0.9;
    }

    .act-capacity-artwork__soldout {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 72px;
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: #FAF8F4;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 24px rgba(0,0,0,0.4);
      margin: 0;
    }

    .act-capacity-artwork__dropname {
      font-family: 'Figtree', system-ui, sans-serif;

<body>
  <div class="container">
    <div class="card headerBar">
      <div class="brand">
        <a class="brandMark" href="./home.html" aria-label="Hearth home">H</a>
        <div>
          <div class="brandTitle">Hearth</div>
          <div class="brandSubtitle" id="actHeaderVendorSub">Activation</div>
        </div>
      </div>
      <nav class="nav" id="operatorNav" aria-label="Primary"></nav>
      <script>HearthNav.renderNav('operatorNav', 'activation.html', { dotSlash: true });</script>
    </div>
    <div class="home-shell">

      <section class="home-card home-pad-lg">
        <h2 class="home-sectionTitle">Activation</h2>
        <p class="home-sectionSub">Fill your drops. The work of making each moment land.</p>
        <div id="activationContent" style="margin-top:18px;">
          <div class="home-loading">Loading your drops…</div>
        </div>
      </section>

    </div>
  </div>

  <script>
    const sb = window.supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const state = {
      vendor: null,
      summaryById: {},
      rawById: {},
      products: [],
      selectedDropId: null,
      activationLog: [],
      view: 'cross',
      resizeObserver: null,
      _ordersOpenObserver: null,
      _capacityObserver: null,
      currentTemplates: {},
      expandedEmailCards: {},
      emailDrafts: {},
      messageDrafts: {},
      expandedMessageCards: {},
      sendingEmail: {},  // touchpoint → true while in-flight
      generateLoading: {},  // touchpoint → true while AI copy generates
      emailBodyGenerated: {},  // touchpoint → true once body auto-generated
      messageGenerated: {}  // touchpoint → true once message copy generated
    };

    const DAY_MS = 24 * 60 * 60 * 1000;

    function byId(id){ return document.getElementById(id); }

    function escapeHtml(str){
      return String(str ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function titleCase(str){
      return String(str || '')
        .replace(/[_-]+/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function fmtTime(d){
      let h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${String(m).padStart(2,'0')}${ampm}`;
    }

    // "Friday 30 May · 6:00pm–8:00pm"
    function fmtDateTime(start, end){
      const ds = start ? new Date(start) : null;
      if (!ds || Number.isNaN(ds.getTime())) return 'Date to be confirmed';
      const datePart = ds.toLocaleDateString('en-GB', {
        weekday:'long', day:'numeric', month:'long'
      });
      let timePart = fmtTime(ds);
      const de = end ? new Date(end) : null;
      if (de && !Number.isNaN(de.getTime())) {
        timePart += `–${fmtTime(de)}`;
      }
      return `${datePart} · ${timePart}`;
    }

    function statusOf(s){
      return String(s.status || '').toLowerCase();
    }

    // ---- Cross-drop view (Prompt 2) ----------------------------------

    // Activation scope: live, or upcoming (published/scheduled/open within
    // the next 14 days), or recently closed (within the last 48 hours).
    function inScope(s){
      const status = statusOf(s);
      if (status === 'live') return true;

      if (status === 'published' || status === 'scheduled' || status === 'open') {
        const ds = Date.parse(s.delivery_start);
        if (Number.isNaN(ds)) return false;
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        const horizon = Date.now() + 14 * DAY_MS;
        return ds >= todayStart.getTime() && ds <= horizon;
      }

      if (status === 'closed') {
        const raw = state.rawById[s.drop_id];
        const closedRaw = s.closed_at ?? (raw && (raw.closed_at ?? raw.closes_at)) ?? s.closes_at;
        const cm = Date.parse(closedRaw);
        if (Number.isNaN(cm)) return false;
        const now = Date.now();
        return cm >= now - 48 * 60 * 60 * 1000 && cm <= now + 60 * 1000;
      }

      return false;
    }

    function scopeRank(s){
      const status = statusOf(s);
      if (status === 'live') return 0;
      if (status === 'closed') return 2;
      return 1; // upcoming
    }

    // live first, then upcoming by delivery_start asc, then recently closed
    // by delivery_start desc.
    function sortScoped(rows){
      return rows.slice().sort((a, b) => {
        const ra = scopeRank(a), rb = scopeRank(b);
        if (ra !== rb) return ra - rb;
        const da = Date.parse(a.delivery_start) || 0;
        const db = Date.parse(b.delivery_start) || 0;
        return ra === 2 ? db - da : da - db;
      });
    }

    function statusPill(status){
      const st = String(status || '').toLowerCase();
      if (st === 'live') return '<span class="home-pill good">Live now</span>';
      if (st === 'closed') return '<span class="home-pill neutral">Closed</span>';
      return '<span class="home-pill neutral">Scheduled</span>';
    }

    function contextLine(s){
      if (s.host_name) return 'at ' + escapeHtml(s.host_name);
      const fm = String(s.fulfilment_mode || '').toLowerCase();
      if (fm === 'delivery') return 'Neighbourhood delivery';
      if (fm === 'collection') return 'Collection';
      if (fm) return escapeHtml(titleCase(fm));
      return '';
    }

    function capacityLine(s){
      const placed = Number(s.order_count || 0);
      const total = s.capacity_units_total;
      if (total == null || Number(total) === 0) {
        return `${placed} orders placed`;
      }
      return `${placed} of ${Number(total)} orders`;
    }

    function cardHtml(s){
      const ctx = contextLine(s);
      const isLive = statusOf(s) === 'live';
      const sbLink = isLive
        ? `<a class="home-button-secondary" href="${HearthNav.withVendor('./service-board.html')}">Open Service Board</a>`
        : '';

      const progress = getDropProgress(s);
      const progressPct = progress.total > 0
        ? Math.round((progress.completed / progress.total) * 100)
        : 0;
      const progressLine = progress.total > 0
        ? `<div class="act-progress-row">
             <div class="act-progress-bar">
               <div class="act-progress-fill" style="width:${progressPct}%"></div>
             </div>
             <span class="act-progress-label">${progress.completed} of ${progress.total}</span>
           </div>`
        : '';
      const nextLine = progress.nextTitle && progress.completed < progress.total
        ? `<div class="act-next-action">Next: ${escapeHtml(progress.nextTitle)}</div>`
        : progress.completed === progress.total && progress.total > 0
          ? `<div class="act-next-action act-next-complete">All steps complete</div>`
          : '';

      return `
        <article class="home-work">
          <div class="home-workTop">
            <div>
              <h3>${escapeHtml(s.drop_name || 'Untitled drop')}</h3>
              ${ctx ? `<p>${ctx}</p>` : ''}
            </div>
            ${statusPill(s.status)}
          </div>
          <div class="home-workMeta">
            ${escapeHtml(fmtDateTime(s.delivery_start, s.delivery_end))}<br>
            ${escapeHtml(capacityLine(s))}
          </div>
          ${progressLine}${nextLine}
          <div class="home-workActions">
            <a class="home-button" href="#" data-drop-id="${escapeHtml(s.drop_id)}">View activation</a>
            ${sbLink}
          </div>
        </article>
      `;
    }

    function renderContent(rows){
      const content = byId('activationContent');
      if (!rows.length) {
        content.innerHTML = `<div class="home-empty">No active or upcoming drops. Create your next drop in Drop Studio.</div>`;
        return;
      }
      content.innerHTML = `<div class="activation-grid">${rows.map(cardHtml).join('')}</div>`;
    }

    async function loadDrops(){
      state.vendor = await window.HearthVendor.resolveVendor(sb);
      if (!state.vendor) throw new Error('Vendor resolution failed');

      const { data, error } = await sb.functions.invoke('list-drops', { body: {} });
      if (error) throw error;
      if (data && data.error) throw new Error(data.error);

      const summaries = Array.isArray(data?.drop_summaries) ? data.drop_summaries : [];
      const drops = Array.isArray(data?.drops) ? data.drops : [];

      state.rawById = {};
      drops.forEach(d => { state.rawById[d.id] = d; });
      state.summaryById = {};
      summaries.forEach(s => { state.summaryById[s.drop_id] = s; });

      return sortScoped(summaries.filter(inScope));
    }

    // ---- Per-drop view: helpers --------------------------------------

    function getOrderingLink(rawDrop) {
      const slug = rawDrop?.slug || '';
      if (!slug) return '';
      return `https://lovehearth.co.uk/order.html?drop=${encodeURIComponent(slug)}`;
    }

    function getTouchpointDayLabels(deliveryStart) {
      const ds = deliveryStart ? new Date(deliveryStart) : null;
      if (!ds || isNaN(ds.getTime())) {
        return [
          '4 DAYS BEFORE',
          '3 DAYS BEFORE — HOST',
          '1 DAY BEFORE — MORNING',
          '1 DAY BEFORE — 5PM',
          '1 DAY BEFORE — EVENING',
          'DROP DAY — MORNING',
          'DROP DAY — SERVICE',
          'DROP DAY — EVENING',
          'DAY AFTER — MORNING'
        ];
      }
      const day = (offset) => {
        const d = new Date(ds);
        d.setDate(d.getDate() + offset);
        return d.toLocaleDateString('en-GB', { weekday: 'long' }).toUpperCase();
      };
      return [
        `${day(-4)} — 4 DAYS BEFORE`,
        `${day(-3)} — HOST AWARENESS`,
        `${day(-1)} MORNING — EARLY ACCESS`,
        `${day(-1)} 5PM — ORDERING OPENS`,
        `${day(-1)} EVENING — HOST LINK`,
        `${day(0)} MORNING — CAPACITY SIGNAL`,
        `${day(0)} — SERVICE`,
        `${day(0)} EVENING — POST DROP`,
        `${day(1)} MORNING — THANK YOU`
      ];
    }

    // Returns the set of touchpoint card numbers relevant for this drop,
    // based on two axes: host present / absent, public / private (event).
    // optionalCards are shown but don't block progress completion and are
    // marked "(optional)" in their title.
    function getDropProfile(summary) {
      const hasHost = !!summary.host_name;
      const isPrivate = summary.drop_type === 'event';

      if (!isPrivate && hasHost)  return { cards: [1,2,3,4,5,6,7,8,9], optional: [] };
      if (!isPrivate && !hasHost) return { cards: [1,3,4,6,7,8,9],     optional: [] };
      if (isPrivate  && hasHost)  return { cards: [1,2,5,7,8,9],       optional: [1] };
      /* isPrivate && !hasHost */  return { cards: [1,7,8,9],           optional: [1] };
    }

    // Returns the activation log entries for a specific drop from
    // state.activationLog. The log entries have a dropId field stamped
    // when actLog() is called.
    function getDropLog(dropId) {
      return (state.activationLog || []).filter(e => e.dropId === dropId);
    }

    // Returns progress for a drop: { completed, total, nextTitle }
    function getDropProgress(summary) {
      const profile = getDropProfile(summary);
      const dropId = summary.drop_id;
      const log = getDropLog(dropId);

      // Map touchpoint card numbers to the actual logged touchpoint keys
      // (verified against the actLog() call sites in renderDropView — the
      // keys here are the ones the code really stamps, not the day-named
      // variants). Card 7 is a passive auto-card that never logs, so it has
      // no key and is excluded from counting below.
      const cardKeyMap = {
        1: 'monday_reveal',
        2: 'tuesday_host',
        3: 'thursday_early_access',
        4: 'thursday_vendor_whatsapp',
        5: 'thursday_host_link',
        6: 'friday_capacity',
        7: null,
        8: 'friday_post_drop',
        9: 'saturday_thankyou'
      };

      const cardTitleMap = {
        1: 'Share reveal post',
        2: 'Send host WhatsApp',
        3: 'Send early access email',
        4: 'Tell customers ordering is live',
        5: 'Send host ordering link',
        6: 'Share capacity signal',
        7: 'Order ready notifications',
        8: 'Post drop content',
        9: 'Send thank-you email'
      };

      const loggedKeys = new Set(log.map(e => e.touchpoint));

      // Only count non-optional cards that actually have a loggable key
      // toward progress. Card 7 (key null) is passive and never completes,
      // so excluding it keeps 100% / "All steps complete" reachable.
      const countableCards = profile.cards.filter(
        n => !profile.optional.includes(n) && cardKeyMap[n]
      );
      const completed = countableCards.filter(n => loggedKeys.has(cardKeyMap[n])).length;
      const total = countableCards.length;

      // Next action: first unlogged countable card in profile order.
      const nextCard = profile.cards.find(
        n => cardKeyMap[n] && !loggedKeys.has(cardKeyMap[n])
      );
      const nextTitle = nextCard ? cardTitleMap[nextCard] : null;

      return { completed, total, nextTitle };
    }


    // "this Friday" / "this Friday evening"
    function actRelDay(value, withPartOfDay){
      if (!value) return 'soon';
      const d = new Date(value);
      if (isNaN(d.getTime())) return 'soon';
      const wd = d.toLocaleDateString('en-GB', { weekday: 'long' });
      if (!withPartOfDay) return `this ${wd}`;
      const h = d.getHours();
      const part = h >= 17 ? 'evening' : (h >= 12 ? 'afternoon' : 'morning');
      return `this ${wd} ${part}`;
    }

    function actWeekday(value, offset){
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      d.setDate(d.getDate() + (offset || 0));
      return d.toLocaleDateString('en-GB', { weekday: 'long' });
    }

    // "5:00pm on Friday 30 May", or "soon" when not set.
    function actOpensPhrase(opensAt){
      if (!opensAt) return 'soon';
      const d = new Date(opensAt);
      if (isNaN(d.getTime())) return 'soon';
      return `${fmtTime(d)} on ${actFormatMenuCardDate(d)}`;
    }

    function getLogEntry(touchpoint){
      return state.activationLog.find(e => e.touchpoint === touchpoint) || null;
    }

    function formatLogTime(isoString){
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return '';
      return fmtTime(d);
    }

    function actLog(touchpoint, action, meta = {}){
      state.activationLog.push({
        touchpoint,
        action,
        dropId: state.selectedDropId || null,
        timestamp: new Date().toISOString(),
        ...meta
      });
      renderDropView(state.selectedDropId);
    }

    async function actCopyToClipboard(text, btn, originalLabel) {
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = 'Copied ✓';
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = originalLabel;
          btn.disabled = false;
        }, 2000);
      } catch (err) {
        console.error('Copy failed', err);
      }
    }

    // ---- Menu card (ported from drop-manager.html, act- prefix) ------

    function actFormatMenuCardDate(value) {
      if (!value) return "";
      const d = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString("en-GB", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });
    }

    function actComputeRevealDate(deliveryStart) {
      if (!deliveryStart) return null;
      const d = new Date(deliveryStart);
      if (Number.isNaN(d.getTime())) return null;
      const reveal = new Date(d.getTime() - 4 * 24 * 60 * 60 * 1000);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      if (reveal.getTime() < today.getTime()) return null;
      return reveal;
    }

    function actPopulateMenuCard(summary, rawDrop, vendor, products) {
      const artworkEl = byId("act-menuCardArtwork");
      const downloadBtn = byId("act-downloadMenuCardBtn");
      const skeletonEl = byId("act-menuCardSkeleton");
      if (!artworkEl) return;

      // Brand-colour solid is the last-resort fallback.
      artworkEl.style.setProperty("--vendor-brand-primary", (vendor && vendor.brand_primary_color) || "#8B6B3F");

      // Image fallback chain: reveal product photo → vendor hero → solid.
      let imageUrl = "";
      if (rawDrop && rawDrop.reveal_product_id) {
        const product = (products || []).find(
          (p) => String(p.id) === String(rawDrop.reveal_product_id)
        );
        if (product && product.image_url) imageUrl = String(product.image_url);
      }
      if (!imageUrl && vendor && vendor.hero_image_url) imageUrl = String(vendor.hero_image_url);

      // Explicit pixel geometry against the 540×540 source box so the
      // html2canvas scale:2 export matches the preview exactly.
      const img = byId("act-menuCardImage");
      const S = 540;
      if (img) {
        if (imageUrl) {
          img.onload = () => {
            const iw = img.naturalWidth, ih = img.naturalHeight;
            const sc = Math.max(S / iw, S / ih);
            const w = iw * sc, h = ih * sc;
            img.style.width  = w + "px";
            img.style.height = h + "px";
            img.style.left   = ((S - w) / 2) + "px";
            img.style.top    = ((S - h) / 2) + "px";
            img.style.display = "block";
            if (skeletonEl) skeletonEl.style.display = "none";
            if (downloadBtn) downloadBtn.disabled = false;
          };
          img.onerror = () => {
            img.style.display = "none";
            if (skeletonEl) skeletonEl.style.display = "none";
            if (downloadBtn) downloadBtn.disabled = false;
          };
          img.crossOrigin = "anonymous";
          img.src = imageUrl;
        } else {
          img.style.display = "none";
          img.removeAttribute("src");
          if (skeletonEl) skeletonEl.style.display = "none";
          if (downloadBtn) downloadBtn.disabled = false;
        }
      }

      const dropNameEl = byId("act-menuCardDropName");
      if (dropNameEl) dropNameEl.textContent = (rawDrop && rawDrop.name) || summary.drop_name || "";
      const dropDateEl = byId("act-menuCardDropDate");
      if (dropDateEl) dropDateEl.textContent = actFormatMenuCardDate((rawDrop && rawDrop.delivery_start) || summary.delivery_start);

      actUpdateMenuCardScale();
    }

    function actUpdateMenuCardScale() {
      const frame = byId("act-menuCardFrame");
      const artwork = byId("act-menuCardArtwork");
      if (!frame || !artwork) return;
      const targetWidth = frame.clientWidth;
      if (!targetWidth) return;
      const scale = Math.min(1, targetWidth / 540);
      artwork.style.transform = `scale(${scale})`;
      frame.style.height = `${540 * scale}px`;
    }

    async function actDownloadMenuCard() {
      const artworkEl = byId("act-menuCardArtwork");
      const downloadBtn = byId("act-downloadMenuCardBtn");
      const skeletonEl = byId("act-menuCardSkeleton");
      if (!artworkEl || !downloadBtn) return;

      const vendor = state.vendor || {};
      const rawDrop = state.rawById[state.selectedDropId] || {};

      const originalText = downloadBtn.textContent;
      const originalTransform = artworkEl.style.transform;
      const skeletonWasVisible = skeletonEl ? skeletonEl.style.display !== "none" : false;

      downloadBtn.disabled = true;
      downloadBtn.textContent = "Generating…";

      try {
        if (typeof window.html2canvas !== "function") {
          throw new Error("html2canvas not loaded");
        }
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        if (skeletonEl) skeletonEl.style.display = "none";
        artworkEl.style.transform = "scale(1)";

        let canvas;
        try {
          canvas = await window.html2canvas(artworkEl, {
            scale: 2,
            useCORS: true,
            backgroundColor: null,
            logging: false
          });
        } finally {
          artworkEl.style.transform = originalTransform;
          if (skeletonEl && skeletonWasVisible) skeletonEl.style.display = "flex";
        }

        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob((b) => {
            if (b) resolve(b);
            else reject(new Error("toBlob returned null"));
          }, "image/png", 1.0);
        });

        const vendorSlug = vendor.slug || "vendor";
        const dropSlug = rawDrop.slug || "drop";
        const filename = `${vendorSlug}-${dropSlug}-reveal.png`;

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");

    function actUpdateOrdersOpenScale() {
      const frame = byId('act-ordersOpenFrame');
      const artwork = byId('act-ordersOpenArtwork');
      if (!frame || !artwork) return;
      const targetWidth = frame.clientWidth;
      if (!targetWidth) return;

    function actPopulateOrdersOpenCard(summary, rawDrop, vendor) {
      const artworkEl = byId('act-ordersOpenArtwork');

      if (!artworkEl) return;

      artworkEl.style.setProperty('--vendor-brand-primary',

      // Image fallback chain: reveal product → vendor hero → solid colour.
      let imageUrl = '';
      if (rawDrop && rawDrop.reveal_product_id) {
        const product = (state.products || []).find(

      if (!imageUrl && vendor && vendor.hero_image_url) {

      const img = byId('act-ordersOpenImage');
      const S = 540;
      if (img) {
        if (imageUrl) {
          img.onload = () => {
            const iw = img.naturalWidth, ih = img.naturalHeight;
            const sc = Math.max(S / iw, S / ih);
            const w = iw * sc, h = ih * sc;
            img.style.width  = w + 'px';
            img.style.height = h + 'px';
            img.style.left   = ((S - w) / 2) + 'px';
            img.style.top    = ((S - h) / 2) + 'px';

    async function actDownloadOrdersOpenCard() {
      const artworkEl = byId('act-ordersOpenArtwork');
      const downloadBtn = byId('act-downloadOrdersOpenBtn');

      if (!artworkEl || !downloadBtn) return;

      const vendor = state.vendor || {};
      const rawDrop = state.rawById[state.selectedDropId] || {};

      const originalTransform = artworkEl.style.transform;
      const skeletonWasVisible = skeletonEl
        ? skeletonEl.style.display !== 'none'
        : false;

      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Generating…';

      try {
        if (typeof window.html2canvas !== 'function') {
          throw new Error('html2canvas not loaded');
        }
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        if (skeletonEl) skeletonEl.style.display = 'none';
        artworkEl.style.transform = 'scale(1)';

        try {
          canvas = await window.html2canvas(artworkEl, {
            scale: 2,

          artworkEl.style.transform = originalTransform;

            skeletonEl.style.display = 'flex';

          canvas.toBlob(b => {
            if (b) resolve(b);

        const vendorSlug = vendor.slug || 'vendor';
        const dropSlug = rawDrop.slug || 'drop';
        const filename = `${vendorSlug}-${dropSlug}-orders-open.png`;

        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);

        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);

        console.error('[ordersOpenCard] download failed', err);
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = originalText;
      }

    // ---- Reveal fields (Card 1: reveal_line + reveal_product_id) -----

    let actRevealSaveTimer = null;

    // Persist the current reveal fields to update-drop. Silent on error —
    // the vendor isn't blocked; failures land in the console for debug.
    async function actSaveRevealFields(dropId) {
      const productEl = byId('act-revealProduct');
      if (!productEl) return;
      const reveal_line = (state.rawById[dropId]?.reveal_line || '').trim() || null;
      const reveal_product_id = productEl.value || null;
      try {
        const { data, error } = await sb.functions.invoke('update-drop', {
          body: {
            vendor_id: state.vendor.id,
            drop_id: dropId,
            fields: { reveal_line, reveal_product_id }
          }
        });
        if (error) throw error;
        if (data && data.error) throw new Error(data.error);
        if (state.rawById[dropId]) {
          state.rawById[dropId].reveal_line = reveal_line;
          state.rawById[dropId].reveal_product_id = reveal_product_id;
        }
      } catch (err) {
        console.error('Reveal fields save failed', err);

    // Wire the reveal textarea + product select inside Card 1's action
    // area. Mirrors templates['monday_reveal'] inline so the Copy caption
    // button always copies the latest text without waiting for the save.
    function actInitRevealFields(dropId, summary, rawDrop) {
      const productEl = byId('act-revealProduct');
      if (!productEl) return;

      productEl.addEventListener('change', () => {
        const newProductId = productEl.value || null;
        if (state.rawById[dropId]) {
          state.rawById[dropId].reveal_product_id = newProductId;
        }
        // Update artwork live (don't wait for save).
        actPopulateMenuCard(summary, state.rawById[dropId] || rawDrop, state.vendor, state.products);

    // ---- Per-drop view: card builders --------------------------------

    function copyBtn(label, touchpoint, action, primary){
      return `<button class="act-copy-btn${primary ? ' primary' : ''}" type="button" data-act="copy" data-touchpoint="${touchpoint}" data-action="${action}">${label}</button>`;
    }

    function confirmBtn(touchpoint){
      return `<button class="act-copy-btn primary" type="button" data-act="confirm" data-touchpoint="${touchpoint}" data-action="confirmed">Confirm send</button>`;
    }

    // Resolves a card's action area, honouring done-state and locked-state.
    function actActionArea(touchpointKey, locked, lockedNote, actionHtml){
      if (touchpointKey) {
        const entry = getLogEntry(touchpointKey);
        if (entry) {
          return { done: true, locked: false, html: `<div class="act-done-state">✓ Done · ${formatLogTime(entry.timestamp)}</div>` };
        }
      }
      if (locked) {
        return { done: false, locked: true, html: `<div class="act-locked-note">${escapeHtml(lockedNote)}</div>` };
      }
      return { done: false, locked: false, html: actionHtml };
    }

    function tpCard(opts){
      const res = actActionArea(opts.touchpointKey || null, !!opts.locked, opts.lockedNote || '', opts.actionHtml || '');
      const classes = ['act-touchpoint', opts.typeClass];
      if (res.locked) classes.push('is-locked');
      if (res.done) classes.push('is-done');
      return `
        <div class="${classes.join(' ')}">
          <div class="act-day-label">${escapeHtml(opts.label || '')}</div>
          <h4>${opts.title}</h4>
          <p>${opts.desc}</p>
          <div class="act-actions">${res.html}</div>
        </div>
      `;
    }

    // Message card: the prepared message stays visible inline, with one
    // copy button per channel. Done-state is handled here (message stays
    // visible, channel buttons replaced) so tpCard's touchpointKey is null.
    function messageCard(opts) {
      const entry = getLogEntry(opts.touchpointKey);
      const tp = opts.touchpointKey;

      // Initialise message draft from generated template if not yet set
      if (!state.messageDrafts[tp]) {
        state.messageDrafts[tp] = opts.messageText || '';
      }
      const currentText = state.messageDrafts[tp];
      const isExpanded = !!state.expandedMessageCards[tp];

      let actionHtml;

      if (entry) {
        // Done state — message still visible read-only, buttons replaced
        actionHtml = `
          <div class="act-message-preview">${escapeHtml(currentText)}</div>
          <div class="act-done-state">✓ Sent · ${formatLogTime(entry.timestamp)}</div>
        `;
      } else if (isExpanded) {
        // Edit state — editable textarea, done editing + copy buttons
        const channelBtns = (opts.channels || []).map(ch =>
          `<button class="act-copy-btn" type="button"
            data-act="copy-message"
            data-touchpoint="${escapeHtml(tp)}"
            data-action="message_copied">Copy for ${escapeHtml(ch)}</button>`
        ).join('');
        actionHtml = `
          <div class="act-message-edit">
            <textarea
              data-act="message-textarea"
              data-touchpoint="${escapeHtml(tp)}"
              rows="5">${escapeHtml(currentText)}</textarea>

            <div class="act-message-edit-row">
              <button
                data-act="generate-copy"
                data-touchpoint="${escapeHtml(tp)}"
                class="act-copy-btn">
                ${state.messageGenerated?.[tp] ? '↺ Regenerate →' : '✦ Generate →'}
              </button>
              <button class="act-copy-btn" type="button"
                data-act="collapse-message"
                data-touchpoint="${escapeHtml(tp)}">Done editing</button>
              ${channelBtns}
            </div>

              style="font-size:12px;color:#b91c1c;margin-top:4px;min-height:16px;"></div>

      } else {

            data-touchpoint="${escapeHtml(tp)}"
