<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hearth — Activation</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="./assets/hearth-vendor.js?v=1"></script>
  <script src="./assets/vendor-nav.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* The .home-* classes used below live in home.html's inline <style>,
       not in hearth.css — mirror the rules this page uses so Activation
       renders consistently with the Home page. */
    :root{
      --home-bg: var(--h-chalk, #faf8f5);
      --home-card:#ffffff;
      --home-border: var(--h-cinder, #e8ddd5);
      --home-text: var(--h-coal, #0f0b08);
      --home-muted: var(--h-stone, #8c7b6e);
      --home-accent: var(--h-fire, #c4511a);
      --home-radius:20px;
      --home-shadow:0 10px 30px rgba(15,23,42,.05);
      --home-good:#166534;
      --home-good-bg:#ecfdf3;
      --home-warn:#92400e;
      --home-warn-bg:#fffbeb;
      --home-neutral-bg:#f3f4f6;
      --home-neutral:#374151;
    }

    body{
      background:var(--home-bg);
      color:var(--home-text);
      font-family: 'Figtree', system-ui, sans-serif;
    }

    .home-shell{
      display:grid;
      gap:18px;
      padding-bottom:40px;
    }

    .home-card{
      background:var(--home-card);
      border:1px solid var(--home-border);
      border-radius:var(--home-radius);
      box-shadow:var(--home-shadow);
    }

    .home-pad-lg{ padding:22px; }

    .home-sectionTitle{
      margin:0;
      font-size:20px;
      letter-spacing:-.02em;
    }

    .home-sectionSub{
      margin:4px 0 0;
      color:var(--home-muted);
      font-size:13px;
    }

    .home-empty{
      border:1px dashed #d6cdbc;
      border-radius:16px;
      padding:22px;
      background:#fcfbf8;
      color:var(--home-muted);
      text-align:center;
      font-size:14px;
      line-height:1.55;
    }

    .home-loading{
      color:var(--home-muted);
      font-size:14px;
    }

    /* Single-column cards grid — full width to give the action area room. */
    .activation-grid{
      display:grid;
      gap:14px;
    }

    .home-work{
      display:grid;
      gap:10px;
      padding:18px;
      border:1px solid var(--home-border);
      border-radius:18px;
      background:linear-gradient(180deg,#fff,#fcfbf8);
    }

    .home-workTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .home-work h3{
      margin:0;
      font-size:18px;
      letter-spacing:-.02em;
    }

    .home-work p{
      margin:0;
      color:var(--home-muted);
      line-height:1.55;
      font-size:14px;
    }

    .home-workMeta{
      color:var(--home-text);
      font-size:13px;
      line-height:1.5;
    }

    .home-workActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:2px;
    }

    .home-pill{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      white-space:nowrap;
    }
    .good{ background:var(--home-good-bg); color:var(--home-good); }
    .warn{ background:var(--home-warn-bg); color:var(--home-warn); }
    .neutral{ background:var(--home-neutral-bg); color:var(--home-neutral); }

    .home-button,
    .home-button-secondary{
      appearance:none;
      border:none;
      text-decoration:none;
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font:inherit;
      cursor:pointer;
      transition:all .18s ease;
    }
    .home-button-secondary{
      background:#fff;
      border:1px solid var(--home-border);
      color:var(--home-text);
    }
    .home-button{
      background:var(--home-accent);
      color:#fff;
      font-weight:700;
    }
    .home-button-secondary:hover{
      border-color:#d8ccb8;
      background:#fcfbf8;
    }
    .home-button:hover{
      filter:brightness(.98);
    }

    /* Menu card artwork — ported verbatim from drop-manager.html. The
       artwork is always 540×540px and scaled down via transform to fit
       its frame; transform-origin top-left keeps the html2canvas export
       pixel-identical to the preview. */
    .menuCardArtwork {
      width: 540px;
      height: 540px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      font-family: 'Figtree', system-ui, sans-serif;
      transform-origin: top left;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      --vendor-brand-primary: #8B6B3F;
      background-color: var(--vendor-brand-primary);
    }

    .menuCardArtwork__image {
      position: absolute;
      display: block;
    }

    .menuCardArtwork__scrim {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0) 25%,
        rgba(0,0,0,0.38) 52%,
        rgba(0,0,0,0.74) 76%,
        rgba(0,0,0,0.92) 100%
      );
      pointer-events: none;
    }

    .menuCardArtwork__lockup {
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 32px;
      color: #FAF8F4;
      text-align: left;
    }

    .menuCardArtwork__dropName {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0.005em;
      margin: 0;
      color: #FAF8F4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45), 0 0 14px rgba(0,0,0,0.35);
    }

    .menuCardArtwork__dropDate {
      margin-top: 6px;
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 500;
      font-size: 13px;
      line-height: 1.2;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #FAF8F4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45), 0 0 14px rgba(0,0,0,0.35);
    }

    .menuCardArtwork__skeleton {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F3EEE6 0%, #EBE4D6 100%);
      color: var(--h-slate);
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Per-drop activation timeline */
    .act-timeline {
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 24px;
      border-left: 2px solid var(--home-border);
      margin-top: 18px;
    }

    .act-touchpoint {
      background: #fff;
      border: 1px solid var(--home-border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      position: relative;
    }

    .act-touchpoint::before {
      content: '';
      position: absolute;
      left: -32px;
      top: 20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--home-border);
      border: 2px solid var(--home-bg);
    }

    .act-touchpoint.is-vendor::before { background: var(--home-accent); }
    .act-touchpoint.is-host::before { background: #CBB89D; }
    .act-touchpoint.is-auto::before { background: #166534; }
    .act-touchpoint.is-prompted::before { background: var(--home-muted); }

    .act-touchpoint.is-host {
      background: rgba(139,107,63,0.03);
    }

    .act-touchpoint.is-auto {
      border-left: 3px solid #ecfdf3;
    }

    .act-touchpoint.is-locked {
      opacity: 0.55;
    }

    .act-touchpoint.is-done {
      opacity: 0.7;
    }

    .act-day-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--home-muted);
      margin-bottom: 6px;
    }

    .act-touchpoint h4 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
    }

    /* Collapsible touchpoint disclosure — the heading row is the toggle.
       Mirrors the host-view "Share with your community" collapse pattern. */
    .act-tp-toggle {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: inherit;
    }

    .act-tp-heading {
      display: block;
      min-width: 0;
    }

    .act-tp-title {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .act-tp-chevron {
      flex-shrink: 0;
      font-size: 20px;
      line-height: 1.2;
      color: var(--home-muted);
      transform: rotate(0deg);
      transition: transform 0.18s ease;
    }

    .act-tp-toggle[aria-expanded="true"] .act-tp-chevron {
      transform: rotate(90deg);
    }

    /* Right-side header cluster: optional channel badge + chevron. */
    .act-tp-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Non-interactive label naming a single-channel touchpoint's destination.
       Calm Hearth sand/brown pill — the slot the ordering-open card will later
       replace with a channel selector. */
    .act-channel-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #8b6b3f;
      background: rgba(139,107,63,0.10);
      border: 1px solid rgba(139,107,63,0.18);
      border-radius: 999px;
      padding: 3px 9px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .act-tp-body {
      margin-top: 10px;
    }

    .act-tp-body.act-tp-body--collapsed {
      display: none;
    }

    .act-touchpoint p {
      margin: 0 0 12px;
      color: var(--home-muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .act-locked-note {
      font-size: 12px;
      color: var(--home-muted);
      font-style: italic;
    }

    .act-done-state {
      font-size: 13px;
      color: #166534;
      font-weight: 600;
    }

    .act-copy-btn {
      appearance: none;
      border: 1px solid var(--home-border);
      background: #fff;
      color: var(--home-text);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.18s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .act-copy-btn:hover {
      border-color: #d8ccb8;
      background: #fcfbf8;
    }

    .act-copy-btn.primary {
      background: var(--home-accent);
      border-color: var(--home-accent);
      color: #fff;
    }

    .act-copy-btn.primary:hover {
      filter: brightness(0.96);
    }

    .act-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      margin-top: 4px;
    }

    .act-note {
      font-size: 12px;
      color: var(--home-muted);
      margin-top: 4px;
    }

    .act-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--home-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      margin-bottom: 16px;
    }

    .act-back-link:hover {
      color: var(--home-text);
    }

    .act-drop-header {
      margin-bottom: 4px;
    }

    .act-drop-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 28px;
      letter-spacing: -0.03em;
      margin: 0 0 4px;
    }

    .act-drop-context {
      font-size: 14px;
      color: var(--home-muted);
      margin: 0 0 4px;
    }

    /* Two-region per-drop layout: timeline (left) | live-stats aside (right,
       sticky on desktop). Mirrors host-view's hvLayout / hvLayoutAside. */
    .act-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      align-items: start;
    }

    .act-layout-main {
      min-width: 0;
    }

    .act-layout-aside {
      position: sticky;
      top: 24px;
      margin-top: 18px;
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    /* Live-stats card — mirrors host-view's hvCard / hvStat* styling. */
    .act-stat-card {
      background: #fff;
      border: 1px solid #e9e3d8;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(15,23,42,0.04);
      padding: 20px 20px 22px;
      display: grid;
      gap: 16px;
    }

    .act-stat-eyebrow {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8b6b3f;
      margin: 0;
    }

    .act-stat-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
    }

    .act-stat-label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin: 0;
    }

    .act-stat-value {
      font-size: 30px;
      font-weight: 950;
      letter-spacing: -0.03em;
      color: #1f2937;
      margin: 0;
      line-height: 1;
    }

    .act-stat-value--sm {
      font-size: 22px;
    }

    .act-stat-divider {
      height: 1px;
      background: rgba(15,23,42,0.06);
    }

    .act-capacity {
      display: grid;
      gap: 10px;
    }

    .act-capacity-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .act-capacity-pct {
      font-size: 14px;
      font-weight: 900;
      color: #1f2937;
      letter-spacing: -0.01em;
    }

    .act-capacity-track {
      position: relative;
      width: 100%;
      height: 10px;
      background: rgba(15,23,42,0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .act-capacity-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: var(--home-accent);
      border-radius: 999px;
      transition: width 0.45s ease;
    }

    .act-capacity-meta {
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      margin: 0;
    }

    .act-message-preview {
      background: rgba(139,107,63,0.04);
      border-left: 3px solid var(--home-border);
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: var(--home-text);
      margin-bottom: 10px;
      word-break: break-word;
    }

    .act-channel-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .act-email-expanded {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    .act-email-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      box-sizing: border-box;
    }

    .act-email-subject-input,
    .act-email-body-input {
      box-sizing: border-box;
    }

    .act-email-field label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--home-muted);
    }

    .act-email-field input,
    .act-email-field textarea {
      font: inherit;
      font-size: 13px;
      line-height: 1.55;
      border: 1px solid var(--home-border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--home-text);
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
    }

    .act-email-field textarea {
      min-height: 100px;
    }

    .act-confirm-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Containment for the cards layered inside the page shell — prevents
       child content (long links, message previews) from forcing the cards
       wider than their parent and reintroducing horizontal scroll. */
    .home-card,
    .act-touchpoint,
    .act-message-preview {
      box-sizing: border-box;
      max-width: 100%;
      min-width: 0;
    }

    @media (max-width: 768px) {
      .home-shell {
        padding: 0;
      }

      .home-card {
        border-radius: 16px;
      }

      .act-timeline {
        padding-left: 16px;
        border-left-width: 2px;
      }

      /* Single column on mobile: aside stacks below the timeline, not sticky. */
      .act-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .act-layout-aside {
        position: static;
        top: auto;
        margin-top: 0;
      }

      .act-touchpoint {
        box-sizing: border-box;
        max-width: 100%;
        min-width: 0;
      }

      .act-touchpoint::before {
        left: -24px;
      }

      .act-message-preview {
        box-sizing: border-box;
        max-width: 100%;
        word-break: break-word;
        overflow-wrap: break-word;
      }

      .act-actions {
        max-width: 100%;
      }

      .act-copy-btn {
        max-width: 100%;
        white-space: normal;
        height: auto;
        min-height: 44px;
        padding: 8px 14px;
        text-align: center;
      }

      .act-drop-title {
        font-size: 22px;
      }

      .menuCardArtworkFrame {
        max-width: 100% !important;
      }
    }

    /* Ported from service-board.html (lines 135–162) — keeps the operator
       nav as a single horizontal scroll strip on small screens instead of
       wrapping to multiple rows under hearth.css's defaults. */
    @media (max-width: 768px) {

      /* --- 1. Header bar: stack brand and nav vertically --- */
      .headerBar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 14px;
      }

      /* --- 2. Navigation: horizontally scrollable, no wrapping --- */
      .nav {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
        flex-wrap: nowrap;
        gap: 2px;
        padding-bottom: 2px;
        scrollbar-width: none;
        justify-content: flex-start;
      }
      .nav::-webkit-scrollbar { display: none; }
      .nav a {
        flex-shrink: 0;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
    }

    /* Reveal fields above the menu card on Card 1 */
    .act-reveal-fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
      width: 100%;
    }

    .act-field-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--home-muted);
      margin-bottom: 4px;
      display: block;
    }

    .act-field-helper {
      font-size: 12px;
      color: var(--home-muted);
      margin-top: 4px;
    }

    .act-reveal-fields textarea,
    .act-reveal-fields select {
      font: inherit;
      font-size: 13px;
      line-height: 1.55;
      border: 1px solid var(--home-border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--home-text);
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
    }

    .act-reveal-fields select {
      resize: none;
      min-height: 38px;
    }

    /* Orders-open visual asset for Card 4. Same 540×540 + transform-
       scale pattern as the menu card; distinct visual treatment with a
       brand-colour tint, centred "Orders open" headline, drop name
       below, closing time at the bottom. */
    .act-orders-open-artwork {
      width: 540px;
      height: 540px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      font-family: 'Figtree', system-ui, sans-serif;
      transform-origin: top left;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      --vendor-brand-primary: #8B6B3F;
      background-color: var(--vendor-brand-primary);
    }

    .act-orders-open-artwork__image {
      position: absolute;
      display: block;
    }

    .act-orders-open-artwork__tint {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-color: var(--vendor-brand-primary);
      opacity: 0.28;
    }

    .act-orders-open-artwork__centre {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;

<body>
  <div class="container">
    <div class="card headerBar">
      <div class="brand">
        <a class="brandMark" href="./home.html" aria-label="Hearth home">H</a>
        <div>
          <div class="brandTitle">Hearth</div>
          <div class="brandSubtitle" id="actHeaderVendorSub">Activation</div>
        </div>
      </div>
      <nav class="nav" id="operatorNav" aria-label="Primary"></nav>
      <script>HearthNav.renderNav('operatorNav', 'activation.html', { dotSlash: true });</script>
    </div>
    <div class="home-shell">

      <section class="home-card home-pad-lg">
        <h2 class="home-sectionTitle">Activation</h2>
        <p class="home-sectionSub">Fill your drops. The work of making each moment land.</p>
        <div id="activationContent" style="margin-top:18px;">
          <div class="home-loading">Loading your drops…</div>
        </div>
      </section>

    </div>
  </div>

  <script>
    const sb = window.supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const state = {
      vendor: null,
      summaryById: {},
      rawById: {},
      products: [],
      selectedDropId: null,
      activationLog: [],
      view: 'cross',
      resizeObserver: null,
      _ordersOpenObserver: null,
      _capacityObserver: null,
      currentTemplates: {},
      expandedEmailCards: {},
      emailDrafts: {},
      messageDrafts: {},
      guidanceDrafts: {},
      expandedMessageCards: {},
      cardExpanded: {},  // cardNum (string) → explicit user toggle override; survives re-render
      _activationDropPhase: 'pre-open',  // current drop phase, drives auto-expand
      sendingEmail: {},  // touchpoint → true while in-flight
      generateLoading: {},  // touchpoint → true while AI copy generates
      emailBodyGenerated: {},  // touchpoint → true once body auto-generated
      messageGenerated: {},  // touchpoint → true once message copy generated
      posterHookGenerated: {},  // dropId → true once the till poster line is generated
      _posterHookDebounce: null  // debounce timer for manual poster-line edits
    };

    const DAY_MS = 24 * 60 * 60 * 1000;

    function byId(id){ return document.getElementById(id); }

    function escapeHtml(str){
      return String(str ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function titleCase(str){
      return String(str || '')
        .replace(/[_-]+/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function fmtTime(d){
      let h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${String(m).padStart(2,'0')}${ampm}`;
    }

    // "Friday 30 May · 6:00pm–8:00pm"
    function fmtDateTime(start, end){
      const ds = start ? new Date(start) : null;
      if (!ds || Number.isNaN(ds.getTime())) return 'Date to be confirmed';
      const datePart = ds.toLocaleDateString('en-GB', {
        weekday:'long', day:'numeric', month:'long'
      });
      let timePart = fmtTime(ds);
      const de = end ? new Date(end) : null;
      if (de && !Number.isNaN(de.getTime())) {
        timePart += `–${fmtTime(de)}`;
      }
      return `${datePart} · ${timePart}`;
    }

    function statusOf(s){
      return String(s.status || '').toLowerCase();
    }

    // ---- Cross-drop view (Prompt 2) ----------------------------------

    // Activation scope: live, or upcoming (published/scheduled/open within
    // the next 14 days), or recently closed (within the last 48 hours).
    function inScope(s){
      const status = statusOf(s);
      if (status === 'live') return true;

      if (status === 'published' || status === 'scheduled' || status === 'open') {
        const ds = Date.parse(s.delivery_start);
        if (Number.isNaN(ds)) return false;
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        const horizon = Date.now() + 14 * DAY_MS;
        return ds >= todayStart.getTime() && ds <= horizon;
      }

      if (status === 'closed') {
        const raw = state.rawById[s.drop_id];
        const closedRaw = s.closed_at ?? (raw && (raw.closed_at ?? raw.closes_at)) ?? s.closes_at;
        const cm = Date.parse(closedRaw);
        if (Number.isNaN(cm)) return false;
        const now = Date.now();
        return cm >= now - 48 * 60 * 60 * 1000 && cm <= now + 60 * 1000;
      }

      return false;
    }

    function scopeRank(s){
      const status = statusOf(s);
      if (status === 'live') return 0;
      if (status === 'closed') return 2;
      return 1; // upcoming
    }

    // live first, then upcoming by delivery_start asc, then recently closed
    // by delivery_start desc.
    function sortScoped(rows){
      return rows.slice().sort((a, b) => {
        const ra = scopeRank(a), rb = scopeRank(b);
        if (ra !== rb) return ra - rb;
        const da = Date.parse(a.delivery_start) || 0;
        const db = Date.parse(b.delivery_start) || 0;
        return ra === 2 ? db - da : da - db;
      });
    }

    function statusPill(status){
      const st = String(status || '').toLowerCase();
      if (st === 'live') return '<span class="home-pill good">Live now</span>';
      if (st === 'closed') return '<span class="home-pill neutral">Closed</span>';
      return '<span class="home-pill neutral">Scheduled</span>';
    }

    function contextLine(s){
      if (s.host_name) return 'at ' + escapeHtml(s.host_name);
      const fm = String(s.fulfilment_mode || '').toLowerCase();
      if (fm === 'delivery') return 'Neighbourhood delivery';
      if (fm === 'collection') return 'Collection';
      if (fm) return escapeHtml(titleCase(fm));
      return '';
    }

    function capacityLine(s){
      const placed = Number(s.order_count || 0);
      const total = s.capacity_units_total;
      if (total == null || Number(total) === 0) {
        return `${placed} orders placed`;
      }
      return `${placed} of ${Number(total)} orders`;
    }

    function cardHtml(s){
      const ctx = contextLine(s);
      const isLive = statusOf(s) === 'live';
      const sbLink = isLive
        ? `<a class="home-button-secondary" href="${HearthNav.withVendor('./service-board.html')}">Open Service Board</a>`
        : '';

      const progress = getDropProgress(s);
      const progressPct = progress.total > 0
        ? Math.round((progress.completed / progress.total) * 100)
        : 0;
      const progressLine = progress.total > 0
        ? `<div class="act-progress-row">
             <div class="act-progress-bar">
               <div class="act-progress-fill" style="width:${progressPct}%"></div>
             </div>
             <span class="act-progress-label">${progress.completed} of ${progress.total}</span>
           </div>`
        : '';
      const nextLine = progress.nextTitle && progress.completed < progress.total
        ? `<div class="act-next-action">Next: ${escapeHtml(progress.nextTitle)}</div>`
        : progress.completed === progress.total && progress.total > 0
          ? `<div class="act-next-action act-next-complete">All steps complete</div>`
          : '';

      return `
        <article class="home-work">
          <div class="home-workTop">
            <div>
              <h3>${escapeHtml(s.drop_name || 'Untitled drop')}</h3>
              ${ctx ? `<p>${ctx}</p>` : ''}
            </div>
            ${statusPill(s.status)}
          </div>
          <div class="home-workMeta">
            ${escapeHtml(fmtDateTime(s.delivery_start, s.delivery_end))}<br>
            ${escapeHtml(capacityLine(s))}
          </div>
          ${progressLine}${nextLine}
          <div class="home-workActions">
            <a class="home-button" href="#" data-drop-id="${escapeHtml(s.drop_id)}">View activation</a>
            ${sbLink}
          </div>
        </article>
      `;
    }

    function renderContent(rows){
      const content = byId('activationContent');
      if (!rows.length) {
        content.innerHTML = `<div class="home-empty">No active or upcoming drops. Create your next drop in Drop Studio.</div>`;
        return;
      }
      content.innerHTML = `<div class="activation-grid">${rows.map(cardHtml).join('')}</div>`;
    }

    async function loadDrops(){
      state.vendor = await window.HearthVendor.resolveVendor(sb);
      if (!state.vendor) throw new Error('Vendor resolution failed');

      const { data, error } = await sb.functions.invoke('list-drops', { body: {} });
      if (error) throw error;
      if (data && data.error) throw new Error(data.error);

      const summaries = Array.isArray(data?.drop_summaries) ? data.drop_summaries : [];
      const drops = Array.isArray(data?.drops) ? data.drops : [];

      state.rawById = {};
      drops.forEach(d => { state.rawById[d.id] = d; });
      state.summaryById = {};
      summaries.forEach(s => { state.summaryById[s.drop_id] = s; });

      return sortScoped(summaries.filter(inScope));
    }

    // ---- Per-drop view: helpers --------------------------------------

    function getOrderingLink(rawDrop) {
      const slug = rawDrop?.slug || '';
      if (!slug) return '';
      return `https://lovehearth.co.uk/order.html?drop=${encodeURIComponent(slug)}`;
    }

    function getTouchpointDayLabels(deliveryStart) {
      const ds = deliveryStart ? new Date(deliveryStart) : null;
      if (!ds || isNaN(ds.getTime())) {
        return [
          '4 DAYS BEFORE',
          '3 DAYS BEFORE — HOST',
          '1 DAY BEFORE — MORNING',
          '1 DAY BEFORE — 5PM',
          '1 DAY BEFORE — EVENING',
          'DROP DAY — MORNING',
          'DROP DAY — SERVICE',
          'DROP DAY — EVENING',
          'DAY AFTER — MORNING'
        ];
      }
      const day = (offset) => {
        const d = new Date(ds);
        d.setDate(d.getDate() + offset);
        return d.toLocaleDateString('en-GB', { weekday: 'long' }).toUpperCase();
      };
      return [
        `${day(-4)} — 4 DAYS BEFORE`,
        `${day(-3)} — HOST AWARENESS`,
        `${day(-1)} MORNING — EARLY ACCESS`,
        `${day(-1)} 5PM — ORDERING OPENS`,
        `${day(-1)} EVENING — HOST LINK`,
        `${day(0)} MORNING — CAPACITY SIGNAL`,
        `${day(0)} — SERVICE`,
        `${day(0)} EVENING — POST DROP`,
        `${day(1)} MORNING — THANK YOU`
      ];
    }

    function resolveOpenness(summary) {
      // An explicit vendor-set audience wins (set in Drop Studio for Hosted drops).
      if (summary.audience_scope === 'public') return 'open';
      if (summary.audience_scope === 'community') return 'closed';
      // No explicit signal: derive. Events are private; a drop with no host is an
      // open neighbourhood drop; any other host-anchored drop defaults to
      // community/closed — host leads, public posts off.
      if (summary.drop_type === 'event') return 'closed';
      return summary.host_name ? 'closed' : 'open';
    }

    // Returns the set of touchpoint card numbers relevant for this drop,
    // selected on two axes: openness (open / closed, host-driven via
    // resolveOpenness) and host present / absent. A closed drop drops the
    // public-Instagram cards (reveal 1, capacity 6, post-drop 8) and keeps
    // the host + email + ordering-open cards. optionalCards are shown but
    // don't block progress completion and are marked "(optional)" in title.
    function getDropProfile(summary) {
      const hasHost = !!summary.host_name;
      const openness = resolveOpenness(summary);

      // Card 4 ("Ordering opens") deliverable descriptor — resolved here, not
      // via inline checks in the render. A closed drop drops the public
      // Instagram image and the 'social' copy channel, and its poster is a
      // pinned-up noticeboard sheet rather than a till-side card.
      const card4 = openness === 'open'
        ? { instagram: true,  poster: 'till',        channels: ['whatsapp', 'social'] }
        : { instagram: false, poster: 'noticeboard', channels: ['whatsapp'] };

      // Card 5 ("Ask your host to drop the link") deliverable descriptor — a
      // closed drop drops the public 'social' channel and reframes the copy.
      const card5 = openness === 'open'
        ? { channels: ['whatsapp', 'email', 'social'] }
        : { channels: ['whatsapp', 'email'] };

      if (openness === 'open'   && hasHost)  return { openness, card4, card5, cards: [1,2,3,4,5,6,7,8,9], optional: [] };
      if (openness === 'open'   && !hasHost) return { openness, card4, card5, cards: [1,3,4,6,7,8,9],     optional: [] };
      if (openness === 'closed' && hasHost)  return { openness, card4, card5, cards: [2,3,4,5,7,9],       optional: [4] };
      /* closed && !hasHost */                return { openness, card4, card5, cards: [3,4,7,9],           optional: [4] };
    }

    // Returns the activation log entries for a specific drop from
    // state.activationLog. The log entries have a dropId field stamped
    // when actLog() is called.
    function getDropLog(dropId) {
      return (state.activationLog || []).filter(e => e.dropId === dropId);
    }

    // Returns progress for a drop: { completed, total, nextTitle }
    function getDropProgress(summary) {
      const profile = getDropProfile(summary);
      const dropId = summary.drop_id;
      const log = getDropLog(dropId);

      // Map touchpoint card numbers to the actual logged touchpoint keys
      // (verified against the actLog() call sites in renderDropView — the
      // keys here are the ones the code really stamps, not the day-named
      // variants). Card 7 is a passive auto-card that never logs, so it has
      // no key and is excluded from counting below.
      const cardKeyMap = {
        1: 'monday_reveal',
        2: 'tuesday_host',
        3: 'thursday_early_access',
        4: 'thursday_vendor_whatsapp',
        5: 'thursday_host_link',
        6: 'friday_capacity',
        7: null,
        8: 'friday_post_drop',
        9: 'saturday_thankyou'
      };

      const cardTitleMap = {
        1: 'Share reveal post',
        2: 'Send host WhatsApp',
        3: 'Send early access email',
        4: 'Tell customers ordering is live',
        5: 'Send host ordering link',
        6: 'Share capacity signal',
        7: 'Order ready notifications',
        8: 'Post drop content',
        9: 'Send thank-you email'
      };

      // Ignore host-origin events so host shares can't inflate the vendor's
      // progress count (actor !== 'host' leaves legacy/null-actor rows as-is).
      const loggedKeys = new Set(log.filter(e => e.actor !== 'host').map(e => e.touchpoint));

      // Only count non-optional cards that actually have a loggable key
      // toward progress. Card 7 (key null) is passive and never completes,
      // so excluding it keeps 100% / "All steps complete" reachable.
      const countableCards = profile.cards.filter(
        n => !profile.optional.includes(n) && cardKeyMap[n]
      );
      const completed = countableCards.filter(n => loggedKeys.has(cardKeyMap[n])).length;
      const total = countableCards.length;

      // Next action: first unlogged countable card in profile order.
      const nextCard = profile.cards.find(
        n => cardKeyMap[n] && !loggedKeys.has(cardKeyMap[n])
      );
      const nextTitle = nextCard ? cardTitleMap[nextCard] : null;

      return { completed, total, nextTitle };
    }


    // "this Friday" / "this Friday evening"
    function actRelDay(value, withPartOfDay){
      if (!value) return 'soon';
      const d = new Date(value);
      if (isNaN(d.getTime())) return 'soon';
      const wd = d.toLocaleDateString('en-GB', { weekday: 'long' });
      if (!withPartOfDay) return `this ${wd}`;
      const h = d.getHours();
      const part = h >= 17 ? 'evening' : (h >= 12 ? 'afternoon' : 'morning');
      return `this ${wd} ${part}`;
    }

    function actWeekday(value, offset){
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      d.setDate(d.getDate() + (offset || 0));
      return d.toLocaleDateString('en-GB', { weekday: 'long' });
    }

    // "5:00pm on Friday 30 May", or "soon" when not set.
    function actOpensPhrase(opensAt){
      if (!opensAt) return 'soon';
      const d = new Date(opensAt);
      if (isNaN(d.getTime())) return 'soon';
      return `${fmtTime(d)} on ${actFormatMenuCardDate(d)}`;

    function getLogEntry(touchpoint){
      // Vendor completion only: ignore host-origin events so a host copying
      // their message on host-view can never mark a vendor card done.
      // actor !== 'host' (not === 'vendor') so legacy/null-actor rows keep
      // counting exactly as before.
      return state.activationLog.find(e => e.touchpoint === touchpoint && e.actor !== 'host') || null;
    }

    function getHostShareSignal(touchpoint){
      // Host's own share, server-stamped actor='host' (host-view logHostShare).
      // Read SEPARATELY from getLogEntry, which excludes host events.
      return state.activationLog.find(e =>
        e.touchpoint === touchpoint && e.actor === 'host' && e.action === 'shared'
      ) || null;
    }

    function formatLogTime(isoString){
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return '';
      return fmtTime(d);
    }

    function formatMoneyPence(pence){
      const n = Number(pence || 0);
      return '£' + (n / 100).toFixed(2);

    function actLog(touchpoint, action, meta = {}){
      const dropId = state.selectedDropId || null;
      state.activationLog.push({
        touchpoint,
        action,
        dropId,
        timestamp: new Date().toISOString(),
        ...meta
      });
      renderDropView(state.selectedDropId);
      // Persist alongside the in-memory update so the log survives reloads.
      // Non-blocking: the UI has already updated; a persist failure is logged
      // but never surfaced and never interrupts the flow.
      if (dropId) {
        sb.functions.invoke('activation-events', {
          body: { op: 'log', drop_id: dropId, touchpoint, action, meta }
        }).then(({ error }) => {
          if (error) console.error('activation-events log failed', error);
        }).catch(e => console.error('activation-events log failed', e));

    function actFormatMenuCardDate(value) {
      if (!value) return "";
      const d = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString("en-GB", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });
    }

    function actComputeRevealDate(deliveryStart) {
      if (!deliveryStart) return null;
      const d = new Date(deliveryStart);
      if (Number.isNaN(d.getTime())) return null;
      const reveal = new Date(d.getTime() - 4 * 24 * 60 * 60 * 1000);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      if (reveal.getTime() < today.getTime()) return null;
      return reveal;
    }

    // Clock formatter shared by actBuildDropContext and the post-response
    // link/close-time assembly in the generate handlers. One definition so
    // the time formatting can never drift between the three handlers.
    function fmtT(iso){
      return iso
        ? new Date(iso).toLocaleTimeString('en-GB', {
            hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'Europe/London'
          }).toLowerCase().replace(':00', '').replace(' ', '')
        : null;
    }

    // Assembles the common request context every generate handler sends to
    // the generate-activation-copy Edge Function — every field EXCEPT
    // touchpoint and guidance, which the handler supplies. Three new signals
    // (fulfilment_mode, reveal_dish, cadence) are included for the EF to
    // start reading next; they are inert until then (each EF case reads only
    // the fields it needs), so adding them does not change current output.
    function actBuildDropContext(dropId){
      const summary = state.summaryById[dropId];
      const rawDrop = state.rawById[dropId] || {};

      const deliveryDay = rawDrop.delivery_start
        ? new Date(rawDrop.delivery_start).toLocaleDateString('en-GB', {
            weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Europe/London'
          })
        : '';
      const opensDay = rawDrop.opens_at
        ? new Date(rawDrop.opens_at).toLocaleDateString('en-GB', {
            weekday: 'long', timeZone: 'Europe/London'
          })
        : null;

      // New signal: the reveal dish name, resolved from reveal_product_id.
      let revealDish = null;
      if (rawDrop.reveal_product_id) {
        const product = (state.products || []).find(
          p => String(p.id) === String(rawDrop.reveal_product_id)
        );
        revealDish = (product && product.name) || null;
      }

      // New signal: cadence — event drops, recurring-series drops, or one-offs.
      const dropType = summary?.drop_type;
      const cadence = dropType === 'event'
        ? 'event'
        : (rawDrop.series_id ? 'series' : 'standalone');

      return {
        vendor_name:     state.vendor?.display_name || '',
        drop_name:       rawDrop.name || '',
        // host_name lives on the v_drop_summary row, not the raw drops row
        // (which carries host_id only). Sourcing it from rawDrop left this
        // always null, so the EF fell back to "their neighbourhood" even for
        // hosted drops. Prefer the summary — same field the rest of the page
        // uses for hasHost — so hosted drops name their venue and only true
        // neighbourhood drops (null host) get the EF's neighbourhood fallback.
        host_name:       summary?.host_name || rawDrop.host_name || null,
        delivery_day:    deliveryDay,
        opens_day:       opensDay,
        opens_time:      fmtT(rawDrop.opens_at),
        closes_time:     fmtT(rawDrop.closes_at),
        capacity:        rawDrop.capacity_units_total || null,
        ordering_url:    `https://lovehearth.co.uk/order.html?drop=${rawDrop.slug}`,
        tagline:         state.vendor?.tagline || null,
        website_url:     state.vendor?.website_url || null,
        brand_voice:     state.vendor?.brand_voice || null,
        // New signals — inert until the EF reads them.
        fulfilment_mode: summary?.fulfilment_mode || rawDrop.fulfilment_mode || null,
        reveal_dish:     revealDish,
        cadence,
      };
    }

    // ---- Per-drop view: card builders --------------------------------

    function copyBtn(label, touchpoint, action, primary){
      return `<button class="act-copy-btn${primary ? ' primary' : ''}" type="button" data-act="copy" data-touchpoint="${touchpoint}" data-action="${action}">${label}</button>`;
    }

    function confirmBtn(touchpoint){
      return `<button class="act-copy-btn primary" type="button" data-act="confirm" data-touchpoint="${touchpoint}" data-action="confirmed">Confirm send</button>`;
    }

    // Resolves a card's action area, honouring done-state and locked-state.
    function actActionArea(touchpointKey, locked, lockedNote, actionHtml){
      if (touchpointKey) {
        const entry = getLogEntry(touchpointKey);
        if (entry) {
          return { done: true, locked: false, html: `<div class="act-done-state">✓ Done · ${formatLogTime(entry.timestamp)}</div>` };
        }
      }
      if (locked) {
        return { done: false, locked: true, html: `<div class="act-locked-note">${escapeHtml(lockedNote)}</div>` };
      }
      return { done: false, locked: false, html: actionHtml };
    }

    // Which activation phase a card belongs to — drives auto-expand on render.
    // PRE-OPEN: 1,2,3 · LIVE: 4,5,6,7 · CLOSED: 8,9
    function actCardPhase(cardNum){
      const n = Number(cardNum);
      if (n === 1 || n === 2 || n === 3) return 'pre-open';
      if (n === 4 || n === 5 || n === 6 || n === 7) return 'live';
      return 'closed';
    }

    // Whether a card should render expanded. An explicit user toggle (stored
    // in state.cardExpanded, keyed by card number) always wins so manual
    // toggles survive the frequent re-renders. Otherwise auto-expand only the
    // current-phase cards that are neither done nor locked; everything else
    // (done, locked, other-phase) starts collapsed.
    function actCardOpen(cardNum, done, locked){
      const key = String(cardNum);
      if (state.cardExpanded[key] !== undefined) return state.cardExpanded[key];
      if (done || locked) return false;
      return actCardPhase(cardNum) === state._activationDropPhase;
    }

    // Wraps a touchpoint card in the collapse-to-expand disclosure shell: an
    // always-visible heading-row <button> toggle (label + title + chevron) and
    // a collapsible body holding the description + actions.
    function actTouchpointShell(opts){
      const open = !!opts.open;
      const bodyId = opts.bodyId;
      // Optional, non-interactive channel badge naming where a single-channel
      // message goes. Lives in the header meta cluster beside the chevron.
      const channelBadge = opts.channel
        ? `<span class="act-channel-badge">${escapeHtml(opts.channel)}</span>`
        : '';
      return `
        <div class="${opts.classes}">
          <button type="button" class="act-tp-toggle" data-act="toggle-card"
            data-card="${opts.cardNum}"
            aria-expanded="${open ? 'true' : 'false'}" aria-controls="${bodyId}">
            <span class="act-tp-heading">
              <span class="act-day-label">${escapeHtml(opts.label || '')}</span>
              <span class="act-tp-title">${opts.title || ''}</span>
            </span>
            <span class="act-tp-meta">
              ${channelBadge}
              <span class="act-tp-chevron" aria-hidden="true">›</span>
            </span>
          </button>
          <div class="act-tp-body${open ? '' : ' act-tp-body--collapsed'}" id="${bodyId}">
            ${opts.bodyHtml}
          </div>
        </div>
      `;
    }

    function tpCard(opts){
      const res = actActionArea(opts.touchpointKey || null, !!opts.locked, opts.lockedNote || '', opts.actionHtml || '');
      const classes = ['act-touchpoint', opts.typeClass];
      if (res.locked) classes.push('is-locked');
      if (res.done) classes.push('is-done');
      const open = (opts.open != null)
        ? opts.open
        : actCardOpen(opts.cardNum, res.done, res.locked);
      return actTouchpointShell({
        classes: classes.join(' '),
        cardNum: opts.cardNum,
        label: opts.label,
        title: opts.title,
        channel: opts.channel,
        bodyHtml: `<p>${opts.desc}</p>\n          <div class="act-actions">${res.html}</div>`,
        open,
        bodyId: 'act-tp-body-' + opts.cardNum
      });
    }

    // Message card: the prepared message stays visible inline, with one
    // copy button per channel. Done-state is handled here (message stays
    // visible, channel buttons replaced) so tpCard's touchpointKey is null.
    function messageCard(opts) {
      const entry = getLogEntry(opts.touchpointKey);
      const tp = opts.touchpointKey;

      // Initialise message draft from generated template if not yet set
      if (!state.messageDrafts[tp]) {
        state.messageDrafts[tp] = opts.messageText || '';
      }
      const currentText = state.messageDrafts[tp];
      const isExpanded = !!state.expandedMessageCards[tp];

      let actionHtml;

      if (entry) {
        // Done state — message still visible read-only, buttons replaced
        actionHtml = `
          <div class="act-message-preview">${escapeHtml(currentText)}</div>
          <div class="act-done-state">✓ Sent · ${formatLogTime(entry.timestamp)}</div>
        `;
      } else if (isExpanded) {
        // Edit state — editable textarea, done editing + copy buttons
        const channelBtns = (opts.channels || []).map(ch =>
          `<button class="act-copy-btn" type="button"
            data-act="copy-message"
            data-touchpoint="${escapeHtml(tp)}"
            data-action="message_copied">Copy for ${escapeHtml(ch)}</button>`
        ).join('');
        actionHtml = `
          <div class="act-message-edit">
            <textarea
              data-act="message-textarea"
              data-touchpoint="${escapeHtml(tp)}"
              rows="5">${escapeHtml(currentText)}</textarea>
            ${state.messageGenerated?.[tp] ? '<div class="act-ai-draft">✦ AI draft — edit freely</div>' : ''}
            ${state.messageGenerated?.[tp] ? `
              <div class="act-guidance-row">
                <input type="text" class="act-guidance-input"
                  data-touchpoint="${escapeHtml(tp)}"
                  placeholder="${escapeHtml(opts.guidancePlaceholder || 'e.g. shorter, more casual, mention the match is on that evening...')}">
              </div>` : ''}
            <div class="act-message-edit-row">
              <button
                data-act="generate-copy"
                data-touchpoint="${escapeHtml(tp)}"
                class="act-copy-btn">
                ${state.messageGenerated?.[tp] ? '↺ Regenerate →' : '✦ Generate →'}
              </button>
              <button class="act-copy-btn" type="button"
                data-act="collapse-message"
                data-touchpoint="${escapeHtml(tp)}">Done editing</button>
              ${channelBtns}
            </div>
            <div class="act-copy-error" data-error-key="${escapeHtml(tp)}"
              style="font-size:12px;color:#b91c1c;margin-top:4px;min-height:16px;"></div>
          </div>
        `;
      } else {
        // Collapsed preview — show message, edit button, copy buttons
        const channelBtns = (opts.channels || []).map(ch =>
          `<button class="act-copy-btn" type="button"
            data-act="copy-message"
            data-touchpoint="${escapeHtml(tp)}"
            data-action="message_copied">Copy for ${escapeHtml(ch)}</button>`
        ).join('');
        actionHtml = `
          <div class="act-message-preview">${escapeHtml(currentText)}</div>
          <div class="act-channel-row">
            <button
              data-act="generate-copy"
              data-touchpoint="${escapeHtml(tp)}"
              class="act-copy-btn">
              ${state.messageGenerated?.[tp] ? '↺ Regenerate →' : '✦ Generate →'}
            </button>
            <button class="act-copy-btn" type="button"
              data-act="expand-message"
              data-touchpoint="${escapeHtml(tp)}">Edit</button>
            ${channelBtns}
          </div>
        `;
      }

      return tpCard({
        typeClass: opts.typeClass,
        cardNum: opts.cardNum,
        label: opts.label,
        title: opts.title,
        desc: opts.desc,
        actionHtml,
        touchpointKey: null,  // done state handled inline above
        open: actCardOpen(opts.cardNum, !!entry, false)
      });
    }

    // Email card: always-editable subject/body with a Generate/Regenerate +
    // Confirm send flow. No mock, no expand/collapse — the fields are shown
    // directly. Edits persist in state.emailDrafts (via the live input
    // listener). Done/locked handled here, so tpCard's touchpointKey is null.
    function emailCard(opts) {
      const tp = opts.touchpointKey;
      const entry = getLogEntry(tp);

      // Preserve any edits the vendor has made
      if (!state.emailDrafts[tp]) {
        state.emailDrafts[tp] = { subject: opts.subject, body: opts.body };
      }
      const draft = state.emailDrafts[tp];

      // Brand indicator — first letter of vendor display name
      const vendorName = (state.vendor && (state.vendor.display_name || state.vendor.name)) || 'Hearth';
      const brandInitial = vendorName.charAt(0).toUpperCase();
      const brandColour = (state.vendor && state.vendor.brand_primary_color) || '#8B6B3F';
      const generated = !!state.emailBodyGenerated?.[tp];

      let actionHtml;

      if (entry) {
        // Done state — confirm button replaced with confirmation + sent count
        const sentCount = entry.sent != null
          ? ` · ${entry.sent} email${entry.sent === 1 ? '' : 's'} sent`
          : '';
        actionHtml = `<div class="act-done-state">✓ Confirmed · ${formatLogTime(entry.timestamp)}${escapeHtml(sentCount)}</div>`;
      } else if (opts.locked) {
        // Locked state — just the trigger note
        actionHtml = `<div class="act-locked-note">${escapeHtml(opts.lockedNote || '')}</div>`;
      } else {
        // Always-editable state — brand header, fields, generate + confirm
        actionHtml = `
          <div class="act-email-brand-header">
            <span class="act-email-brand-dot" style="background:${escapeHtml(brandColour)};">${escapeHtml(brandInitial)}</span>
            <span>${escapeHtml(vendorName)}</span>
            <span>· via Hearth · to your customers</span>
          </div>
          <div class="act-email-field">
            <label class="act-field-label">Subject</label>
            <input type="text" class="act-email-subject-input"
              data-email-key="${escapeHtml(tp)}"
              style="width:100%"
              value="${escapeHtml(draft.subject)}" />
          </div>
          <div class="act-email-field">
            <label class="act-field-label">Message</label>
            <textarea class="act-email-body-input"
              data-email-key="${escapeHtml(tp)}"
              rows="8">${escapeHtml(draft.body)}</textarea>
          </div>
          ${generated ? '<div class="act-ai-draft">✦ AI draft — edit freely</div>' : ''}
          ${generated ? `
            <div class="act-guidance-row">
              <input type="text" class="act-guidance-input"
                data-touchpoint="${escapeHtml(tp)}"
                placeholder="e.g. shorter, more personal, mention it's their first time at this venue...">
            </div>` : ''}
          <div class="act-confirm-row">
            <button class="act-copy-btn" type="button"
              data-act="generate-email-body"
              data-touchpoint="${escapeHtml(tp)}">${generated ? '↺ Regenerate body →' : '✦ Generate body →'}</button>
            <button class="act-copy-btn primary" type="button"
              data-act="confirm-email"
              data-touchpoint="${escapeHtml(tp)}">Confirm send</button>
          </div>
          <div class="act-email-send-error" data-error-key="${escapeHtml(tp)}"
            style="font-size:12px;color:#b91c1c;margin-top:6px;"></div>
          ${opts.note ? `<div class="act-note">${escapeHtml(opts.note)}</div>` : ''}
        `;
      }

      return tpCard({
        typeClass: opts.typeClass,
        cardNum: opts.cardNum,
        label: opts.label,
        title: opts.title,
        channel: opts.channel,
        desc: opts.desc,
        actionHtml,
        touchpointKey: null,  // done state handled inline above
        open: actCardOpen(opts.cardNum, !!entry, !!opts.locked)
      });
    }

    function renderDropView(dropId){
      // Flush any open message-textarea values into messageDrafts before
      // re-rendering so edits aren't lost when another card's action
      // triggers a re-render mid-edit.
      document.querySelectorAll('[data-act="message-textarea"]').forEach(ta => {
        const tp = ta.dataset.touchpoint;
        if (tp) state.messageDrafts[tp] = ta.value;
      });

      const content = byId('activationContent');
      const summary = state.summaryById[dropId];
      const rawDrop = state.rawById[dropId];

      if (!summary || !rawDrop) {
        if (state.resizeObserver) { state.resizeObserver.disconnect(); state.resizeObserver = null; }
        content.innerHTML = `
          <button class="act-back-link" type="button" data-act="back">← All drops</button>
          <div class="home-empty">This drop could not be loaded. Return to all drops and try again.</div>
        `;
        return;
      }

      const vendor = state.vendor || {};
      const labels = getTouchpointDayLabels(summary.delivery_start);
      const orderingLink = getOrderingLink(rawDrop);
      const hasHost = !!summary.host_name;
      const status = statusOf(summary);

      // Drive auto-expand: 'live' → LIVE phase, 'closed' → CLOSED phase,
      // anything else (published/scheduled/open/upcoming) → PRE-OPEN phase.
      state._activationDropPhase =
        status === 'live' ? 'live' : (status === 'closed' ? 'closed' : 'pre-open');

      const profile = getDropProfile(summary);
      const profileCards = profile.cards;
      const optionalCards = new Set(profile.optional);

      // Helper: should this card number be included for this drop?
      function inProfile(cardNum) {
        return profileCards.includes(cardNum);
      }

      // Helper: is this card optional for this drop?
      function isOptional(cardNum) {
        return optionalCards.has(cardNum);
      }

      // Helper: append the "(optional)" title marker generically for
      // whichever card(s) profile.optional contains — never a hardcoded
      // card index. Card 1 keeps its own richer optional treatment below.
      function optionalTitle(cardNum, title) {
        return isOptional(cardNum) ? `${title} (optional)` : title;
      }

      const dropName = summary.drop_name || rawDrop.name || 'Your drop';
      const hostName = summary.host_name || '';
      const vendorName = vendor.display_name || vendor.name || 'your kitchen';

      const capTotal = summary.capacity_units_total;
      const capTotalNum = capTotal != null ? Number(capTotal) : null;
      const used = Number(summary.capacity_units_used || 0);
      const remaining = summary.capacity_units_remaining != null
        ? Number(summary.capacity_units_remaining)
        : (capTotalNum != null ? Math.max(0, capTotalNum - used) : null);
      const orderCount = Number(summary.order_count || 0);

      const capPhrase = (capTotalNum != null && capTotalNum > 0) ? String(capTotalNum) : 'a limited number of';
      const opensAt = rawDrop.opens_at;
      const closesAt = rawDrop.closes_at;
      const closesTime = closesAt && !isNaN(new Date(closesAt).getTime()) ? fmtTime(new Date(closesAt)) : '';
      const revealLine = (rawDrop.reveal_line || '').trim();

      // --- copy templates ---
      const templates = {};

      // Card 1 — reveal caption
      const c1 = [];
      const c1Venue = summary.host_name || rawDrop.host_name || '';
      c1.push(`${dropName} is coming${c1Venue ? ` to ${c1Venue}` : ''} ${actRelDay(summary.delivery_start, false)}.`);
      if (revealLine) c1.push(revealLine);
      c1.push(`Orders open ${actOpensPhrase(opensAt)}. Capacity is limited to ${capPhrase} orders.`);
      if (orderingLink) c1.push(orderingLink);
      templates['monday_reveal'] = c1.join('\n\n');

      // Card 2 — host awareness
      const opensClause = opensAt && !isNaN(new Date(opensAt).getTime())
        ? `orders open ${fmtTime(new Date(opensAt))} on ${actFormatMenuCardDate(opensAt)}`
        : `orders open soon`;
      templates['tuesday_host'] =
        `Hey everyone — just to let you know, we've got ${vendorName} coming to ${hostName} on ${actRelDay(summary.delivery_start, true)}. It's pre-order only — ${opensClause} and capacity is limited to ${capPhrase} so worth ordering early. I'll share the link when it's live.`;

      // Card 4 — vendor WhatsApp
      const c4 = `${dropName} orders are now open. ${capPhrase} slots available — order here: ${orderingLink}` +
        (closesTime ? `\n\nOrders close at ${closesTime}.` : '');
      templates['thursday_vendor_whatsapp'] = c4;

      // Card 5 — host link
      templates['thursday_host_link'] =
        `Orders are live — ${capPhrase} slots available. Order here: ${orderingLink}`;

      // Card 6 — capacity signal
      const soldOut = (remaining === 0) || (capTotalNum != null && capTotalNum > 0 && used >= capTotalNum);
      templates['friday_capacity'] = soldOut
        ? `We're full for tonight. Next one coming soon.`
        : `Only ${remaining == null ? capPhrase : remaining} slots left for ${dropName} today. Order here: ${orderingLink}`;

      // Card 8 — post-drop caption
      templates['friday_post_drop'] =
        `${dropName} is done for tonight. ${orderCount} orders fulfilled.\n\n` +
        `Thanks to everyone who ordered${hostName ? `, and to ${hostName} for having us` : ''} — see you next time.`;

      state.currentTemplates = templates;

      // Email content for Cards 3 and 9
      const dropDayName = actWeekday(summary.delivery_start, 0) || 'drop day';
      const emailSubject3 = `${dropDayName} — orders open early for you`;
      const emailBody3 = `Hi,\n\nOrders for ${dropName} are open early for you — you get first access before the public link goes live.\n\nOrder here: ${orderingLink}\n\nCapacity is limited to ${capPhrase} orders${closesTime ? ` and closes at ${closesTime}` : ''}. Don't hang about.\n\n${vendorName}`;

      const emailSubject9 = `Thanks for your order — ${dropName}`;
      const emailBody9 = `Hi,\n\nThank you for ordering from ${dropName}${hostName ? ` at ${hostName}` : ''}. We hope you enjoyed it.\n\nOur next drop is coming soon — we'll be in touch.\n\n${vendorName}`;

      // Preserve any edits the vendor has made to email fields
      if (!state.emailDrafts) state.emailDrafts = {};
      if (!state.emailDrafts['thursday_early_access']) {
        state.emailDrafts['thursday_early_access'] = { subject: emailSubject3, body: emailBody3 };
      }
      if (!state.emailDrafts['saturday_thankyou']) {
        state.emailDrafts['saturday_thankyou'] = { subject: emailSubject9, body: emailBody9 };
      }

      // --- cards ---
      const eName = escapeHtml(dropName);
      const eHost = escapeHtml(hostName);
      const cards = [];

      // Card 1 — reveal post (is-vendor). Rendered directly (not via
      // tpCard) so the menu card artwork + download button always show;
      // only the caption button flips to a done state once copied.
      if (inProfile(1)) {
      const card1Title = isOptional(1)
        ? 'Share your reveal post (optional)'
        : 'Share your reveal post';
      const card1Desc = isOptional(1)
        ? 'Create a menu card asset for your client or to share on social if relevant to this drop.'
        : 'Post your menu card to Instagram before ordering opens. Start the anticipation early — this is the moment that seeds the algorithm for your drop day.';
      let card1CaptionArea;
      if (getLogEntry('monday_reveal')) {
        card1CaptionArea = `<div class="act-done-state">✓ Caption copied · ${formatLogTime(getLogEntry('monday_reveal').timestamp)}</div>`;
      } else {
        // Editable caption draft, seeded from the assembled template.
        if (!state.messageDrafts['monday_reveal']) {
          state.messageDrafts['monday_reveal'] = templates['monday_reveal'];
        }
        const card1Caption = state.messageDrafts['monday_reveal'];
        card1CaptionArea = `
          <div class="act-message-edit">
            <textarea
              data-act="message-textarea"
              data-touchpoint="monday_reveal"
              rows="5">${escapeHtml(card1Caption)}</textarea>
            ${state.messageGenerated?.['monday_reveal'] ? '<div class="act-ai-draft">✦ AI draft — edit freely</div>' : ''}
            ${state.messageGenerated?.['monday_reveal'] ? `
              <div class="act-guidance-row">
                <input type="text" class="act-guidance-input"
                  data-touchpoint="monday_reveal"
                  placeholder="e.g. shorter, more intriguing, mention it's their first drop at this venue...">
              </div>` : ''}
            <div class="act-message-edit-row">
              <button
                data-act="generate-copy"
                data-touchpoint="monday_reveal"
                class="act-copy-btn">
                ${state.messageGenerated?.['monday_reveal'] ? '↺ Regenerate →' : '✦ Generate →'}
              </button>
              ${copyBtn('Copy caption', 'monday_reveal', 'caption_copied', false)}
            </div>
            <div class="act-copy-error" data-error-key="monday_reveal"
              style="font-size:12px;color:#b91c1c;margin-top:4px;min-height:16px;"></div>
          </div>
        `;
      }

      // Reveal-dish options: only products with images (no image means
       // nothing usable for the menu card).
      const revealProductOptions = (state.products || [])
        .filter(p => p && p.image_url)
        .map(p => {
          const selected = String(p.id) === String(rawDrop.reveal_product_id || '') ? ' selected' : '';
          return `<option value="${escapeHtml(p.id)}"${selected}>${escapeHtml(p.name || 'Untitled product')}</option>`;
        })
        .join('');

      const card1Body = `
          <p>${escapeHtml(card1Desc)}</p>
          <div class="act-actions">
            <div class="act-reveal-fields">
              <div>
                <label class="act-field-label" for="act-revealProduct">Reveal dish</label>
                <select id="act-revealProduct">
                  <option value="">No dish selected</option>
                  ${revealProductOptions}
                </select>
                <div class="act-field-helper">The dish that headlines your reveal post — we'll use its photo.</div>
              </div>
            </div>
            ${card1CaptionArea}
            <div class="menuCardArtworkFrame" id="act-menuCardFrame" style="width:100%; max-width:280px; position:relative; overflow:hidden; align-self:flex-start;">
              <div class="menuCardArtwork" id="act-menuCardArtwork">
                <img class="menuCardArtwork__image" id="act-menuCardImage" alt="" crossorigin="anonymous" />
                <div class="menuCardArtwork__scrim" aria-hidden="true"></div>
                <div class="menuCardArtwork__lockup">
                  <div class="menuCardArtwork__dropName" id="act-menuCardDropName"></div>
                  <div class="menuCardArtwork__dropDate" id="act-menuCardDropDate"></div>
                </div>
                <div class="menuCardArtwork__skeleton" id="act-menuCardSkeleton">Loading…</div>
              </div>
            </div>
            <button class="act-copy-btn primary" id="act-downloadMenuCardBtn" type="button" data-act="download" disabled>Download menu card</button>
          </div>
      `;
      cards.push(actTouchpointShell({
        classes: `act-touchpoint is-vendor${getLogEntry('monday_reveal') ? ' is-done' : ''}`,
        cardNum: 1,
        label: labels[0],
        title: escapeHtml(card1Title),
        channel: 'Instagram',
        bodyHtml: card1Body,
        open: actCardOpen(1, !!getLogEntry('monday_reveal'), false),
        bodyId: 'act-tp-body-1'
      }));
      }

      // Card 2 — host handoff (is-host) — only in profiles that include it.
      // Rendered directly (not via messageCard) so the send / copy-link
      // handoff UI is bespoke. messageCard() is shared with Card 5 and the
      // caption cards and must NOT change (A2 — Card 2 host handoff). The
      // card hands the host to their own share page (host-view.html), where
      // they customise and post in their own voice — so there is no textarea,
      // no AI draft/Regenerate, and no per-channel copy here.
      if (inProfile(2)) {
        const card2Entry = getLogEntry('tuesday_host');
        const card2Host = eHost || 'your host';
        const card2NoEmail = !!(state.hostNoEmail && state.hostNoEmail['tuesday_host'] && state.hostNoEmail['tuesday_host'][dropId]);
        // Transient "Copied ✓" confirmation for Copy link, driven through
        // rendered state (not a post-render button flash, which actLog's
        // re-render destroys). Survives the re-render and works in every
        // state — including when the done line already reads "Sent to {host}"
        // and clicking the retained Copy link changes nothing else. The flag
        // is set in the copy-host-link handler and cleared ~2s later.
        const card2Copied = !!(state.hostLinkCopied && state.hostLinkCopied['tuesday_host'] && state.hostLinkCopied['tuesday_host'][dropId]);
        const card2CopyLabel = card2Copied ? 'Copied ✓' : 'Copy link';

        // Shared inline slot for transport / link-build failure messages.
        const card2ErrorSlot = `<div class="act-copy-error" data-error-key="tuesday_host"
              style="font-size:12px;color:#b91c1c;margin-top:4px;min-height:16px;"></div>`;

        let card2Action;
        if (card2Entry) {
          // Done — keep Copy link available quietly. The done line is
          // action-aware: an email send always takes precedence over a later
          // link copy, so a copy-only completion (e.g. a host with no email)
          // never falsely reads "Sent". getLogEntry returns the FIRST match by
          // touchpoint and isn't action-aware, so inspect the log by action
          // here for the wording. (Touchpoint presence still drives the
          // done/progress state itself — unchanged.)
          const card2EmailSent = state.activationLog.find(
            e => e.touchpoint === 'tuesday_host' && e.action === 'host_email_sent' && e.actor !== 'host'
          );
          const card2DoneEntry = card2EmailSent || state.activationLog.find(
            e => e.touchpoint === 'tuesday_host' && e.action === 'host_link_copied' && e.actor !== 'host'
          ) || card2Entry;
          const card2DoneLine = card2EmailSent
            ? `✓ Sent to ${card2Host} · ${formatLogTime(card2DoneEntry.timestamp)}`
            : `✓ Link copied · ${formatLogTime(card2DoneEntry.timestamp)}`;
          card2Action = `
            <div class="act-done-state">${card2DoneLine}</div>
            <div class="act-channel-row">
              <button class="act-copy-btn" type="button" data-act="copy-host-link" data-touchpoint="tuesday_host">${card2CopyLabel}</button>
            </div>
            ${card2ErrorSlot}
          `;
        } else if (card2NoEmail) {
          // Host has no email on file — foreground Copy link.
          card2Action = `
            <div class="act-note">${card2Host} has no email on file — copy their link and send it across however you usually reach them.</div>
            <div class="act-channel-row">
              <button class="act-copy-btn primary" type="button" data-act="copy-host-link" data-touchpoint="tuesday_host">${card2CopyLabel}</button>
            </div>
            ${card2ErrorSlot}
          `;
        } else {
          // Default — primary email send + quiet Copy link fallback.
          card2Action = `
            <div class="act-channel-row">
              <button class="act-copy-btn primary" type="button" data-act="email-host-share" data-touchpoint="tuesday_host">Email share page to ${card2Host}</button>
              <button class="act-copy-btn" type="button" data-act="copy-host-link" data-touchpoint="tuesday_host">${card2CopyLabel}</button>
            </div>
            ${card2ErrorSlot}
          `;
        }

        const card2Body = `
          <p>${card2Host} can reach their community in a way nothing from you can. Send them their share page — it carries a short message for them to post in their own words, and the order link to add once ordering opens.</p>
          <div class="act-actions">${card2Action}</div>
        `;

        cards.push(actTouchpointShell({
          classes: `act-touchpoint is-host${card2Entry ? ' is-done' : ''}`,
          cardNum: 2,
          label: labels[1],
          title: optionalTitle(2, 'Share with your host'),
          // EMAIL header pill — same mechanism as the email cards (Card 3/9
          // pass channel: 'Email'); actTouchpointShell renders the shared
          // .act-channel-badge (CSS upper-cases it). Card 2's primary action
          // is the email send, so EMAIL is the correct pill.
          channel: 'Email',
          bodyHtml: card2Body,
          open: actCardOpen(2, !!card2Entry, false),
          bodyId: 'act-tp-body-2'
        }));
      }

      // Card 3 — early access email (is-auto), locked when no prior customers
      // Card 3 locks only when the vendor has no previous customers at all —
      // not based on this drop's order count. Sum order_count across all
      // loaded summaries as a proxy for total customer history.
      if (inProfile(3)) {
        const totalOrdersAcrossDrops = Object.values(state.summaryById)
          .reduce((sum, s) => sum + Number(s.order_count || 0), 0);
        const card3Locked = totalOrdersAcrossDrops === 0;
        cards.push(emailCard({
          typeClass: 'is-auto',
          cardNum: 3,
          label: labels[2],
          title: optionalTitle(3, 'Early access for previous customers'),
          channel: 'Email',
          desc: 'Previous customers get access before the public link goes live. Review and confirm the email below.',
          subject: state.emailDrafts['thursday_early_access'].subject,
          body: state.emailDrafts['thursday_early_access'].body,
          note: card3Locked ? null : `Sends to customers who have previously ordered from you.`,
          locked: card3Locked,
          lockedNote: 'No previous customers yet — this unlocks once someone has ordered from you.',
          touchpointKey: 'thursday_early_access'
        }));
      }

      // Card 4 — ordering open (is-vendor) with visual asset. Rendered
      // directly (not via messageCard) so the artwork + download button
      // always show; only the message + channel buttons flip to a done
      // state once one of the channels has been copied.
      if (inProfile(4)) {
      const card4Entry = getLogEntry('thursday_vendor_whatsapp');

      // Archetype-aware deliverables for this drop (resolved in getDropProfile).
      const card4Deliverables = profile.card4 || { instagram: true, poster: 'till', channels: ['whatsapp', 'social'] };
      const card4ShowInstagram = card4Deliverables.instagram;
      const card4ShowSocial = card4Deliverables.channels.includes('social');
      const card4PosterLabel = card4Deliverables.poster === 'noticeboard'
        ? 'Noticeboard line — the line on the sheet you pin up'
        : 'Till poster line — the line a walk-in customer reads by the till';

      // Initialise Card 4 message draft
      if (!state.messageDrafts['thursday_vendor_whatsapp']) {
        state.messageDrafts['thursday_vendor_whatsapp'] = templates['thursday_vendor_whatsapp'] || '';
      }
      const card4Text = state.messageDrafts['thursday_vendor_whatsapp'];
      const card4Expanded = !!state.expandedMessageCards['thursday_vendor_whatsapp'];

      let card4MessageArea;
      if (card4Entry) {
        card4MessageArea = `
          <div class="act-message-preview">${escapeHtml(card4Text)}</div>
          <div class="act-done-state">✓ Sent · ${formatLogTime(card4Entry.timestamp)}</div>
        `;
      } else if (card4Expanded) {
        card4MessageArea = `
          <div class="act-message-edit">
            <textarea data-act="message-textarea" data-touchpoint="thursday_vendor_whatsapp"
              rows="5">${escapeHtml(card4Text)}</textarea>
            ${state.messageGenerated?.['thursday_vendor_whatsapp']
              ? '<div class="act-ai-draft">✦ AI draft — edit freely</div>' : ''}
            ${state.messageGenerated?.['thursday_vendor_whatsapp'] ? `
              <div class="act-guidance-row">
                <input type="text" class="act-guidance-input"
                  data-touchpoint="thursday_vendor_whatsapp"
                  placeholder="e.g. more urgent, mention it's first come first served...">
              </div>` : ''}
            <div class="act-message-edit-row">
              <button
                data-act="generate-copy"
                data-touchpoint="thursday_vendor_whatsapp"
                class="act-copy-btn">
                ${state.messageGenerated?.['thursday_vendor_whatsapp'] ? '↺ Regenerate →' : '✦ Generate →'}
              </button>
              <button class="act-copy-btn" type="button"
                data-act="collapse-message"
                data-touchpoint="thursday_vendor_whatsapp">Done editing</button>
              <button class="act-copy-btn" type="button"
                data-act="copy-message"
                data-touchpoint="thursday_vendor_whatsapp"
                data-action="message_copied">Copy for WhatsApp</button>
              ${card4ShowSocial ? `<button class="act-copy-btn" type="button"
                data-act="copy-message"
                data-touchpoint="thursday_vendor_whatsapp"
                data-action="message_copied">Copy for social</button>` : ''}
            </div>
            <div class="act-copy-error" data-error-key="thursday_vendor_whatsapp"
              style="font-size:12px;color:#b91c1c;margin-top:4px;min-height:16px;"></div>
          </div>
        `;
      } else {
        card4MessageArea = `
          <div class="act-message-preview">${escapeHtml(card4Text)}</div>
          ${state.messageGenerated?.['thursday_vendor_whatsapp']
            ? '<div class="act-ai-draft">✦ AI draft — edit freely</div>' : ''}
          ${state.messageGenerated?.['thursday_vendor_whatsapp'] ? `
            <div class="act-guidance-row">
              <input type="text" class="act-guidance-input"
                data-touchpoint="thursday_vendor_whatsapp"
                placeholder="e.g. more urgent, mention it's first come first served...">
            </div>` : ''}
          <div class="act-channel-row">
            <button class="act-copy-btn" type="button"
              data-act="generate-copy"
              data-touchpoint="thursday_vendor_whatsapp">
              ${state.messageGenerated?.['thursday_vendor_whatsapp'] ? '↺ Regenerate →' : '✦ Generate →'}
            </button>
            <button class="act-copy-btn" type="button"
              data-act="expand-message"
              data-touchpoint="thursday_vendor_whatsapp">Edit</button>
            <button class="act-copy-btn" type="button"
              data-act="copy-message"
              data-touchpoint="thursday_vendor_whatsapp"
              data-action="message_copied">Copy for WhatsApp</button>
            ${card4ShowSocial ? `<button class="act-copy-btn" type="button"
              data-act="copy-message"
              data-touchpoint="thursday_vendor_whatsapp"
              data-action="message_copied">Copy for social</button>` : ''}
          </div>
        `;
      }

      const card4Body = `
