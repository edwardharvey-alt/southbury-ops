<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drop Poster — Hearth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/config.js"></script>
  <script src="./assets/hearth-vendor.js?v=1"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* ---- Screen styles ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #E8E4DC;
      font-family: 'Figtree', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px;
      gap: 20px;
    }

    .screen-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .btn-primary {
      background: #8B6B3F;
      color: #fff;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.6);
      color: #1F2937;
      border: 1px solid rgba(0,0,0,0.12);
    }

    .poster-scale-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .poster-wrap {
      width: 210mm;
      height: 297mm;
      background: #FAF8F4;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Loading + error states */
    .poster-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #6B7280;
      font-family: 'Figtree', system-ui, sans-serif;
      min-height: 297mm;
    }

    /* ---- Poster content ---- */
    .poster-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20mm 18mm;
      min-height: 297mm;
    }

    .poster-topbar {
      display: flex;
      align-items: flex-start;
      margin-bottom: 16mm;
    }

    .poster-hearth-mark {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .poster-hearth-mark__text {
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #3D3530;
      letter-spacing: -0.01em;
    }

    .poster-hearth-mark__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #C1440E;
      flex-shrink: 0;
    }

    .poster-vendor-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 38pt;
      line-height: 1.05;
      color: #1F2937;
      letter-spacing: -0.01em;
    }

    .poster-drop-name {
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 500;
      font-size: 13pt;
      color: #6B5D4F;
      margin-top: 3mm;
      letter-spacing: 0.01em;
    }

    .poster-reveal-line {
      font-family: 'Figtree', system-ui, sans-serif;
      font-style: italic;
      font-weight: 400;
      font-size: 11pt;
      color: #8B6B3F;
      margin-top: 3mm;
      letter-spacing: 0.01em;
    }

    .poster-rule {
      border: none;
      border-top: 1.5px solid #C4B49A;
      margin: 10mm 0;
    }

    .poster-cta {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 28pt;
      color: #1F2937;
      line-height: 1.15;
      letter-spacing: -0.005em;
      margin-bottom: 10mm;
    }

    .poster-qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5mm;
      flex: 1;
      justify-content: center;
      padding: 8mm 0;
    }

    #posterQr {
      /* QR library renders a canvas or img inside this div */
    }

    #posterQr canvas,
    #posterQr img {
      width: 54mm !important;
      height: 54mm !important;
      display: block;
    }

    .poster-scan-label {
      font-family: 'Figtree', system-ui, sans-serif;
      font-weight: 700;
      font-size: 11pt;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1F2937;
    }

    .poster-url {
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 9pt;
      color: #6B5D4F;
      word-break: break-all;
      text-align: center;
      max-width: 80mm;
      line-height: 1.4;
    }

    .poster-footer {
      margin-top: auto;
      padding-top: 10mm;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .poster-closes {
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: 9pt;
      font-weight: 500;
      color: #9B8B7A;
      letter-spacing: 0.02em;
    }

    /* ---- Print styles — everything except the poster-wrap disappears ---- */
    @media print {
      body {
        background: none;
        padding: 0;
        display: block;
      }

      .screen-toolbar {
        display: none !important;
      }

      .poster-scale-wrap {
        display: block;
        width: 100%;
      }

      .poster-wrap {
        zoom: 1 !important;
        transform: none !important;
        width: 100% !important;
        height: auto !important;
        min-height: 100vh !important;
        box-shadow: none;
        border-radius: 0;
      }

      .poster-state {
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>

  <div class="screen-toolbar" id="screenToolbar">
    <button class="btn btn-primary" onclick="window.print()">Print poster</button>
    <a class="btn btn-ghost" id="backBtn" href="activation.html">← Back to Activation</a>
  </div>

  <div class="poster-scale-wrap">
    <div class="poster-wrap" id="posterWrap">
      <div class="poster-state" id="posterState">Loading…</div>
    </div>
  </div>

  <script>
    function byId(id) { return document.getElementById(id); }

    function scalePoster() {
      const wrap = byId('posterWrap');
      const scaleWrap = wrap && wrap.parentElement;
      if (!wrap || !scaleWrap) return;

      // A4 at 96dpi
      const A4_W = 794;

      const availWidth = window.innerWidth - 32;
      const scale = Math.min(1, availWidth / A4_W);

      // CSS zoom scales layout AND visual — no transform trickery needed
      wrap.style.zoom = scale;
      wrap.style.transform = 'none';

      // Container just needs to centre the element; zoom handles the rest
      scaleWrap.style.display = 'flex';
      scaleWrap.style.justifyContent = 'center';
      scaleWrap.style.width = '100%';
      scaleWrap.style.height = 'auto';
    }

    window.addEventListener('resize', scalePoster);
    // Call after render too — hooked in renderPoster()

    function fmtTime(date) {
      return date.toLocaleTimeString('en-GB', {
        hour: 'numeric', minute: '2-digit', hour12: true
      }).toLowerCase().replace(' ', '');
    }

    function getOrderingLink(slug) {
      return `https://lovehearth.co.uk/order.html?drop=${slug}`;
    }

    async function init() {
      // Get drop slug from query string
      const params = new URLSearchParams(window.location.search);
      const dropSlug = params.get('drop');

      if (!dropSlug) {
        byId('posterState').textContent = 'No drop specified.';
        return;
      }

      // Shared singleton client (per-request session JWT injection — see assets/config.js)
      const sb = window._getHearthClient();
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        byId('posterState').innerHTML = 'Please <a href="index.html">sign in</a> to view this poster.';
        return;
      }

      // Fetch vendor
      const { data: vendor } = await sb
        .from('vendors')
        .select('id, display_name, brand_primary_color')
        .eq('auth_user_id', session.user.id)
        .maybeSingle();

      if (!vendor) {
        byId('posterState').textContent = 'Vendor not found.';
        return;
      }

      // Fetch drop by slug scoped to vendor
      const { data: drop } = await sb
        .from('drops')
        .select('id, name, slug, closes_at, opens_at, delivery_start, reveal_line')
        .eq('slug', dropSlug)
        .eq('vendor_id', vendor.id)
        .maybeSingle();

      if (!drop) {
        byId('posterState').textContent = 'Drop not found.';
        return;
      }

      renderPoster(vendor, drop);
    }

    function renderPoster(vendor, drop) {
      const wrap = byId('posterWrap');
      const orderingUrl = getOrderingLink(drop.slug);

      const closesAt = drop.closes_at;
      const closesTime = closesAt && !isNaN(new Date(closesAt).getTime())
        ? fmtTime(new Date(closesAt))
        : null;

      // Build the deep-link back button to include the drop
      const backBtn = byId('backBtn');
      if (backBtn) {
        backBtn.href = `activation.html?drop=${encodeURIComponent(drop.id)}`;
      }

      wrap.innerHTML = `
        <div class="poster-inner">
          <div class="poster-topbar">
            <div>
              <div class="poster-vendor-name">${escapeHtml(vendor.display_name || 'Hearth')}</div>
              <div class="poster-drop-name">${escapeHtml(drop.name || '')}</div>
              ${drop.reveal_line
                ? `<div class="poster-reveal-line">${escapeHtml(drop.reveal_line)}</div>`
                : ''}
            </div>
          </div>

          <hr class="poster-rule">

          <div class="poster-cta">Orders are now open.</div>

          <div class="poster-qr-section">
            <div id="posterQr"></div>
            <div class="poster-scan-label">Scan to order</div>
            <div class="poster-url">${escapeHtml(orderingUrl)}</div>
          </div>

          <div class="poster-footer">
            <div class="poster-closes">
              ${closesTime ? `Orders close at ${escapeHtml(closesTime)}` : ''}
            </div>
            <div class="poster-hearth-mark poster-hearth-mark--footer">
              <span class="poster-hearth-mark__text" style="font-size:10px; color:#C4B49A;">Hearth</span>
              <span class="poster-hearth-mark__dot" style="width:6px; height:6px; background:#C4B49A;"></span>
            </div>
          </div>
        </div>
      `;

      // Generate QR code
      new QRCode(byId('posterQr'), {
        text: orderingUrl,
        width: 204,  // 54mm at 96dpi ≈ 204px
        height: 204,
        colorDark: '#1F2937',
        colorLight: '#FAF8F4',
        correctLevel: QRCode.CorrectLevel.M
      });

      scalePoster();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    init();
  </script>
</body>
</html>
