<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Southbury Farm Pizza — Operator</title>
<style>
  body { font-family: system-ui; padding:20px; background:#fafafa; }
  table { width:100%; border-collapse:collapse; margin-top:15px; }
  th, td { border:1px solid #ddd; padding:8px; text-align:left; vertical-align: top; }
  th { background:#f2f2f2; }
  button { margin:2px; padding:4px 8px; cursor:pointer; }
  #cap { margin-left:15px; font-weight:bold; }
  .muted { color:#666; font-size:12px; }
</style>
</head>
<body>

<h2>Southbury Farm Pizza — Operator Dashboard</h2>

<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
  <label>Live drop:</label>
  <select id="dropSelect" style="min-width:420px;"></select>
  <button id="loadBtn">Load</button>

  <!-- NEW: split into two buttons -->
  <button id="summarySelectedBtn">Aggregated (selected drop)</button>
  <button id="summaryAllBtn">Aggregated (all live drops)</button>

  <span id="cap"></span>
</div>

<div id="msg" style="color:red;margin-top:10px;"></div>

<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Pizzas</th>
      <th>Items</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
/** =========================
 *  CONFIG
 *  ========================= */
const SUPABASE_URL = "https://tvqhhjvumgumyetvpgid.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_GftZ3Mw1M2-jb2bStjv80Q_gRDC9FzD";

const headers = {
  apikey: SUPABASE_ANON_KEY,
  Authorization: "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json"
};

/** =========================
 *  ELEMENTS / STATE
 *  ========================= */
const rowsEl = document.getElementById("rows");
const msgEl = document.getElementById("msg");
const capEl = document.getElementById("cap");

const dropSelect = document.getElementById("dropSelect");
const loadBtn = document.getElementById("loadBtn");

const summarySelectedBtn = document.getElementById("summarySelectedBtn");
const summaryAllBtn = document.getElementById("summaryAllBtn");

let timer = null;
let lastOrders = [];
let lastDrops = []; // live drops list

/** =========================
 *  HELPERS
 *  ========================= */
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g,
    m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}
function fmtTime(d){
  try { return new Date(d).toLocaleTimeString(); } catch { return d; }
}
function safeArr(x){ return Array.isArray(x) ? x : []; }
function moneyFromPence(p){
  const n = Number(p) || 0;
  return "£" + (n/100).toFixed(2);
}

/** =========================
 *  DATA FETCH
 *  ========================= */
async function loadLiveDrops() {
  const url =
    `${SUPABASE_URL}/rest/v1/drops` +
    `?select=id,name,closes_at,status` +
    `&status=eq.live` +
    `&order=closes_at.asc.nullslast`;

  const res = await fetch(url, { headers });
  const text = await res.text();
  if (!res.ok) {
    msgEl.textContent = `Could not load drops: ${res.status} ${text}`;
    return;
  }

  const drops = JSON.parse(text);
  lastDrops = drops;

  if (!drops.length) {
    dropSelect.innerHTML = "";
    msgEl.textContent = "No live drops found.";
    return;
  }

  dropSelect.innerHTML = drops.map(d => {
    const label =
      `${d.name || d.id}` +
      (d.closes_at ? ` (closes ${new Date(d.closes_at).toLocaleString()})` : "");
    return `<option value="${d.id}">${esc(label)}</option>`;
  }).join("");

  dropSelect.value = drops[0].id;
}

async function fetchDropMeta(dropId){
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/drops?id=eq.${dropId}&select=max_orders,capacity_units_total`,
    { headers }
  );
  const text = await res.text();
  if (!res.ok) return null;
  return (JSON.parse(text) || [])[0] || null;
}

async function fetchOrdersForDrop(dropId){
  // orders + nested order_items + nested products
  const url =
    `${SUPABASE_URL}/rest/v1/orders?drop_id=eq.${dropId}` +
    `&select=id,created_at,customer_name,customer_phone,status,` +
    `order_items(qty,price_pence,product:products(name,category,capacity_units,price_pence))` +
    `&order=created_at.desc`;

  const res = await fetch(url, { headers });
  const text = await res.text();
  if(!res.ok){
    throw new Error(`Orders fetch failed for drop ${dropId}: ${res.status} ${text}`);
  }
  return JSON.parse(text);
}

async function updateStatus(orderId,status){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`,{
    method:"PATCH",
    headers:{...headers,"Prefer":"return=representation"},
    body:JSON.stringify({status})
  });
  if(!res.ok){
    msgEl.textContent = `Status update failed: ${res.status} ${await res.text()}`;
    return;
  }
  refresh();
}
window.updateStatus = updateStatus;

/** =========================
 *  ORDER TRANSFORMS
 *  ========================= */
function splitPizzaVsOtherItems(order){
  const items = safeArr(order.order_items);

  const pizzas = [];
  const others = [];

  for (const it of items){
    const qty = Number(it.qty) || 0;
    const prod = it.product || {};
    const name = prod.name || "Unknown";
    const category = String(prod.category || "").toLowerCase();

    const label = `${name} x${qty}`;

    if (category === "pizza" || category === "pizzas") pizzas.push(label);
    else others.push(label);
  }

  return { pizzas, others };
}

function computeCapacityUnitsFromOrders(orders){
  let units = 0;
  for (const o of orders){
    for (const it of safeArr(o.order_items)){
      const qty = Number(it.qty) || 0;
      const cu = Number((it.product||{}).capacity_units) || 0;
      units += qty * cu;
    }
  }
  return units;
}

function computePizzaQtyFromOrders(orders){
  let pizzaQty = 0;
  for (const o of orders){
    for (const it of safeArr(o.order_items)){
      const qty = Number(it.qty) || 0;
      const category = String((it.product||{}).category || "").toLowerCase();
      if (category === "pizza" || category === "pizzas") pizzaQty += qty;
    }
  }
  return pizzaQty;
}

function computeRevenueFromOrders(orders){
  let total = 0;
  for (const o of orders){
    for (const it of safeArr(o.order_items)){
      const qty = Number(it.qty) || 0;
      const priceEach = (it.price_pence != null ? Number(it.price_pence) : null);
      const fallback = Number((it.product||{}).price_pence) || 0;
      total += qty * (priceEach != null ? (priceEach || 0) : fallback);
    }
  }
  return total;
}

/** =========================
 *  RENDER
 *  ========================= */
function renderOrdersTable(orders){
  rowsEl.innerHTML = orders.map(o => {
    const { pizzas, others } = splitPizzaVsOtherItems(o);

    return `
      <tr>
        <td>${fmtTime(o.created_at)}</td>
        <td>${esc(o.customer_name)}</td>
        <td>${esc(o.customer_phone)}</td>
        <td>${pizzas.length ? esc(pizzas.join(", ")) : "<span class='muted'>—</span>"}</td>
        <td>${others.length ? esc(others.join(", ")) : "<span class='muted'>—</span>"}</td>
        <td><b>${esc(o.status)}</b></td>
        <td>
          <button onclick="updateStatus('${o.id}','confirmed')">Confirmed</button>
          <button onclick="updateStatus('${o.id}','baking')">Baking</button>
          <button onclick="updateStatus('${o.id}','ready')">Ready</button>
          <button onclick="updateStatus('${o.id}','collected')">Collected</button>
          <button onclick="updateStatus('${o.id}','cancelled')">Cancel</button>
        </td>
      </tr>
    `;
  }).join("");
}

/** =========================
 *  MAIN REFRESH
 *  ========================= */
async function refresh(){
  const dropId = (dropSelect.value || "").trim();
  if(!dropId) return;

  msgEl.textContent = "";

  try {
    const [dropMeta, orders] = await Promise.all([
      fetchDropMeta(dropId),
      fetchOrdersForDrop(dropId)
    ]);

    lastOrders = orders;

    const pizzaQty = computePizzaQtyFromOrders(orders);
    const unitsUsed = computeCapacityUnitsFromOrders(orders);

    let capText = "";
    if (dropMeta && dropMeta.max_orders != null) {
      capText = `Capacity: ${orders.length}/${dropMeta.max_orders}`;
    } else {
      capText = `Capacity: ${orders.length} orders`;
    }

    if (dropMeta && dropMeta.capacity_units_total != null) {
      capText += ` | Units: ${unitsUsed}/${dropMeta.capacity_units_total} | Pizzas: ${pizzaQty}`;
    } else {
      capText += ` | Units: ${unitsUsed} | Pizzas: ${pizzaQty}`;
    }

    capEl.textContent = capText;
    renderOrdersTable(orders);

  } catch (e) {
    msgEl.textContent = String(e.message || e);
  }
}

/** =========================
 *  AGGREGATION (GROUP BY CATEGORY + PRODUCT)
 *  ========================= */
function buildAggregate(orders){
  // category -> name -> {qty, units, revenue}
  const agg = {};
  for (const o of orders){
    for (const it of safeArr(o.order_items)){
      const qty = Number(it.qty) || 0;
      const prod = it.product || {};
      const name = prod.name || "Unknown";
      const category = String(prod.category || "uncategorised").toLowerCase();

      const unitsEach = Number(prod.capacity_units) || 0;
      const units = qty * unitsEach;

      const priceEach = (it.price_pence != null ? Number(it.price_pence) : null);
      const fallback = Number(prod.price_pence) || 0;
      const revenue = qty * (priceEach != null ? (priceEach || 0) : fallback);

      if (!agg[category]) agg[category] = {};
      if (!agg[category][name]) agg[category][name] = { qty:0, units:0, revenue:0 };

      agg[category][name].qty += qty;
      agg[category][name].units += units;
      agg[category][name].revenue += revenue;
    }
  }
  return agg;
}

function formatAggregateLines(agg){
  const cats = Object.keys(agg).sort((a,b)=>a.localeCompare(b));
  if (!cats.length) return "No items found.";

  let out = "";
  for (const cat of cats){
    out += `\n${cat.toUpperCase()}\n`;
    const names = Object.keys(agg[cat]).sort((a,b)=>a.localeCompare(b));

    for (const name of names){
      const r = agg[cat][name];
      out += `- ${name}: ${r.qty}  (units ${r.units}, revenue ${moneyFromPence(r.revenue)})\n`;
    }
  }
  return out.trim();
}

/** =========================
 *  BUTTON: AGGREGATED (SELECTED DROP)
 *  ========================= */
async function showAggregatedSelectedDrop(){
  const dropId = (dropSelect.value || "").trim();
  if(!dropId){
    alert("Select a drop first.");
    return;
  }

  try {
    const orders = await fetchOrdersForDrop(dropId);
    const agg = buildAggregate(orders);

    const totalOrders = orders.length;
    const totalPizzas = computePizzaQtyFromOrders(orders);
    const totalUnits = computeCapacityUnitsFromOrders(orders);
    const totalRevenue = computeRevenueFromOrders(orders);

    alert(
`Aggregated orders (SELECTED DROP)

Total orders: ${totalOrders}
Total pizzas: ${totalPizzas}
Total capacity units: ${totalUnits}
Estimated revenue: ${moneyFromPence(totalRevenue)}

Breakdown:
${formatAggregateLines(agg)}`
    );
  } catch (e) {
    alert("Aggregate failed: " + String(e.message || e));
  }
}

/** =========================
 *  BUTTON: AGGREGATED (ALL LIVE DROPS)
 *  ========================= */
async function showAggregatedAllDrops(){
  if (!lastDrops.length) await loadLiveDrops();
  if (!lastDrops.length) {
    alert("No live drops to aggregate.");
    return;
  }

  try {
    const allOrdersByDrop = await Promise.all(
      lastDrops.map(d => fetchOrdersForDrop(d.id))
    );

    let totalOrders = 0;
    let totalPizzas = 0;
    let totalUnits = 0;
    let totalRevenue = 0;

    const aggAll = {}; // merged agg

    for (const orders of allOrdersByDrop){
      totalOrders += orders.length;
      totalPizzas += computePizzaQtyFromOrders(orders);
      totalUnits += computeCapacityUnitsFromOrders(orders);
      totalRevenue += computeRevenueFromOrders(orders);

      const agg = buildAggregate(orders);
      for (const cat of Object.keys(agg)){
        if (!aggAll[cat]) aggAll[cat] = {};
        for (const name of Object.keys(agg[cat])){
          if (!aggAll[cat][name]) aggAll[cat][name] = {qty:0, units:0, revenue:0};
          aggAll[cat][name].qty += agg[cat][name].qty;
          aggAll[cat][name].units += agg[cat][name].units;
          aggAll[cat][name].revenue += agg[cat][name].revenue;
        }
      }
    }

    alert(
`Aggregated orders (ALL LIVE DROPS)

Total drops: ${lastDrops.length}
Total orders: ${totalOrders}
Total pizzas: ${totalPizzas}
Total capacity units: ${totalUnits}
Estimated revenue: ${moneyFromPence(totalRevenue)}

Breakdown:
${formatAggregateLines(aggAll)}`
    );

  } catch (e) {
    alert("Aggregate failed: " + String(e.message || e));
  }
}

/** =========================
 *  START / EVENTS
 *  ========================= */
async function start(){
  await loadLiveDrops();
  await refresh();

  if(timer) clearInterval(timer);
  timer = setInterval(refresh, 5000);
}

loadBtn.addEventListener("click", start);
summarySelectedBtn.addEventListener("click", showAggregatedSelectedDrop);
summaryAllBtn.addEventListener("click", showAggregatedAllDrops);

// Auto start
start();
</script>

</body>
</html>
