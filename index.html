<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Southbury Farm Pizza — Operator</title>
<style>
body { font-family: system-ui; padding:20px; background:#fafafa; }
table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #ddd; padding:8px; text-align:left; }
th { background:#f2f2f2; }
button { margin:2px; padding:4px 8px; cursor:pointer; }
#cap { margin-left:15px; font-weight:bold; }
</style>
</head>
<body>

<h2>Southbury Farm Pizza — Operator Dashboard</h2>

<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
  <label>Live drop:</label>
  <select id="dropSelect" style="min-width:420px;"></select>
<button id="loadBtn">Load</button>
<button id="summaryBtn">Aggregated orders</button>
<span id="cap"></span>
</div>

<div id="msg" style="color:red;margin-top:10px;"></div>

<table>
<thead>
<tr>
<th>Time</th>
<th>Name</th>
<th>Phone</th>
<th>Pizzas</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>
const SUPABASE_URL = "https://tvqhhjvumgumyetvpgid.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_GftZ3Mw1M2-jb2bStjv80Q_gRDC9FzD"; // rotate later if you want

const headers = {
  apikey: SUPABASE_ANON_KEY,
  Authorization: "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json"
};

// Elements (some optional depending on your HTML)
const rows = document.getElementById("rows");
const msg = document.getElementById("msg");
const capEl = document.getElementById("cap");

const dropInput = document.getElementById("dropId");      // optional
const dropSelect = document.getElementById("dropSelect");  // optional dropdown
const loadBtn = document.getElementById("loadBtn");        // optional
const summaryBtn = document.getElementById("summaryBtn");  // optional

let timer = null;
let lastOrders = [];

function esc(s){return String(s ?? "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));}
function fmt(d){ try { return new Date(d).toLocaleTimeString(); } catch { return d; } }

function getSelectedDropId() {
  if (dropSelect && dropSelect.value) return dropSelect.value.trim();
  if (dropInput && dropInput.value) return dropInput.value.trim();
  return "";
}

async function loadLiveDrops() {
  if (!dropSelect) return; // dropdown not on page yet

  const url =
    `${SUPABASE_URL}/rest/v1/drops` +
    `?select=id,name,closes_at,status` +
    `&status=eq.live` +
    `&order=closes_at.asc.nullslast`;

  const res = await fetch(url, { headers });
  const text = await res.text();
  if (!res.ok) {
    msg.textContent = `Could not load drops: ${res.status} ${text}`;
    return;
  }

  const drops = JSON.parse(text);

  dropSelect.innerHTML = drops.map(d => {
    const label = `${d.name || d.id}${d.closes_at ? ` (closes ${new Date(d.closes_at).toLocaleString()})` : ""}`;
    return `<option value="${d.id}">${esc(label)}</option>`;
  }).join("");

  if (drops.length) dropSelect.value = drops[0].id;
}

async function fetchCap(dropId){
  // supports either max_orders (your current) or capacity_units_total (if you add later)
  const d = await fetch(
    `${SUPABASE_URL}/rest/v1/drops?id=eq.${dropId}&select=max_orders,capacity_units_total`,
    { headers }
  );
  const drop = (await d.json())[0];

  const o = await fetch(
    `${SUPABASE_URL}/rest/v1/orders?drop_id=eq.${dropId}&select=id,pizzas`,
    { headers }
  );
  const orders = await o.json();

  if (!drop) return;

  // If max_orders exists, show orders count / max_orders (what you already had)
  if (drop.max_orders != null) {
    capEl.textContent = `Capacity: ${orders.length}/${drop.max_orders}`;
    return;
  }

  // Else fallback to capacity_units_total if you later move to units
  const used = orders.reduce((sum, r) => sum + (Number(r.pizzas) || 0), 0);
  if (drop.capacity_units_total != null) {
    capEl.textContent = `Capacity: ${used}/${drop.capacity_units_total}`;
  }
}

async function fetchOrders(dropId){
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/orders?drop_id=eq.${dropId}` +
    `&select=id,created_at,customer_name,customer_phone,pizzas,status` +
    `&order=created_at.desc`,
    { headers }
  );
  const text = await res.text();
  if(!res.ok){ msg.textContent = `Orders fetch failed: ${res.status} ${text}`; return []; }
  return JSON.parse(text);
}

async function updateStatus(id,status){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`,{
    method:"PATCH",
    headers:{...headers,"Prefer":"return=representation"},
    body:JSON.stringify({status})
  });
  if (!res.ok) {
    msg.textContent = `Status update failed: ${res.status} ${await res.text()}`;
    return;
  }
  refresh();
}

// Keep as global so your inline onclick works
window.updateStatus = updateStatus;

async function refresh(){
  const dropId = getSelectedDropId();
  if(!dropId) { msg.textContent = "Select or enter a drop ID first."; return; }

  msg.textContent="";
  await fetchCap(dropId);

  const orders = await fetchOrders(dropId);
  lastOrders = orders;

  rows.innerHTML = orders.map(o=>`
    <tr>
      <td>${fmt(o.created_at)}</td>
      <td>${esc(o.customer_name)}</td>
      <td>${esc(o.customer_phone)}</td>
      <td>${Number(o.pizzas) || 0}</td>
      <td><b>${esc(o.status)}</b></td>
      <td>
        <button onclick="updateStatus('${o.id}','confirmed')">Confirmed</button>
        <button onclick="updateStatus('${o.id}','baking')">Baking</button>
        <button onclick="updateStatus('${o.id}','ready')">Ready</button>
        <button onclick="updateStatus('${o.id}','collected')">Collected</button>
        <button onclick="updateStatus('${o.id}','cancelled')">Cancel</button>
      </td>
    </tr>
  `).join("");
}

function showSummary(){
  const totalOrders = lastOrders.length;
  const totalPizzas = lastOrders.reduce((s,o)=> s + (Number(o.pizzas)||0), 0);

  const byStatus = {};
  for (const o of lastOrders) byStatus[o.status] = (byStatus[o.status]||0) + 1;

  alert(
`Aggregated orders (selected drop)

Total orders: ${totalOrders}
Total pizzas: ${totalPizzas}

By status:
${Object.entries(byStatus).map(([k,v])=>`- ${k}: ${v}`).join("\n") || "- none"}`
  );
}

async function start(){
  // if dropdown exists, populate it and auto-select closes-soonest live drop
  await loadLiveDrops();

  await refresh();
  if(timer) clearInterval(timer);
  timer = setInterval(refresh,5000);
}

// Wire buttons if they exist
if (loadBtn) loadBtn.addEventListener("click", start);
if (summaryBtn) summaryBtn.addEventListener("click", showSummary);

// Auto-start if you want (optional):
start();
</script>

</body>
</html>
