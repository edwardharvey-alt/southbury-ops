<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hearth — Service Board</title>
<link rel="stylesheet" href="./assets/hearth.css">
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="brand">
      <div class="title">🔥 Hearth</div>
      <div class="subtitle">Service Board</div>
    </div>
    <div class="tabs">
      <a class="tab active" href="./index.html">Service Board</a>
      <a class="tab" href="./drop-manager.html">Drop Studio</a>
      <a class="tab" href="./products.html">Menu Library</a>
    </div>
  </div>

  <div class="panel">
    <div class="bar">
      <label class="small">Live drop</label>
      <select id="dropSelect" style="min-width:360px;"></select>
      <button id="loadBtn" class="primary">Load</button>
      <button id="summaryBtn">Aggregated orders</button>
      <span id="cap" class="badge"></span>
    </div>
    <div id="msg" class="msg"></div>

    <div style="margin-top:12px;">
      <table>
        <thead>
          <tr>
            <th style="width:100px;">Time</th>
            <th style="width:180px;">Name</th>
            <th style="width:160px;">Phone</th>
            <th style="width:220px;">Pizzas</th>
            <th style="width:220px;">Other items</th>
            <th style="width:110px;">Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="./assets/config.js"></script>

<script>
/*** CONFIG ***/
const SUPABASE_URL = window.HEARTH_CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.HEARTH_CONFIG.SUPABASE_ANON_KEY;

const headers = {
  apikey: SUPABASE_ANON_KEY,
  Authorization: "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json"
};

const rows = document.getElementById("rows");
const msg = document.getElementById("msg");
const capEl = document.getElementById("cap");

const dropSelect = document.getElementById("dropSelect");
const loadBtn = document.getElementById("loadBtn");
const summaryBtn = document.getElementById("summaryBtn");

let timer = null;
let lastOrders = [];
let lastDrop = null;

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g,
    m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}
function fmt(d){ try { return new Date(d).toLocaleTimeString(); } catch { return d; } }

async function fetchText(url, opts){
  const res = await fetch(url, opts);
  const text = await res.text();
  return {res, text};
}

async function loadLiveDrops(){
  msg.textContent = "";
  const url =
    `${SUPABASE_URL}/rest/v1/drops` +
    `?select=id,name,closes_at,status,capacity_category,capacity_units_total,max_orders` +
    `&status=eq.live&order=closes_at.asc.nullslast`;

  const {res, text} = await fetchText(url, { headers });
  if(!res.ok){
    msg.textContent = `Could not load drops: ${res.status}\n${text}`;
    return;
  }

  const drops = JSON.parse(text);
  dropSelect.innerHTML = drops.map(d => {
    const label =
      `${d.name || d.id}` +
      (d.closes_at ? ` (closes ${new Date(d.closes_at).toLocaleString()})` : "");
    return `<option value="${d.id}">${esc(label)}</option>`;
  }).join("");

  if(drops.length) dropSelect.value = drops[0].id;
  else msg.textContent = "No live drops found.";
}

async function fetchDrop(dropId){
  const url =
    `${SUPABASE_URL}/rest/v1/drops?id=eq.${dropId}` +
    `&select=id,name,status,capacity_category,capacity_units_total,max_orders`;
  const {res, text} = await fetchText(url, { headers });
  if(!res.ok) throw new Error(`Drop fetch failed: ${res.status}\n${text}`);
  return (JSON.parse(text)[0] || null);
}

async function fetchOrders(dropId){
  const url =
    `${SUPABASE_URL}/rest/v1/orders?drop_id=eq.${dropId}` +
    `&select=id,created_at,customer_name,customer_phone,status,` +
    `order_items(qty,product:products(name,category))` +
    `&order=created_at.asc`;

  const {res, text} = await fetchText(url, { headers });
  if(!res.ok) throw new Error(`Orders fetch failed: ${res.status}\n${text}`);
  return JSON.parse(text);
}

function splitItems(order, capacityCategory){
  const cap = String(capacityCategory || "pizza").toLowerCase();
  const pizzas = new Map();
  const others = new Map();

  for(const oi of (order.order_items || [])){
    const p = oi.product || {};
    const name = p.name || "Unknown";
    const cat = String(p.category || "").toLowerCase();
    const qty = Number(oi.qty) || 0;
    if(!qty) continue;

    const m = (cat === cap) ? pizzas : others;
    m.set(name, (m.get(name) || 0) + qty);
  }

  const toStr = (m) => {
    const arr = Array.from(m.entries()).map(([n,q])=>`${n} x${q}`);
    return arr.length ? arr.join(", ") : "—";
  };

  return { pizzasStr: toStr(pizzas), othersStr: toStr(others) };
}

function computeCapacity(orders, capacityCategory){
  const cap = String(capacityCategory || "pizza").toLowerCase();
  let used = 0;
  for(const o of orders){
    for(const oi of (o.order_items || [])){
      const cat = String(oi.product?.category || "").toLowerCase();
      if(cat === cap) used += (Number(oi.qty) || 0);
    }
  }
  return used;
}

async function updateStatus(id,status){
  const url = `${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`;
  const {res, text} = await fetchText(url, {
    method:"PATCH",
    headers:{...headers, Prefer:"return=representation"},
    body: JSON.stringify({status})
  });
  if(!res.ok){
    msg.textContent = `Status update failed: ${res.status}\n${text}`;
    return;
  }
  refresh();
}
window.updateStatus = updateStatus;

async function refresh(){
  const dropId = dropSelect.value;
  if(!dropId) return;

  msg.textContent = "";

  try{
    lastDrop = await fetchDrop(dropId);
    lastOrders = await fetchOrders(dropId);

    const cat = lastDrop?.capacity_category || "pizza";
    const used = computeCapacity(lastOrders, cat);

    const total = (lastDrop?.capacity_units_total ?? "—");
    const maxOrders = (lastDrop?.max_orders ?? "—");
    capEl.textContent = `Orders ${lastOrders.length}/${maxOrders} · ${cat} ${used}/${total}`;

    rows.innerHTML = lastOrders.map(o=>{
      const {pizzasStr, othersStr} = splitItems(o, cat);
      return `
        <tr>
          <td>${fmt(o.created_at)}</td>
          <td>${esc(o.customer_name)}</td>
          <td>${esc(o.customer_phone)}</td>
          <td>${esc(pizzasStr)}</td>
          <td>${esc(othersStr)}</td>
          <td><b>${esc(o.status)}</b></td>
          <td>
            <button onclick="updateStatus('${o.id}','confirmed')">Confirmed</button>
            <button onclick="updateStatus('${o.id}','baking')">Baking</button>
            <button onclick="updateStatus('${o.id}','ready')">Ready</button>
            <button onclick="updateStatus('${o.id}','collected')">Collected</button>
            <button onclick="updateStatus('${o.id}','cancelled')">Cancel</button>
          </td>
        </tr>
      `;
    }).join("");

  }catch(e){
    msg.textContent = e.message || String(e);
  }
}

function showSummary(){
  const totals = new Map();
  for(const o of lastOrders){
    for(const oi of (o.order_items || [])){
      const name = oi.product?.name || "Unknown";
      const qty = Number(oi.qty) || 0;
      totals.set(name, (totals.get(name) || 0) + qty);
    }
  }
  const lines = Array.from(totals.entries()).sort((a,b)=>b[1]-a[1]).map(([n,q])=>`- ${n}: ${q}`).join("\n") || "(none)";
  alert(`Prep Summary (selected drop)\n\n${lines}`);
}

async function start(){
  await loadLiveDrops();
  await refresh();
  if(timer) clearInterval(timer);
  timer = setInterval(refresh, 5000);
}

loadBtn.addEventListener("click", start);
summaryBtn.addEventListener("click", showSummary);
start();
</script>

</body>
</html>
