<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Southbury Farm Pizza — Operator</title>
<style>
body { font-family: system-ui; padding:20px; background:#fafafa; }
table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #ddd; padding:8px; text-align:left; }
th { background:#f2f2f2; }
button { margin:2px; padding:4px 8px; cursor:pointer; }
#cap { margin-left:15px; font-weight:bold; }
</style>
</head>
<body>

<h2>Southbury Farm Pizza — Operator Dashboard</h2>

<div>
Drop ID:
<input id="dropId" style="width:350px;">
<button onclick="start()">Load</button>
<span id="cap"></span>
</div>

<div id="msg" style="color:red;margin-top:10px;"></div>

<table>
<thead>
<tr>
<th>Time</th>
<th>Name</th>
<th>Phone</th>
<th>Pizzas</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>

const SUPABASE_URL = "https://tvqhhjvumgumyetvpgid.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_GftZ3Mw1M2-jb2bStjv80Q_gRDC9FzD";
const DEFAULT_DROP_ID = "f749be39-139d-4451-bc32-df0823c95963";

const headers = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json"
};

const rows = document.getElementById("rows");
const msg = document.getElementById("msg");
const capEl = document.getElementById("cap");
const dropInput = document.getElementById("dropId");

dropInput.value = DEFAULT_DROP_ID;

let timer = null;

function esc(s){return String(s ?? "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));}

function fmt(d){return new Date(d).toLocaleTimeString();}

async function fetchCap(dropId){
  const d = await fetch(`${SUPABASE_URL}/rest/v1/drops?id=eq.${dropId}&select=max_orders`,{headers});
  const drop = (await d.json())[0];
  const o = await fetch(`${SUPABASE_URL}/rest/v1/orders?drop_id=eq.${dropId}&select=id`,{headers});
  const orders = await o.json();
  if(drop) capEl.textContent = `Capacity: ${orders.length}/${drop.max_orders}`;
}

async function fetchOrders(dropId){
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/orders?drop_id=eq.${dropId}&select=id,created_at,customer_name,customer_phone,pizzas,status&order=created_at.desc`,
    {headers}
  );
  const text = await res.text();
  if(!res.ok){ msg.textContent=text; return []; }
  return JSON.parse(text);
}

async function updateStatus(id,status){
  await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`,{
    method:"PATCH",
    headers:{...headers,"Prefer":"return=representation"},
    body:JSON.stringify({status})
  });
  refresh();
}

async function refresh(){
  const dropId = dropInput.value.trim();
  if(!dropId) return;
  msg.textContent="";
  await fetchCap(dropId);
  const orders = await fetchOrders(dropId);
  rows.innerHTML = orders.map(o=>`
    <tr>
      <td>${fmt(o.created_at)}</td>
      <td>${esc(o.customer_name)}</td>
      <td>${esc(o.customer_phone)}</td>
      <td>${Array.isArray(o.pizzas)?o.pizzas.join(", "):""}</td>
      <td><b>${o.status}</b></td>
      <td>
        <button onclick="updateStatus('${o.id}','confirmed')">Confirmed</button>
        <button onclick="updateStatus('${o.id}','baking')">Baking</button>
        <button onclick="updateStatus('${o.id}','ready')">Ready</button>
        <button onclick="updateStatus('${o.id}','collected')">Collected</button>
        <button onclick="updateStatus('${o.id}','cancelled')">Cancel</button>
      </td>
    </tr>
  `).join("");
}

function start(){
  refresh();
  if(timer) clearInterval(timer);
  timer = setInterval(refresh,5000);
}

</script>
</body>
</html>
