<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hearth — Platform admin</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --pa-bg: var(--h-chalk, #faf8f5);
      --pa-text: var(--h-coal, #0f0b08);
      --pa-muted: var(--h-stone, #8c7b6e);
      --pa-border: var(--h-cinder, #e8ddd5);
      --pa-accent: var(--h-fire, #c4511a);
      --pa-surface: #ffffff;
    }

    body {
      margin: 0;
      background: var(--pa-bg);
      color: var(--pa-text);
      font-family: var(--h-font-ui, 'Figtree', system-ui, sans-serif);
      font-size: 15px;
      line-height: 1.5;
    }

    .pa-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 32px;
      border-bottom: 1px solid var(--pa-border);
      background: var(--pa-surface);
    }

    .pa-headerBrand {
      font-family: var(--h-font-display, 'Cormorant Garamond', serif);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .pa-headerWho {
      font-size: 13px;
      color: var(--pa-muted);
    }

    .pa-headerWho strong {
      color: var(--pa-text);
      font-weight: 600;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    .pa-state {
      padding: 24px 0;
    }

    .pa-loading {
      font-size: 14px;
      color: var(--pa-muted);
    }

    .pa-state h1 {
      font-family: var(--h-font-display, 'Cormorant Garamond', serif);
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0 0 12px 0;
    }

    .pa-state p {
      color: var(--pa-muted);
      margin: 0 0 16px 0;
    }

    .pa-state a {
      color: var(--pa-accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .pa-state a:hover {
      text-decoration: underline;
    }

    .adminHeader {
      margin-bottom: 24px;
    }
    .adminHeader h1 {
      font-family: var(--h-font-display, 'Cormorant Garamond', serif);
      margin: 0 0 4px 0;
    }
    .adminSubhead {
      margin: 0;
      color: var(--h-stone);
      font-size: 0.875rem;
    }

    .vendorTableWrap {
      background: var(--h-chalk);
      border: 1px solid var(--h-cinder);
      border-radius: 12px;
      overflow: hidden;
    }
    .vendorTable {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    .vendorTable th:nth-child(1), .vendorTable td:nth-child(1) { min-width: 200px; }
    .vendorTable th:nth-child(2), .vendorTable td:nth-child(2) { width: 160px; }
    .vendorTable th:nth-child(4), .vendorTable td:nth-child(4) { width: 130px; }
    .vendorTable th:nth-child(5), .vendorTable td:nth-child(5) { width: 110px; }
    .vendorTable th:nth-child(6), .vendorTable td:nth-child(6) { width: 80px; }
    .vendorTable th:nth-child(7), .vendorTable td:nth-child(7) { width: 130px; }
    .vendorRow { cursor: pointer; transition: background 0.12s ease; }
    .vendorRow:hover { background: var(--h-bone, #f8f5ef); }
    .vendorTable th,
    .vendorTable td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--h-cinder);
      font-size: 0.9375rem;
      vertical-align: middle;
    }
    .vendorTable thead th {
      background: var(--h-chalk);
      font-weight: 600;
      font-size: 0.8125rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--h-stone);
    }
    .vendorTable tbody tr:last-child td {
      border-bottom: none;
    }

    .vendorNameCell {
      font-weight: 600;
      color: var(--h-coal);
    }
    .slugCell {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.8125rem;
      color: var(--h-stone);
    }
    .emailCell {
      font-size: 0.875rem;
      color: var(--h-coal);
    }
    .lastActivityCell {
      font-size: 0.875rem;
      color: var(--h-stone);
      white-space: nowrap;
    }
    .numCol {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .muted {
      color: var(--h-stone);
      opacity: 0.7;
    }

    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      border: 1px solid;
      background: transparent;
      white-space: nowrap;
    }
    .pillPositive {
      color: var(--h-coal);
      border-color: var(--h-cinder);
    }
    .pillNeutral {
      color: var(--h-stone);
      border-color: var(--h-cinder);
    }
    .pillAttention {
      color: var(--h-fire);
      border-color: var(--h-fire);
    }

    .vendorEmpty,
    .vendorError {
      padding: 24px;
      background: var(--h-chalk);
      border: 1px solid var(--h-cinder);
      border-radius: 12px;
      color: var(--h-stone);
      text-align: center;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <header class="pa-header">
    <div class="pa-headerBrand">Hearth — Platform admin</div>
    <div class="pa-headerWho">Signed in as <strong id="adminEmail">…</strong></div>
  </header>

  <main>
    <section id="loadingState" class="pa-state pa-loading">
      Verifying access…
    </section>

    <section id="notAuthorisedState" class="pa-state" hidden>
      <h1>Not authorised</h1>
      <p>You don't have platform admin access.</p>
      <a href="home.html">Return to home</a>
    </section>

    <section id="adminContent" class="pa-state" hidden>
      <header class="adminHeader">
        <h1>Vendors</h1>
        <p class="adminSubhead" id="vendorCount">Loading…</p>
      </header>

      <section class="vendorTableWrap" id="vendorTableWrap" hidden>
        <table class="vendorTable">
          <thead>
            <tr>
              <th scope="col">Vendor</th>
              <th scope="col">Slug</th>
              <th scope="col">Email</th>
              <th scope="col">Onboarding</th>
              <th scope="col">Stripe</th>
              <th scope="col" class="numCol">Drops</th>
              <th scope="col">Last activity</th>
            </tr>
          </thead>
          <tbody id="vendorTableBody"></tbody>
        </table>
      </section>

      <section class="vendorEmpty" id="vendorEmpty" hidden>
        <p>No vendors found.</p>
      </section>

      <section class="vendorError" id="vendorError" hidden>
        <p>Couldn't load vendors. Try refreshing the page.</p>
      </section>
    </section>
  </main>

  <script>
    (async function init() {
      const loadingEl = document.getElementById('loadingState');
      const notAuthorisedEl = document.getElementById('notAuthorisedState');
      const adminContentEl = document.getElementById('adminContent');
      const adminEmailEl = document.getElementById('adminEmail');
      const vendorCountEl = document.getElementById('vendorCount');
      const vendorTableWrapEl = document.getElementById('vendorTableWrap');
      const vendorTableBodyEl = document.getElementById('vendorTableBody');
      const vendorEmptyEl = document.getElementById('vendorEmpty');
      const vendorErrorEl = document.getElementById('vendorError');

      vendorTableBodyEl.addEventListener('click', (e) => {
        const row = e.target.closest('.vendorRow');
        if (!row) return;
        const vendorId = row.dataset.vendorId;
        if (vendorId) window.location.href = `platform-admin-vendor.html?id=${encodeURIComponent(vendorId)}`;
      });

      function showNotAuthorised() {
        loadingEl.hidden = true;
        adminContentEl.hidden = true;
        notAuthorisedEl.hidden = false;
      }

      function showAdminContent(email) {
        adminEmailEl.textContent = email;
        loadingEl.hidden = true;
        notAuthorisedEl.hidden = true;
        adminContentEl.hidden = false;
      }

      function formatRelativeTime(iso) {
        if (!iso) return '';
        const then = new Date(iso).getTime();
        if (Number.isNaN(then)) return '';
        const now = Date.now();
        const diffMs = now - then;
        const minute = 60 * 1000;
        const hour = 60 * minute;
        const day = 24 * hour;

        if (diffMs < minute) return 'Just now';
        if (diffMs < hour) {
          const n = Math.floor(diffMs / minute);
          return `${n} minute${n === 1 ? '' : 's'} ago`;
        }
        if (diffMs < day) {
          const n = Math.floor(diffMs / hour);
          return `${n} hour${n === 1 ? '' : 's'} ago`;
        }
        const days = Math.floor(diffMs / day);
        if (days === 1) return 'Yesterday';
        if (days < 7) return `${days} days ago`;

        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const d = new Date(iso);
        return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
      }

      function makePillCell(type, label) {
        const td = document.createElement('td');
        const span = document.createElement('span');
        span.className = `pill ${type}`;
        span.textContent = label;
        td.appendChild(span);
        return td;
      }

      function makeTextCell(text, className) {
        const td = document.createElement('td');
        if (className) td.className = className;
        td.textContent = text;
        return td;
      }

      function makeMutedCell(label, className, title) {
        const td = document.createElement('td');
        if (className) td.className = className;
        const span = document.createElement('span');
        span.className = 'muted';
        span.textContent = label;
        if (title) span.setAttribute('title', title);
        td.appendChild(span);
        return td;
      }

      function renderVendorRow(v) {
        const tr = document.createElement('tr');
        tr.className = 'vendorRow';
        if (v.id) tr.dataset.vendorId = v.id;

        tr.appendChild(makeTextCell(v.display_name ?? '', 'vendorNameCell'));
        tr.appendChild(makeTextCell(v.slug ?? '', 'slugCell'));

        if (v.email) {
          tr.appendChild(makeTextCell(v.email, 'emailCell'));
        } else {
          tr.appendChild(makeMutedCell('—', 'emailCell', 'No auth email recorded'));
        }

        if (v.onboarding_completed === true) {
          tr.appendChild(makePillCell('pillPositive', 'Complete'));
        } else {
          tr.appendChild(makePillCell('pillNeutral', 'In progress'));
        }

        if (v.stripe_onboarding_complete === true) {
          tr.appendChild(makePillCell('pillPositive', 'Ready'));
        } else {
          tr.appendChild(makePillCell('pillAttention', 'Not ready'));
        }

        tr.appendChild(makeTextCell(String(v.drop_count ?? 0), 'numCol'));

        if (v.last_drop_created) {
          tr.appendChild(makeTextCell(formatRelativeTime(v.last_drop_created), 'lastActivityCell'));
        } else {
          tr.appendChild(makeMutedCell('Never', 'lastActivityCell'));
        }

        return tr;
      }

      async function loadVendors(session) {
        try {
          const res = await fetch(`${window.HEARTH_CONFIG.SUPABASE_URL}/functions/v1/admin-list-vendors`, {
            method: 'POST',
            headers: {
              'apikey': window.HEARTH_CONFIG.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${session.access_token}`,
              'Content-Type': 'application/json'
            },
            body: '{}'
          });

          if (res.status !== 200) {
            console.error('admin-list-vendors returned', res.status);
            vendorCountEl.hidden = true;
            vendorTableWrapEl.hidden = true;
            vendorEmptyEl.hidden = true;
            vendorErrorEl.hidden = false;
            return;
          }

          const data = await res.json();
          const vendors = Array.isArray(data?.vendors) ? data.vendors : [];

          const n = vendors.length;
          vendorCountEl.textContent = `${n} vendor${n === 1 ? '' : 's'}`;

          if (n === 0) {
            vendorTableWrapEl.hidden = true;
            vendorErrorEl.hidden = true;
            vendorEmptyEl.hidden = false;
            return;
          }

          vendorTableBodyEl.textContent = '';
          for (const v of vendors) {
            vendorTableBodyEl.appendChild(renderVendorRow(v));
          }
          vendorEmptyEl.hidden = true;
          vendorErrorEl.hidden = true;
          vendorTableWrapEl.hidden = false;
        } catch (err) {
          console.error('loadVendors failed:', err);
          vendorCountEl.hidden = true;
          vendorTableWrapEl.hidden = true;
          vendorEmptyEl.hidden = true;
          vendorErrorEl.hidden = false;
        }
      }

      try {
        const supabase = window.supabase.createClient(
          window.HEARTH_CONFIG.SUPABASE_URL,
          window.HEARTH_CONFIG.SUPABASE_ANON_KEY
        );

        const { data: sessionData } = await supabase.auth.getSession();
        const session = sessionData?.session;

        if (!session) {
          showNotAuthorised();
          return;
        }

        const res = await fetch(`${window.HEARTH_CONFIG.SUPABASE_URL}/functions/v1/admin-verify`, {
          method: 'POST',
          headers: {
            'apikey': window.HEARTH_CONFIG.SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${session.access_token}`,
            'Content-Type': 'application/json'
          },
          body: '{}'
        });

        if (res.status !== 200) {
          showNotAuthorised();
          return;
        }

        const data = await res.json();
        if (!data?.isAdmin) {
          showNotAuthorised();
          return;
        }

        showAdminContent(data.email || '');
        loadVendors(session);
      } catch (err) {
        console.error('platform-admin auth gate failed:', err);
        showNotAuthorised();
      }
    })();
  </script>
</body>
</html>
