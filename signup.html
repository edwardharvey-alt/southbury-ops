<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get started — Hearth</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --sg-brand-primary: var(--h-accent, #8B6B3F);
      --sg-brand-secondary: var(--h-accent-2, #CBB89D);
      --sg-brand-soft: rgba(139,107,63,0.10);
      --sg-brand-soft-2: rgba(203,184,157,0.08);
    }

    body.sgBody{
      background:
        radial-gradient(1200px 600px at 15% -10%, var(--sg-brand-soft), rgba(249,115,22,0) 60%),
        radial-gradient(900px 450px at 90% 0%, var(--sg-brand-soft-2), rgba(251,146,60,0) 55%),
        #f7f5f1;
      min-height:100vh;
    }

    .sgPage{
      max-width:440px;
      margin:0 auto;
      padding:56px 20px 72px;
      display:grid;
      gap:28px;
    }

    /* Wordmark */
    .sgWordmark{
      text-align:center;
      padding:4px 0 4px;
    }

    .sgWordmarkText{
      display:inline-block;
      font-size:22px;
      font-weight:950;
      letter-spacing:-0.035em;
      color:#1f2937;
      margin:0;
    }

    .sgWordmarkDot{
      display:inline-block;
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--sg-brand-primary), var(--sg-brand-secondary));
      margin-left:6px;
      vertical-align:middle;
      transform:translateY(-2px);
    }

    /* Card */
    .sgCard{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:32px 28px;
      display:grid;
      gap:20px;
    }

    .sgHeader{
      display:grid;
      gap:8px;
    }

    .sgEyebrow{
      font-size:11px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#8b6b3f;
      margin:0;
    }

    .sgTitle{
      font-size:28px;
      font-weight:950;
      letter-spacing:-0.035em;
      line-height:1.1;
      color:#1f2937;
      margin:0;
    }

    .sgSub{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    /* Form */
    .sgForm{
      display:grid;
      gap:14px;
    }

    .sgField{
      display:grid;
      gap:6px;
    }

    .sgLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .sgInput{
      appearance:none;
      width:100%;
      box-sizing:border-box;
      min-height:46px;
      padding:0 14px;
      border:1px solid #d9d2c3;
      border-radius:12px;
      background:#fbf8f3;
      font-size:15px;
      font-weight:600;
      color:#1f2937;
      font-family:inherit;
      transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .sgInput:focus{
      outline:none;
      border-color:var(--sg-brand-primary);
      background:#fff;
      box-shadow:0 0 0 3px rgba(139,107,63,0.15);
    }

    .sgInput:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .sgButton{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:48px;
      padding:0 18px;
      border-radius:12px;
      background:linear-gradient(135deg, var(--sg-brand-primary), var(--sg-brand-secondary));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.01em;
      font-family:inherit;
      transition:transform .08s ease, box-shadow .15s ease, opacity .15s ease;
    }

    .sgButton:hover:not(:disabled){
      box-shadow:0 4px 14px rgba(139,107,63,0.25);
    }

    .sgButton:active:not(:disabled){
      transform:translateY(1px);
    }

    .sgButton:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .sgError{
      font-size:13px;
      font-weight:700;
      color:#b45309;
      background:rgba(180,83,9,0.08);
      border:1px solid rgba(180,83,9,0.18);
      border-radius:10px;
      padding:10px 12px;
      margin:0;
      line-height:1.45;
    }

    .sgError[hidden]{
      display:none !important;
    }

    /* Terms small print */
    .sgTerms{
      font-size:12px;
      font-weight:600;
      color:#6b7280;
      line-height:1.5;
      margin:0;
      text-align:center;
    }

    .sgTerms a{
      color:var(--sg-brand-primary);
      text-decoration:none;
      font-weight:900;
    }

    .sgTerms a:hover{
      text-decoration:underline;
    }


    /* Secondary link */
    .sgFoot{
      text-align:center;
      font-size:13px;
      font-weight:700;
      color:#6b7280;
    }

    .sgFoot a{
      color:var(--sg-brand-primary);
      text-decoration:none;
      font-weight:900;
    }

    .sgFoot a:hover{
      text-decoration:underline;
    }

    @media (max-width:600px){
      .sgPage{
        padding:36px 14px 56px;
        gap:22px;
      }
      .sgCard{
        padding:26px 20px;
      }
      .sgTitle{
        font-size:24px;
      }
    }
  </style>
</head>
<body class="sgBody">

  <div class="sgPage">
    <div class="sgWordmark">
      <p class="sgWordmarkText">Hearth<span class="sgWordmarkDot" aria-hidden="true"></span></p>
    </div>

    <div class="sgCard">
      <div class="sgHeader">
        <p class="sgEyebrow">New vendor</p>
        <h1 class="sgTitle">Start your Hearth</h1>
        <p class="sgSub">Create your vendor account with an email and password.</p>
      </div>

      <form class="sgForm" id="sgForm" novalidate>
        <div class="sgField">
          <label class="sgLabel" for="sgEmail">Email address</label>
          <input
            class="sgInput"
            type="email"
            id="sgEmail"
            name="email"
            autocomplete="email"
            inputmode="email"
            placeholder="you@yourvendor.co.uk"
            required
          />
        </div>
        <div class="sgField">
          <label class="sgLabel" for="sgPassword">Password</label>
          <input
            class="sgInput"
            type="password"
            id="sgPassword"
            name="password"
            autocomplete="new-password"
            placeholder="Create a password"
            required
          />
        </div>
        <div class="sgField">
          <label class="sgLabel" for="sgPasswordConfirm">Confirm password</label>
          <input
            class="sgInput"
            type="password"
            id="sgPasswordConfirm"
            name="password_confirm"
            autocomplete="new-password"
            placeholder="Confirm your password"
            required
          />
        </div>
        <p class="sgError" id="sgError" hidden></p>
        <button class="sgButton" type="submit" id="sgSubmit">Get started</button>
        <p class="sgTerms">By continuing you agree to Hearth's <a href="./vendor-terms.html">vendor terms</a>.</p>
      </form>

    </div>

    <p class="sgFoot">Already have an account? <a href="./login.html">Sign in →</a></p>
  </div>

  <script>
    const _sb = supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const formEl = document.getElementById("sgForm");
    const emailEl = document.getElementById("sgEmail");
    const passwordEl = document.getElementById("sgPassword");
    const confirmEl = document.getElementById("sgPasswordConfirm");
    const submitEl = document.getElementById("sgSubmit");
    const errorEl = document.getElementById("sgError");

    function showError(message){
      errorEl.textContent = message;
      errorEl.hidden = false;
    }

    function clearError(){
      errorEl.textContent = "";
      errorEl.hidden = true;
    }

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearError();

      const email = (emailEl.value || "").trim();
      if (!email){
        showError("Please enter your email address.");
        return;
      }

      const looksValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      if (!looksValid){
        showError("That doesn't look like a valid email address.");
        return;
      }

      const password = passwordEl.value || "";
      if (password.length < 8){
        showError("Password must be at least 8 characters.");
        return;
      }

      const confirm = confirmEl.value || "";
      if (password !== confirm){
        showError("Passwords do not match.");
        return;
      }

      submitEl.disabled = true;
      emailEl.disabled = true;
      passwordEl.disabled = true;
      confirmEl.disabled = true;
      submitEl.textContent = "Creating account…";

      try {
        const { error } = await _sb.auth.signUp({ email, password });

        if (error) throw error;

        window.location.replace("./auth-callback.html");
      } catch (err){
        console.error(err);
        showError(
          (err && err.message)
            ? err.message
            : "Something went wrong. Please try again."
        );
        submitEl.disabled = false;
        emailEl.disabled = false;
        passwordEl.disabled = false;
        confirmEl.disabled = false;
        submitEl.textContent = "Get started";
      }
    });
  </script>
</body>
</html>
