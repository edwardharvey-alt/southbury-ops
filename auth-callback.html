<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Signing in — Hearth</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --cb-brand-primary: var(--h-accent, #8B6B3F);
      --cb-brand-secondary: var(--h-accent-2, #CBB89D);
      --cb-brand-soft: rgba(139,107,63,0.10);
      --cb-brand-soft-2: rgba(203,184,157,0.08);
    }

    body.cbBody{
      background:
        radial-gradient(1200px 600px at 15% -10%, var(--cb-brand-soft), rgba(249,115,22,0) 60%),
        radial-gradient(900px 450px at 90% 0%, var(--cb-brand-soft-2), rgba(251,146,60,0) 55%),
        #f7f5f1;
      min-height:100vh;
    }

    .cbPage{
      max-width:440px;
      margin:0 auto;
      padding:56px 20px 72px;
      display:grid;
      gap:28px;
      min-height:100vh;
      align-content:center;
      justify-items:center;
      text-align:center;
    }

    /* Wordmark */
    .cbWordmark{
      padding:4px 0 4px;
    }

    .cbWordmarkText{
      display:inline-block;
      font-size:22px;
      font-weight:950;
      letter-spacing:-0.035em;
      color:#1f2937;
      margin:0;
    }

    .cbWordmarkDot{
      display:inline-block;
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--cb-brand-primary), var(--cb-brand-secondary));
      margin-left:6px;
      vertical-align:middle;
      transform:translateY(-2px);
    }

    /* Loading state */
    .cbStatus{
      display:grid;
      gap:14px;
      justify-items:center;
    }

    .cbSpinner{
      width:28px;
      height:28px;
      border-radius:50%;
      border:3px solid rgba(139,107,63,0.18);
      border-top-color:var(--cb-brand-primary);
      animation: cbSpin .8s linear infinite;
    }

    @keyframes cbSpin{
      to { transform: rotate(360deg); }
    }

    .cbMessage{
      font-size:15px;
      font-weight:700;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    /* Error state */
    .cbError{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:28px 24px;
      display:grid;
      gap:14px;
      max-width:400px;
    }

    .cbErrorTitle{
      font-size:18px;
      font-weight:950;
      letter-spacing:-0.03em;
      color:#1f2937;
      margin:0;
    }

    .cbErrorBody{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    .cbErrorLink{
      color:var(--cb-brand-primary);
      text-decoration:none;
      font-size:14px;
      font-weight:900;
    }

    .cbErrorLink:hover{
      text-decoration:underline;
    }

    /* Password reset form */
    .cbReset{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:28px 24px;
      display:grid;
      gap:18px;
      max-width:400px;
      text-align:left;
    }

    .cbResetTitle{
      font-size:20px;
      font-weight:950;
      letter-spacing:-0.03em;
      color:#1f2937;
      margin:0;
    }

    .cbResetForm{
      display:grid;
      gap:14px;
    }

    .cbResetField{
      display:grid;
      gap:6px;
    }

    .cbResetLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .cbResetInput{
      appearance:none;
      width:100%;
      box-sizing:border-box;
      min-height:46px;
      padding:0 14px;
      border:1px solid #d9d2c3;
      border-radius:12px;
      background:#fbf8f3;
      font-size:15px;
      font-weight:600;
      color:#1f2937;
      font-family:inherit;
      transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .cbResetInput:focus{
      outline:none;
      border-color:var(--cb-brand-primary);
      background:#fff;
      box-shadow:0 0 0 3px rgba(139,107,63,0.15);
    }

    .cbResetInput:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .cbResetButton{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:48px;
      padding:0 18px;
      border-radius:12px;
      background:linear-gradient(135deg, var(--cb-brand-primary), var(--cb-brand-secondary));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.01em;
      font-family:inherit;
      transition:transform .08s ease, box-shadow .15s ease, opacity .15s ease;
    }

    .cbResetButton:hover:not(:disabled){
      box-shadow:0 4px 14px rgba(139,107,63,0.25);
    }

    .cbResetButton:active:not(:disabled){
      transform:translateY(1px);
    }

    .cbResetButton:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .cbResetError{
      font-size:13px;
      font-weight:700;
      color:#b45309;
      background:rgba(180,83,9,0.08);
      border:1px solid rgba(180,83,9,0.18);
      border-radius:10px;
      padding:10px 12px;
      margin:0;
      line-height:1.45;
    }

    .cbResetError[hidden]{
      display:none !important;
    }

    [hidden]{ display:none !important; }

    @media (max-width:600px){
      .cbPage{
        padding:36px 14px 56px;
        gap:22px;
      }
      .cbError{
        padding:24px 20px;
      }
    }
  </style>
</head>
<body class="cbBody">

  <div class="cbPage">
    <div class="cbWordmark">
      <p class="cbWordmarkText">Hearth<span class="cbWordmarkDot" aria-hidden="true"></span></p>
    </div>

    <div class="cbStatus" id="cbStatus">
      <div class="cbSpinner" aria-hidden="true"></div>
      <p class="cbMessage">Signing you in…</p>
    </div>

    <div class="cbError" id="cbError" hidden>
      <h1 class="cbErrorTitle">Something went wrong</h1>
      <p class="cbErrorBody">Something went wrong. Please try signing in again.</p>
      <a class="cbErrorLink" href="./login.html">Back to sign in →</a>
    </div>

    <div class="cbReset" id="cbReset" hidden>
      <h1 class="cbResetTitle">Set a new password</h1>
      <form class="cbResetForm" id="cbResetForm" novalidate>
        <div class="cbResetField">
          <label class="cbResetLabel" for="cbNewPassword">New password</label>
          <input class="cbResetInput" type="password" id="cbNewPassword" autocomplete="new-password" placeholder="New password" required />
        </div>
        <div class="cbResetField">
          <label class="cbResetLabel" for="cbConfirmPassword">Confirm password</label>
          <input class="cbResetInput" type="password" id="cbConfirmPassword" autocomplete="new-password" placeholder="Confirm password" required />
        </div>
        <p class="cbResetError" id="cbResetError" hidden></p>
        <button class="cbResetButton" type="submit" id="cbResetSubmit">Update password</button>
      </form>
    </div>
  </div>

  <script>
    const _sb = supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const statusEl = document.getElementById("cbStatus");
    const errorEl = document.getElementById("cbError");
    const resetEl = document.getElementById("cbReset");
    const resetFormEl = document.getElementById("cbResetForm");
    const newPwEl = document.getElementById("cbNewPassword");
    const confirmPwEl = document.getElementById("cbConfirmPassword");
    const resetErrorEl = document.getElementById("cbResetError");
    const resetSubmitEl = document.getElementById("cbResetSubmit");

    function showError(){
      statusEl.hidden = true;
      errorEl.hidden = false;
    }

    function showResetForm(){
      statusEl.hidden = true;
      resetEl.hidden = false;
    }

    function redirectTo(url){
      window.location.replace(url);
    }

    // Handle password reset form submission
    resetFormEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      resetErrorEl.hidden = true;

      const pw = newPwEl.value || "";
      if (pw.length < 8){
        resetErrorEl.textContent = "Password must be at least 8 characters.";
        resetErrorEl.hidden = false;
        return;
      }

      if (pw !== (confirmPwEl.value || "")){
        resetErrorEl.textContent = "Passwords do not match.";
        resetErrorEl.hidden = false;
        return;
      }

      resetSubmitEl.disabled = true;
      newPwEl.disabled = true;
      confirmPwEl.disabled = true;
      resetSubmitEl.textContent = "Updating…";

      try {
        const { error } = await _sb.auth.updateUser({ password: pw });
        if (error) throw error;

        redirectTo("./login.html");
      } catch (err) {
        console.error("Password update failed:", err);
        resetErrorEl.textContent = (err && err.message) || "Something went wrong. Please try again.";
        resetErrorEl.hidden = false;
        resetSubmitEl.disabled = false;
        newPwEl.disabled = false;
        confirmPwEl.disabled = false;
        resetSubmitEl.textContent = "Update password";
      }
    });

    // Listen for password recovery event from Supabase
    let recoveryMode = false;

    _sb.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY"){
        recoveryMode = true;
        showResetForm();
      }
    });

    async function route(){
      try {
        const { data: sessionData, error: sessionError } = await _sb.auth.getSession();
        if (sessionError) throw sessionError;

        const session = sessionData && sessionData.session;
        if (!session || !session.user){
          redirectTo("./login.html");
          return;
        }

        // Auto-link: if a vendor row exists with this email but no auth_user_id, claim it
        const { data: unlinked } = await _sb
          .from("vendors")
          .select("id")
          .eq("email", session.user.email)
          .is("auth_user_id", null)
          .maybeSingle();

        if (unlinked) {
          await _sb
            .from("vendors")
            .update({ auth_user_id: session.user.id })
            .eq("id", unlinked.id);
        }

        // Read and clear any stored redirect target before we route.
        const storedRedirect = sessionStorage.getItem("hearth:redirect");
        sessionStorage.removeItem("hearth:redirect");

        const { data: vendor, error: vendorError } = await _sb
          .from("vendors")
          .select("id, onboarding_completed")
          .eq("auth_user_id", session.user.id)
          .maybeSingle();

        if (vendorError) throw vendorError;

        if (!vendor){
          redirectTo("./onboarding.html");
          return;
        }

        if (!vendor.onboarding_completed){
          redirectTo("./onboarding.html");
          return;
        }

        redirectTo(storedRedirect || "./home.html");
      } catch (err) {
        console.error("auth-callback routing failed:", err);
        showError();
      }
    }

    // Give onAuthStateChange a moment to fire for recovery tokens,
    // then route normally if not a password recovery
    setTimeout(() => {
      if (!recoveryMode) route();
    }, 150);
  </script>
</body>
</html>
