<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Hearth — Host View</title>

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root{
      --hv-brand-primary: var(--h-fire, #c4511a);
      --hv-brand-secondary: var(--h-accent-2, #CBB89D);
      --hv-brand-soft: rgba(139,107,63,0.10);
      --hv-brand-soft-2: rgba(203,184,157,0.08);
    }

    body{
      font-family: 'Figtree', system-ui, sans-serif;
    }

    h1, h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    body.hvBody{
      background:
        radial-gradient(1200px 600px at 15% -10%, var(--hv-brand-soft), rgba(196,81,26,0) 60%),
        radial-gradient(900px 450px at 90% 0%, var(--hv-brand-soft-2), rgba(251,146,60,0) 55%),
        #f7f5f1;
      min-height:100vh;
    }

    .hvPage{
      max-width:1040px;
      margin:0 auto;
      padding:48px 20px 64px;
      display:grid;
      gap:20px;
    }

    /* Two-region layout: activation (left) | order insight (right, sticky) */
    .hvLayout{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 340px;
      gap:20px;
      align-items:start;
    }

    .hvLayoutAside{
      position:sticky;
      top:24px;
      display:grid;
      gap:16px;
      min-width:0;
    }

    /* Header / drop identity */
    .hvHeader{
      display:grid;
      gap:8px;
      padding:4px 4px 4px;
    }

    .hvEyebrow{
      font-size:11px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#8b6b3f;
      margin:0 0 2px;
    }

    .hvDropName{
      font-size:34px;
      font-weight:950;
      letter-spacing:-0.035em;
      line-height:1.08;
      color:#1f2937;
      margin:0;
    }

    .hvHostSub{
      font-size:16px;
      font-weight:700;
      color:#4b5563;
      margin:2px 0 0;
      line-height:1.45;
    }

    .hvHostSub strong{
      color:#1f2937;
      font-weight:900;
    }

    .hvTiming{
      font-size:14px;
      font-weight:700;
      color:#6b7280;
      margin:2px 0 0;
    }

    /* Status note banner */
    .hvNote{
      background:rgba(139,107,63,0.08);
      border:1px solid rgba(139,107,63,0.18);
      border-radius:14px;
      padding:12px 16px;
      font-size:13px;
      font-weight:700;
      color:#6b4c1f;
      line-height:1.5;
    }

    .hvNote.closed{
      background:rgba(15,23,42,0.04);
      border-color:rgba(15,23,42,0.12);
      color:#374151;
    }

    /* Primary live card */
    .hvCard{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:24px 22px;
      display:grid;
      gap:18px;
    }

    .hvStatRow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:14px;
    }

    .hvStatLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .hvStatValue{
      font-size:30px;
      font-weight:950;
      letter-spacing:-0.03em;
      color:#1f2937;
      margin:0;
      line-height:1;
    }

    .hvStatValue.secondary{
      font-size:22px;
    }

    /* Capacity bar */
    .hvCapacity{
      display:grid;
      gap:10px;
    }

    .hvCapacityHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .hvCapacityLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .hvCapacityPct{
      font-size:14px;
      font-weight:900;
      color:#1f2937;
      letter-spacing:-0.01em;
    }

    .hvCapacityTrack{
      position:relative;
      width:100%;
      height:10px;
      background:rgba(15,23,42,0.07);
      border-radius:999px;
      overflow:hidden;
    }

    .hvCapacityFill{
      position:absolute;
      inset:0 auto 0 0;
      width:0%;
      background:linear-gradient(90deg, var(--hv-brand-primary), var(--hv-brand-secondary));
      border-radius:999px;
      transition:width .45s ease;
    }

    .hvCapacityMeta{
      font-size:12px;
      font-weight:700;
      color:#6b7280;
      margin:0;
    }

    /* Divider */
    .hvDivider{
      height:1px;
      background:rgba(15,23,42,0.06);
      margin:0;
    }

    /* Revenue share card */
    .hvShareCard{
      background:linear-gradient(135deg, var(--hv-brand-primary), var(--hv-brand-secondary));
      border-radius:22px;
      padding:24px 22px;
      color:#fff;
      display:grid;
      gap:6px;
    }

    .hvShareLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.1em;
      opacity:.82;
      margin:0;
    }

    .hvShareValue{
      font-size:38px;
      font-weight:950;
      letter-spacing:-0.04em;
      line-height:1;
      margin:0;
    }

    .hvShareHint{
      font-size:12px;
      font-weight:700;
      opacity:.78;
      margin:2px 0 0;
      line-height:1.4;
    }

    /* Share with your community */
    .hvCommunity{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:24px 22px;
      display:grid;
      gap:18px;
    }

    .hvCommunityHead{
      display:grid;
      gap:8px;
    }

    .hvCommunityTitle{
      font-family:'Cormorant Garamond', Georgia, serif;
      font-weight:500;
      font-size:26px;
      letter-spacing:-0.01em;
      line-height:1.12;
      color:#1f2937;
      margin:0;
    }

    .hvCommunityIntro{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    .hvStep{
      display:grid;
      gap:10px;
    }

    .hvStepTitle{
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.01em;
      color:#1f2937;
      margin:0;
    }

    .hvStepGuide{
      font-size:13px;
      font-weight:600;
      color:#6b7280;
      line-height:1.5;
      margin:0;
    }

    /* Subtle "when to send" line under each step heading */
    .hvStepWhen{
      font-size:12px;
      font-weight:700;
      color:#8b6b3f;
      letter-spacing:.01em;
      margin:-2px 0 2px;
    }

    .hvTextarea{
      width:100%;
      box-sizing:border-box;
      font-family:'Figtree', system-ui, sans-serif;
      font-size:14px;
      font-weight:500;
      line-height:1.55;
      color:#1f2937;
      background:#fcfbf9;
      border:1px solid #e9e3d8;
      border-radius:14px;
      padding:12px 14px;
      min-height:120px;
      resize:vertical;
    }

    .hvTextarea:focus{
      outline:none;
      border-color:var(--hv-brand-secondary);
      box-shadow:0 0 0 3px var(--hv-brand-soft);
    }

    .hvLinkRow{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .hvLinkBox{
      flex:1 1 auto;
      min-width:0;
      font-size:13px;
      font-weight:700;
      color:#6b4c1f;
      background:rgba(139,107,63,0.08);
      border:1px solid rgba(139,107,63,0.18);
      border-radius:12px;
      padding:10px 14px;
      word-break:break-all;
    }

    .hvActionBtn{
      font-family:'Figtree', system-ui, sans-serif;
      font-size:13px;
      font-weight:800;
      letter-spacing:-0.01em;
      color:#fff;
      background:var(--hv-brand-primary);
      border:none;
      border-radius:999px;
      padding:10px 18px;
      cursor:pointer;
      transition:opacity .2s ease;
    }

    .hvActionBtn:hover{
      opacity:0.9;
    }

    .hvActionBtn:disabled{
      opacity:0.6;
      cursor:default;
    }

    .hvActionBtn.ghost{
      color:#6b4c1f;
      background:none;
      border:1px solid rgba(139,107,63,0.32);
      flex:0 0 auto;
    }

    .hvBtnRow{
      display:flex;
    }

    .hvQrWrap{
      display:flex;
      justify-content:center;
      padding:6px 0 2px;
    }

    .hvQr{
      padding:14px;
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:16px;
      line-height:0;
    }

    /* Footer */
    .hvFooter{
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#9ca3af;
      padding-top:10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }

    .hvFooterCredit{
      margin:0;
    }

    .hvRefreshLink{
      background:none;
      border:none;
      color:#6b7280;
      font:inherit;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      padding:4px 10px;
      text-decoration:underline;
    }

    .hvRefreshLink:disabled{
      opacity:0.5;
      cursor:not-allowed;
    }

    /* States */
    .hvState{
      text-align:center;
      padding:72px 24px;
      display:grid;
      gap:14px;
      justify-items:center;
    }

    .hvStateIcon{
      font-size:38px;
    }

    .hvStateTitle{
      font-size:22px;
      font-weight:950;
      letter-spacing:-0.03em;
      color:#1f2937;
      margin:0;
    }

    .hvStateSub{
      font-size:14px;
      font-weight:600;
      color:#6b7280;
      max-width:38ch;
      line-height:1.5;
      margin:0;
    }

    @media (max-width:600px){
      .hvPage{
        padding:28px 14px 64px;
        gap:16px;
      }
      .hvDropName{
        font-size:28px;
      }
      .hvShareValue{
        font-size:32px;
      }
      .hvStatValue{
        font-size:26px;
      }
      .hvLayout{
        grid-template-columns:1fr;
      }
      .hvLayoutAside{
        position:static;
        top:auto;
      }
    }
  </style>
</head>
<body class="hvBody">

  <div class="hvPage" id="hvPage">
    <div class="hvState" id="loadingState">
      <div class="hvStateIcon">⏳</div>
      <h2 class="hvStateTitle">Loading your drop…</h2>
    </div>
  </div>

  <script>
    const state = {
      dropSlug: null,
      token: null,
      dropId: null,
      drop: null,
      refreshInFlight: false,
    };

    let _sb;

    function getQueryParam(name){
      return new URLSearchParams(window.location.search).get(name);
    }

    function stripWindowSuffix(name) {
      return String(name || "").replace(/\s*[\u2014-]\s*Window\s*\d+\s*$/i, "").trim();
    }

    function escapeHtml(str){
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatMoneyPence(pence){
      const n = Number(pence || 0);
      return "£" + (n / 100).toFixed(2);
    }

    function formatDateLong(value){
      if (!value) return null;
      const d = new Date(value);
      if (isNaN(d.getTime())) return null;
      return d.toLocaleDateString("en-GB", {
        weekday: "long",
        day: "numeric",
        month: "long",
      });
    }

    function formatTime(value){
      if (!value) return null;
      const d = new Date(value);
      if (isNaN(d.getTime())) return null;
      return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
    }

    function formatDropWindow(startISO, endISO){
      const startDate = formatDateLong(startISO) || formatDateLong(endISO);
      const startTime = formatTime(startISO);
      const endTime = formatTime(endISO);
      if (!startDate) return "";
      if (startTime && endTime) return `${startDate}, ${startTime}–${endTime}`;
      if (startTime) return `${startDate}, from ${startTime}`;
      if (endTime) return `${startDate}, until ${endTime}`;
      return startDate;
    }

    function formatOpensAtLong(value){
      if (!value) return "soon";
      const date = formatDateLong(value);
      const time = formatTime(value);
      if (date && time) return `${date} at ${time}`;
      if (date) return date;
      return "soon";
    }

    async function loadDrop(){
      state.dropSlug = getQueryParam("drop");
      state.token = getQueryParam("t");

      if (!state.dropSlug || !state.token){
        renderEmpty(
          "This link is invalid or has expired.",
          "Please ask your vendor for a fresh host link."
        );
        return;
      }

      try {
        _sb = window.supabase.createClient(
          window.HEARTH_CONFIG.SUPABASE_URL,
          window.HEARTH_CONFIG.SUPABASE_ANON_KEY
        );
      } catch (initErr){
        renderEmpty(
          "Couldn't connect to the platform.",
          "Please try refreshing the page."
        );
        return;
      }

      const summary = await fetchHostSummary();
      if (!summary){
        renderEmpty(
          "This link is invalid or has expired.",
          "Please ask your vendor for a fresh host link."
        );
        return;
      }

      state.dropId = summary.drop_id;
      state.drop = summary;
      renderDrop(summary);
    }

    async function fetchHostSummary(){
      try {
        const { data, error } = await _sb.functions.invoke(
          "host-view-summary",
          { body: { slug: state.dropSlug, token: state.token } }
        );
        if (error) return null;
        if (data?.error) return null;
        if (!data || !data.drop_id) return null;
        return data;
      } catch (err){
        console.error("host-view-summary invoke failed", err);
        return null;
      }
    }

    function computeDropState(drop){
      const status = String(drop.status || "").toLowerCase();
      if (status === "closed") return "closed";

      const now = Date.now();

      // Treat opens_at === null as already open — a drop with no scheduled
      // open time is live from creation. Only flag pre-open when opens_at
      // is non-null AND resolves to a future moment.
      if (drop.opens_at != null){
        const opensAt = new Date(drop.opens_at).getTime();
        if (!isNaN(opensAt) && now < opensAt) return "pre-open";
      }

      if (drop.closes_at != null){
        const closesAt = new Date(drop.closes_at).getTime();
        if (!isNaN(closesAt) && now > closesAt) return "closed";
      }

      return "live";
    }

    function buildOrderLink(){
      const slug = state.dropSlug || "";
      if (!slug) return "";
      // Mirrors drop-manager.html getShareUrl(): origin + /order.html?drop=<slug>
      return `${window.location.origin}/order.html?drop=${encodeURIComponent(slug)}`;
    }

    function buildCommunitySection(drop, orderLink){
      const hostName = drop.host_name || null;
      // Use the delivery date as the human "[date]"; fall back to generic phrasing.
      const dateText = formatDateLong(drop.delivery_start) || formatDateLong(drop.delivery_end);

      const hostFragment = hostName ? ` at ${hostName}` : "";
      const dateFragment = dateText ? ` on ${dateText}` : "";

      const headsUpMessage =
        `Just so you know — we've got a Hearth food drop${hostFragment}${dateFragment}. ` +
        `It's pre-order only and places are limited, so worth keeping an eye out. ` +
        `I'll post the order link here as soon as ordering opens.`;

      const linkText = orderLink || "[order link]";
      const shareLinkMessage =
        `Ordering's now open for the food drop${hostFragment} — ${linkText}. ` +
        `Places are limited and it's pre-order only, so get yours in when you can.`;

      const linkRow = orderLink
        ? `
          <div class="hvLinkRow">
            <span class="hvLinkBox" id="hvOrderLinkText">${escapeHtml(orderLink)}</span>
            <button type="button" class="hvActionBtn ghost" id="hvCopyLinkBtn">Copy link</button>
          </div>
          <div class="hvQrWrap"><div class="hvQr" id="hvQr"></div></div>
        `
        : `<p class="hvStepGuide">The order link will appear here once this drop has a link name set.</p>`;

      // "When to send" guidance, derived from the ordering-open date (opens_at).
      const timings = computeStepTimings(drop);

      return `
        <div class="hvCommunity">
          <div class="hvCommunityHead">
            <h2 class="hvCommunityTitle">Share with your community</h2>
            <p class="hvCommunityIntro">A drop fills best when the people who'll love it hear about it from you. Here are two simple things that help — share them in your own words, through your own channels. Both are optional.</p>
          </div>

          <div class="hvDivider"></div>

          <div class="hvStep">
            <p class="hvStepTitle">1 · Give your community a heads-up</p>
            <p class="hvStepWhen">${escapeHtml(timings.step1)}</p>
            <p class="hvStepGuide">Give people a heads-up — post it wherever you'd normally reach them.</p>
            <textarea class="hvTextarea" id="hvHeadsUpMessage">${escapeHtml(headsUpMessage)}</textarea>
            <div class="hvBtnRow">
              <button type="button" class="hvActionBtn" data-copy-target="hvHeadsUpMessage">Copy message</button>
            </div>
          </div>

          <div class="hvDivider"></div>

          <div class="hvStep">
            <p class="hvStepTitle">2 · Share the order link</p>
            <p class="hvStepWhen">${escapeHtml(timings.step2)}</p>
            <p class="hvStepGuide">Share the link so people can order.</p>
            <textarea class="hvTextarea" id="hvShareLinkMessage">${escapeHtml(shareLinkMessage)}</textarea>
            <div class="hvBtnRow">
              <button type="button" class="hvActionBtn" data-copy-target="hvShareLinkMessage">Copy message</button>
            </div>
            ${linkRow}
          </div>
        </div>
      `;
    }

    // Derive gentle "when to send" lines.
    // Step 1 anchors on the ordering-open date if scheduled, else the
    // delivery date; the heads-up lands ~2 days ahead (or "as soon as you
    // can" once that day is here/past). Step 2 reflects whether ordering
    // has a scheduled opening, is already open (reusing computeDropState's
    // "null opens_at = open from creation" logic), or neither.
    function computeStepTimings(drop){
      // Step 1 — heads-up, two days ahead of the anchor.
      const anchorRaw = drop.opens_at != null ? drop.opens_at : drop.delivery_start;
      const anchorMs = anchorRaw != null ? new Date(anchorRaw).getTime() : NaN;

      let step1;
      if (isNaN(anchorMs)){
        step1 = "A few days ahead";
      } else {
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);

        const minusTwo = new Date(anchorMs);
        minusTwo.setDate(minusTwo.getDate() - 2);
        minusTwo.setHours(0, 0, 0, 0);

        if (minusTwo.getTime() <= todayStart.getTime()){
          step1 = "Get the word out as soon as you can";
        } else {
          const minusTwoLong = formatDateLong(minusTwo.toISOString());
          step1 = minusTwoLong ? `A few days ahead — around ${minusTwoLong}` : "A few days ahead";
        }
      }

      // Step 2 — when ordering opens.
      let step2;
      const openDate = formatDateLong(drop.opens_at);
      if (drop.opens_at != null && openDate){
        step2 = `Send when ordering opens — ${openDate}`;
      } else if (computeDropState(drop) === "live"){
        step2 = "Ordering is open now";
      } else {
        step2 = "Send when ordering opens";
      }

      return { step1, step2 };
    }

    async function copyTextToClipboard(text){
      if (navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "absolute";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    function flashCopied(btn){
      if (!btn) return;
      const original = btn.textContent;
      btn.textContent = "Copied ✓";
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = original;
        btn.disabled = false;
      }, 2000);
    }

    function wireCommunitySection(orderLink){
      // Copy-message buttons (read live textarea contents).
      document.querySelectorAll("[data-copy-target]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const target = document.getElementById(btn.dataset.copyTarget);
          if (!target) return;
          try {
            await copyTextToClipboard(target.value);
            flashCopied(btn);
          } catch (err){
            console.error("copy failed", err);
          }
        });
      });

      // Copy the order link.
      const copyLinkBtn = document.getElementById("hvCopyLinkBtn");
      if (copyLinkBtn && orderLink){
        copyLinkBtn.addEventListener("click", async () => {
          try {
            await copyTextToClipboard(orderLink);
            flashCopied(copyLinkBtn);
          } catch (err){
            console.error("copy failed", err);
          }
        });
      }

      // QR code of the order link.
      const qrEl = document.getElementById("hvQr");
      if (qrEl && orderLink && window.QRCode){
        qrEl.innerHTML = "";
        new QRCode(qrEl, {
          text: orderLink,
          width: 160,
          height: 160,
          correctLevel: QRCode.CorrectLevel.M,
        });
      }
    }

    function renderDrop(drop){
      const page = document.getElementById("hvPage");
      const orderLink = buildOrderLink();

      const dropName = stripWindowSuffix(drop.drop_name || drop.name) || "This drop";
      const hostName = drop.host_name || null;
      const windowText = formatDropWindow(drop.delivery_start, drop.delivery_end);

      const dropState = computeDropState(drop);
      const isPreOpen = dropState === "pre-open";
      const isClosed = dropState === "closed";

      const orderCount = isPreOpen ? 0 : Number(drop.order_count || 0);
      const capacityTotal = Number(drop.capacity_units_total || 0);
      const capacityUsed = isPreOpen ? 0 : Number(drop.capacity_units_used || 0);
      const pct = capacityTotal > 0
        ? Math.min(100, Math.round((capacityUsed / capacityTotal) * 100))
        : 0;

      const hostShareEnabled = drop.host_share_enabled === true;
      const hostSharePence = Number(drop.host_share_total_pence || 0);
      const hostShareDescriptor = drop.host_share_descriptor || null;
      const fundraisingEnabled = drop.fundraising_enabled === true;
      const fundraisingPence = Number(drop.fundraising_total_pence || 0);
      const fundraisingText = drop.fundraising_display_text || null;

      let noteHTML = "";
      if (isPreOpen){
        noteHTML = `
          <div class="hvNote">
            Ordering opens ${escapeHtml(formatOpensAtLong(drop.opens_at))}.
          </div>
        `;
      } else if (isClosed){
        noteHTML = `
          <div class="hvNote closed">
            This drop has closed. Here are the final figures.
          </div>
        `;
      }

      const hostLine = hostName
        ? `You're hosting this drop at <strong>${escapeHtml(hostName)}</strong>.`
        : `You're hosting this drop.`;

      page.innerHTML = `
        <div class="hvHeader">
          <p class="hvEyebrow">A Hearth drop</p>
          <h1 class="hvDropName">${escapeHtml(dropName)}</h1>
          <p class="hvHostSub">${hostLine}</p>
          ${windowText ? `<p class="hvTiming">${escapeHtml(windowText)}</p>` : ""}
        </div>

        ${noteHTML}

        <div class="hvLayout">
          ${buildCommunitySection(drop, orderLink)}

          <div class="hvLayoutAside">
            <div class="hvCard">
              <div class="hvStatRow">
                <p class="hvStatLabel">Orders placed</p>
                <p class="hvStatValue" id="hvOrderCount">${orderCount}</p>
              </div>

              <div class="hvDivider"></div>

              <div class="hvCapacity">
                <div class="hvCapacityHead">
                  <p class="hvCapacityLabel">Capacity filled</p>
                  <span class="hvCapacityPct" id="hvCapacityPct">${pct}%</span>
                </div>
                <div class="hvCapacityTrack">
                  <div class="hvCapacityFill" id="hvCapacityFill" style="width:${pct}%"></div>
                </div>
                <p class="hvCapacityMeta" id="hvCapacityMeta">
                  ${capacityUsed} of ${capacityTotal} units taken
                </p>
              </div>
            </div>

            ${hostShareEnabled ? `
            <div class="hvShareCard">
              <p class="hvShareLabel">Your share</p>
              <p class="hvShareValue" id="hvShareValue">${formatMoneyPence(hostSharePence)}</p>
              ${hostShareDescriptor ? `<p class="hvShareHint">${escapeHtml(hostShareDescriptor)}</p>` : ""}
            </div>
            ` : ""}

            ${fundraisingEnabled ? `
            <div class="hvShareCard">
              <p class="hvShareLabel">Fundraising</p>
              <p class="hvShareValue" id="hvFundraisingValue">${formatMoneyPence(fundraisingPence)}</p>
              ${fundraisingText ? `<p class="hvShareHint">${escapeHtml(fundraisingText)}</p>` : ""}
            </div>
            ` : ""}
          </div>
        </div>

        <div class="hvFooter">
          <button type="button" id="hvRefreshBtn" class="hvRefreshLink">Refresh</button>
          <p class="hvFooterCredit">Powered by Hearth</p>
        </div>
      `;

      const refreshBtn = document.getElementById("hvRefreshBtn");
      if (refreshBtn){
        refreshBtn.addEventListener("click", refreshLiveValues);
      }

      wireCommunitySection(orderLink);
    }

    function updateLiveValues(summary){
      const drop = summary || state.drop;
      if (!drop) return;

      const dropState = computeDropState(drop);
      const isPreOpen = dropState === "pre-open";

      const orderCount = isPreOpen ? 0 : Number(drop.order_count || 0);
      const capacityTotal = Number(drop.capacity_units_total || 0);
      const capacityUsed = isPreOpen ? 0 : Number(drop.capacity_units_used || 0);
      const pct = capacityTotal > 0
        ? Math.min(100, Math.round((capacityUsed / capacityTotal) * 100))
        : 0;

      const orderEl = document.getElementById("hvOrderCount");
      if (orderEl) orderEl.textContent = String(orderCount);

      const pctEl = document.getElementById("hvCapacityPct");
      if (pctEl) pctEl.textContent = `${pct}%`;

      const fillEl = document.getElementById("hvCapacityFill");
      if (fillEl) fillEl.style.width = `${pct}%`;

      const metaEl = document.getElementById("hvCapacityMeta");
      if (metaEl) metaEl.textContent = `${capacityUsed} of ${capacityTotal} units taken`;

      const shareEl = document.getElementById("hvShareValue");
      if (shareEl && drop.host_share_enabled === true){
        shareEl.textContent = formatMoneyPence(drop.host_share_total_pence || 0);
      }
      const fundraisingEl = document.getElementById("hvFundraisingValue");
      if (fundraisingEl && drop.fundraising_enabled === true){
        fundraisingEl.textContent = formatMoneyPence(drop.fundraising_total_pence || 0);
      }
    }

    async function refreshLiveValues(){
      if (!state.dropId) return;
      if (state.refreshInFlight) return;
      state.refreshInFlight = true;
      const btn = document.getElementById("hvRefreshBtn");
      if (btn) btn.disabled = true;
      try {
        const summary = await fetchHostSummary();
        if (summary){
          state.drop = summary;
          updateLiveValues(summary);
        }
      } finally {
        state.refreshInFlight = false;
        if (btn) btn.disabled = false;
      }
    }

    function renderEmpty(title, sub){
      document.getElementById("hvPage").innerHTML = `
        <div class="hvState">
          <div class="hvStateIcon">🔍</div>
          <h2 class="hvStateTitle">${escapeHtml(title)}</h2>
          <p class="hvStateSub">${escapeHtml(sub)}</p>
        </div>
      `;
    }

    loadDrop();
  </script>
</body>
</html>
