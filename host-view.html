<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Hearth — Host View</title>

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --hv-brand-primary: var(--h-fire, #c4511a);
      --hv-brand-secondary: var(--h-accent-2, #CBB89D);
      --hv-brand-soft: rgba(139,107,63,0.10);
      --hv-brand-soft-2: rgba(203,184,157,0.08);
    }

    body{
      font-family: 'Figtree', system-ui, sans-serif;
    }

    h1, h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    body.hvBody{
      background:
        radial-gradient(1200px 600px at 15% -10%, var(--hv-brand-soft), rgba(196,81,26,0) 60%),
        radial-gradient(900px 450px at 90% 0%, var(--hv-brand-soft-2), rgba(251,146,60,0) 55%),
        #f7f5f1;
      min-height:100vh;
    }

    .hvPage{
      max-width:1040px;
      margin:0 auto;
      padding:48px 20px 64px;
      display:grid;
      gap:20px;
    }

    /* Two-region layout: activation (left) | order insight (right, sticky) */
    .hvLayout{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 340px;
      gap:20px;
      align-items:start;
    }

    .hvLayoutAside{
      position:sticky;
      top:24px;
      display:grid;
      gap:16px;
      min-width:0;
    }

    /* Header / drop identity */
    .hvHeader{
      display:grid;
      gap:8px;
      padding:4px 4px 4px;
    }

    .hvEyebrow{
      font-size:11px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#8b6b3f;
      margin:0 0 2px;
    }

    .hvDropName{
      font-size:34px;
      font-weight:950;
      letter-spacing:-0.035em;
      line-height:1.08;
      color:#1f2937;
      margin:0;
    }

    .hvHostSub{
      font-size:16px;
      font-weight:700;
      color:#4b5563;
      margin:2px 0 0;
      line-height:1.45;
    }

    .hvHostSub strong{
      color:#1f2937;
      font-weight:900;
    }

    .hvTiming{
      font-size:14px;
      font-weight:700;
      color:#6b7280;
      margin:2px 0 0;
    }

    /* Status note banner */
    .hvNote{
      background:rgba(139,107,63,0.08);
      border:1px solid rgba(139,107,63,0.18);
      border-radius:14px;
      padding:12px 16px;
      font-size:13px;
      font-weight:700;
      color:#6b4c1f;
      line-height:1.5;
    }

    .hvNote.closed{
      background:rgba(15,23,42,0.04);
      border-color:rgba(15,23,42,0.12);
      color:#374151;
    }

    /* Primary live card */
    .hvCard{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:24px 22px;
      display:grid;
      gap:18px;
    }

    .hvStatRow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:14px;
    }

    .hvStatLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .hvStatValue{
      font-size:30px;
      font-weight:950;
      letter-spacing:-0.03em;
      color:#1f2937;
      margin:0;
      line-height:1;
    }

    .hvStatValue.secondary{
      font-size:22px;
    }

    /* Capacity bar */
    .hvCapacity{
      display:grid;
      gap:10px;
    }

    .hvCapacityHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .hvCapacityLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .hvCapacityPct{
      font-size:14px;
      font-weight:900;
      color:#1f2937;
      letter-spacing:-0.01em;
    }

    .hvCapacityTrack{
      position:relative;
      width:100%;
      height:10px;
      background:rgba(15,23,42,0.07);
      border-radius:999px;
      overflow:hidden;
    }

    .hvCapacityFill{
      position:absolute;
      inset:0 auto 0 0;
      width:0%;
      background:linear-gradient(90deg, var(--hv-brand-primary), var(--hv-brand-secondary));
      border-radius:999px;
      transition:width .45s ease;
    }

    .hvCapacityMeta{
      font-size:12px;
      font-weight:700;
      color:#6b7280;
      margin:0;
    }

    /* Divider */
    .hvDivider{
      height:1px;
      background:rgba(15,23,42,0.06);
      margin:0;
    }

    /* Revenue share card */
    .hvShareCard{
      background:linear-gradient(135deg, var(--hv-brand-primary), var(--hv-brand-secondary));
      border-radius:22px;
      padding:24px 22px;
      color:#fff;
      display:grid;
      gap:6px;
    }

    .hvShareLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.1em;
      opacity:.82;
      margin:0;
    }

    .hvShareValue{
      font-size:38px;
      font-weight:950;
      letter-spacing:-0.04em;
      line-height:1;
      margin:0;
    }

    .hvShareHint{
      font-size:12px;
      font-weight:700;
      opacity:.78;
      margin:2px 0 0;
      line-height:1.4;
    }

    /* Share with your community */
    .hvCommunity{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:24px 22px;
      display:grid;
      gap:18px;
    }

    .hvCommunityHead{
      display:grid;
      gap:8px;
    }

    .hvCommunityTitle{
      font-family:'Cormorant Garamond', Georgia, serif;
      font-weight:500;
      font-size:26px;
      letter-spacing:-0.01em;
      line-height:1.12;
      color:#1f2937;
      margin:0;
    }

    .hvCommunityIntro{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    .hvStep{
      display:grid;
      gap:10px;
    }

    .hvStepTitle{
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.01em;
      color:#1f2937;
      margin:0;
    }

    .hvStepGuide{
      font-size:13px;
      font-weight:600;
      color:#6b7280;
      line-height:1.5;
      margin:0;
    }

    /* Subtle "when to send" line under each step heading */
    .hvStepWhen{
      font-size:12px;
      font-weight:700;
      color:#8b6b3f;
      letter-spacing:.01em;
      margin:-2px 0 2px;
    }

    /* Collapsible step disclosure — the title row is the toggle */
    .hvStepToggle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      width:100%;
      background:none;
      border:none;
      padding:0;
      margin:0;
      cursor:pointer;
      text-align:left;
      font-family:inherit;
      color:inherit;
    }

    .hvStepChevron{
      flex-shrink:0;
      font-size:20px;
      line-height:1;
      color:#8b6b3f;
      transform:rotate(0deg);
      transition:transform .18s ease;
    }

    .hvStepToggle[aria-expanded="true"] .hvStepChevron{
      transform:rotate(90deg);
    }

    .hvStepBody{
      display:grid;
      gap:10px;
    }

    .hvStepBody.hvStepBody--collapsed{
      display:none;
    }

    /* Channel selector — subtle segmented control */
    .hvChannelBar{
      justify-self:start;
      display:inline-flex;
      gap:4px;
      padding:4px;
      background:rgba(139,107,63,0.08);
      border:1px solid rgba(139,107,63,0.16);
      border-radius:999px;
    }

    .hvChannelPill{
      font-family:'Figtree', system-ui, sans-serif;
      font-size:12px;
      font-weight:800;
      letter-spacing:-0.01em;
      color:#6b7280;
      background:none;
      border:none;
      border-radius:999px;
      padding:6px 14px;
      cursor:pointer;
      transition:background .2s ease, color .2s ease;
    }

    .hvChannelPill:hover{
      color:#1f2937;
    }

    .hvChannelPill.active{
      background:#fff;
      color:#6b4c1f;
      box-shadow:0 1px 3px rgba(15,23,42,0.08);
    }

    .hvTextarea{
      width:100%;
      box-sizing:border-box;
      font-family:'Figtree', system-ui, sans-serif;
      font-size:14px;
      font-weight:500;
      line-height:1.55;
      color:#1f2937;
      background:#fcfbf9;
      border:1px solid #e9e3d8;
      border-radius:14px;
      padding:12px 14px;
      min-height:120px;
      resize:vertical;
    }

    .hvTextarea:focus{
      outline:none;
      border-color:var(--hv-brand-secondary);
      box-shadow:0 0 0 3px var(--hv-brand-soft);
    }

    .hvLinkRow{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .hvLinkBox{
      flex:1 1 auto;
      min-width:0;
      font-size:13px;
      font-weight:700;
      color:#6b4c1f;
      background:rgba(139,107,63,0.08);
      border:1px solid rgba(139,107,63,0.18);
      border-radius:12px;
      padding:10px 14px;
      word-break:break-all;
    }

    .hvActionBtn{
      font-family:'Figtree', system-ui, sans-serif;
      font-size:13px;
      font-weight:800;
      letter-spacing:-0.01em;
      color:#fff;
      background:var(--hv-brand-primary);
      border:none;
      border-radius:999px;
      padding:10px 18px;
      cursor:pointer;
      transition:opacity .2s ease;
    }

    .hvActionBtn:hover{
      opacity:0.9;
    }

    .hvActionBtn:disabled{
      opacity:0.6;
      cursor:default;
    }

    .hvActionBtn.ghost{
      color:#6b4c1f;
      background:none;
      border:1px solid rgba(139,107,63,0.32);
      flex:0 0 auto;
    }

    .hvBtnRow{
      display:flex;
    }

    /* "Print a poster" — always-available outbound asset, shares from Step 2 */
    .hvPoster{
      display:grid;
      gap:10px;
    }

    .hvPoster .hvActionBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    /* Footer */
    .hvFooter{
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#9ca3af;
      padding-top:10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }

    .hvFooterCredit{
      margin:0;
    }

    .hvRefreshLink{
      background:none;
      border:none;
      color:#6b7280;
      font:inherit;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      padding:4px 10px;
      text-decoration:underline;
    }

    .hvRefreshLink:disabled{
      opacity:0.5;
      cursor:not-allowed;
    }

    /* States */
    .hvState{
      text-align:center;
      padding:72px 24px;
      display:grid;
      gap:14px;
      justify-items:center;
    }

    .hvStateIcon{
      font-size:38px;
    }

    .hvStateTitle{
      font-size:22px;
      font-weight:950;
      letter-spacing:-0.03em;
      color:#1f2937;
      margin:0;
    }

    .hvStateSub{
      font-size:14px;
      font-weight:600;
      color:#6b7280;
      max-width:38ch;
      line-height:1.5;
      margin:0;
    }

    @media (max-width:600px){
      .hvPage{
        padding:28px 14px 64px;
        gap:16px;
      }
      .hvDropName{
        font-size:28px;
      }
      .hvShareValue{
        font-size:32px;
      }
      .hvStatValue{
        font-size:26px;
      }
      .hvLayout{
        grid-template-columns:1fr;
      }
      .hvLayoutAside{
        position:static;
        top:auto;
      }
    }
  </style>
</head>
<body class="hvBody">

  <div class="hvPage" id="hvPage">
    <div class="hvState" id="loadingState">
      <div class="hvStateIcon">⏳</div>
      <h2 class="hvStateTitle">Loading your drop…</h2>
    </div>
  </div>

  <script>
    const state = {
      dropSlug: null,
      token: null,
      dropId: null,
      drop: null,
      refreshInFlight: false,
    };

    let _sb;

    // Per-step channel message drafts. Each step holds an active channel and
    // its own draft per channel, so edits survive switching channels and back.
    // Shape: { step1: { active, drafts: {whatsapp, social, email} }, step2: {...} }
    let communityState = null;

    function getQueryParam(name){
      return new URLSearchParams(window.location.search).get(name);
    }

    function stripWindowSuffix(name) {
      return String(name || "").replace(/\s*[\u2014-]\s*Window\s*\d+\s*$/i, "").trim();
    }

    function escapeHtml(str){
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatMoneyPence(pence){
      const n = Number(pence || 0);
      return "£" + (n / 100).toFixed(2);
    }

    function formatDateLong(value){
      if (!value) return null;
      const d = new Date(value);
      if (isNaN(d.getTime())) return null;
      return d.toLocaleDateString("en-GB", {
        weekday: "long",
        day: "numeric",
        month: "long",
      });
    }

    function formatTime(value){
      if (!value) return null;
      const d = new Date(value);
      if (isNaN(d.getTime())) return null;
      return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
    }

    function formatDropWindow(startISO, endISO){
      const startDate = formatDateLong(startISO) || formatDateLong(endISO);
      const startTime = formatTime(startISO);
      const endTime = formatTime(endISO);
      if (!startDate) return "";
      if (startTime && endTime) return `${startDate}, ${startTime}–${endTime}`;
      if (startTime) return `${startDate}, from ${startTime}`;
      if (endTime) return `${startDate}, until ${endTime}`;
      return startDate;
    }

    function formatOpensAtLong(value){
      if (!value) return "soon";
      const date = formatDateLong(value);
      const time = formatTime(value);
      if (date && time) return `${date} at ${time}`;
      if (date) return date;
      return "soon";
    }

    async function loadDrop(){
      state.dropSlug = getQueryParam("drop");
      state.token = getQueryParam("t");

      if (!state.dropSlug || !state.token){
        renderEmpty(
          "This link is invalid or has expired.",
          "Please ask your vendor for a fresh host link."
        );
        return;
      }

      try {
        _sb = window.supabase.createClient(
          window.HEARTH_CONFIG.SUPABASE_URL,
          window.HEARTH_CONFIG.SUPABASE_ANON_KEY
        );
      } catch (initErr){
        renderEmpty(
          "Couldn't connect to the platform.",
          "Please try refreshing the page."
        );
        return;
      }

      const summary = await fetchHostSummary();
      if (!summary){
        renderEmpty(
          "This link is invalid or has expired.",
          "Please ask your vendor for a fresh host link."
        );
        return;
      }

      state.dropId = summary.drop_id;
      state.drop = summary;
      renderDrop(summary);
    }

    async function fetchHostSummary(){
      try {
        const { data, error } = await _sb.functions.invoke(
          "host-view-summary",
          { body: { slug: state.dropSlug, token: state.token } }
        );
        if (error) return null;
        if (data?.error) return null;
        if (!data || !data.drop_id) return null;
        return data;
      } catch (err){
        console.error("host-view-summary invoke failed", err);
        return null;
      }
    }

    function computeDropState(drop){
      const status = String(drop.status || "").toLowerCase();
      if (status === "closed") return "closed";

      const now = Date.now();

      // Treat opens_at === null as already open — a drop with no scheduled
      // open time is live from creation. Only flag pre-open when opens_at
      // is non-null AND resolves to a future moment.
      if (drop.opens_at != null){
        const opensAt = new Date(drop.opens_at).getTime();
        if (!isNaN(opensAt) && now < opensAt) return "pre-open";
      }

      if (drop.closes_at != null){
        const closesAt = new Date(drop.closes_at).getTime();
        if (!isNaN(closesAt) && now > closesAt) return "closed";
      }

      return "live";
    }

    function buildOrderLink(){
      const slug = state.dropSlug || "";
      if (!slug) return "";
      // Mirrors drop-manager.html getShareUrl(): origin + /order.html?drop=<slug>
      return `${window.location.origin}/order.html?drop=${encodeURIComponent(slug)}`;
    }

    // Channel starter templates. Tokens [vendor], [host], [date], [link] are
    // filled by fillTemplate() below. Email starters lead with a "Subject:"
    // line. Outbound copy goes to the host's community, who don't know
    // "Hearth" or "a drop" — so it names neither. When the vendor name is
    // available it leads with the maker (*_VENDOR variants); otherwise it
    // describes the moment in plain terms (the generic variants). (See
    // CLAUDE.md brand/tone rules.)
    const STEP1_TEMPLATES = {
      whatsapp:
        "Just so you know — we've got food coming to [host] on [date]. It's pre-order only and places are limited, so worth keeping an eye out. I'll share the order link here as soon as ordering opens.",
      social:
        "We've got food coming to [host] on [date]. Pre-order only, places limited — ordering opens soon. We'll share the link when it's live.",
      email:
        "Subject: Food coming to [host] — [date]\n\nHello,\n\nWe've got food coming to [host] on [date]. It's pre-order only and places are limited.\n\nOrdering opens soon — we'll send the link as soon as it's live.\n\nSee you there.",
    };

    const STEP1_TEMPLATES_VENDOR = {
      whatsapp:
        "Just so you know — [vendor] is coming to [host] on [date]. It's pre-order only and places are limited, so worth keeping an eye out. I'll share the order link here as soon as ordering opens.",
      social:
        "[vendor] is coming to [host] on [date]. Pre-order only, places limited — ordering opens soon. We'll share the link when it's live.",
      email:
        "Subject: [vendor] is coming to [host] — [date]\n\nHello,\n\n[vendor] is coming to [host] on [date]. It's pre-order only and places are limited.\n\nOrdering opens soon — we'll send the link as soon as it's live.\n\nSee you there.",
    };

    const STEP2_TEMPLATES = {
      whatsapp:
        "Ordering's now open — food at [host] on [date]. [link] Pre-order only and places are limited, so get yours in when you can.",
      social:
        "Ordering is now open — food at [host]. Pre-order only and places are limited — order here: [link]",
      email:
        "Subject: Ordering's open — food at [host]\n\nHello,\n\nOrdering is now open — food at [host] on [date]. Places are limited and it's pre-order only.\n\nOrder here: [link]\n\nSee you there.",
    };

    const STEP2_TEMPLATES_VENDOR = {
      whatsapp:
        "Ordering's now open — [vendor] at [host] on [date]. [link] Pre-order only and places are limited, so get yours in when you can.",
      social:
        "Ordering is now open — [vendor] at [host]. Pre-order only and places are limited — order here: [link]",
      email:
        "Subject: Ordering's open — [vendor] at [host]\n\nHello,\n\nOrdering is now open — [vendor] at [host] on [date]. Places are limited and it's pre-order only.\n\nOrder here: [link]\n\nSee you there.",
    };

    const CHANNELS = [
      { key: "whatsapp", label: "WhatsApp" },
      { key: "social", label: "Social" },
      { key: "email", label: "Email" },
    ];

    function textareaIdFor(step){
      return step === "step1" ? "hvMsgStep1" : "hvMsgStep2";
    }

    function buildCommunitySection(drop, orderLink){
      const hostName = drop.host_name || null;
      // Vendor (the maker). When present we lead the outbound copy with it.
      const vendorName = (drop.vendor_name && String(drop.vendor_name).trim())
        ? String(drop.vendor_name).trim()
        : null;
      // Use the delivery date as the human "[date]"; fall back to generic phrasing.
      const dateText = formatDateLong(drop.delivery_start) || formatDateLong(drop.delivery_end);

      // Fill rule, reusing the page's existing host/date/link values. Missing
      // values degrade to calm generic phrasing rather than leaving brackets.
      const host = hostName || "our community";
      const linkText = orderLink || "[order link]";
      const onDate = dateText ? `on ${dateText}` : "soon";
      const dashDate = dateText ? dateText : "soon";
      const fillTemplate = (s) =>
        s
          .split("[vendor]").join(vendorName || "")
          .split("[host]").join(host)
          .split("on [date]").join(onDate)
          .split("— [date]").join(`— ${dashDate}`)
          .split("[date]").join(dashDate)
          .split("[link]").join(linkText);

      const fillAll = (templates) => ({
        whatsapp: fillTemplate(templates.whatsapp),
        social: fillTemplate(templates.social),
        email: fillTemplate(templates.email),
      });

      // Lead with the vendor when we have a name; otherwise the generic
      // describe-the-moment templates.
      const step1Templates = vendorName ? STEP1_TEMPLATES_VENDOR : STEP1_TEMPLATES;
      const step2Templates = vendorName ? STEP2_TEMPLATES_VENDOR : STEP2_TEMPLATES;

      // Seed the per-step channel drafts (default channel: WhatsApp).
      communityState = {
        step1: { active: "whatsapp", drafts: fillAll(step1Templates) },
        step2: { active: "whatsapp", drafts: fillAll(step2Templates) },
      };

      const channelBar = (step) => `
        <div class="hvChannelBar" data-step="${step}">
          ${CHANNELS.map((c, i) => `
            <button type="button" class="hvChannelPill${i === 0 ? " active" : ""}" data-step="${step}" data-channel="${c.key}">${c.label}</button>
          `).join("")}
        </div>
      `;

      const linkRow = orderLink
        ? `
          <div class="hvLinkRow">
            <span class="hvLinkBox" id="hvOrderLinkText">${escapeHtml(orderLink)}</span>
            <button type="button" class="hvActionBtn ghost" id="hvCopyLinkBtn">Copy link</button>
          </div>
        `
        : `<p class="hvStepGuide">The order link will appear here once this drop has a link name set.</p>`;

      // "When to send" guidance, derived from the ordering-open date (opens_at).
      const timings = computeStepTimings(drop);

      // Auto-expand the step that matches the drop's current state; collapse
      // the other (the host can still open it). Closed → both collapsed.
      // Manual toggles override this initial state (see wireCommunitySection).
      const dropState = computeDropState(drop);
      const step1Open = dropState === "pre-open";
      const step2Open = dropState === "live";

      // Printable poster — an always-available asset. Passes the same slug +
      // token this page already holds; the poster's QR encodes the public
      // order URL only (never the token). New tab, rel=noopener.
      const posterUrl = (state.dropSlug && state.token)
        ? `${window.location.origin}/host-poster.html?drop=${encodeURIComponent(state.dropSlug)}&t=${encodeURIComponent(state.token)}`
        : null;

      return `
        <div class="hvCommunity">
          <div class="hvCommunityHead">
            <h2 class="hvCommunityTitle">Share with your community</h2>
            <p class="hvCommunityIntro">A drop fills best when the people who'll love it hear about it from you. Here are two simple things that help — share them in your own words, through your own channels. Both are optional.</p>
          </div>

          <div class="hvDivider"></div>

          <div class="hvStep">
            <button type="button" class="hvStepToggle" data-step-toggle="step1" aria-expanded="${step1Open}" aria-controls="hvStepBody-step1">
              <span class="hvStepTitle">1 · Give your community a heads-up</span>
              <span class="hvStepChevron" aria-hidden="true">›</span>
            </button>
            <div class="hvStepBody${step1Open ? "" : " hvStepBody--collapsed"}" id="hvStepBody-step1">
              <p class="hvStepWhen">${escapeHtml(timings.step1)}</p>
              <p class="hvStepGuide">Give people a heads-up — post it wherever you'd normally reach them.</p>
              ${channelBar("step1")}
              <textarea class="hvTextarea" id="hvMsgStep1">${escapeHtml(communityState.step1.drafts.whatsapp)}</textarea>
              <div class="hvBtnRow">
                <button type="button" class="hvActionBtn" data-copy-target="hvMsgStep1">Copy message</button>
              </div>
            </div>
          </div>

          <div class="hvDivider"></div>

          <div class="hvStep">
            <button type="button" class="hvStepToggle" data-step-toggle="step2" aria-expanded="${step2Open}" aria-controls="hvStepBody-step2">
              <span class="hvStepTitle">2 · Share the order link</span>
              <span class="hvStepChevron" aria-hidden="true">›</span>
            </button>
            <div class="hvStepBody${step2Open ? "" : " hvStepBody--collapsed"}" id="hvStepBody-step2">
              <p class="hvStepWhen">${escapeHtml(timings.step2)}</p>
              <p class="hvStepGuide">Share the link so people can order.</p>
              ${channelBar("step2")}
              <textarea class="hvTextarea" id="hvMsgStep2">${escapeHtml(communityState.step2.drafts.whatsapp)}</textarea>
              <div class="hvBtnRow">
                <button type="button" class="hvActionBtn" data-copy-target="hvMsgStep2">Copy message</button>
              </div>
              ${linkRow}
              ${posterUrl ? `
              <div class="hvPoster">
                <p class="hvStepTitle">Print a poster</p>
                <p class="hvStepGuide">Put it up where people will see it — a noticeboard, counter, or window.</p>
                <div class="hvBtnRow">
                  <a class="hvActionBtn ghost" href="${escapeHtml(posterUrl)}" target="_blank" rel="noopener">Open poster</a>
                </div>
              </div>
              ` : ""}
            </div>
          </div>
        </div>
      `;
    }

    // Derive gentle "when to send" lines.
    // Step 1 anchors on the ordering-open date if scheduled, else the
    // delivery date; the heads-up lands ~2 days ahead (or "as soon as you
    // can" once that day is here/past). Step 2 reflects whether ordering
    // has a scheduled opening, is already open (reusing computeDropState's
    // "null opens_at = open from creation" logic), or neither.
    function computeStepTimings(drop){
      // Step 1 — heads-up, two days ahead of the anchor.
      const anchorRaw = drop.opens_at != null ? drop.opens_at : drop.delivery_start;
      const anchorMs = anchorRaw != null ? new Date(anchorRaw).getTime() : NaN;

      let step1;
      if (isNaN(anchorMs)){
        step1 = "A few days ahead";
      } else {
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);

        const minusTwo = new Date(anchorMs);
        minusTwo.setDate(minusTwo.getDate() - 2);
        minusTwo.setHours(0, 0, 0, 0);

        if (minusTwo.getTime() <= todayStart.getTime()){
          step1 = "Get the word out as soon as you can";
        } else {
          const minusTwoLong = formatDateLong(minusTwo.toISOString());
          step1 = minusTwoLong ? `A few days ahead — around ${minusTwoLong}` : "A few days ahead";
        }
      }

      // Step 2 — reflect the drop's ACTUAL state via computeDropState
      // (the same logic behind the pre-open banner), not just whether
      // opens_at is set.
      let step2;
      const dropState = computeDropState(drop);
      if (dropState === "pre-open"){
        const openDate = formatDateLong(drop.opens_at);
        step2 = openDate ? `Send when ordering opens — ${openDate}` : "Send when ordering opens";
      } else if (dropState === "closed"){
        step2 = "Ordering has closed";
      } else {
        step2 = "Ordering is open now";
      }

      return { step1, step2 };
    }

    async function copyTextToClipboard(text){
      if (navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "absolute";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    function flashCopied(btn){
      if (!btn) return;
      const original = btn.textContent;
      btn.textContent = "Copied ✓";
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = original;
        btn.disabled = false;
      }, 2000);
    }

    function wireCommunitySection(orderLink){
      // Collapsible step disclosures — the title row toggles its body.
      // Native <button> gives keyboard operability for free; aria-expanded
      // and the chevron reflect state. A manual toggle overrides the
      // auto-expanded initial state set in buildCommunitySection.
      document.querySelectorAll(".hvStepToggle").forEach((toggle) => {
        toggle.addEventListener("click", () => {
          const next = toggle.getAttribute("aria-expanded") !== "true";
          toggle.setAttribute("aria-expanded", String(next));
          const bodyId = toggle.getAttribute("aria-controls");
          const body = bodyId ? document.getElementById(bodyId) : null;
          if (body) body.classList.toggle("hvStepBody--collapsed", !next);
        });
      });

      // Channel selectors — preserve the current channel's edit on switch.
      document.querySelectorAll(".hvChannelBar").forEach((bar) => {
        const step = bar.dataset.step;
        bar.querySelectorAll(".hvChannelPill").forEach((pill) => {
          pill.addEventListener("click", () => {
            const channel = pill.dataset.channel;
            const st = communityState && communityState[step];
            if (!st || channel === st.active) return;
            const ta = document.getElementById(textareaIdFor(step));
            if (!ta) return;
            // Save the current channel's live edit, then load the new one.
            st.drafts[st.active] = ta.value;
            st.active = channel;
            ta.value = st.drafts[channel];
            bar.querySelectorAll(".hvChannelPill").forEach((p) => {
              p.classList.toggle("active", p.dataset.channel === channel);
            });
          });
        });
      });

      // Copy-message buttons (read live textarea contents).
      document.querySelectorAll("[data-copy-target]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const target = document.getElementById(btn.dataset.copyTarget);
          if (!target) return;
          try {
            await copyTextToClipboard(target.value);
            flashCopied(btn);
          } catch (err){
            console.error("copy failed", err);
          }
        });
      });

      // Copy the order link.
      const copyLinkBtn = document.getElementById("hvCopyLinkBtn");
      if (copyLinkBtn && orderLink){
        copyLinkBtn.addEventListener("click", async () => {
          try {
            await copyTextToClipboard(orderLink);
            flashCopied(copyLinkBtn);
          } catch (err){
            console.error("copy failed", err);
          }
        });
      }
    }

    function renderDrop(drop){
      const page = document.getElementById("hvPage");
      const orderLink = buildOrderLink();

      const dropName = stripWindowSuffix(drop.drop_name || drop.name) || "This drop";
      const hostName = drop.host_name || null;
      const windowText = formatDropWindow(drop.delivery_start, drop.delivery_end);

      const dropState = computeDropState(drop);
      const isPreOpen = dropState === "pre-open";
      const isClosed = dropState === "closed";

      const orderCount = isPreOpen ? 0 : Number(drop.order_count || 0);
      const capacityTotal = Number(drop.capacity_units_total || 0);
      const capacityUsed = isPreOpen ? 0 : Number(drop.capacity_units_used || 0);
      const pct = capacityTotal > 0
        ? Math.min(100, Math.round((capacityUsed / capacityTotal) * 100))
        : 0;

      const hostShareEnabled = drop.host_share_enabled === true;
      const hostSharePence = Number(drop.host_share_total_pence || 0);
      const hostShareDescriptor = drop.host_share_descriptor || null;
      const fundraisingEnabled = drop.fundraising_enabled === true;
      const fundraisingPence = Number(drop.fundraising_total_pence || 0);
      const fundraisingText = drop.fundraising_display_text || null;

      let noteHTML = "";
      if (isPreOpen){
        noteHTML = `
          <div class="hvNote">
            Ordering opens ${escapeHtml(formatOpensAtLong(drop.opens_at))}.
          </div>
        `;
      } else if (isClosed){
        noteHTML = `
          <div class="hvNote closed">
            This drop has closed. Here are the final figures.
          </div>
        `;
      }

      const hostLine = hostName
        ? `You're hosting this drop at <strong>${escapeHtml(hostName)}</strong>.`
        : `You're hosting this drop.`;

      page.innerHTML = `
        <div class="hvHeader">
          <p class="hvEyebrow">A Hearth drop</p>
          <h1 class="hvDropName">${escapeHtml(dropName)}</h1>
          <p class="hvHostSub">${hostLine}</p>
          ${windowText ? `<p class="hvTiming">${escapeHtml(windowText)}</p>` : ""}
        </div>

        ${noteHTML}

        <div class="hvLayout">
          ${buildCommunitySection(drop, orderLink)}

          <div class="hvLayoutAside">
            <div class="hvCard">
              <div class="hvStatRow">
                <p class="hvStatLabel">Orders placed</p>
                <p class="hvStatValue" id="hvOrderCount">${orderCount}</p>
              </div>

              <div class="hvDivider"></div>

              <div class="hvCapacity">
                <div class="hvCapacityHead">
                  <p class="hvCapacityLabel">Capacity filled</p>
                  <span class="hvCapacityPct" id="hvCapacityPct">${pct}%</span>
                </div>
                <div class="hvCapacityTrack">
                  <div class="hvCapacityFill" id="hvCapacityFill" style="width:${pct}%"></div>
                </div>
                <p class="hvCapacityMeta" id="hvCapacityMeta">
                  ${capacityUsed} of ${capacityTotal} units taken
                </p>
              </div>
            </div>

            ${hostShareEnabled ? `
            <div class="hvShareCard">
              <p class="hvShareLabel">Your share</p>
              <p class="hvShareValue" id="hvShareValue">${formatMoneyPence(hostSharePence)}</p>
              ${hostShareDescriptor ? `<p class="hvShareHint">${escapeHtml(hostShareDescriptor)}</p>` : ""}
            </div>
            ` : ""}

            ${fundraisingEnabled ? `
            <div class="hvShareCard">
              <p class="hvShareLabel">Fundraising</p>
              <p class="hvShareValue" id="hvFundraisingValue">${formatMoneyPence(fundraisingPence)}</p>
              ${fundraisingText ? `<p class="hvShareHint">${escapeHtml(fundraisingText)}</p>` : ""}
            </div>
            ` : ""}
          </div>
        </div>

        <div class="hvFooter">
          <button type="button" id="hvRefreshBtn" class="hvRefreshLink">Refresh</button>
          <p class="hvFooterCredit">Powered by Hearth</p>
        </div>
      `;

      const refreshBtn = document.getElementById("hvRefreshBtn");
      if (refreshBtn){
        refreshBtn.addEventListener("click", refreshLiveValues);
      }

      wireCommunitySection(orderLink);
    }

    function updateLiveValues(summary){
      const drop = summary || state.drop;
      if (!drop) return;

      const dropState = computeDropState(drop);
      const isPreOpen = dropState === "pre-open";

      const orderCount = isPreOpen ? 0 : Number(drop.order_count || 0);
      const capacityTotal = Number(drop.capacity_units_total || 0);
      const capacityUsed = isPreOpen ? 0 : Number(drop.capacity_units_used || 0);
      const pct = capacityTotal > 0
        ? Math.min(100, Math.round((capacityUsed / capacityTotal) * 100))
        : 0;

      const orderEl = document.getElementById("hvOrderCount");
      if (orderEl) orderEl.textContent = String(orderCount);

      const pctEl = document.getElementById("hvCapacityPct");
      if (pctEl) pctEl.textContent = `${pct}%`;

      const fillEl = document.getElementById("hvCapacityFill");
      if (fillEl) fillEl.style.width = `${pct}%`;

      const metaEl = document.getElementById("hvCapacityMeta");
      if (metaEl) metaEl.textContent = `${capacityUsed} of ${capacityTotal} units taken`;

      const shareEl = document.getElementById("hvShareValue");
      if (shareEl && drop.host_share_enabled === true){
        shareEl.textContent = formatMoneyPence(drop.host_share_total_pence || 0);
      }
      const fundraisingEl = document.getElementById("hvFundraisingValue");
      if (fundraisingEl && drop.fundraising_enabled === true){
        fundraisingEl.textContent = formatMoneyPence(drop.fundraising_total_pence || 0);
      }
    }

    async function refreshLiveValues(){
      if (!state.dropId) return;
      if (state.refreshInFlight) return;
      state.refreshInFlight = true;
      const btn = document.getElementById("hvRefreshBtn");
      if (btn) btn.disabled = true;
      try {
        const summary = await fetchHostSummary();
        if (summary){
          state.drop = summary;
          updateLiveValues(summary);
        }
      } finally {
        state.refreshInFlight = false;
        if (btn) btn.disabled = false;
      }
    }

    function renderEmpty(title, sub){
      document.getElementById("hvPage").innerHTML = `
        <div class="hvState">
          <div class="hvStateIcon">🔍</div>
          <h2 class="hvStateTitle">${escapeHtml(title)}</h2>
          <p class="hvStateSub">${escapeHtml(sub)}</p>
        </div>
      `;
    }

    loadDrop();
  </script>
</body>
</html>
