<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Set password — Hearth</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --sp-brand-primary: var(--h-accent, #8B6B3F);
      --sp-brand-secondary: var(--h-accent-2, #CBB89D);
      --sp-brand-soft: rgba(139,107,63,0.10);
      --sp-brand-soft-2: rgba(203,184,157,0.08);
    }

    body.spBody{
      background:
        radial-gradient(1200px 600px at 15% -10%, var(--sp-brand-soft), rgba(249,115,22,0) 60%),
        radial-gradient(900px 450px at 90% 0%, var(--sp-brand-soft-2), rgba(251,146,60,0) 55%),
        #f7f5f1;
      min-height:100vh;
    }

    .spPage{
      max-width:440px;
      margin:0 auto;
      padding:56px 20px 72px;
      display:grid;
      gap:28px;
    }

    /* Wordmark */
    .spWordmark{
      text-align:center;
      padding:4px 0 4px;
    }

    .spWordmarkText{
      display:inline-block;
      font-size:22px;
      font-weight:950;
      letter-spacing:-0.035em;
      color:#1f2937;
      margin:0;
    }

    .spWordmarkDot{
      display:inline-block;
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--sp-brand-primary), var(--sp-brand-secondary));
      margin-left:6px;
      vertical-align:middle;
      transform:translateY(-2px);
    }

    /* Card */
    .spCard{
      background:#fff;
      border:1px solid #e9e3d8;
      border-radius:22px;
      box-shadow:0 2px 12px rgba(15,23,42,0.04);
      padding:32px 28px;
      display:grid;
      gap:20px;
    }

    .spHeader{
      display:grid;
      gap:8px;
    }

    .spEyebrow{
      font-size:11px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#8b6b3f;
      margin:0;
    }

    .spTitle{
      font-size:28px;
      font-weight:950;
      letter-spacing:-0.035em;
      line-height:1.1;
      color:#1f2937;
      margin:0;
    }

    .spSub{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    /* Form */
    .spForm{
      display:grid;
      gap:14px;
    }

    .spField{
      display:grid;
      gap:6px;
    }

    .spLabel{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#6b7280;
      margin:0;
    }

    .spInput{
      appearance:none;
      width:100%;
      box-sizing:border-box;
      min-height:46px;
      padding:0 14px;
      border:1px solid #d9d2c3;
      border-radius:12px;
      background:#fbf8f3;
      font-size:15px;
      font-weight:600;
      color:#1f2937;
      font-family:inherit;
      transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .spInput:focus{
      outline:none;
      border-color:var(--sp-brand-primary);
      background:#fff;
      box-shadow:0 0 0 3px rgba(139,107,63,0.15);
    }

    .spInput:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .spButton{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:48px;
      padding:0 18px;
      border-radius:12px;
      background:linear-gradient(135deg, var(--sp-brand-primary), var(--sp-brand-secondary));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.01em;
      font-family:inherit;
      transition:transform .08s ease, box-shadow .15s ease, opacity .15s ease;
    }

    .spButton:hover:not(:disabled){
      box-shadow:0 4px 14px rgba(139,107,63,0.25);
    }

    .spButton:active:not(:disabled){
      transform:translateY(1px);
    }

    .spButton:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .spError{
      font-size:13px;
      font-weight:700;
      color:#b45309;
      background:rgba(180,83,9,0.08);
      border:1px solid rgba(180,83,9,0.18);
      border-radius:10px;
      padding:10px 12px;
      margin:0;
      line-height:1.45;
    }

    .spError[hidden]{
      display:none !important;
    }

    /* Loading / expired states */
    .spStatus{
      display:grid;
      gap:12px;
      justify-items:center;
      padding:12px 0;
    }

    .spSpinner{
      width:28px;
      height:28px;
      border-radius:50%;
      border:3px solid rgba(139,107,63,0.18);
      border-top-color:var(--sp-brand-primary);
      animation: spSpin .8s linear infinite;
    }

    @keyframes spSpin{
      to { transform: rotate(360deg); }
    }

    .spStatusMessage{
      font-size:14px;
      font-weight:700;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    .spExpiredBody{
      font-size:14px;
      font-weight:600;
      color:#4b5563;
      line-height:1.55;
      margin:0;
    }

    .spFoot{
      text-align:center;
      font-size:13px;
      font-weight:700;
      color:#6b7280;
    }

    .spFoot a{
      color:var(--sp-brand-primary);
      text-decoration:none;
      font-weight:900;
    }

    .spFoot a:hover{
      text-decoration:underline;
    }

    [hidden]{ display:none !important; }

    @media (max-width:600px){
      .spPage{
        padding:36px 14px 56px;
        gap:22px;
      }
      .spCard{
        padding:26px 20px;
      }
      .spTitle{
        font-size:24px;
      }
    }
  </style>
</head>
<body class="spBody">

  <div class="spPage">
    <div class="spWordmark">
      <p class="spWordmarkText">Hearth<span class="spWordmarkDot" aria-hidden="true"></span></p>
    </div>

    <div class="spCard">
      <div class="spStatus" id="spStatus">
        <div class="spSpinner" aria-hidden="true"></div>
        <p class="spStatusMessage">Checking your link…</p>
      </div>

      <div id="spExpired" hidden>
        <div class="spHeader">
          <p class="spEyebrow">Link expired</p>
          <h1 class="spTitle">This link has expired</h1>
          <p class="spExpiredBody">Your invite or reset link is no longer valid. Please request a new one.</p>
        </div>
        <p class="spFoot" style="margin-top:18px;"><a href="./login.html">Back to sign in →</a></p>
      </div>

      <div id="spFormWrap" hidden>
        <div class="spHeader">
          <p class="spEyebrow">Set your password</p>
          <h1 class="spTitle">Choose a password</h1>
          <p class="spSub">Create a password for your Hearth account. You'll use this to sign in from now on.</p>
        </div>

        <form class="spForm" id="spForm" novalidate style="margin-top:18px;">
          <div class="spField">
            <label class="spLabel" for="spPassword">New password</label>
            <input
              class="spInput"
              type="password"
              id="spPassword"
              name="password"
              autocomplete="new-password"
              placeholder="At least 8 characters"
              required
              minlength="8"
            />
          </div>
          <div class="spField">
            <label class="spLabel" for="spConfirm">Confirm password</label>
            <input
              class="spInput"
              type="password"
              id="spConfirm"
              name="confirm"
              autocomplete="new-password"
              placeholder="Re-enter your password"
              required
              minlength="8"
            />
          </div>
          <p class="spError" id="spError" hidden></p>
          <button class="spButton" type="submit" id="spSubmit">Set password</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const _sb = supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const statusEl = document.getElementById("spStatus");
    const expiredEl = document.getElementById("spExpired");
    const formWrapEl = document.getElementById("spFormWrap");
    const formEl = document.getElementById("spForm");
    const passwordEl = document.getElementById("spPassword");
    const confirmEl = document.getElementById("spConfirm");
    const submitEl = document.getElementById("spSubmit");
    const errorEl = document.getElementById("spError");

    function showError(message){
      errorEl.textContent = message;
      errorEl.hidden = false;
    }

    function clearError(){
      errorEl.textContent = "";
      errorEl.hidden = true;
    }

    function showExpired(){
      statusEl.hidden = true;
      formWrapEl.hidden = true;
      expiredEl.hidden = false;
    }

    function showForm(){
      statusEl.hidden = true;
      expiredEl.hidden = true;
      formWrapEl.hidden = false;
    }

    // Supabase fires PASSWORD_RECOVERY when the URL fragment carries a
    // recovery token. Treat that as a valid session for this page.
    let recoverySignalled = false;
    _sb.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN"){
        recoverySignalled = true;
        showForm();
      }
    });

    async function init(){
      try {
        const { data, error } = await _sb.auth.getSession();
        if (error) throw error;

        const session = data && data.session;
        if (session && session.user){
          showForm();
          return;
        }

        // Give onAuthStateChange a moment to fire for recovery tokens
        // embedded in the URL fragment before deciding the link has expired.
        setTimeout(() => {
          if (!recoverySignalled) showExpired();
        }, 600);
      } catch (err){
        console.error("set-password init failed:", err);
        showExpired();
      }
    }

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearError();

      const password = passwordEl.value || "";
      const confirm = confirmEl.value || "";

      if (password.length < 8){
        showError("Password must be at least 8 characters.");
        return;
      }

      if (password !== confirm){
        showError("Passwords do not match.");
        return;
      }

      submitEl.disabled = true;
      passwordEl.disabled = true;
      confirmEl.disabled = true;
      submitEl.textContent = "Setting password…";

      try {
        const { error } = await _sb.auth.updateUser({ password });
        if (error) throw error;

        window.location.replace("./index.html");
      } catch (err){
        console.error("Password update failed:", err);
        showError(
          (err && err.message)
            ? err.message
            : "Something went wrong. Please try again."
        );
        submitEl.disabled = false;
        passwordEl.disabled = false;
        confirmEl.disabled = false;
        submitEl.textContent = "Set password";
      }
    });

    init();
  </script>
</body>
</html>
