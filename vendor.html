<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vendor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Figtree:wght@400;500;600&display=swap" />
  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!--
    T-CAP-1 (PR3) — the permanent vendor page.

    The durable anchor for a vendor: whatever is on right now, or — when nothing
    is on — a calm surface that still lets someone ask to hear what's next. The
    resting state is the point of this page, not a fallback.

    Design: the vendor is the foreground (colour-block header, vendor primary as
    the accent everywhere), Hearth is the quiet frame (Hearthfire #c4511a appears
    ONLY in the footer attribution). Cormorant Garamond display + Figtree UI.
    All five states share one system; the STATE is the headline.

    Customer-facing surface: no vendor-nav.js, no hearth-vendor.js, no operator
    context. Every read goes through the anonymous get-vendor-page Edge Function
    — capacity in particular can never be read over anon PostgREST (it would
    return a silent, wrong zero).
  -->
  <style>
    :root{
      /* Vendor layer — overwritten at runtime from the EF's vendor.brand block.
         Defaults are the NEUTRAL vendor-brand fallbacks, deliberately NOT
         Hearthfire — a colourless vendor must never render in Hearth's own
         accent (learning #85). */
      --v-primary:#8B6B3F;
      --v-secondary:#CBB89D;
      --v-on-primary:#FFFFFF;

      /* Hearth frame */
      --h-bg:#faf8f4;
      --h-surface:#ffffff;
      --h-ink:#1f2937;
      --h-ink-soft:#6b6660;
      --h-hair:#e7e1d8;
      --h-fire:#c4511a;

      --display:"Cormorant Garamond",Georgia,serif;
      --ui:"Figtree",-apple-system,BlinkMacSystemFont,sans-serif;

      --col:820px;
      --gutter:24px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    html{max-width:100%;overflow-x:hidden}
    body{
      background:var(--h-bg);
      color:var(--h-ink);
      font-family:var(--ui);
      font-size:17px;
      line-height:1.65;
      max-width:100%;
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:var(--col);margin:0 auto;padding:0 var(--gutter)}

    .vp-loading{text-align:center;padding:80px 24px;color:var(--h-ink-soft)}

    /* ---------- Colour-block header ---------- */
    .topbar{background:var(--v-primary);color:var(--v-on-primary);padding:18px 0}
    .topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .mark{display:flex;align-items:center;gap:12px;min-width:0}
    .mark img{width:44px;height:44px;border-radius:10px;background:#fff;object-fit:contain;flex:none}
    .mark span{
      font-family:var(--display);font-size:22px;letter-spacing:.01em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .share{
      font-family:var(--ui);font-size:14px;font-weight:500;
      color:var(--v-on-primary);text-decoration:none;background:transparent;
      border:1px solid rgba(255,255,255,.45);border-radius:999px;
      padding:8px 16px;white-space:nowrap;cursor:pointer;
    }
    .share:hover{background:rgba(255,255,255,.14)}
    .share:focus-visible{outline:2px solid var(--v-on-primary);outline-offset:2px}

    /* ---------- Hero: the state IS the headline ---------- */
    .hero{padding:72px 0 0}
    .hero.resting,.hero.plain{padding:72px 0 8px}
    .eyebrow{
      display:inline-flex;align-items:center;gap:9px;
      font-family:var(--ui);font-size:12px;font-weight:600;
      letter-spacing:.14em;text-transform:uppercase;
      color:var(--v-primary);margin:0 0 18px;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;background:var(--v-primary);
      box-shadow:0 0 0 4px color-mix(in srgb,var(--v-primary) 18%,transparent);
    }
    h1{
      font-family:var(--display);font-weight:500;
      font-size:clamp(48px,8.2vw,80px);line-height:1;
      letter-spacing:-.015em;margin:0 0 22px;
    }
    .hero.resting h1,.hero.plain h1{font-size:clamp(52px,9vw,86px);line-height:.98}
    .lede{font-size:20px;line-height:1.6;color:var(--h-ink-soft);max-width:34em;margin:0}
    .vendorline{
      display:flex;align-items:center;gap:14px;
      margin:34px 0 0;padding-top:26px;border-top:1px solid var(--h-hair);
      font-size:15px;color:var(--h-ink-soft);
    }
    .vendorline strong{color:var(--h-ink);font-weight:600}

    /* ---------- Facts strip ---------- */
    .facts{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
      margin:40px 0 0;padding:26px 0;
      border-top:1px solid var(--h-hair);border-bottom:1px solid var(--h-hair);
    }
    .fact b{
      display:block;font-family:var(--ui);font-size:11.5px;font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--h-ink-soft);
      margin-bottom:7px;
    }
    .fact span{font-family:var(--display);font-size:23px;line-height:1.25;display:block}
    .fact.places span{color:var(--v-primary)}

    /* ---------- Order CTA ---------- */
    .order{padding:34px 0 8px}
    .undercta{margin:14px 0 0;font-size:14.5px;color:var(--h-ink-soft);text-align:center}

    /* ---------- Buttons ---------- */
    .btn{
      display:block;width:100%;text-align:center;text-decoration:none;
      font-family:var(--ui);font-size:16px;font-weight:600;
      color:var(--v-on-primary);background:var(--v-primary);
      border:0;border-radius:10px;padding:15px 20px;cursor:pointer;
    }
    .order .btn{font-size:17px;padding:18px 22px;border-radius:11px}
    .btn:hover{filter:brightness(1.07)}
    .btn:focus-visible{outline:2px solid var(--h-ink);outline-offset:2px}
    .btn.ghost{background:transparent;color:var(--v-primary);border:1.5px solid var(--v-primary)}
    .btn.ghost:hover{background:color-mix(in srgb,var(--v-primary) 8%,transparent);filter:none}

    /* ---------- Sections ---------- */
    section{padding:56px 0}
    .sechead{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:0 0 26px}
    h2{font-family:var(--display);font-weight:500;font-size:34px;line-height:1.15;letter-spacing:-.01em;margin:0}
    .sechead .note{font-size:14px;color:var(--h-ink-soft)}

    /* ---------- Recent drops: the rhythm list ----------
       Past drops as a dated sequence, not a card grid. The dates ARE the
       content — they show a vendor with a cadence, which is the whole model. */
    .rhythm{border-top:1px solid var(--h-hair)}
    .drop{
      display:grid;grid-template-columns:96px 1fr 64px;
      align-items:center;gap:20px;
      padding:20px 0;border-bottom:1px solid var(--h-hair);
    }
    .when{
      font-family:var(--ui);font-size:12px;font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;color:var(--v-primary);
      line-height:1.5;
    }
    .when em{display:block;font-style:normal;color:var(--h-ink-soft);font-weight:400;letter-spacing:.06em}
    .what{min-width:0}
    .what h3{font-family:var(--display);font-weight:500;font-size:26px;line-height:1.2;margin:0 0 4px}
    .what p{margin:0;font-size:14.5px;color:var(--h-ink-soft)}
    .thumb{
      width:64px;height:64px;border-radius:8px;flex:none;
      background:var(--v-secondary);
      background-size:cover;background-position:center;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--display);font-size:24px;color:var(--v-primary);
    }

    /* ---------- FAQ: the vendor's own answers ----------
       A details/summary accordion — native disclosure, so it is keyboard
       operable and screen-reader announced without any JS. The whole section is
       omitted when the vendor has written nothing; a bare "Questions" heading
       over an empty list is worse than no FAQ at all. */
    .faq details{border-bottom:1px solid var(--h-hair)}
    .faq details:first-of-type{border-top:1px solid var(--h-hair)}
    .faq summary{
      cursor:pointer;list-style:none;padding:20px 0;
      font-family:var(--display);font-size:22px;font-weight:500;
      display:flex;justify-content:space-between;align-items:center;gap:16px;
    }
    .faq summary::-webkit-details-marker{display:none}
    .faq summary::after{content:"+";color:var(--v-primary);font-size:24px;flex:none}
    .faq details[open] summary::after{content:"–"}
    .faq summary:focus-visible{outline:2px solid var(--v-primary);outline-offset:3px}
    .faq p{margin:0 0 20px;color:var(--h-ink-soft);max-width:46em;white-space:pre-line}

    /* ---------- Explainer: Hearth's model, stated plainly ---------- */
    .explain{
      background:var(--h-surface);
      border:1px solid var(--h-hair);border-radius:14px;
      padding:34px 34px 30px;
    }
    .explain h2{margin-bottom:14px}
    .explain p{margin:0 0 18px;color:var(--h-ink-soft);max-width:46em}
    .rules{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:26px}
    .rule{border-top:2px solid var(--v-primary);padding-top:14px}
    .rule b{display:block;font-family:var(--ui);font-size:14px;font-weight:600;margin-bottom:4px}
    .rule span{font-size:14px;color:var(--h-ink-soft);line-height:1.5}

    /* ---------- Follow ---------- */
    .follow{
      background:var(--h-surface);
      border:1px solid var(--h-hair);border-radius:14px;padding:34px;
    }
    .follow h2{margin-bottom:8px}
    .follow > p{margin:0 0 24px;color:var(--h-ink-soft)}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:14px;font-weight:500;margin-bottom:6px}
    .field label i{font-style:normal;font-weight:400;color:var(--h-ink-soft)}
    .field input{
      width:100%;font-family:var(--ui);font-size:16px;color:var(--h-ink);
      padding:12px 14px;background:var(--h-bg);
      border:1px solid var(--h-hair);border-radius:9px;
    }
    .field input:focus{outline:2px solid var(--v-primary);outline-offset:1px;border-color:transparent}
    .consent{display:flex;gap:12px;align-items:flex-start;margin:20px 0 22px}
    .consent input{margin-top:4px;accent-color:var(--v-primary);width:17px;height:17px;flex:none}
    .consent label{font-size:14.5px;color:var(--h-ink-soft);line-height:1.5}
    /* Quiet, muted helper text under a field (reuses the existing muted token —
       no new colour). Generic so any field needing a hint can reuse it. */
    .field-hint{margin-top:6px;font-size:13.5px;color:var(--h-ink-soft);line-height:1.45}
    /* The frequency-promise line under the follow sub-heading. Specificity beats
       .follow > p (0,1,1) so the tightened spacing/size actually applies. */
    .follow p.follow-note{margin:-16px 0 24px;font-size:14px;color:var(--h-ink-soft);line-height:1.5}

    /* ---------- Catering: the second door ----------
       A contained block, NOT a bare link, and deliberately NOT .undercta —
       that class belongs to the live-drop "Pre-order only" line and is left
       alone. The tint is derived from the vendor's own colour via color-mix,
       so a vendor with no brand colour set inherits the --v-primary fallback
       (:38) and the block still renders correctly rather than breaking.
       Kept faint (4%) over a neutral hairline border: this must read as
       quieter than the white follow card above it, because someone who
       simply can't make this drop should reach the follow form first. */
    .catering{
      margin:16px 0 0;
      background:color-mix(in srgb,var(--v-primary) 4%,transparent);
      border:0.5px solid var(--h-hair);border-radius:12px;
      padding:1.15rem 1.4rem;
    }
    .catering h3{
      font-family:var(--display);font-weight:500;font-size:19px;line-height:1.3;
      color:var(--h-ink);margin:0 0 6px;
    }
    .catering p{margin:0 0 12px;font-size:13.5px;line-height:1.6;color:var(--h-ink-soft)}
    .catering a{
      font-family:var(--ui);font-size:14px;font-weight:500;
      color:var(--v-primary);text-decoration:none;
    }
    .catering a:hover{text-decoration:underline}
    .catering a:focus-visible{outline:2px solid var(--v-primary);outline-offset:3px;border-radius:3px}

    /* Follow validation / error notice. Class names are load-bearing — wireFollow
       toggles exactly these (.vp-notice / .is-error / .vp-hidden). */
    .vp-notice{
      margin-top:16px;padding:12px 14px;border-radius:9px;
      font-size:14.5px;line-height:1.5;
      background:#fdf2f0;border:1px solid #f3d3cc;color:#8c3a25;
    }
    .vp-hidden{display:none !important}

    /* ---------- Footer: Hearth, quietly ---------- */
    footer{
      margin-top:36px;padding:34px 0 56px;
      border-top:1px solid var(--h-hair);
      font-size:14px;color:var(--h-ink-soft);
    }
    footer .wrap{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    footer a{color:var(--h-fire);text-decoration:none;font-weight:500}
    footer a:hover{text-decoration:underline}

    @media (max-width:640px){
      .hero{padding:48px 0 0}
      .hero.resting,.hero.plain{padding:48px 0 4px}
      section{padding:40px 0}
      .facts{grid-template-columns:1fr;gap:20px;padding:22px 0}
      .drop{grid-template-columns:1fr 56px;gap:14px}
      .when{grid-column:1/-1;margin-bottom:-8px}
      .thumb{width:56px;height:56px}
      .rules{grid-template-columns:1fr;gap:18px}
      .explain,.follow{padding:26px 22px}
      h2{font-size:29px}
    }
    @media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
  </style>
</head>
<body>
  <div id="vpRoot" class="vp-loading">Loading…</div>

  <script>
    (function () {
      "use strict";

      var SUPABASE_URL = (window.HEARTH_CONFIG || {}).SUPABASE_URL;
      var SUPABASE_ANON_KEY = (window.HEARTH_CONFIG || {}).SUPABASE_ANON_KEY;

      var supabase = null;
      // capturePlacement holds ?src= for the lifetime of this page view ONLY.
      // Deliberately NOT persisted to localStorage/sessionStorage: a stored
      // value would survive the visit and misattribute a later direct visit as
      // a QR scan. The page has no storage usage at all — keep it that way.
      var state = { vendor: null, page: null, slug: null, followDone: false, capturePlacement: null };

      var root = document.getElementById("vpRoot");

      /* ---------- helpers ---------- */

      function escapeHtml(v) {
        return String(v == null ? "" : v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      /* Slug resolution.

         Two sources, in order:
           1. ?slug= — preserves every link written before clean URLs shipped,
              and stays the testing handle.
           2. location.pathname — the clean URL (/gather), served here by the
              catch-all rewrite in _redirects.

         Only a SINGLE path segment resolves. /gather/menu is not a vendor;
         guessing at its first segment would silently serve the wrong thing for
         any future nested route. Multi-segment paths fall through to
         not-found, which is also what every unknown URL on the site now does —
         this page is the de-facto 404 handler. */
      function readSlug() {
        var params = new URLSearchParams(window.location.search);
        var q = params.get("slug");
        if (q && q.trim()) return q.trim();
        return slugFromPath(window.location.pathname);
      }

      /* T-CAP-2a — ?src= records which physical object was scanned (the durable
         vendor QR encodes it). Read raw here; the server whitelists it and
         writes null for anything unrecognised, so an odd value can never fail a
         follow. */
      function readCapturePlacement() {
        var params = new URLSearchParams(window.location.search);
        var v = params.get("src");
        return v && v.trim() ? v.trim() : null;
      }

      /* Remove ?src= from the address bar once it has been read into memory.
         Without this, a customer who copies the URL — or uses the Share button,
         which reads window.location.href — propagates their sticker's origin to
         someone who never saw it, and that person's follow is recorded as a
         counter capture. The parameter exists to answer "what physical object
         did they scan"; a shared link corrupts precisely that.

         replaceState, never pushState: pushState would add a history entry and
         break the back button. Every other parameter is preserved (notably the
         legacy ?slug=), and the stripped URL still resolves on reload because
         readSlug() falls back to the path. If there is no src, no history call
         is made at all. */
      function stripCapturePlacementFromUrl() {
        if (!window.history || !window.history.replaceState) return;

        var url;
        try {
          url = new URL(window.location.href);
        } catch (_) {
          return;
        }
        if (!url.searchParams.has("src")) return;

        url.searchParams.delete("src");
        // Drop the "?" entirely when src was the only parameter, rather than
        // leaving a bare trailing "?" in the address bar.
        var next = url.pathname + (url.searchParams.toString() ? "?" + url.searchParams.toString() : "") + url.hash;
        try {
          window.history.replaceState(window.history.state, "", next);
        } catch (_) {
          /* Non-fatal: the value is already in memory and the follow still
             records correctly. A failed tidy-up must never break the page. */
        }
      }

      function slugFromPath(pathname) {
        var raw = String(pathname == null ? "" : pathname);

        // Strip the leading slash and a single trailing slash, so /gather and
        // /gather/ are the same address.
        if (raw.charAt(0) === "/") raw = raw.slice(1);
        if (raw.charAt(raw.length - 1) === "/") raw = raw.slice(0, -1);

        // "" is the site root, which is index.html, never a vendor.
        if (!raw) return null;

        // Exactly one segment, or nothing.
        if (raw.indexOf("/") !== -1) return null;

        // A malformed escape sequence must resolve to not-found, never throw.
        var decoded;
        try {
          decoded = decodeURIComponent(raw);
        } catch (_) {
          return null;
        }

        decoded = decoded.trim();
        if (!decoded) return null;

        // Decoding can reveal a separator that was hidden as %2F.
        if (decoded.indexOf("/") !== -1) return null;

        // Slugs are stored lowercase (enforced at creation in create-vendor),
        // so /Gather and /gather are the same vendor.
        return decoded.toLowerCase();
      }

      function firstLetter(name) {
        var s = (name == null ? "" : String(name)).trim();
        return s ? s.charAt(0).toUpperCase() : "";
      }

      // Fulfilment wording; an absent/mixed mode degrades to the neutral "Ready".
      function fulfilmentLabel(mode) {
        if (mode === "delivery") return "Delivery";
        if (mode === "collection") return "Collection";
        return "Ready";
      }

      // All customer-facing dates render in UK time — Hearth is UK-only (GBP,
      // UK postcodes, Stripe GB) — so a drop shows its real UK window regardless
      // of the viewer's timezone.
      function londonParts(iso) {
        if (!iso) return null;
        var d = new Date(iso);
        if (isNaN(d.getTime())) return null;
        function grab(opts) {
          var m = {};
          try {
            new Intl.DateTimeFormat("en-GB", Object.assign({ timeZone: "Europe/London" }, opts))
              .formatToParts(d).forEach(function (p) { m[p.type] = p.value; });
          } catch (e) { return null; }
          return m;
        }
        var L = grab({ weekday: "long", day: "numeric", month: "long" });
        var S = grab({ weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit", hour12: false });
        if (!L || !S) return null;
        return { wkLong: L.weekday, monLong: L.month, wkShort: S.weekday, monShort: S.month, day: L.day, hh: S.hour, mm: S.minute };
      }
      function fmtLongDate(iso) { var p = londonParts(iso); return p ? (p.wkLong + " " + p.day + " " + p.monLong) : null; }
      function fmtShortDate(iso) { var p = londonParts(iso); return p ? (p.wkShort + " " + p.day + " " + p.monShort) : null; }
      function fmtShortDateTime(iso) { var p = londonParts(iso); return p ? (p.wkShort + " " + p.day + " " + p.monShort + ", " + p.hh + ":" + p.mm) : null; }

      function orderUrl(slug) {
        // Mirrors drop-manager.html getShareUrl() / host-view.html buildOrderLink().
        return "/order.html?drop=" + encodeURIComponent(slug);
      }

      /* Normalises supabase-js's two failure shapes into one result. On a
         non-2xx the library raises FunctionsHttpError and leaves `data` null —
         the function's own JSON body is only reachable via error.context. */
      async function callFunction(name, body) {
        var data, error;
        try {
          var res = await supabase.functions.invoke(name, { body: body });
          data = res.data;
          error = res.error;
        } catch (e) {
          error = e;
        }

        if (!error) {
          if (data && data.error) return { ok: false, message: data.error, status: 200 };
          return { ok: true, data: data };
        }

        var message = null;
        var status = null;
        var ctx = error && error.context;
        if (ctx) {
          status = typeof ctx.status === "number" ? ctx.status : null;
          try {
            var parsed = await ctx.json();
            if (parsed && parsed.error) message = parsed.error;
          } catch (e2) { /* body wasn't JSON — fall back to a generic message */ }
        }
        return { ok: false, message: message, status: status };
      }

      /* ---------- brand ---------- */

      function applyBrand(vendor) {
        var brand = (vendor && vendor.brand) || {};
        var rootEl = document.documentElement;
        if (brand.primary) rootEl.style.setProperty("--v-primary", brand.primary);
        if (brand.secondary) rootEl.style.setProperty("--v-secondary", brand.secondary);
        if (brand.text_on_primary) rootEl.style.setProperty("--v-on-primary", brand.text_on_primary);
        var name = vendor && vendor.display_name;
        if (name) document.title = name;
      }

      /* ---------- crawler signal ---------- */

      /* T-vendor-is-internal. Hearth's own test vendor records serve a fully
         normal page — they exist to keep the live path testable — but they are
         real public URLs under lovehearth.co.uk/{slug} and must never enter
         search results. This is the ONLY effect of the flag on this page: no
         badge, no banner, no altered copy. A visitor cannot tell.

         Only ever ADDS the tag. There is no removal branch, because the page
         renders one vendor per load and a stray noindex would silently
         de-index a real vendor's storefront — the expensive direction of this
         mistake. The idempotence guard is for repeat calls within one load. */
      function noIndex() {
        if (document.querySelector('meta[name="robots"]')) return;
        var meta = document.createElement("meta");
        meta.setAttribute("name", "robots");
        meta.setAttribute("content", "noindex, nofollow");
        document.head.appendChild(meta);
      }

      function applyIndexingPolicy(vendor) {
        if (!vendor || vendor.is_internal !== true) return;
        noIndex();
      }

      function vendorName() {
        return (state.vendor && (state.vendor.display_name || state.vendor.name)) || "This vendor";
      }

      /* ---------- frame ---------- */

      function topbarHtml(vendor) {
        var logo = (vendor && vendor.logo_url)
          ? '<img src="' + escapeHtml(vendor.logo_url) + '" alt="" />'
          : "";
        var name = vendor ? escapeHtml(vendor.display_name || vendor.name || "") : "";
        var share = vendor
          ? '<button class="share" id="vpShare" type="button">Share</button>'
          : "";
        return '<header class="topbar"><div class="wrap">' +
          '<div class="mark">' + logo + "<span>" + name + "</span></div>" +
          share +
        "</div></header>";
      }

      function footerHtml(vendor) {
        var left = vendor ? escapeHtml(vendor.display_name || vendor.name || "") : "";
        // Nullable-boolean convention: only an explicit false hides it.
        var showPowered = !vendor || vendor.powered_by_hearth_visible !== false;
        var powered = showPowered
          ? '<span>Powered by <a href="https://lovehearth.co.uk">Hearth</a></span>'
          : "";
        return '<footer><div class="wrap"><span>' + left + "</span>" + powered + "</div></footer>";
      }

      /* ---------- hero ---------- */

      function heroRestingHtml(vendor) {
        var lede = escapeHtml(vendorName()) +
          " cooks to a plan — a set menu, a fixed window to order, and a set number of places. There’s nothing open at the moment, but there will be.";
        var vline = (vendor && vendor.tagline)
          ? '<div class="vendorline"><span>' + escapeHtml(vendor.tagline) + "</span></div>"
          : "";
        return '<div class="wrap"><div class="hero resting">' +
          '<p class="eyebrow">Nothing on right now</p>' +
          "<h1>Between drops</h1>" +
          '<p class="lede">' + lede + "</p>" +
          vline +
        "</div></div>";
      }

      function factsStripHtml(st, drop, capacity) {
        var facts = [];
        var hasCap = capacity && typeof capacity.total === "number" && typeof capacity.remaining === "number";
        if (st === "live_drop") {
          facts.push({ label: fulfilmentLabel(drop.fulfilment_mode), value: fmtLongDate(drop.delivery_start) });
          facts.push({ label: "Ordering closes", value: fmtShortDateTime(drop.closes_at) });
          if (hasCap) facts.push({ label: "Places left", value: capacity.remaining + " of " + capacity.total, places: true });
        } else if (st === "full_drop") {
          facts.push({ label: fulfilmentLabel(drop.fulfilment_mode), value: fmtLongDate(drop.delivery_start) });
          facts.push({ label: "Ordering closes", value: fmtShortDateTime(drop.closes_at) });
          facts.push({ label: "Places", value: "Full", places: true });
        } else { // announced_drop
          facts.push({ label: fulfilmentLabel(drop.fulfilment_mode), value: fmtLongDate(drop.delivery_start) });
          facts.push({ label: "Ordering opens", value: fmtShortDateTime(drop.opens_at) });
        }
        var cells = facts.filter(function (f) { return f.value; }).map(function (f) {
          return '<div class="fact' + (f.places ? " places" : "") + '"><b>' +
            escapeHtml(f.label) + "</b><span>" + escapeHtml(f.value) + "</span></div>";
        });
        return cells.length ? '<div class="facts">' + cells.join("") + "</div>" : "";
      }

      function orderCtaHtml(drop, capacity) {
        var under = (capacity && typeof capacity.total === "number")
          ? "Pre-order only. When the " + capacity.total + " places are gone, they’re gone."
          : "Pre-order only.";
        return '<div class="order">' +
          '<a class="btn" href="' + escapeHtml(orderUrl(drop.slug)) + '">See the menu and order</a>' +
          '<p class="undercta">' + escapeHtml(under) + "</p>" +
        "</div>";
      }

      function heroDropHtml(st, drop, capacity) {
        var eyebrow, lede = "";
        if (st === "live_drop") {
          eyebrow = '<p class="eyebrow"><span class="dot"></span>Ordering is open</p>';
          if (drop.drop_intro) lede = '<p class="lede">' + escapeHtml(drop.drop_intro) + "</p>";
        } else if (st === "full_drop") {
          eyebrow = '<p class="eyebrow">This drop is full</p>';
          var taken = (capacity && typeof capacity.total === "number")
            ? "All " + capacity.total + " places have been taken."
            : "Every place has been taken.";
          lede = '<p class="lede">' + escapeHtml(taken) + "</p>";
        } else { // announced_drop
          eyebrow = '<p class="eyebrow">Coming up</p>';
          if (drop.drop_intro) lede = '<p class="lede">' + escapeHtml(drop.drop_intro) + "</p>";
        }
        return '<div class="wrap"><div class="hero">' +
          eyebrow +
          "<h1>" + escapeHtml(drop.name || "") + "</h1>" +
          lede +
          factsStripHtml(st, drop, capacity) +
          (st === "live_drop" ? orderCtaHtml(drop, capacity) : "") +
        "</div></div>";
      }

      /* ---------- recent drops ---------- */

      /* The dated rhythm list. Thumbnail uses social_image_url when present;
         when null (the default for this vendor), it falls back to a typographic
         tile — the drop's first letter on the vendor's secondary colour. The
         whole section is omitted when there are no recent drops. */
      function recentDropsHtml(recent) {
        if (!Array.isArray(recent) || recent.length === 0) return "";
        var rows = recent.map(function (d) {
          var when = fmtShortDate(d.delivery_start || d.closes_at) || "";
          var em = fulfilmentLabel(d.fulfilment_mode);
          var intro = d.drop_intro ? "<p>" + escapeHtml(d.drop_intro) + "</p>" : "";
          var thumb = d.social_image_url
            ? '<div class="thumb" data-thumb="' + escapeHtml(d.social_image_url) + '"></div>'
            : '<div class="thumb">' + escapeHtml(firstLetter(d.name)) + "</div>";
          return '<article class="drop">' +
            '<div class="when">' + escapeHtml(when) + "<em>" + escapeHtml(em) + "</em></div>" +
            '<div class="what"><h3>' + escapeHtml(d.name || "") + "</h3>" + intro + "</div>" +
            thumb +
          "</article>";
        }).join("");
        return '<div class="wrap"><section>' +
          '<div class="sechead"><h2>Recent drops</h2><span class="note">What they’ve been cooking</span></div>' +
          '<div class="rhythm">' + rows + "</div>" +
        "</section></div>";
      }

      /* ---------- FAQ (vendor-authored) ----------
         The only vendor-written free text on this page, so every value goes
         through escapeHtml before it reaches innerHTML. Entries missing either
         half are skipped here as well as in update-vendor — this render must
         stand on its own, not on the write path having behaved. If nothing
         survives, the section returns "" and the heading never appears. */
      function faqHtml(vendor) {
        var entries = vendor && Array.isArray(vendor.faq) ? vendor.faq : [];
        var rows = entries.map(function (item) {
          if (!item || typeof item !== "object") return "";
          var q = typeof item.q === "string" ? item.q.trim() : "";
          var a = typeof item.a === "string" ? item.a.trim() : "";
          if (!q || !a) return "";
          return "<details>" +
            "<summary>" + escapeHtml(q) + "</summary>" +
            "<p>" + escapeHtml(a) + "</p>" +
          "</details>";
        }).filter(Boolean).join("");

        if (!rows) return "";

        return '<div class="wrap"><section class="faq">' +
          '<div class="sechead"><h2>Questions</h2></div>' +
          rows +
        "</section></div>";
      }

      /* ---------- explainer (static Hearth copy) ---------- */

      function explainHtml() {
        return '<div class="wrap"><section>' +
          '<div class="explain">' +
            "<h2>What’s a drop?</h2>" +
            "<p>A drop is a planned moment rather than an always-open menu. The kitchen decides what it’s making, when it can make it, and how many it can make well — then opens ordering for a set window.</p>" +
            '<div class="rules">' +
              "<div class=\"rule\"><b>A set menu</b><span>Chosen for that day, not a standing list.</span></div>" +
              "<div class=\"rule\"><b>A fixed window</b><span>Ordering opens, then closes. You plan around it.</span></div>" +
              "<div class=\"rule\"><b>Real places</b><span>When they’re gone, they’re gone. No overselling.</span></div>" +
            "</div>" +
          "</div>" +
        "</section></div>";
      }

      /* ---------- follow ---------- */

      /* Catering enquiry block. Rendered ONLY when the vendor has DECLARED they
         offer catering (catering_enabled === true) — nothing at all otherwise:
         no wrapper, no heading, no stray whitespace, same discipline as the FAQ
         section. Placed as a sibling of #vpFollowCard within the SAME <section>,
         so it survives the follow success handler's innerHTML replacement of the
         card (see the card.innerHTML assignment in wireFollow).

         WHY THIS IS A CONTAINED BLOCK AND NOT A BARE LINK. The durable counter
         card (T-CAP-2b PR2) carries no catering copy at all, on the explicit
         grounds that a printed artefact may only encode facts as durable as the
         print — catering_enabled is a toggle, so the PAGE carries the catering
         route instead. That decision only holds while this block is actually
         findable on the page. Its legibility is therefore a dependency of the
         counter card's design, not a styling preference: shipping it back to a
         footer-weight text link silently removes the only route the counter
         card was allowed to omit.

         It remains a deliberate SECOND door, never a primary action. It must
         not out-weigh the follow form above it or an active drop's order CTA —
         hence the faint tint and soft border in .catering rather than a button
         or a full-strength accent. */
      function cateringLinkHtml() {
        var v = state.vendor;
        if (!v || v.catering_enabled !== true) return "";
        var href = "catering-enquiry.html?vendor=" + encodeURIComponent(v.slug || "");
        return '<div class="catering">' +
          "<h3>Feeding a crowd?</h3>" +
          "<p>Parties, office lunches, family gatherings — tell " +
            escapeHtml(vendorName()) + " what you need and they’ll come back to you.</p>" +
          '<a href="' + escapeHtml(href) + '">Send an enquiry →</a>' +
        "</div>";
      }

      function followHtml(opts) {
        var btnClass = opts.ghost ? "btn ghost" : "btn";
        return '<div class="wrap"><section>' +
          '<div class="follow" id="vpFollowCard">' +
            "<h2>" + escapeHtml(opts.title) + "</h2>" +
            "<p>" + escapeHtml(opts.sub) + "</p>" +
            '<p class="follow-note">Only when there’s a drop planned — nothing else.</p>' +
            '<form id="vpFollowForm" novalidate>' +
              '<div class="field"><label for="vpName">Your name</label>' +
                '<input id="vpName" name="name" type="text" autocomplete="name" required /></div>' +
              '<div class="field"><label for="vpEmail">Email</label>' +
                '<input id="vpEmail" name="email" type="email" autocomplete="email" required /></div>' +
              '<div class="field"><label for="vpPostcode">First part of your postcode</label>' +
                '<input id="vpPostcode" name="postcode" type="text" autocomplete="postal-code" placeholder="BH18" required />' +
                '<div class="field-hint">So you only hear about drops near you.</div></div>' +
              '<div class="field"><label for="vpPhone">Mobile <i>— optional</i></label>' +
                '<input id="vpPhone" name="phone" type="tel" autocomplete="tel" /></div>' +
              '<div class="consent"><input id="vpConsent" type="checkbox" />' +
                '<label for="vpConsent">Yes, ' + escapeHtml(vendorName()) +
                  " can email me about what’s coming next. You can ask to stop at any time.</label></div>" +
              // Messaging consent is a separate, per-vendor permission and is
              // meaningless without a number, so it stays hidden until the mobile
              // field has content (revealed/cleared by wireFollow). Reuses the
              // .consent block verbatim — no new class, colour or token.
              '<div class="consent vp-hidden" id="vpMessagingConsentRow">' +
                '<input id="vpMessagingConsent" type="checkbox" />' +
                '<label for="vpMessagingConsent">Yes, ' + escapeHtml(vendorName()) +
                  " can message me about drops.</label></div>" +
              '<button class="' + btnClass + '" id="vpFollowSubmit" type="submit">' + escapeHtml(opts.cta) + "</button>" +
              '<div class="vp-notice vp-hidden" id="vpFollowNotice" role="status"></div>' +
            "</form>" +
          "</div>" +
          cateringLinkHtml() +
        "</section></div>";
      }

      /* ---------- render ---------- */

      function renderPage(page) {
        var vendor = page.vendor;
        var st = page.state;
        var drop = page.drop;
        var capacity = page.capacity;
        var recent = page.recent_drops;

        var hero, sections;
        if (st === "live_drop") {
          hero = heroDropHtml("live_drop", drop, capacity);
          // Explainer ABOVE recent drops: a stranger arriving mid-order needs
          // the model explained before the CTA makes sense.
          sections = explainHtml() + recentDropsHtml(recent) + followHtml({
            title: "Can’t make this one?",
            sub: "Leave your details and " + vendorName() + " will let you know when the next drop is planned.",
            cta: "Keep me posted",
            ghost: true
          });
        } else if (st === "full_drop") {
          hero = heroDropHtml("full_drop", drop, capacity);
          sections = explainHtml() + recentDropsHtml(recent) + followHtml({
            title: "This drop is full",
            sub: "It’s fully booked — leave your details and " + vendorName() + " will let you know when the next one is planned.",
            cta: "Keep me posted",
            ghost: false
          });
        } else if (st === "announced_drop") {
          hero = heroDropHtml("announced_drop", drop, capacity);
          sections = explainHtml() + recentDropsHtml(recent) + followHtml({
            title: "Be there when it opens",
            sub: "Ordering isn’t open yet. Leave your details and " + vendorName() + " will let you know the moment it is.",
            cta: "Keep me posted",
            ghost: false
          });
        } else { // resting
          hero = heroRestingHtml(vendor);
          sections = recentDropsHtml(recent) + explainHtml() + followHtml({
            title: "See what’s coming next",
            sub: "Hear first when the next drop opens.",
            cta: "Keep me posted",
            ghost: false
          });
        }

        // The FAQ sits last in every state, below the follow card — the same
        // position for all four, because "questions I still have" is where a
        // reader lands after the ask, whatever brought them here. Renders
        // nothing at all when the vendor has written no FAQ.
        sections += faqHtml(vendor);

        root.className = "";
        root.innerHTML = topbarHtml(vendor) + "<main>" + hero + sections + "</main>" + footerHtml(vendor);
        applyDeferredBackgrounds();
        wireShare();
        wireFollow();
      }

      /* This is now the whole site's not-found state, not just a wrong vendor
         name — every unmatched path lands here via the catch-all rewrite. The
         copy has to sit comfortably over both, so it names neither: no "we
         couldn't find that vendor", and nothing that implies the visitor
         mistyped. Soft 404s should never be indexed, hence the noindex. */
      function renderNotFound() {
        document.title = "Not found";
        noIndex();
        root.className = "";
        root.innerHTML = topbarHtml(null) +
          '<main><div class="wrap"><div class="hero plain">' +
            "<h1>There’s nothing at this address.</h1>" +
            "<p class=\"lede\">The link may be out of date, or it may have picked up a change along the way. " +
            'You can <a href="https://lovehearth.co.uk">start from the beginning</a>.</p>' +
          "</div></div></main>" +
          footerHtml(null);
      }

      function renderError() {
        root.className = "";
        root.innerHTML = topbarHtml(null) +
          '<main><div class="wrap"><div class="hero plain">' +
            "<h1>This page didn’t load.</h1>" +
            "<p class=\"lede\">Something went wrong at our end. Please try again in a moment.</p>" +
          "</div></div></main>" +
          footerHtml(null);
      }

      /* The thumbnail URL is carried in a data- attribute and applied as a style
         property after insertion — interpolating a URL into a style="" attribute
         would break on the first quote it contains. */
      function applyDeferredBackgrounds() {
        var els = document.querySelectorAll("[data-thumb]");
        for (var i = 0; i < els.length; i++) {
          var url = els[i].getAttribute("data-thumb");
          if (url) els[i].style.backgroundImage = 'url("' + url.replace(/["\\]/g, "\\$&") + '")';
        }
      }

      /* ---------- share ---------- */

      function wireShare() {
        var btn = document.getElementById("vpShare");
        if (!btn) return;
        btn.addEventListener("click", async function () {
          var url = window.location.href;
          var title = (state.vendor && (state.vendor.display_name || state.vendor.name)) || document.title;
          if (navigator.share) {
            try { await navigator.share({ title: title, url: url }); }
            catch (e) { /* user cancelled / share unavailable — ignore */ }
            return;
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            try {
              await navigator.clipboard.writeText(url);
              var original = btn.textContent;
              btn.textContent = "Link copied";
              setTimeout(function () { btn.textContent = original; }, 1800);
            } catch (e) { /* ignore */ }
          }
        });
      }

      /* ---------- follow ---------- */

      function wireFollow() {
        var form = document.getElementById("vpFollowForm");
        if (!form) return;

        var notice = document.getElementById("vpFollowNotice");
        var submit = document.getElementById("vpFollowSubmit");

        // Messaging consent follows the mobile field. Clearing the number must
        // both hide AND untick the box: a consent that outlives the number it was
        // given for is a permission we could not honour and should not hold.
        var phoneInput = document.getElementById("vpPhone");
        var messagingRow = document.getElementById("vpMessagingConsentRow");
        var messagingBox = document.getElementById("vpMessagingConsent");

        function syncMessagingConsent() {
          if (phoneInput.value.trim()) {
            messagingRow.classList.remove("vp-hidden");
          } else {
            messagingRow.classList.add("vp-hidden");
            messagingBox.checked = false;
          }
        }
        // "input" covers typing, paste and most autofill; "change" catches the
        // autofill paths that don't emit input.
        phoneInput.addEventListener("input", syncMessagingConsent);
        phoneInput.addEventListener("change", syncMessagingConsent);
        syncMessagingConsent();

        function showNotice(msg) {
          notice.textContent = msg;
          notice.className = "vp-notice is-error";
        }
        function clearNotice() {
          notice.textContent = "";
          notice.className = "vp-notice vp-hidden";
        }

        form.addEventListener("submit", async function (ev) {
          ev.preventDefault();
          if (state.followDone) return;
          clearNotice();

          var name = document.getElementById("vpName").value.trim();
          var email = document.getElementById("vpEmail").value.trim();
          var phone = document.getElementById("vpPhone").value.trim();
          var consent = document.getElementById("vpConsent").checked;

          if (!name) return showNotice("Please add your name.");
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            return showNotice("Please add an email address we can reach you on.");
          }

          // Postcode: outward code only (e.g. BH18, SW1A, M1). Uppercased and
          // stripped of spaces on save; a full postcode is rejected, never
          // silently truncated. Mirrored server-side in register-vendor-interest.
          var postcode = document.getElementById("vpPostcode").value.trim().toUpperCase().replace(/\s+/g, "");
          var outwardRe = /^[A-Z]{1,2}[0-9]{1,2}[A-Z]?$/;
          var fullPostcodeRe = /^[A-Z]{1,2}[0-9]{1,2}[A-Z]?[0-9][A-Z]{2}$/;
          if (!postcode) return showNotice("Please add the first part of your postcode.");
          if (fullPostcodeRe.test(postcode)) {
            return showNotice("Just the first part is enough — e.g. BH18");
          }
          if (!outwardRe.test(postcode)) {
            return showNotice("That doesn’t look like a UK postcode.");
          }

          if (!consent) {
            return showNotice("Please tick the box so we know it's okay to email you.");
          }

          var original = submit.textContent;
          submit.disabled = true;
          submit.textContent = "Sending…";

          var result = await callFunction("register-vendor-interest", {
            vendor_slug: state.slug,
            name: name,
            email: email,
            postcode: postcode,
            phone: phone || null,
            consent: true,
            // Belt-and-braces &&: the sync above already unticks on an empty
            // field, and the server refuses the pair outright.
            messaging_consent: messagingBox.checked && !!phone,
            // Read from ?src= at boot and held in memory only. Null when the
            // visit did not come from a QR. Sent raw — the server whitelists it
            // and stores null for anything unrecognised, never an error.
            capture_placement: state.capturePlacement
          });

          if (!result.ok) {
            submit.disabled = false;
            submit.textContent = original;
            // Surface the function's own wording where it gave us one (consent
            // and validation refusals are meaningful); fall back otherwise.
            showNotice(result.message || "Sorry — that didn't go through. Please try again.");
            return;
          }

          state.followDone = true;
          var card = document.getElementById("vpFollowCard");
          // Success sentence always names the vendor; it leads with the person's
          // name when we have one, and falls back cleanly when we somehow don't —
          // it must never render an empty slot or a literal token.
          var heading = name ? "Thanks, " + escapeHtml(name) + "." : "Thanks.";
          card.innerHTML =
            "<h2>" + heading + "</h2>" +
            "<p>" + escapeHtml(vendorName()) + " will let you know when the next drop opens.</p>";
        });
      }

      /* ---------- boot ---------- */

      async function init() {
        var slug = readSlug();
        state.slug = slug;

        // Order is load-bearing: both reads must happen BEFORE the strip, since
        // stripping rewrites window.location.search that readSlug() also uses.
        state.capturePlacement = readCapturePlacement();
        stripCapturePlacementFromUrl();

        if (!slug) {
          renderNotFound();
          return;
        }

        if (!window.supabase || !window.supabase.createClient || !SUPABASE_URL || !SUPABASE_ANON_KEY) {
          renderError();
          return;
        }

        // Isolated client. This is a public surface on the same origin as the
        // operator pages, so a logged-in vendor's persisted session must never
        // leak into it (learning #79).
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: false, autoRefreshToken: false }
        });

        var result = await callFunction("get-vendor-page", { slug: slug });

        if (!result.ok) {
          if (result.status === 404 || result.message === "vendor_not_found") {
            renderNotFound();
          } else {
            renderError();
          }
          return;
        }

        state.page = result.data;
        state.vendor = result.data.vendor;
        applyBrand(state.vendor);
        applyIndexingPolicy(state.vendor);
        renderPage(result.data);
      }

      init();
    })();
  </script>
</body>
</html>
