<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hearth — Enquiries</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="./assets/hearth.css?v=31" />
  <script src="./assets/config.js"></script>
  <script src="./assets/hearth-vendor.js?v=1"></script>
  <script src="./assets/vendor-nav.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- QR generation for the catering poster. qrcodejs@1.0.0 (cdnjs) — the same
       reputable, already-vetted library activation-poster.html uses; renders
       client-side to a canvas with configurable dark/light colours. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root{
      --home-bg: var(--h-chalk, #faf8f5);
      --home-card:#ffffff;
      --home-border: var(--h-cinder, #e8ddd5);
      --home-text: var(--h-coal, #0f0b08);
      --home-muted: var(--h-stone, #8c7b6e);
      --home-soft:#faf8f4;
      --home-accent: var(--h-fire, #c4511a);
      --home-accent-2:var(--h-accent-2, #CBB89D);
      --home-radius:20px;
      --home-shadow:0 10px 30px rgba(15,23,42,.05);
      --home-good:#166534;
      --home-good-bg:#ecfdf3;
      --home-warn:#92400e;
      --home-warn-bg:#fffbeb;
      --home-neutral-bg:#f3f4f6;
      --home-neutral:#374151;
    }

    body{
      background:var(--home-bg);
      color:var(--home-text);
      font-family: 'Figtree', system-ui, sans-serif;
    }

    .home-shell{
      display:grid;
      gap:18px;
      padding-bottom:40px;
    }

    .home-card{
      background:var(--home-card);
      border:1px solid var(--home-border);
      border-radius:var(--home-radius);
      box-shadow:var(--home-shadow);
    }

    .home-pad{ padding:18px; }
    .home-pad-lg{ padding:22px; }

    .home-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .home-brandLockup{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .home-brandMark{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(139,107,63,.16), rgba(203,184,157,.18));
      display:grid;
      place-items:center;
      font-weight:800;
      color:var(--home-accent);
      letter-spacing:.02em;
      flex:0 0 auto;
    }

    .home-brandText{
      min-width:0;
    }

    .home-brandTitle{
      margin:0;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .home-brandSub{
      margin:2px 0 0;
      color:var(--home-muted);
      font-size:13px;
    }

    .home-button,
    .home-button-secondary{
      appearance:none;
      border:none;
      text-decoration:none;
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font:inherit;
      cursor:pointer;
      transition:all .18s ease;
    }

    .home-button-secondary{
      background:#fff;
      border:1px solid var(--home-border);
      color:var(--home-text);
    }

    .home-button{
      background:var(--home-accent);
      color:#fff;
      font-weight:700;
    }

    .home-button-secondary:hover{
      border-color:#d8ccb8;
      background:#fcfbf8;
    }

    .home-button:hover{
      filter:brightness(.98);
    }

    .home-hero{
      display:grid;
      grid-template-columns:1.35fr .95fr;
      gap:16px;
    }

    .home-heroMain{
      background:
        radial-gradient(circle at top right, rgba(203,184,157,.18), transparent 28%),
        linear-gradient(180deg,#fff,#fcfbf8);
    }

    .home-eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(139,107,63,.08);
      color:var(--home-accent);
      font-size:12px;
      font-weight:800;
      letter-spacing:.03em;
      text-transform:uppercase;
    }

    .home-hero h1{
      margin:16px 0 8px;
      font-size:36px;
      line-height:1.05;
      letter-spacing:-.04em;
      max-width:12ch;
    }

    .home-lead{
      margin:0;
      font-size:16px;
      line-height:1.6;
      color:var(--home-muted);
      max-width:60ch;
    }

    .home-subLead{
      margin:14px 0 0;
      color:var(--home-text);
      font-size:15px;
      line-height:1.6;
      max-width:62ch;
    }

    .home-heroActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .home-miniStats{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin-top:18px;
    }

    .home-miniStat{
      border:1px solid var(--home-border);
      border-radius:16px;
      background:#fff;
      padding:14px;
    }

    .home-miniLabel{
      color:var(--home-muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .home-miniValue{
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .home-miniMeta{
      margin-top:6px;
      font-size:12px;
      color:var(--home-muted);
    }

    .home-sidePanel{
      display:grid;
      gap:12px;
    }

    .home-panel{
      border:1px solid var(--home-border);
      border-radius:16px;
      background:#fff;
      padding:16px;
    }

    .home-panelTitle{
      font-size:12px;
      font-weight:800;
      color:var(--home-muted);
      text-transform:uppercase;
      letter-spacing:.03em;
      margin-bottom:8px;
    }

    .home-panelValue{
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
      margin-bottom:6px;
    }

    .home-panelText{
      margin:0;
      color:var(--home-muted);
      font-size:14px;
      line-height:1.55;
    }

    .home-pulseGrid,
    .home-workGrid,
    .home-actionGrid,
    .home-flowGrid{
      display:grid;
      gap:14px;
    }

    .home-pulseGrid{
      grid-template-columns:repeat(4,minmax(0,1fr));
    }

    .home-workGrid{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .home-workGrid > .home-work:last-child:nth-child(odd) {
      grid-column: 1 / -1;
    }

    .home-flowGrid{
      grid-template-columns:repeat(3,minmax(0,1fr));
    }

    .home-actionGrid{
      grid-template-columns:repeat(3,minmax(0,1fr));
    }

    .home-sectionHead{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-end;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .home-sectionTitle{
      margin:0;
      font-size:20px;
      letter-spacing:-.02em;
    }

    .home-sectionSub{
      margin:4px 0 0;
      color:var(--home-muted);
      font-size:13px;
    }

    .home-pill{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      white-space:nowrap;
    }

    .good{ background:var(--home-good-bg); color:var(--home-good); }
    .warn{ background:var(--home-warn-bg); color:var(--home-warn); }
    .neutral{ background:var(--home-neutral-bg); color:var(--home-neutral); }

    .home-pulse{
      padding:16px;
      border:1px solid var(--home-border);
      border-radius:16px;
      background:linear-gradient(180deg,#fff,#fdfcf9);
    }

    .home-pulseTop{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
    }

    .home-pulseLabel{
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.03em;
      color:var(--home-muted);
    }

    .home-pulseValue{
      margin-top:10px;
      font-size:28px;
      font-weight:800;
      letter-spacing:-.04em;
    }

    .home-pulseMeta{
      margin-top:8px;
      font-size:13px;
      color:var(--home-muted);
      line-height:1.5;
    }

    .home-work{
      display:grid;
      gap:10px;
      padding:18px;
      border:1px solid var(--home-border);
      border-radius:18px;
      background:linear-gradient(180deg,#fff,#fcfbf8);
    }

    .home-workTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .home-workIcon{
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      font-weight:800;
      color:var(--home-accent);
      background:rgba(139,107,63,.10);
      flex:0 0 auto;
    }

    .home-work h3{
      margin:0;
      font-size:18px;
      letter-spacing:-.02em;
    }

    .home-work p{
      margin:0;
      color:var(--home-muted);
      line-height:1.55;
      font-size:14px;
    }

    .home-workMeta{
      color:var(--home-text);
      font-size:13px;
      line-height:1.5;
      min-height:40px;
    }

    .home-workActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:2px;
    }

    .home-workLink{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--home-border);
      color:var(--home-text);
      background:#fff;
      font-weight:700;
    }

    .home-workLink.primary{
      background:var(--home-accent);
      border-color:var(--home-accent);
      color:#fff;
    }

    .home-how{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:16px;
    }

    .home-howText p{
      margin:0 0 14px;
      color:var(--home-muted);
      line-height:1.65;
      font-size:15px;
    }

    .home-howText p:last-child{
      margin-bottom:0;
    }

    .home-bulletList{
      display:grid;
      gap:10px;
    }

    .home-bullet{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 14px;
      border:1px solid var(--home-border);
      border-radius:14px;
      background:#fff;
    }

    .home-bulletDot{
      width:10px;
      height:10px;
      margin-top:6px;
      border-radius:999px;
      background:var(--home-accent);
      flex:0 0 auto;
    }

    .home-flow{
      padding:16px;
      border:1px solid var(--home-border);
      border-radius:16px;
      background:#fff;
    }

    .home-flow h4{
      margin:0 0 6px;
      font-size:16px;
    }

    .home-flow p{
      margin:0;
      color:var(--home-muted);
      font-size:13px;
      line-height:1.55;
    }

    .home-action{
      padding:16px;
      border:1px solid var(--home-border);
      border-radius:16px;
      background:linear-gradient(180deg,#fff,#fbfaf7);
    }

    .home-action h4{
      margin:10px 0 8px;
      font-size:16px;
    }

    .home-action p{
      margin:0;
      color:var(--home-muted);
      font-size:14px;
      line-height:1.55;
    }

    .home-empty{
      border:1px dashed #d6cdbc;
      border-radius:16px;
      padding:22px;
      background:#fcfbf8;
      color:var(--home-muted);
      text-align:center;
      font-size:14px;
      line-height:1.55;
    }

    .home-footerNote{
      color:var(--home-muted);
      font-size:13px;
      line-height:1.6;
      margin:0;
    }

    .home-loading{
      color:var(--home-muted);
      font-size:14px;
    }

    /* Today strip */
    .home-today{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .home-todayLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .home-todayDot{
      width:10px;
      height:10px;
      border-radius:999px;
      flex:0 0 auto;
    }

    .home-todayDot.live{
      background:#16a34a;
      box-shadow:0 0 0 4px rgba(22,163,74,.18);
      animation:home-pulse-dot 2s infinite;
    }

    .home-todayDot.scheduled{ background:var(--home-accent); }
    .home-todayDot.quiet{ background:var(--home-border); }

    @keyframes home-pulse-dot{
      0%,100%{ box-shadow:0 0 0 4px rgba(22,163,74,.18); }
      50%{ box-shadow:0 0 0 8px rgba(22,163,74,.10); }
    }

    .home-todayLabel{
      font-size:15px;
      font-weight:700;
      color:var(--home-text);
    }

    .home-todayMeta{
      font-size:13px;
      color:var(--home-muted);
      margin-top:2px;
    }

    /* Body + contact lines for richer list rows (e.g. catering enquiries) */
    .home-todayBody{
      font-size:13px;
      color:var(--home-text);
      margin-top:8px;
      white-space:pre-line;
    }

    .home-todayContacts{
      font-size:13px;
      margin-top:8px;
    }

    .home-todayContacts a{
      color:var(--home-muted);
      text-decoration:none;
    }

    /* Catering enquiry row: convert action + inline error */
    .home-cateringActions{
      margin-top:12px;
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .home-cateringError{
      font-size:13px;
      color:#b45309;
    }

    /* Asset snapshot */
    .home-assetGrid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }

    .home-assetCard{
      padding:16px;
      border:1px solid var(--home-border);
      border-radius:16px;
      background:linear-gradient(180deg,#fff,#fdfcf9);
    }

    .home-assetLabel{
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.03em;
      color:var(--home-muted);
    }

    .home-assetValue{
      margin-top:10px;
      font-size:28px;
      font-weight:800;
      letter-spacing:-.04em;
    }

    .home-assetMeta{
      margin-top:8px;
      font-size:13px;
      color:var(--home-muted);
      line-height:1.5;
    }

    /* Recommendation action cards (intelligence-driven) */
    .home-recAction{
      padding:16px;
      border:1px solid var(--home-border);
      border-radius:16px;
      background:linear-gradient(180deg,#fff,#fbfaf7);
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .home-recAction h4{
      margin:0;
      font-size:16px;
    }

    .home-recAction p{
      margin:0;
      color:var(--home-muted);
      font-size:14px;
      line-height:1.55;
      flex:1;
    }

    .home-recCta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:0 12px;
      border-radius:10px;
      border:1px solid var(--home-border);
      color:var(--home-text);
      background:#fff;
      font-weight:700;
      font-size:13px;
      text-decoration:none;
      align-self:flex-start;
      transition:all .18s ease;
    }

    .home-recCta:hover{
      border-color:#d8ccb8;
      background:#fcfbf8;
    }

    @media (max-width: 1100px){
      .home-hero,
      .home-how,
      .home-pulseGrid,
      .home-workGrid,
      .home-flowGrid,
      .home-actionGrid,
      .home-assetGrid{
        grid-template-columns:1fr;
      }

      .home-miniStats{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 720px){
      .home-hero h1{
        font-size:28px;
      }

      .home-topbar{
        align-items:flex-start;
      }
    }

    /* ================================================================
       Mobile Home — max-width: 768px
       All layout changes via CSS media queries only.
       Desktop layout (>768px) is completely unchanged.
       ================================================================ */
    @media (max-width: 768px){

      /* --- Shared headerBar / nav (hearth.css classes) --- */
      .headerBar{
        flex-direction:column;
        align-items:stretch;
        gap:10px;
        padding:14px;
      }
      .brand{ min-width:0; }
      .nav{
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
        white-space:nowrap;
        flex-wrap:nowrap;
        gap:2px;
        padding-bottom:2px;
        scrollbar-width:none;
        justify-content:flex-start;
        min-width:0;
        max-width:100%;
      }
      .nav::-webkit-scrollbar{ display:none; }
      .nav a{
        flex-shrink:0;
        white-space:nowrap;
        min-height:44px;
        display:inline-flex;
        align-items:center;
      }

      /* --- Top bar: stack brand lockup and nav vertically --- */
      .home-topbar{
        flex-direction:column;
        align-items:stretch;
        gap:10px;
      }

      /* --- Hero: h1 reduced for mobile (720px handles ≤720; this covers 721–768) --- */
      .home-hero h1{
        font-size:26px;
        letter-spacing:-.02em;
      }

      /* --- Hero action buttons: full-width, stacked vertically --- */
      .home-heroActions{
        flex-direction:column;
        align-items:stretch;
      }
      .home-heroActions .home-button,
      .home-heroActions .home-button-secondary{
        width:100%;
        justify-content:center;
      }

      /* --- Pulse grid: single column on mobile so card content is not cramped --- */
      .home-pulseGrid,
      .home-assetGrid{
        grid-template-columns:1fr;
      }

      /* --- Prevent horizontal overflow --- */
      *{ box-sizing:border-box; }
      body{ overflow-x:hidden; }
      .container{ max-width:100vw; overflow-x:hidden; }

      /* --- All grid and card containers: fully constrained within viewport --- */
      .home-hero,
      .home-miniStats,
      .home-sidePanel,
      .home-how,
      .home-pulseGrid,
      .home-workGrid,
      .home-flowGrid,
      .home-actionGrid,
      .home-card,
      .home-panel{
        box-sizing:border-box;
        max-width:100%;
        width:100%;
        min-width:0;
      }

      /* --- Hero: explicit single column so side panel stacks below main content --- */
      .home-hero{
        grid-template-columns:1fr;
      }

      /* --- Mini-stats row: explicit single column to prevent overflow --- */
      .home-miniStats{
        grid-template-columns:1fr;
      }

      /* --- Panel value: wrap long unbreakable strings --- */
      .home-panelValue{
        font-size: 18px;
        letter-spacing: -0.01em;
        line-height: 1.4;
        word-break:break-word;
        overflow-wrap:break-word;
      }

      .home-miniValue{
        font-size: 18px;
        letter-spacing: -0.02em;
        word-break: break-word;
      }

      /* --- Reduce large padding to 16px on mobile --- */
      .home-pad-lg{
        padding:16px;
      }

      /* --- Workspace card top row: allow pill to wrap so text column is not squeezed --- */
      .home-workTop{
        flex-wrap:wrap;
        gap:8px;
      }
      .home-workTop > div:first-child{
        flex:1 1 auto;
        min-width:0;
      }
    }

    .home-hero h1{
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .home-sectionTitle{
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    .home-panelValue{
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    .home-work h3{
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    .home-flow h4,
    .home-action h4,
    .home-recAction h4{
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    /* ---- Catering poster (standing, printable A5) ---- */

    /* On screen: centre the real-A5 poster in a soft stage and scale it down
       with zoom (zoom rescales the box footprint too, not just the render, so
       the card doesn't overflow — see the zoom-vs-transform:scale learning). */
    .cposter-stage{
      display:flex;
      justify-content:center;
      background:var(--home-soft);
      border:1px solid var(--home-border);
      border-radius:16px;
      padding:24px;
      overflow:auto;
    }
    .cposter-scaler{ zoom:0.62; }

    /* The poster itself at true A5 (148×210mm) so print is 1:1 with @page. */
    .cposter{
      width:148mm;
      height:210mm;
      box-sizing:border-box;
      overflow:hidden;
      background:#ffffff;
      color:#1f1a15;
      padding:16mm 14mm;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      font-family:'Figtree', system-ui, sans-serif;
      box-shadow:0 10px 30px rgba(15,23,42,.12);
      /* Decorative accent only — set from the vendor's brand colour in JS.
         NEVER applied to the QR, which stays high-contrast dark-on-white. */
      --cposter-accent:#8B6B3F;
    }
    .cposter__logo{ max-height:22mm; max-width:60%; object-fit:contain; margin-bottom:8mm; }
    .cposter__vendor{
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:30px; font-weight:500; margin:0 0 10mm; color:#1f1a15;
    }
    .cposter__eyebrow{
      font-size:13px; letter-spacing:.32em; text-transform:uppercase;
      color:var(--cposter-accent); font-weight:600; margin-bottom:6mm;
    }
    .cposter__headline{
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:44px; line-height:1.05; font-weight:600; margin:0 0 6mm; color:#1f1a15;
    }
    .cposter__invite{
      font-size:16px; line-height:1.5; color:#4a423b; max-width:112mm; margin:0 0 auto;
    }
    .cposter__qrzone{ margin:8mm 0 5mm; display:flex; flex-direction:column; align-items:center; gap:4mm; }
    .cposter__qr{ width:46mm; height:46mm; display:flex; align-items:center; justify-content:center; }
    .cposter__qr canvas,
    .cposter__qr img{ width:46mm !important; height:46mm !important; }
    .cposter__scan{ font-size:13px; color:#4a423b; }
    .cposter__url{ font-size:12px; color:#6b625a; word-break:break-all; max-width:112mm; }
    .cposter__hearth{
      margin-top:6mm; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9a8f84;
    }

    /* Collapsed utility strip — quiet and subordinate to the enquiry list; the
       copyable link stays to hand, the full poster is one tap away. */
    .cposter-strip{ display:flex; flex-direction:column; gap:10px; }
    .cposter-strip__label{
      font-size:13px; font-weight:600; color:var(--home-muted); letter-spacing:.01em;
    }
    .cposter-share__row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .cposter-share__url{
      flex:1; min-width:0; font-size:13px; color:var(--home-text);
      background:var(--home-soft); border:1px solid var(--home-border); border-radius:10px;
      padding:9px 12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    /* Toggle is a quiet text control, not a call-to-action button. */
    .cposter-toggle{
      align-self:flex-start;
      display:inline-flex; align-items:center; gap:6px;
      background:none; border:none; padding:0;
      font:inherit; font-size:13px; color:var(--home-accent); cursor:pointer;
    }
    .cposter-toggle:hover .cposter-toggle__text{ text-decoration:underline; }
    .cposter-toggle__chev{ font-size:11px; line-height:1; transition:transform .15s ease; }
    .cposter-toggle[aria-expanded="true"] .cposter-toggle__chev{ transform:rotate(180deg); }

    /* Expanded block (revealed on toggle) — context line, poster, then link. */
    .cposter-preview{ margin-top:16px; }
    .cposter-preview__intro{ font-size:13px; color:var(--home-muted); margin:0 0 14px; }
    .cposter-actions{ margin-top:16px; display:flex; justify-content:center; }
    .cposter-preview .cposter-share__row{ margin-top:16px; }

    /* Print: show ONLY the poster at true A5, isolated from the nav and list.
       The poster is relocated to <body> root during printing (JS beforeprint/
       afterprint) so everything else can be display:none'd without collapsing
       it — this avoids the blank trailing pages a visibility-only trick leaves
       when the hidden enquiry list still occupies flow height. */
    @page{ size:A5 portrait; margin:0; }
    @media print{
      html.cposter-printing body > *:not(#cateringPosterScaler){ display:none !important; }
      html.cposter-printing #cateringPosterScaler{
        display:block !important;
        position:static !important;
        zoom:1 !important;
        margin:0 !important;
      }
      html.cposter-printing .cposter{ box-shadow:none !important; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="home-shell">

      <!-- TOP BAR -->
      <section class="home-card home-pad">
        <div class="home-topbar">
          <div class="home-brandLockup">
            <div class="home-brandMark">H</div>
            <div class="home-brandText">
              <h1 class="home-brandTitle">Hearth</h1>
              <p class="home-brandSub" id="topVendorSub">Loading workspace…</p>
            </div>
          </div>

          <nav class="nav" id="operatorNav" aria-label="Primary"></nav>
          <script>HearthNav.renderNav('operatorNav', 'enquiries.html', { dotSlash: true });</script>
        </div>
      </section>

      <!-- CATERING POSTER (standing utility — collapsed by default so the
           enquiry list below stays the visual priority; the copyable link is
           always to hand, the full A5 poster preview is one tap away. Never
           gated on enquiry count.) -->
      <section class="home-card home-pad" id="cateringPosterCard">
        <!-- Collapsed: ONE quiet line — the catering page and one way in. The
             URL is never shown on its own; the link lives inside the expanded
             block, beneath the poster, as part of the same thing. -->
        <div class="cposter-strip">
          <div class="cposter-strip__label">Your catering page</div>

          <button type="button" class="cposter-toggle" id="cposterToggleBtn"
                  aria-expanded="false" aria-controls="cposterPreview">
            <span class="cposter-toggle__text">Show poster &amp; link</span>
            <span class="cposter-toggle__chev" aria-hidden="true">&#9662;</span>
          </button>
        </div>

        <!-- Expanded — poster and link together, stacked. Hidden until the
             toggle is opened; the QR is generated lazily on first expand
             (generating into a hidden container can yield a zero-size QR). -->
        <div class="cposter-preview" id="cposterPreview" hidden>
          <p class="cposter-preview__intro">Print a poster for your counter, or share the link online.</p>
          <div class="cposter-stage">
            <div class="cposter-scaler" id="cateringPosterScaler">
              <div class="cposter" id="cateringPoster">
                <img class="cposter__logo" id="cposterLogo" alt="" hidden />
                <div class="cposter__vendor" id="cposterVendor"></div>
                <div class="cposter__eyebrow">Catering</div>
                <h3 class="cposter__headline">Planning something?</h3>
                <p class="cposter__invite" id="cposterInvite"></p>
                <div class="cposter__qrzone">
                  <div class="cposter__qr" id="cposterQr"></div>
                  <div class="cposter__scan">Scan to tell us about your event</div>
                </div>
                <div class="cposter__url" id="cposterUrl"></div>
                <div class="cposter__hearth">Powered by Hearth</div>
              </div>
            </div>
          </div>

          <div class="cposter-actions">
            <button type="button" class="home-button" id="cposterPrintBtn">Print poster</button>
          </div>

          <div class="cposter-share__row">
            <span class="cposter-share__url" id="cposterShareUrl"></span>
            <button type="button" class="home-button-secondary" id="cposterCopyBtn" style="font-size:13px;">Copy link</button>
          </div>
        </div>
      </section>

      <!-- ENQUIRIES -->
      <!--
        First enquiry archetype: catering. The page is structured as one
        section per archetype so a second type can be added later as a
        sibling section + render function, with no rebuild. No schema, types
        or UI for any other archetype exist yet.
      -->
      <section class="home-card home-pad-lg" id="cateringSection">
        <div class="home-sectionHead">
          <div>
            <h2 class="home-sectionTitle">Catering enquiries</h2>
            <p class="home-sectionSub">People who've asked about catering with you.</p>
          </div>
        </div>

        <div id="cateringContent">
          <div class="home-loading">Loading enquiries…</div>
        </div>
      </section>

    </div>
  </div>

  <script>
    const sb = window.supabase.createClient(
      window.HEARTH_CONFIG.SUPABASE_URL,
      window.HEARTH_CONFIG.SUPABASE_ANON_KEY
    );

    const state = {
      vendor: null,
      cateringEnquiries: []
    };

    function fmtNum(v){
      return new Intl.NumberFormat('en-GB').format(Number(v || 0));
    }

    function fmtDate(v){
      if (!v) return '—';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return '—';
      return d.toLocaleDateString('en-GB', {
        day:'numeric',
        month:'short',
        year:'numeric'
      });
    }

    function escapeHtml(str){
      return String(str ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function titleCase(str){
      return String(str || '')
        .replace(/[_-]+/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    async function loadData(){
      state.vendor = await window.HearthVendor.resolveVendor(sb);
      if (!state.vendor) {
        const requestedSlug = new URLSearchParams(window.location.search).get('vendor');
        throw new Error(
          requestedSlug
            ? `Vendor "${requestedSlug}" not found. Check the ?vendor= URL parameter.`
            : 'No vendor found. Add at least one vendor to the database.'
        );
      }

      const vendorName =
        state.vendor.display_name ||
        state.vendor.name ||
        'Vendor workspace';
      document.getElementById('topVendorSub').textContent = vendorName;

      const cateringRes = await (async () => {
        try {
          const { data, error } = await sb.functions.invoke('list-catering-enquiries', { body: {} });
          if (error || (data && data.error)) return { failed: true };
          return { enquiries: Array.isArray(data?.enquiries) ? data.enquiries : [] };
        } catch (e) {
          return { failed: true };
        }
      })();
      state.cateringEnquiries = cateringRes.failed ? null : (cateringRes.enquiries || []);
    }

    // Catering enquiry list. Relocated verbatim from home.html (PRs #436/#440);
    // the only change from the Home version is the empty branch: this is a
    // destination the vendor navigated to on purpose, so an empty state is
    // shown here rather than hiding the section.
    function renderCateringEnquiries(){
      const section = document.getElementById('cateringSection');
      const content = document.getElementById('cateringContent');
      if (!section || !content) return;

      // Load failed — quiet inline message.
      if (state.cateringEnquiries === null) {
        content.innerHTML = `<div class="home-empty">Catering enquiries couldn't be loaded just now.</div>`;
        return;
      }

      // No open enquiries — calm empty state (this is a page the vendor chose
      // to open, unlike the Home signal which hides when there are none).
      const enquiries = state.cateringEnquiries || [];
      if (!enquiries.length) {
        content.innerHTML = `<div class="home-empty">No catering enquiries yet. When someone asks about catering with you, they'll appear here.</div>`;
        return;
      }

      const rows = enquiries.map(e => {
        const name = escapeHtml(e.contact_name || 'Someone');

        const facts = [];
        if (e.event_date) facts.push(escapeHtml(fmtDate(e.event_date)));
        if (e.guest_count) facts.push(`~${fmtNum(e.guest_count)} guests`);
        if (e.event_type) facts.push(escapeHtml(titleCase(e.event_type)));
        if (e.fulfilment) facts.push(escapeHtml(titleCase(e.fulfilment)));
        const factsLine = facts.length
          ? `<div class="home-todayMeta">${facts.join(' · ')}</div>`
          : '';

        const briefRaw = (e.brief || '').trim();
        const brief = briefRaw
          ? `<div class="home-todayBody">${escapeHtml(briefRaw.length > 220 ? briefRaw.slice(0, 220).trimEnd() + '…' : briefRaw)}</div>`
          : '';

        const contactBits = [];
        if (e.contact_email) {
          const em = escapeHtml(e.contact_email);
          contactBits.push(`<a href="mailto:${em}">${em}</a>`);
        }
        if (e.contact_phone) {
          const ph = escapeHtml(e.contact_phone);
          contactBits.push(`<a href="tel:${ph}">${ph}</a>`);
        }
        const contactLine = contactBits.length
          ? `<div class="home-todayContacts">${contactBits.join(' &nbsp;·&nbsp; ')}</div>`
          : '';

        const received = e.created_at
          ? `<div style="font-size:13px; color:var(--home-muted); white-space:nowrap;">${escapeHtml(fmtDate(e.created_at))}</div>`
          : '';

        const enquiryId = escapeHtml(e.id || '');

        return `
          <div data-enquiry-row="${enquiryId}">
            <div style="display:flex; align-items:flex-start; gap:14px;">
              <div style="min-width:0; flex:1;">
                <div class="home-todayLabel">${name}</div>
                ${factsLine}
                ${brief}
                ${contactLine}
              </div>
              ${received}
            </div>
            <div class="home-cateringActions">
              <button type="button" class="home-workLink primary" data-convert-enquiry="${enquiryId}">Turn into catering drop</button>
              <span class="home-cateringError" data-convert-error="${enquiryId}" hidden></span>
            </div>
          </div>
        `;
      }).join('<div style="height:1px; background:var(--home-border); margin:10px 0;"></div>');

      content.innerHTML = rows;

      // Wire the convert action on each row. One confirm, then invoke the
      // convert-catering-enquiry EF; on success open the new draft in Drop
      // Studio (?drop=<id>), on failure show a quiet inline error and leave
      // the enquiry in place.
      content.querySelectorAll('button[data-convert-enquiry]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const enquiryId = btn.getAttribute('data-convert-enquiry');
          if (!enquiryId) return;
          const errEl = content.querySelector(`[data-convert-error="${enquiryId}"]`);
          if (errEl) { errEl.hidden = true; errEl.textContent = ''; }

          if (!window.confirm("Turn this enquiry into a catering drop? This creates a draft you'll finish in Drop Studio.")) {
            return;
          }

          btn.disabled = true;
          const originalLabel = btn.textContent;
          btn.textContent = 'Creating draft…';

          try {
            const { data, error } = await sb.functions.invoke('convert-catering-enquiry', {
              body: { enquiry_id: enquiryId }
            });
            if (error || !data || data.ok !== true || !data.drop_id) {
              throw new Error((data && data.error) || 'Could not create the drop.');
            }
            // Success — open the new draft in Drop Studio, preserving vendor scope.
            window.location.href = HearthNav.withVendor('./drop-manager.html?drop=' + encodeURIComponent(data.drop_id));
          } catch (err) {
            btn.disabled = false;
            btn.textContent = originalLabel;
            if (errEl) {
              errEl.textContent = "Couldn't create the drop just now. Please try again.";
              errEl.hidden = false;
            }
          }
        });
      });
    }

    // The evergreen catering enquiry page for this vendor. catering-enquiry.html
    // resolves the vendor from getParam("vendor"), so the link is ?vendor=<slug>.
    function cateringEnquiryUrl(){
      const slug = (state.vendor && state.vendor.slug) || '';
      return `https://lovehearth.co.uk/catering-enquiry.html?vendor=${encodeURIComponent(slug)}`;
    }

    // Draw the poster QR once, lazily, the first time the preview is expanded.
    // Generating into a still-hidden container can produce a zero-size / broken
    // QR (a known qrcodejs pitfall), so this is only ever called after the
    // preview has been revealed. Idempotent — subsequent toggles are no-ops.
    // Always high-contrast dark-on-white: vendors may print in black and white,
    // so a brand-tinted code could fail to scan; the brand accent never touches
    // the QR.
    let posterQrDrawn = false;
    function ensurePosterQr(){
      if (posterQrDrawn) return;
      const qrEl = document.getElementById('cposterQr');
      if (!qrEl || !window.QRCode) return;
      qrEl.innerHTML = '';
      new QRCode(qrEl, {
        text: cateringEnquiryUrl(),
        width: 220,
        height: 220,
        colorDark: '#1f2937',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      posterQrDrawn = true;
    }

    // Standing catering poster + copyable link. Reads only the already-resolved
    // vendor (logo, name, brand colour, slug) and its own FIXED copy — it does
    // NOT read reveal_line or any drop field (activation-poster.html's content
    // coupling is deliberately not inherited). Always rendered.
    function renderCateringPoster(){
      const v = state.vendor || {};
      const name = v.display_name || v.name || 'Us';
      const url = cateringEnquiryUrl();

      // Vendor brand colour as a tasteful decorative accent (eyebrow only).
      const posterEl = document.getElementById('cateringPoster');
      if (posterEl) posterEl.style.setProperty('--cposter-accent', v.brand_primary_color || '#8B6B3F');

      const logo = document.getElementById('cposterLogo');
      if (logo) {
        if (v.logo_url) { logo.src = v.logo_url; logo.alt = name; logo.hidden = false; }
        else { logo.hidden = true; }
      }

      const vendorEl = document.getElementById('cposterVendor');
      if (vendorEl) vendorEl.textContent = name;

      // Fixed, restrained invitation — the poster's own copy, not reveal_line.
      const inviteEl = document.getElementById('cposterInvite');
      if (inviteEl) inviteEl.textContent = "We'd love to cater it. Scan to tell us about your event, and we'll be in touch.";

      const urlEl = document.getElementById('cposterUrl');
      if (urlEl) urlEl.textContent = url;
      const shareUrlEl = document.getElementById('cposterShareUrl');
      if (shareUrlEl) shareUrlEl.textContent = url;

      // NB: the QR is NOT generated here. The poster preview starts collapsed
      // (hidden), and generating into a hidden container can yield a zero-size
      // QR — so it is drawn lazily on first expand via ensurePosterQr().

      // Copy link — with a brief "Copied ✓" confirmation.
      const copyBtn = document.getElementById('cposterCopyBtn');
      if (copyBtn && !copyBtn.dataset.wired) {
        copyBtn.dataset.wired = '1';
        copyBtn.addEventListener('click', async () => {
          const link = cateringEnquiryUrl();
          try {
            await navigator.clipboard.writeText(link);
          } catch (e) {
            // Fallback for older browsers / non-secure contexts.
            const ta = document.createElement('textarea');
            ta.value = link;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); } catch (_) {}
            document.body.removeChild(ta);
          }
          const orig = copyBtn.textContent;
          copyBtn.textContent = 'Copied ✓';
          copyBtn.disabled = true;
          setTimeout(() => { copyBtn.textContent = orig; copyBtn.disabled = false; }, 1800);
        });
      }
    }

    // Collapsed-by-default toggle for the poster preview. On first expand it
    // draws the QR (lazy — see ensurePosterQr). Quiet utility, not a CTA.
    function setupPosterToggle(){
      const toggle = document.getElementById('cposterToggleBtn');
      const preview = document.getElementById('cposterPreview');
      if (!toggle || !preview || toggle.dataset.wired) return;
      toggle.dataset.wired = '1';
      // Update only the label span so the chevron (rotated via aria-expanded)
      // survives; toggle.textContent would wipe both children.
      const toggleText = toggle.querySelector('.cposter-toggle__text');
      const setToggleLabel = (label) => {
        if (toggleText) toggleText.textContent = label;
      };
      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        if (expanded) {
          preview.hidden = true;
          toggle.setAttribute('aria-expanded', 'false');
          setToggleLabel('Show poster & link');
        } else {
          preview.hidden = false;              // reveal first, then draw the QR
          ensurePosterQr();                    // into a now-laid-out container
          toggle.setAttribute('aria-expanded', 'true');
          setToggleLabel('Hide');
        }
      });
    }

    // Print isolation. The poster lives inside the operator shell on screen, so
    // to print ONLY the poster at A5 we relocate it to <body> root just before
    // printing (and restore it after), letting @media print display:none the
    // rest without collapsing the poster. Avoids the blank trailing pages a
    // pure visibility:hidden approach leaves behind.
    function setupPosterPrint(){
      const printBtn = document.getElementById('cposterPrintBtn');
      if (printBtn && !printBtn.dataset.wired) {
        printBtn.dataset.wired = '1';
        printBtn.addEventListener('click', () => window.print());
      }

      const scaler = document.getElementById('cateringPosterScaler');
      if (!scaler || scaler.dataset.printWired) return;
      scaler.dataset.printWired = '1';
      let placeholder = null;

      window.addEventListener('beforeprint', () => {
        if (scaler.parentNode && scaler.parentNode !== document.body) {
          placeholder = document.createComment('cposter-home');
          scaler.parentNode.insertBefore(placeholder, scaler);
          document.body.appendChild(scaler);
        }
        document.documentElement.classList.add('cposter-printing');
      });

      window.addEventListener('afterprint', () => {
        document.documentElement.classList.remove('cposter-printing');
        if (placeholder && placeholder.parentNode) {
          placeholder.parentNode.insertBefore(scaler, placeholder);
          placeholder.parentNode.removeChild(placeholder);
          placeholder = null;
        }
      });
    }

    function render(){
      renderCateringEnquiries();
      renderCateringPoster();
      setupPosterToggle();
      setupPosterPrint();
    }

    async function init(){
      try {
        await loadData();
        render();
      } catch (err) {
        console.error(err);
        document.querySelector('.home-shell').innerHTML = `
          <section class="home-card home-pad-lg">
            <div class="home-empty">
              Enquiries could not load. Check vendor resolution, Supabase access and page routes.
              <br><br>
              <strong>${escapeHtml(err.message || 'Unknown error')}</strong>
            </div>
          </section>
        `;
      }
    }

    init();
  </script>
</body>
</html>
