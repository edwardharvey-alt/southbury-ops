# comms-dispatch
#
# Scheduled ping for the comms dispatcher Edge Functions so they run without
# anyone manually firing a curl. One job, two steps, two touchpoints:
#   - dispatch-interest-open       (interest-registrants when ordering opens)
#   - dispatch-post-drop-thankyou  (orderers the morning after a drop finishes)
#
# Each dispatcher self-discovers the work to do (it scans for the relevant
# drops/records itself) and dedupes its sends, so a single invocation is
# idempotent and safe to repeat. That means this schedule only has to be
# "often enough" to catch newly-eligible drops in good time — it does NOT need
# to line up with any particular event, and double-firing causes no harm
# because each function dedupes. dispatch-post-drop-thankyou additionally
# self-gates to an 08:00–11:00 Europe/London send window, so pinging it on the
# */30 cron all day is fine — it only actually sends in the morning.
#
# Both steps share ONE runner (two steps in one job, not two jobs) so the cron
# does not double GitHub Actions minutes. The thank-you step uses
# `if: always()` so it still runs even if the interest-open ping fails.
#
# Because GitHub Actions cron drives this, there is no pg_net / Postgres
# scheduling required on the Supabase side. The only secret needed is
# INTERNAL_FUNCTION_SECRET (set as a repo Actions secret); the Supabase
# project URL is not secret, so it is hardcoded below.

name: comms-dispatch

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch interest-open emails
        run: |
          curl -sS -X POST \
            "https://tvqhhjvumgumyetvpgid.supabase.co/functions/v1/dispatch-interest-open" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_FUNCTION_SECRET }}" \
            -d '{}' \
            --fail-with-body

      - name: Dispatch post-drop thank-you emails
        if: ${{ always() }}
        run: |
          curl -sS -X POST \
            "https://tvqhhjvumgumyetvpgid.supabase.co/functions/v1/dispatch-post-drop-thankyou" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_FUNCTION_SECRET }}" \
            -d '{}' \
            --fail-with-body
